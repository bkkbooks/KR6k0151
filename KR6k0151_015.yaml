body:
  text: 古吳蕅益沙門智旭彚輯阿蘭若法第三分云清旦洗手取衣抖擻著大衣著頭上或肩上洗鉢放絡囊中取革屣行露杖持鑰出房閉戶推看牢不若不牢應更安扂若牢應推繩著內四顧看若無人見應藏戶鉤若有人見應更著隱處或持去在道行應常思惟善法若見人應先問訊言善來若欲入村安鉢置地著大衣以革屣打露杖寄村邊入村時應看巷相若空處相市相門相糞聚相入白衣家應看第一門相乃至第七門相若欲正衣應向壁右手捉杖左手捉鉢不應當道住不應屏處住不應迎取食若喚應往若得飯乾飯等不應并著一處若是一鉢應以物隔若樹葉皮若鍵𨩲若次鉢若小鉢應手巾裹不應選大家乞不應強乞要得若知當得應待乞已出村下道安鉢置地褋大衣著頭上肩上行時常思惟善法見人應先問訊善來至常所食處掃灑具水器殘食器牀座洗腳石水器拭腳巾若有餘阿蘭若比丘來應起遠迎為取鉢與座與水器等乃至澡豆洗手已淨潔別留殘食若有賊來應與次授水與彼阿蘭若比丘次授食與彼食時應看供給所須鹽醋菜水扇等若日時欲過應俱食食已應為取鉢與洗手若有餘食應與人非人等洗盛殘食器牀座等物復本處掃灑食處若有賊來應語此是水此是洗足物此是食為汝等故別留淨潔欲食便食阿蘭若比丘應善知夜時節善知方相善知星不應敷好臥具安眠應初夜後夜警心思惟比丘食時若人若非人應與食乃至一摶根本律云釋子出家耽著財利資生雜物不能見諦佛告苾芻我欲於此夏安居三月內宴默而住勿令苾芻見我除一為我請食者除長淨日時諸苾芻謹受佛教衆共立制不得輒見世尊若違制者令作墮罪說悔時有苾芻名小軍於王舍城作前安居世尊是後安居是小軍三月滿已隨意事了并作衣竟執持衣鉢順杜多行與諸門徒端嚴整肅往詣佛所徐扣門扇佛與開門小軍入禮佛而坐佛慰問曰小軍何意汝自端嚴端嚴圍繞小軍言大德若有人來欲求出家我便報言汝善男子當住阿蘭若當乞食但三衣糞掃衣樹下坐我為讚歎如是等事若言能者我度出家若言不能令隨意去若有欲受具圓或求依止或求讀誦或學如理作意寂念思惟來求我者皆如前報由此緣故我身端嚴門徒亦爾佛言善哉小軍汝能誓度無量人天利益無邊諸有情類來求法者令求安樂小軍當知若能讚歎杜多功德則為讚歎我身若有毀呰杜多功德即是毀呰我身何以故我於長夜稱揚如斯出要然汝不應違僧制令小軍白佛我實不知此處僧伽作何制令佛告之故且曰無問客主僧制須遵然阿蘭若苾芻與其饒益免依僧制若欲見我無問時節隨意來見小軍聞已歡喜奉行禮佛而退六衆苾芻即詣小軍詰其所犯小軍具以佛語告之時彼釋種諸出家者各生是念小軍來見即得承事親共言談我等在此而不能得由我多貪佛擯黜我我等宜於長衣鉢等觀之如病如癰如箭當持棄之即將所有諸物至阿難所阿難白佛佛令阿難受取置一大房語諸苾芻若有缺乏隨意取用釋種苾芻棄衣物已即詣佛所佛為說法令五百釋種即於座上自證圓滿破無明殼斷三界惑成阿羅漢三明六通八解成就得如實知我生已盡梵行已立所作已辦不受後有心無障礙如手撝空刀割香塗愛憎不起觀金與土等無有異於諸名利無不棄捨釋梵諸天悉皆恭敬律攝云非愚癡人堪住阿蘭若處設非多聞但明戒相亦得住於阿蘭若處十誦律云阿練若比丘有人來先應共語好正憶念和顏悅色不應垂頭應言善來應畜火及火鑽食食器水水器洗腳水水器淨水瓶常用水瓶盛滿水應知道知日知時分知星宿應誦修多羅毗尼阿毗曇應解應知四禪四果若未得者應知誦讀不應畜日珠月珠無人深山可畏處不應住毗尼序云若比丘獨處一身聽心念說戒自恣受衣受七日法受七日藥與一請及淨施衣物僧祇律世尊捨衆獨行偈曰若審得善伴共行住勇健遊處在諸衆其心常歡喜若不得善伴獨行住勇健捨於郡國邑無事如野象根本律大迦葉尊者偈曰所食無過一升飯眠臥惟須一小牀兩張氍布足遮身自外並是愚癡物四分律跋闍子比丘警阿難偈曰靜住空樹下心思涅槃法坐禪莫放逸多說何所作大衆會法第三分云衆僧破非法和合應在身口不生惡處坐如法和合事已滅應間闕一人坐處坐第四分云論法律時相降三歲聽共坐木牀相降二歲聽共坐小繩牀比丘至僧中有五法應以慈心一應自卑下如拭塵巾二應善知坐起見上座不應安坐見下座不應起立三不雜論世俗事若自說法若請人說法四若見僧中有不可事心不安忍應默然何以故恐僧別異故五五分律云入僧中應以五法一下意二慈心三恭敬四知次第坐處五不論說餘事根本雜事云年少苾芻應喚老者為大德老者喚少年為具壽分物法第三分云現前僧大得可分衣物聽差一人令分白二羯磨一比丘住得可分衣物或有客比丘來四人以上應持衣與一比丘令白二羯磨分若二人三人應彼此共三語分若一人心念口言此是我分有住處有比丘有比丘想欲別部分不成分突吉羅有比丘疑不成分突吉羅無比丘想不成分不犯無比丘有比丘想及疑皆成分突吉羅無比丘想成分無犯受衣成不成犯不犯亦爾有多知識比丘死有多僧伽藍園田果樹別房及物銅瓶銅盆斧鑿燈臺重物牀褥枕等多有守僧伽藍人車輿澡罐錫杖扇作器衣鉢坐具針筒不知云何佛言多知識無知識一切屬僧若衣鉢坐具針筒現前僧應分餘皆屬四方僧不應分二部僧多得可分衣物乃至唯有沙彌尼亦應分作二分唯有沙彌亦應分作二分若無沙彌尼比丘僧應分若無沙彌比丘尼僧應分若比丘在無比丘處命終彼處優婆塞或守園人應掌録俟五衆出家人來與之若無來者送與近處僧伽藍諸比丘所捨長衣應施僧或施佛塔不應與白衣及外道行波利婆沙摩那埵比丘亦應與分若被訶責等羯磨者可置地與或使人與若有作使白衣應計功多少與食與價病比丘死以衣鉢坐具針筒白二羯磨與瞻病者復有多三衣者以亡人常所持者與之應看此瞻病人若能極上瞻病與上三衣若中與中三衣若下與下三衣負債比丘命過聽持長衣償或無長衣賣三衣償之有餘者與瞻病人瞻病人應問病比丘何者是三衣何者是長衣汝負誰誰負汝汝應與誰若不問如法治有比丘在異處結夏安居已復於餘處住住日多處取安居物此謂有因緣受過七日法而往住也若二處俱等聽各取半此謂有因緣故四十日猶不能還本安居處不名破夏也不應此處安居受衣分已復於餘處受衣分夏安居未分衣便去應囑一人取分僧應與之若不囑若漫囑若受囑者忘皆非僧過比丘死多有衣物現前僧應分不應留過安居檀越為欲施塔乃至作會等現前僧大得可分衣物不應留此是非時衣應分一比丘住處大得夏安居衣物彼比丘應作心念此是我物若受若不受餘比丘來不應得分若大得衣物後僧破應分為二分若未得時僧破應問檀越隨彼所語與之若檀越言不知或言俱與應作二分諸比丘得可分衣物有比丘從此部往彼部不應與分有比丘往彼部未至便死衣鉢與所欲往處比丘被舉已命過衣鉢與共同羯磨舉僧問僧祇治罪法中被舉人無常衣鉢不應分應棄之今云被舉比丘命過衣鉢與同羯磨舉僧此復何從答僧祇意指不捨惡見此中通指一切舉罪兩不相背俱可從也有僧破為二部檀越請一處飯食并施衣施縷應隨檀越所與有僧得安居衣破為二部應數人多少分若未得安居衣僧破亦應數人多少分若得夏衣未得夏衣往餘部皆應與分凡有八種施衣若與比丘僧若與尼僧若與二部僧若與四方僧若與界內僧若與同羯磨僧若稱名字與若與一人皆應隨所施分屬第四分云四方僧物不應分不應自入不應賣買亦非僧所賣非多人乃至一人所賣若彼自入若分若賣買者不成自入不成分不成賣買犯偷蘭遮何等四方僧物若僧伽藍僧伽藍物房舍房舍物盆瓨釜鑊斧鑿燈臺諸雜重物繩牀木牀臥具木竹皆不聽分聽分果華若華上佛僧地作私房有上座客比丘來應起避更無有理以僧地入己有五法為僧分粥入地獄如射箭有愛有恚有怖有癡不知分未分有五法分粥生天如射箭不愛恚怖癡知分未分乃至差沙彌使亦如是僧祇律云餘處安居不應此處得衣分要是中安居是中得衣分除命難梵行難有五事不應與安居衣一被舉三見中若一一見不捨作舉羯磨但除此不捨惡見舉則餘不見罪舉不懺悔舉及訶責羯磨等並可置地與或使人與也二罷道若彼依王力大臣力賊黨力來索能作不饒益者應與三無常若安居衣已集雖未分命垂終時囑與某甲死已應與四破安居不前安居不後安居五去時不囑取衣分若比丘雖不在此安居檀越為彼故設供應與分若施家欲通與餘比丘隨檀越意應與有四種物隨語應屬現前僧何等四我施衣衣直物物直又有十種得應屬現前僧何等十時藥夜分藥即非時漿七日藥盡壽藥死比丘物施住處大會非時衣雜物請食沙彌無常物屬和尚五分律云沙彌命過其物現前僧分問亡沙彌物僧祇五分二說相違此應安從答若亡沙彌本是和尚撫育則應從僧祇若亡沙彌久已同僧利養則應從五分蓋各舉一隅耳十誦律云與學沙彌當與大比丘等分分毗尼序云比丘貸塔物四方僧物用死後以衣鉢物計直輸還餘殘僧應分比丘衣鉢物貸塔用四方僧用死後以塔僧物計直還現前僧應分根本雜事云僧若得餅乃至極小猶如樹葉衆共分張若得衣乃至極少堪作燈炷衆亦共分若得上價㲲賣取錢貝然後共分尼陀那云苾芻於尼寺死衣鉢應還苾芻苾芻尼死僧寺衣鉢還尼若處無苾芻者尼即應受若處無尼衆者苾芻應取有四種物皆不應分一四方僧物二窣堵波物三衆家病藥四寺資産物設大會時多獲珍財據合得者隨次準法平分衆若多者應可千人與其一分各自分之或復百人或三十人乃至十人而為一分令自分取十人分中若一身死已分衣竟亡人之分應入僧伽如其未分九人合得多亦準斯目得迦云不應持此處物與餘住處應隨定處而受用之若私與者應全償直若不還者得重越法罪僧不應受病比丘三衣設受不應分散見缺應還施僧尼二衆財物應問施主隨語而分二衆利物應共平分求寂男女三分與一學戒女及欲受戒人二分與一請食施物苾芻與尼計人分施不應中半設法會時所獲施物亦應分與尼衆若施主本意惟供此處住寺之人不通餘人者若有來食並須計物酬價律攝云若安居人有緣出行囑授而去應取其分若不囑授則不應取若受囑人不為取者應以己物準數酬還苾芻命過若苾芻來及五時者應與分一打犍椎時二誦三啓無常經時三禮制底時四行籌時五作白時若衆不和集或無秉法人應為初後法謂取亡人少財許物或兩錢等於衆首上座及最下座各行與之用為定記然後現前僧如常共分更不須作法若作初後法竟有人來者不應與分若前四時有後二時無亦應與分若作自己現於界內應合得者皆應受利若不作白不作初後法者但是世尊聲聞弟子所有現在瞻部洲中或住餘處悉皆有分所有經論並不應分當貯經藏四方僧共讀其外書賣之現前應分所有券契之物若能早索得者即可分之如未得者卷貯僧庫後時得充四方僧用若苾芻病作如是語我死之後可持此物與彼人者是俗人法不成囑授此物應分對面授者便為善與其死尸應焚燒供養誦經事了然後分物若亡人寄物即於物所在處衆共分之毗尼母經云比丘存時所有經律應處分與能讀誦者若不及處分現前僧應與能讀誦者不應分賣問亡比丘經律論律攝母論二說不同此應安從答經論貴在流通讀誦但除分賣餘可隨時斟酌說法法第二分云聽說義不具說文句不應二比丘共一高座說法不應相近敷高座說義互求長短不應共相逼切不應同聲合唄不應過差歌詠聲說法歌詠聲說法有五過失一自生貪著愛樂音聲二聞者生貪三聞者習學四長者譏嫌生慢五靜寂之處緣憶音聲以亂禪定第四分云若比丘說相似文句違法毗尼此比丘令多人不得利益作諸苦業以滅正法若隨順文句不違法毗尼此比丘利益多人不令作衆苦業正法久住乃至若比丘非制而制是制便斷如是漸漸令戒毀壞令多人不得利益作衆苦業以滅正法若比丘非制不制是制不斷如是漸漸令戒成就利益多人不作苦業令正法久住是故汝等非制不應制是制不應斷當隨佛所制戒而學問今觀五百問經典衆部律多有相違又觀百丈清規亦甚與律不同後人遵行得無壞正法不答正法滅壞全由律學不明五百問經的約後人附會增添昭彰可識即百丈清規久失懷悔禪師本意並是元朝流俗僧官住持杜撰增飾文理不通今人有奉行者皆因未諳律學故也佛告比丘有四種廣說何等四若比丘如是語諸長老我於某甲某城從佛聞受持此是法是毗尼是佛教若聞彼說不應便生嫌疑亦不應訶應審定文句已尋究修多羅毗尼檢校法律若不相應違背於法應語彼比丘汝所說者非佛所說或是長老不審得佛說何以故我尋究法律不與相應長老不須誦習亦莫教餘比丘今應棄捨若尋究法律相應應語言長老所說是佛所說審得佛語何以故我尋究法律相應不違背長老應善持誦習教餘比丘勿令忘失此是初廣說復次若言我於某村城和合僧中上座聞此是法等亦復尋究檢校若不相應應語言此非佛所說是彼僧及上座不審得佛語長老亦爾乃至今當棄之若相應應語言是佛所說彼僧上座及長老亦審得佛語乃至勿令忘失此是第二廣說三者若言從知法毗尼摩夷多比丘所聞亦應如是四者若言從知法毗尼摩夷一比丘所聞亦應如是根本律云於上座處置師子座若是定處甎為踏道若處不定應為木梯法師棄唾應安唾器慳法招五過失一得生盲二無智慧三遠離佛法四室有怨家五不入聖位命終墮地獄雜事云師子座下應作承足牀或以石支足律攝云有五種人不應為說毗奈耶藏謂性無所知強生異問或不為除疑而問或試弄故問或惱他故問或求過失故問宣說聖言不應求利以為活命若說非法上座應遮又說法人不應多領門徒以為侍從彼自隨行者無犯說法之師若他不請輒為人說得越法罪十誦律云聽法時上座來不應遣下座起若二師來恭敬故自起不得起他有五種人不應為說毗尼試問無疑問不為悔所犯問詰問不受語問月六齊日無病比丘應和合集一處說法若外道論議師懷嫉妒心來欲破說法當如法難詰降伏莫瞋惡口說法人應一心說法生慈悲利益心當淨潔明了莊嚴語言次第相續辨才無盡隨順諸法實相為法故說不為利養毗尼序云說法時聽法時上座來不應起上座亦不應驅下座起五分律云月八日十四日說法十五日布薩不應作歌詠聲說法白衣散華若落比丘頭及衣上應拂去落高座上無苦毗尼母經云說法比丘當籌量大衆應說何法而得受解若應聞深法當為說深應聞淺法為說淺法不益前人名為惡說復次應除貪心不染心不惡心不愚癡心不自輕心不輕大衆心應慈心喜心利益心堪忍心不動心無惑心立此等心應當說法復次不應因餘緣說法應故說法以法重難聞此法是寶是藥能利益人是以故說乃至一四句能使前人如實解者於長夜中利益安樂聽引經中要言妙辭直顯其義讀誦法根本律云多聞有五種利益一者蘊善巧二者處善巧三者界善巧四者緣起善巧五者於其所須教誡教授不求於他雜事云許二事作吟詠聲一謂讚大師德二謂誦三啓經不解吟詠者應在屏處學不應歌詠引聲而誦經法夜可然燈誦經夏月損蟲應作燈籠明慧多聞強記能摧外道者方可學習外書於日初分及以中後可讀佛經待至晚時應披外典夜三亦爾四分律云不應以外道言語雜糅佛經聽隨國俗言音所解誦習佛經問且如此土老莊及宣尼典籍引入經論以釋義旨為有罪不答教眼未開徒欲莊嚴章句廣引文辭是名雜糅若達實相法印能簡能收簡別分劑分明不屈不濫收則粗言細語皆第一義或復旁引曲譬令人開解皆順四悉無違妨也十誦律云下座欲教上座法者應在高處坐為尊法故上座欲從下座受法應在下處坐為尊法故亦聽下座教上座法者共等牀坐為上座故唄有五利身體不疲不忘所憶心不懈倦聲音不壞語言易解又諸天聞唄心則歡喜以外書音聲誦佛經者突吉羅薩婆多論云若比丘無處受誦乃至得從沙彌尼受法但求好時戒重德人作伴證明耳亦得從白衣受法但不得稱阿闍梨如是展轉皆得受法但消息令不失威儀問相傳云白衣說法比丘聽是佛法衰兆何得許從白衣受法耶答給孤長者每向祇園授新比丘經但必先禮足而後說法維摩居士時復彈偏斥小令諸聲聞菩薩皆悉喪辭但未嘗敢以師禮自居此皆佛世芳規豈名衰兆若稱白衣為師比丘反行禮敬又或從受外學則皆為非法矣五分律云聽學書不聽為好廢業為伏外道故聽讀外書不得隨書生見聽隨國音誦經但不得違失佛意不聽以佛語作外書語犯者偷蘭遮律攝云四威儀中皆得授法其受法者具三威儀為敬法故不應眠受弟子之法若老若少到彼師所合掌鞠躬方問四大安不應生敬仰直心無諂請決所疑一心善領不令忘失若無疑者如常受法禮足而退師亦應敬學徒勿生輕懱虗心授與於法無恪善領善答有忍有悲令受業者情無疲惱常給侍者應數教授性愚鈍者亦應偏教若吟咏聲授法得惡作罪不應讚誦外書典籍若為降伏異道自知有力日作三時兩分勝時應學佛法初日中日一分下時應習外典向晚不應計年月以為三分坐禪法第三分云比丘睡眠比坐當覺之當用禪杖若故復睡眠當捫眼若以水洗面若自摘耳鼻若摩額上若披張衣以手摩身若起出戶外瞻視四方仰觀星宿若至經行處經行守攝諸根令心不散十誦律云取禪杖時應生敬心睡者不可信築者可信有五法以禪杖築他一者憐愍二者不惱他三者睡四者頭倚壁五者舒腳聽著禪鎮作孔以繩貫孔繩頭施紐掛耳上去額四指著禪鎮禪鎮一墮一舒腳二墮二舒腳三墮應起行聽作時節兩時夜時晝時七日時常坐禪時毗尼序云坐禪時不應計大小不應驅去根本雜事云北方有一國王送二童子與勝光王一名駝索迦一名波洛迦一是斷見一是邪見遠近咸知後因給孤長者巧便攝受令掃寺地夜見阿羅漢神變及見諸天聽法生正見心詣佛聞法出家證果勝光嫌恥佛令於長者家食時行水以彰勝德王乃歎服苾芻問其往因佛言迦葉佛時二人出家為伴往詣邊國無師教授自修禪定實無所證作證解心臨終誹謗正法生邪見心作是語迦葉波佛誑惑世間斷盡煩惱得阿羅漢我於諸惑不能斷盡何有餘人得阿羅漢由謗聖法生邪見故經歷多時墮於惡趣復於多生常處邊地起邪見心由彼讀誦受持蘊處界緣生道理及處非處悉皆善巧由斯業力於我法中出家得道無師習定有如是過是故不應無師輒自習定善見律云若能善持舍摩他非但二十年三十年乃至八十年百年煩惱不起是以生增上慢奢摩他此翻為止若體真止等並是有慧之定不起增上慢失若惟修事定止息粗浮亂想縱使展轉伏除下染得至非想非非想定認作涅槃仍是增上慢耳雜法僧祇律云六念者一念知日月數二念知食處三念知受戒時夏數四念衣知鉢受持及淨施者五念食同別六念身強羸第四分云不嚼楊枝五過一口氣臭二不別味三增熱陰四不引食五眼不明嚼楊就五利反上可知楊枝極長一磔手極短四指不應嚼奇者雜葉者不應純嚼皮應在屏處嚼僧祇律云若齒木難得當截所嚼處棄之洗已殘者明日更用齒木極長十六指極短四指以上南海寄歸云朝嚼齒木盥漱清淨方行禮敬不嚼齒木便利不洗食無淨觸將以為鄙四分律云應順風掃地有五種掃地不得大福德不知逆風順風掃不滅迹不除糞不復掃本處有五法得大福德反上可知若上座在下風應語言小避我欲掃地根本雜事云給孤長者每晨掃寺內地一時他緣不遑入寺世尊見地不淨即自執欲掃時舍利子等諸大聲聞皆共掃已入食堂坐佛告苾芻掃地有五勝利一自心清淨二令他心淨三諸天歡喜四植端正業五命終生天後給孤長者入林聞佛及大弟子躬掃林中不敢足蹈愧悚不前佛令口誦經法當可前行由佛敬重法故諸阿羅漢皆尊敬法第四分云經行有五事好堪遠行能思惟少病消食飲得定久住不應晝眠若老病遠來聽入房內閉戶眠五分律云至廁前謦咳彈指令廁中人非人知廁中人亦應彈指謦咳根本雜事云若不洗淨不應繞塔行道禮佛讀經禮他受禮噉食入衆坐僧牀座由身不淨不如法故諸天不喜所持呪法皆無效驗若作齊供書經造像得福寡薄百一羯磨云大便時至應持水瓶向大便室置衣一邊持土十五塊廁外安之一一聚如半桃許安摶上或板上近水流處置灰土物長一肘闊一磔手更持土三塊并拭體物持水瓶入廁橫扂其戶旋轉既訖葉籌淨拭次取三土用左手三遍洗淨即將左腋挾瓶右手排扂還以右手攜瓶向洗手處蹲坐瓶安左腿以肘壓之取其七土一一別洗左手其餘七土兩手俱洗餘有一聚用洗君持然後灈足取衣而去既至房中淨水漱口僧祇律云若下部痔病不得洗者當用軟物拭若布若樹葉不得廁上嚼齒木覆頭覆右肩應偏袒善見律云臨終睡時應先念佛念法念僧念戒念天念無常於六念中隨一一念問備閲毗尼集要及四分律藏乃至僧祇根本五分十誦善見毗尼母等但見廣明戒法不見別有偈呪今時律學推以偈呪為事此義云何答法門無量雖各有弘功而初機向道必一門深入既預比丘之列當知律學為先欲明律學綱宗又惟二事最急一者熟誦戒法了達持犯開遮二者攝持威儀專修四念處觀是必二六時中常爾一心念無錯亂方能打成一片斷惑證真若頭緒多端則終難入道今之願偈本出華嚴種種真言皆屬蜜部論法門雖不可思議約修證則各有本宗隨自宗而專修無間則三昧易成採衆華而中無線貫則風吹必散收之則全是若一偈若一偈若一字皆為道種揀之則全非律不律顯不顯蜜不蜜僅成散善此正法所以漸衰而末運所以不振也有志之士不若專精戒律辦比丘之本職利根者固能即戒而得究竟全收顯密神功鈍根者亦能由戒而作階梯漸登顯密堂奧庶幾學有本源不受多岐亡羊之誚耳第三分佛告比丘順汝心念攝持威儀此是我教云何順汝心念觀內身身意止即身念處精勤攝持念不散亂調伏貪嫉世間憂惱觀外身內外身受意即心法亦如是如是比丘得正心念云何攝持威儀若出若入屈伸俯仰執持衣鉢若飲若食若服藥大小便利若眠若覺若來若去若坐若住若語若默常爾一心是謂比丘攝持威儀二六時中四威儀內一心修習四念處觀此律學之綱宗也根本律云出家五利一者我自得利不共他有二者自知我是卑賤之人被他驅使既出家後受人恭敬讚揚禮拜三者當得安隱無上涅槃四者命終當生天上五者常為諸佛及聲聞衆諸勝人類之所讚揚佛說犯戒罪輕重經後漢安息三藏沙門安世高譯如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者大目犍連晡時從禪定覺往至佛所頭面禮足卻坐一面合掌恭敬而白佛言世尊意有所疑今欲請問惟願聽許佛告目連恣汝所問當為汝說目連即白佛言世尊若比丘比丘尼無慚愧心輕慢佛語犯衆學戒如是犯波羅提提舍尼波逸提偷蘭遮僧伽婆尸沙犯波羅夷得幾不饒益罪惟願解說佛告目連諦聽諦聽今為汝說若比丘比丘尼無慚無愧輕慢佛語犯衆學戒如四天王壽五百歲墮泥犁中於人間數九百千歲應云九百萬歲或千上缺十字也復次目連若無慚愧輕慢佛語犯波羅提提舍尼如三十三天壽千歲墮泥犁中於人間數三億六十千歲應云三千六百萬歲復次目連若無慚無愧輕慢佛語犯波逸提如𦦨摩天壽二千歲墮泥犁中於人間數一十四億四十千歲應云一萬四千四百萬歲復次目連若無慚愧輕慢佛語犯偷蘭遮如兜率天壽四千歲墮泥犁中於人間數五十億六十千歲應云五萬七千六百萬歲復次目連若無慚愧輕慢佛語犯僧伽婆尸沙如不憍樂天即化樂天壽八千歲墮泥犂中於人間數二百三十億四十千歲應云二十三萬零四百萬歲復次目連若無慚愧輕慢佛語犯波羅夷如他化自在天壽十六千歲墮泥犂中於人間數九百二十一億六十千歲應云九十二萬一千六百萬歲尊者目連聞佛所說歡喜奉行問此問既真餘五百問何得是僞答依真乃得附僞以僞故向年拈鬮取決拈得真雜之鬮也戒相攝頌按僧祇律結集之時先出攝頌後出律文根本律中亦有攝頌蓋為初機便於記誦也今四分律既無此頌設欲傍取他部則次序不類欲仍其舊又慮初機記誦為難故輒援例頌之俾初學先誦此則五篇戒相已提挈其綱領矣沙門智旭敬述淫欲盜五錢故斷人類命無知妄言證除增上慢人是四波羅夷犯者不可救弄失精觸女粗惡索淫供媒嫁房過量大房不處分無根謗取片破僧及伴黨被擯反嫌僧惡性不受語前九初便犯後四皆三諫是十三僧殘二十僧中悔不定法有二三二隨所治捨墮有三十長衣離衣宿持足過一月取非親里尼及使浣染打從非親里乞過受自恣請求益價合作索衣過六反是為初十法蠶綿作臥具鈍黑不雜色不滿六年持坐具不帖故持羊毛遠行使泥浣染擘受金銀賣買販賣為二十長鉢更求好非親織作衣許直求好織與衣後瞋奪殘藥過七日雨衣前求用過畜急施衣後月離六夜回僧物入己是為三十法物向僧中捨波逸提說悔單提九十事妄語毀呰語兩舌女同室未受戒三宿共誦向說罪及說過人法與女過說法掘地是初十損壞鬼神村異惱及嫌罵露敷僧臥具并房中不舉強奪止宿處牽他出僧房閣坐脫腳牀蟲水澆泥草覆房過三節此是第二十自往教授尼僧差教至暮譏論教尼人衣與非親里作衣屏處坐期行及乘船尼讚歎得食女同行三十過受一食施展轉及別衆過三鉢受請不作餘食法故使他人犯非時與殘宿不受索好食第四十法竟自與外道食詣餘家不囑食家強安坐及在屏處坐露地獨與女使他不得食過受請與藥觀軍過三宿宿時觀軍事是名第五十飲酒水中戲擊攊不受諫怖他過洗浴露地輒然火戲藏他衣物不問主著衣新衣不壞色第六十法竟故殺畜生命飲用有蟲水惱他覆他罪授戒不如法發起已滅諍同賊伴共行惡見諫不捨供給與同事畜被擯沙彌波逸提七十拒諫輕訶戒無知違羯磨不與欲後悔屏聽語瞋打手搏僧殘謗八十波逸提入王宮捉寶非時入聚落高牀兜羅貯骨牙角針箇坐具覆瘡衣雨浴衣過量及等佛衣量九十單提竟如法悔清淨不悔墮無疑受非親尼食不止尼代索學家恐處受四名悔過法衆學著衣初入白衣舍法受食大小便說法恭敬塔攜手行上樹絡杖等應學現前及憶念不癡并自言覓罪多人語草覆七滅諍如是諸篇聚比丘所應知如說修行人諸佛共稱美音義唄音敗或云唄匿或云梵唄此翻讚歎蘊善巧依五蘊而修四念處觀具足三十七品乃至入三脫門也處善巧善知六根六塵內外十二處攝一切法及知無常無我等界善巧善知十八界與五蘊十二處開合不同無常無我其理不二又知身中六界所謂地水火風空識亦並無常無我也緣起善巧善知十二因緣流轉還滅之法處非處善巧為善上升斯有是處為善下墜無有是處為惡下墜斯有是處為惡上升無有是處了知此等正因果法也𦦨摩此翻時分又翻妙善兜率此翻妙足亦翻知足
