body:
  text: 古吳蕅益沙門智旭彚釋六十八惡見不捨戒大乘犯重是謗法故若比丘作如是説我知佛所説法行淫欲非障道法彼比丘諫此比丘言大德莫作是語莫謗世尊謗世尊者不善世尊不作是語世尊無數方便説犯淫欲是障道法彼比丘諫此比丘時堅持不捨彼比丘乃至三諫捨此事故若再三諫捨者善不捨者波逸提緣阿梨吒比丘生是惡見諸比丘諫而不捨白佛佛令僧為作訶諫白四羯磨而結此戒相三羯磨竟波逸提遮彼莫捨者突吉羅比丘尼波逸提餘三衆突吉羅五分律云一比丘屏處諫捨者一突吉羅多比丘往諫捨者二突吉羅僧往諫捨者三突吉羅白竟捨者四突吉羅一羯磨竟捨者五突吉羅二羯磨竟捨或三羯磨未竟捨者六突吉羅三羯磨竟若捨若不捨波逸提證大般若經云若染色欲於生梵天尚能為障况得無上正等菩提是故菩薩斷欲出家能得無上菩提非不斷者菩薩摩訶薩於五欲中深生厭患不為五欲過失所染以無量門訶毀諸欲欲為熾火燒身心故欲為穢惡染自他故欲為魁膾於去來今常為害故欲為怨敵長夜伺求作衰損故欲如草炬欲如苦果欲如利劒欲如火聚欲如毒器欲如幻惑欲如暗井欲如詐親旃陀羅等舍利子諸菩薩摩訶薩以如是等無量過門訶毀諸欲六十九黨惡見人戒大乘同制若比丘知如是語人未作法如是邪見而不捨供給所須共同羯磨止宿言語者波逸提緣阿梨吒不捨惡見諸比丘白佛佛令僧作惡見不捨舉白四羯磨時六羣供給所須等故制釋未作法者被舉未解不捨者僧訶諫而不捨所須有二一者法教修增上戒增上意增上智學問誦經二者財供給四事同羯磨者同説戒相比丘尼波逸提若隨順被舉比丘三諫不捨波羅夷不犯者不知有是語人及病倒持縛命難等五分律云共語語語波逸提共坐坐坐波逸提共宿宿宿波逸提共事事事波逸提雖捨惡見僧未解羯磨亦波逸提若作惡見僧未羯磨突吉羅若不知及不如法羯磨不犯十誦律云若教他法若從受法若與他財若取他財若共宿一切波逸提根本律云若彼身病看侍無犯或共同居令捨惡見亦無犯七十畜被擯沙彌戒大乘同制若比丘知沙彌作如是言我從佛聞法若行淫欲非障道法彼比丘諫此沙彌如是言汝莫誹謗世尊謗世尊者不善世尊不作是語沙彌世尊無數方便説淫欲是障道法彼比丘諫此沙彌時堅持不捨彼比丘應乃再三訶諫令捨此事故乃至三諫而捨者善不捨者彼比丘應語彼沙彌言汝自今以去不得言佛是我世尊不得隨逐餘比丘如諸沙彌得與餘比丘二三宿汝今無是事汝出去滅去不應住此若比丘知如是衆中被擯沙彌而誘將畜養共止宿者波逸提緣跋難陀有二沙彌作是惡見佛敕比丘為作訶諫白四羯磨三諫不捨乃令僧作滅擯白四羯磨六羣知僧滅擯而誘將畜養共止宿故制相若自畜若與人若自誘若教人若共宿盡波逸提比丘尼波逸提不犯者不知是被擯乃至命難等根本律云若令彼捨惡見雖權攝受無犯附律攝云凡不見罪等被捨置人共為受用皆得惡作僧祇律云若有人為二師所嫌餘比丘不得誘引言我與汝四事汝當在我邊住受經誦經若觀彼人必當捨戒就俗者得誘取已當教言汝當知二師恩甚重難報汝應還彼自下住七十一拒諫難問戒大乘同制若比丘餘比丘如法諫時如是語我今不學此戒當難問餘智慧持律比丘者波逸提若為知為學故應難問緣起自闡陀比丘故制相比丘尼波逸提餘三衆突吉羅不犯者諫者癡七十二輕訶説戒戒此是性罪大乘同制若比丘説戒時作是語大德何用説是雜碎戒為説是戒時令人惱愧懷疑輕訶戒故波逸提緣衆比丘誦正法毗尼六羣恐其通利數舉我罪往語之言若欲誦者當誦四事及十三事餘不應誦云云餘比丘察知其意欲滅法白佛結戒相毀呰阿毗曇及餘契經突吉羅比丘尼波逸提沙彌等毀所受戒等亦突吉羅不犯者語令病瘥乃誦語令先求果證不為滅法五分律云若欲令人遠離毗尼不讀不誦而毀呰者波逸提若欲令波羅提木叉不得久住而毀呰者偷蘭遮毀呰經亦如是毀呰餘四衆及在家二衆戒突吉羅比丘尼毀呰二部戒波逸提毀餘五衆戒突吉羅若恐新受戒人生疑廢退心教未可誦戒不犯證薩婆多論云何以訶戒經罪重餘經罪輕以戒是佛法之平地萬善由之生又一切佛弟子皆依而住若無戒則無所依又入佛法之初門若無戒者無由入泥洹城又是佛法之瓔珞莊嚴佛法是故訶毀罪重善見律云若學毗尼者有五德一身自護戒二能斷他疑三入衆無畏四能伏怨家五令正法久住下至五比丘解律在世能令正法久住若中天竺佛法滅邊地有五人受戒滿十人往中天竺得與人具足戒是名令正法久住如是乃至二十人得出罪是名令正法久住又持律有六德一者守領波羅提木叉二者知布薩三者知自恣四者知授人具足戒五者受人依止六者得畜沙彌若不解律但知修多羅阿毗曇不得度沙彌受人依止以律師持律故佛法住世五千歲七十三無知戒大乘同學若比丘説戒時作如是語我今始知此法戒經所載半月半月説戒經來餘比丘知是比丘若二若三説戒中坐何況多彼比丘無知無解若犯罪應如法治更重增無知罪語言長老汝無利不善得汝説戒時不用心念不一心攝耳聽法彼無知故波逸提緣六羣中一人自知罪障恐清淨比丘舉發先往語言我今始知云云諸比丘察知其故白佛結戒相若不與彼罪者突吉羅比丘尼波逸提沙彌等不知自所受戒突吉羅不犯者未曾聞説戒今始聞若未曾聞廣説今始聞乃至錯説等僧祇律云受具足已應誦二部毗尼若不能者當誦一部乃至若復不能當誦初篇戒及偈布薩時應廣説五篇乃至若復不能當説初篇及偈餘者僧常聞不誦者越毗尼罪僧中應使誦利者説餘人專心聽不得坐禪及作餘業若於四事乃至七滅諍法中間隨不聽隨得越毗尼罪一切不聽波逸提此罪不得趣向人悔當衆中持戒有威德人所敬難者於前悔前人應訶言長老汝失善利半月説波羅提木叉時汝不尊重不一心念不攝耳聽法訶已波逸提悔過七十四違反羯磨戒大乘同學若比丘共同羯磨已後如是言諸比丘隨親厚以衆僧物與者波逸提緣沓婆摩羅子知僧事設會布施不得住衣服破壞衆僧白二羯磨以衣與之六羣亦在衆中後乃更作是語故制相比丘尼波逸提沙彌等不得同羯磨若私譏議亦突吉羅不犯者其事實爾薩婆多論云凡僧中執勞苦人若大德其貧匱者僧和合與盡得與之但言不應與盡犯七十五不與欲戒大乘同學若比丘衆僧斷事未竟不與欲而起去波逸提緣衆比丘集一處論法毗尼六羣疑為我等作羯磨從座起去衆僧止而不住故制釋事者十八破僧事法非法乃至説不説相出戶外波逸提一足在戶外等突吉羅比丘尼波逸提不犯者有僧事塔事瞻病事與欲而去若口噤不能與欲及非法羯磨等僧祇律云若大小便須臾還不廢僧事無罪若説法説毗尼聽多比丘誦經聽他受經聽他誦經盡應白去不白去者越毗尼罪若誦經者止誦作餘語去者無罪五分律云若屋下羯磨隨幾過出一一出波逸提若露地羯磨出去僧面一尋波逸提若神通人離地四指波逸提若僧不羯磨斷事出去突吉羅若私房斷事來而去突吉羅若僧不羯磨斷事及私房斷事沙彌得在其中起去突吉羅式叉摩那沙彌尼亦如是七十六與欲後悔戒大乘比丘同學若比丘與欲已後悔者波逸提緣六羣中有犯事者恐僧彈舉於一切時六人相隨不離僧不得與作羯磨後於作衣時喚之報言作衣不得往僧言若不得來可令一二比丘持欲來即令一比丘來僧即與此比丘作羯磨此比丘還六群悔言彼作羯磨者非為羯磨羯磨不成我以彼事故與欲不以此事諸比丘嫌責白佛結戒相比丘尼波逸提不犯者實非羯磨五分律云僧不作羯磨斷事後訶突吉羅七十七屏聽諍後語戒此是性罪大乘同制若比丘比丘共鬬諍已聽此語向彼説波逸提緣起自六群比丘故制釋聽者屏聽相往而聞波逸提不聞突吉羅欲往不往及一切處二人共語不以彈指謦咳驚之盡突吉羅比丘尼波逸提餘三衆突吉羅不犯者為破非法羯磨及無利益事五分律云默聽餘四衆語突吉羅十誦律云為和合故往聽不犯善見律云往去步步突吉羅至聞處波逸提為欲自改往聽不犯僧祇律云二比丘在堂裏私語若比丘欲入應彈指動腳作聲若前人默然者應還出若故語不止者入無罪一比丘先在堂內坐二比丘私語從外來先坐者應作聲若彼默然者堂內比丘應出前後行亦爾若比丘共餘比丘鬬諍結恨作是罵詈我要當殺此惡人比丘聞已得語彼好自警備我聞有惡聲若有客比丘作是言我等當盜某庫藏某塔物某僧淨廚某人衣鉢知事人聞已默然應還僧中唱言諸大德某庫藏某塔物某僧淨廚某人衣鉢當警備我聞惡聲使前人知若比丘多有弟子日暮竊按行諸房知如法不若聞説世俗語不得便入訶責待自來然後誨責若聞論經説義問答不得便入讚歎待自來然後讚美七十八瞋打比丘戒大乘同制若為相報犯輕若無端起恚及忿恨增上不受彼懺者犯重若比丘嗔恚故不喜打比丘者波逸提緣六群中有一人瞋打十七羣比丘被打人高聲喚言莫爾比房聞之白佛結戒相手石杖等打皆波逸提比丘尼波逸提餘三衆突吉羅不犯者病須椎打噎須椎脊觸令聞語及誤觸等薩婆多論云打得戒沙彌即與學沙彌也盲瞎聾啞波利婆沙摩那埵比丘悉波逸提失雙目名盲失一目為瞎先有盲瞎聾啞病者不得受比丘戒已受具戒而得此病仍是比丘故也摩得勒伽云打三種人突吉羅謂賊住不得戒本不和合受五法者本犯戒犯四重禁失比丘性若以把沙把豆等物擲衆比丘隨所著隨得爾所波逸提不著突吉羅五分律云打餘四衆乃至畜生突吉羅僧祇律云若惡象馬牛羊豬狗等來不得打得捉杖木瓦石等打地作恐怖相若畜生來入塔寺觸突形像壞華果樹亦得以杖木瓦石打地恐怖令去七十九瞋搏比丘戒大乘輕重同上説若比丘瞋恚不喜以手搏比丘者波逸提緣亦起自前人故制相比丘尼等同上不犯者他欲打舉手遮遮一切難舉手招喚誤觸等十誦律云以手腳掌向他波逸提舉餘身分向他突吉羅五分律云手擬及波逸提不及突吉羅八十無根僧殘瞋謗戒大乘同制向同法者説犯輕若向外人説犯重若比丘瞋恚故以無根僧伽婆尸沙謗者波逸提緣亦起自前人故制釋三根如僧殘法中説相了了不了了同前比丘尼等同前不犯者説實令改等八十一輒入宮閾戒大乘同制末世尤所當慎設令喚請亦不應輒入若具大神力威德不犯若比丘剎利水澆頭王種王未出未藏寶而入若過宮門閾者波逸提西國紹王位時取四海水以灌其頂故名水澆頭王種即灌頂王也緣末利夫人勸波斯匿王既得信樂聽諸比丘入出宮閣無有障礙迦留陀夷入宮王與夫人晝日共眠遙見尊者即起披衣以所披衣拂座令坐夫人失衣露形慚愧而蹲尊者還僧伽藍語諸比丘比丘嫌責白佛結戒釋王未出者王未出采女未還本處薩婆多論云王者聚落主已上也相比丘尼波逸提餘三衆突吉羅不犯者王已出已藏寶有所奏白若被請喚及被執等律攝云入王宮有十過失一宮人有娠便疑苾芻行不淨行二宮中失物三密言出外四王子有損五王身有損六舉大臣七黜國相八國人苦害九往征餘國十輒聚軍師如是等事咸疑苾芻八十二捉寶物戒此是遮罪大乘為衆生故不問處所但酌機緣若比丘若寶及寶莊飾自捉若教人捉除僧伽藍中及寄宿處波逸提若比丘在僧伽藍中若寄宿處捉寶若以寶莊飾自捉教人捉當作是意若有主識者當取作如是因緣非餘緣有外道居士路行忘千兩金囊衆比丘見而持去以待識者居士趨還即出與之反以為少訟於波斯匿王王鞠知其詐罰其家財盡沒入官故制除僧伽藍者毗舍佉母脫身瓔珞置樹下往見世尊心存於法忘取還家比丘白佛故聽取舉寄宿處者比丘行無住處村寄宿巧師舍巧師以金銀置舍內而去比丘為守護故竟夜不眠還以白佛故聽收舉釋根本律云寶謂七寶寶類者謂諸兵器弓刀之屬及音樂具鼓笛之流相如上寶物自捉教人捉當識囊器相識裹相識繫相應解囊器看知幾連綴幾未連綴幾方幾圓幾故幾新若有求索者應問汝物何似若相應應還若不相應語言我不見如是物若有二人俱來索亦如是問答若二人語俱相應應持物著前語言是汝等物各取若不爾盡突吉羅比丘尼波逸提不犯者若供養塔寺莊嚴具為堅牢故收舉十誦律云捉偽珠突吉羅人間金銀寶地牀器比丘不應行坐用天上金銀寶地牀器比丘應行坐用根本雜事云不應於寶器中食或往天上或至龍宮無餘雜器者設金寶器亦應取食證律攝云佛在鷲峰詣城乞食遇大雨水蕩崖崩有伏藏現告阿難陀汝應觀此是大害毒阿難言世尊實是可畏毒有一採根果人聞而往觀見是伏藏念言願此害蛇恆螫於我父母妻子眷屬亦不辭痛遂盡持歸隨意受用未生怨王見其富盛遣使往問汝於何處得王伏藏報言不得捉以送王王自問之亦云不得王即準法繫其眷屬將付屠人彼人悲泣隨屠者去高聲大喚阿難陀此是害毒此是害毒將刑有言法須返奏王便喚返問之彼人具答昔緣王時初信佛法不覺流淚告曰汝緣世尊獲斯珍寶罪雖合死我今釋汝并及眷屬應將此物供養佛僧既蒙釋免遂辦上供奉請佛僧佛為説法便獲初果緣斯不聽比丘捉寶附僧祇律云比丘見寶物若無人識者應停至三月已塔園中得者即作塔用僧園中得者當作四方僧用若故壞僧房塔院欲更修治堀地得寶藏者淨人不可信應白王王若須應與若施應用設己用王知索者應乞塔物僧物還有淨人可信得取停至三年已用作塔事僧事如上若寶藏上有鐵券姓名亦應如實答作新僧房等得物亦爾八十三非時入聚落戒大乘同學若比丘非時入聚落不囑比丘者波逸提緣跋難陀非時入村與居士樗蒱居士不勝以慳嫉故便言比丘晨朝入村為乞食故非時入村為何事耶故制或有僧事塔事瞻病事等聽囑餘比丘而去若獨處一房當囑授比房釋非時者從中後至明相未出相入村門波逸提一腳入村及共期不去等突吉羅比丘尼波逸提餘三衆突吉羅不犯者道由村過有所啓白若為喚若受請乃至命難等十誦律云餘比丘者謂眼所見若白已入聚落還所住處即以先白復至聚落波逸提若不白入聚落隨所經過大小巷隨得爾所突吉羅隨入白衣家一一波逸提若八難中一一難起不犯僧祇律云二比丘在阿練若住欲俱行展轉相白若一人説己行後人復欲行應白餘比丘若無餘比丘應作是念若道中若門若聚落邊見比丘當白白已然後入摩得勒伽云若無比丘應白餘四衆八十四作高牀戒大乘同學若比丘作繩牀木牀足應高如來八指除入陛孔上截竟若過者波逸提緣迦留陀夷敷高好牀座世尊訶責結戒釋律攝云佛八指者中人一肘薩婆多論云八指者一指二寸也相自作教他作成盡波逸提不成盡突吉羅為他作成不成盡突吉羅比丘尼波逸提餘三衆突吉羅不犯者他施己成者截而用之第三分云除寶牀餘在白衣舍應坐十誦律云應截己悔過若未截僧應敕令截不敕不聽盡突吉羅五分律云得高牀施應作是念此牀不如法我當更截不作是念受波逸提僧祇律云若自作終日坐上一波逸提起已還坐一一坐波逸提他牀而坐上越毗尼罪若客比丘來次第付得過量牀應語知事言借我鋸來問作何等答言此牀過量欲截令如法若言莫截檀越見或不喜若不久住鑿地埋腳齊量止若久住應齊埋處木筒盛腳勿使壞若檀越家坐牀腳高不得懸腳坐應索承機或索磚木承足若福德舍中牀高坐者無犯福德舍即施一食處八十五兜羅綿貯褥戒大乘同學若比丘作兜羅綿貯繩牀木牀大小褥成者波逸提緣六羣作此居士嫌其無愧無慈故制釋兜羅綿者白楊樹華楊柳華蒱臺華並易生蟲大褥為坐臥故小褥為坐故相犯輕重同上比丘尼等同上不犯者若鳩羅耶草文若草娑婆草若以毳劫貝碎弊物五分律云若坐坐坐波逸提若臥臥臥波逸提若他與受波逸提要先棄然後悔過若不爾罪益深十誦律云擲破却之然後悔過若未破僧應敕令破僧祇律云若貯枕枕頭支足越毗尼罪若病無罪八十六作骨牙角針筒戒大乘同學若比丘作骨牙角針筒刳刮成者波逸提緣羅閲城有信樂工師為比丘作骨牙角針筒廢家事業無復衣食世人言其求福得殃故制相犯輕重如上餘四衆突吉羅不犯者鐵銅鉛錫白鑞竹木𥯤舍羅草用作針筒十誦律云應破已悔過若未破僧應敕令破八十七過量作坐具戒大乘同學若比丘作尼師壇當應量作是中量者長佛二磔手廣一磔手半更增廣長各半磔手若過截竟波逸提緣佛見僧臥具不淨所汙聽諸比丘為障身障衣障臥具故作尼師壇六羣便作廣大尼師壇故制迦留陀夷體大不能坐向佛所從來道邊手挽尼師壇欲令廣大佛乃聽更增廣長各半磔手釋僧祇律云如來磔手二尺四寸此約小尺若約大尺可二尺許相犯輕重如上餘四衆突吉羅不犯者若得已成者裁割如量或疊作兩重十誦律云應截斷已悔過若未截僧應敕令截八十八過量作覆瘡衣戒大乘同學若比丘作覆瘡衣當應量作是中量者長佛四磔手廣二磔手裁竟過者波逸提緣比丘患癰瘡疥膿血汙身衣臥具佛聽作細耎衣覆瘡上著涅槃僧若至白衣家請坐應語言我有患若言但坐當褰上涅槃僧以此衣覆瘡而坐時六羣便多作廣長覆瘡衣故制相犯不犯同上餘四衆突吉羅十誦律云乃至瘡差後十日若過是畜波逸提應同長衣犯捨墮也應截己悔過若未截僧應敕令截八十九過量作雨浴衣戒大乘同學若比丘作雨浴衣應量作是中量者長佛六磔手廣二磔手半過者裁竟波逸提緣亦起自六羣故制相比丘尼浴衣過量波逸提十誦律云應截斷已悔過若未割截僧應敕令割截九十等佛衣量戒大乘同學若比丘與如來等量作衣或過量作者波逸提是中如來衣量者長佛十磔手廣六磔手是謂如來衣量緣尊者難陀短佛四指諸比丘遙見皆謂是佛即起奉迎至乃知是難陀諸比丘皆懷慚愧難陀亦懷慚愧佛制難陀著黑衣時六羣比丘與如來等量作衣或過量作故制相犯不犯同前餘四衆突吉羅僧祇律云當隨自身量僧伽梨有三種上者長五肘廣三肘中者長五肘一不舒手廣三肘一不舒手下者長四肘半廣三肘一不舒手多羅僧亦爾安陀會上中二種亦爾下者長四肘半廣二肘二不舒手律攝云若減此量不得本罪若過五肘已上皆得惡作十誦律云應截己悔過若未截僧應敕令截三結問諸大德我已説九十波逸提法今問諸大德是中清淨不三説諸大德是中清淨默然故是事如是持附回僧物與餘人戒大乘同學五分律云若比丘知檀越欲與僧物回與餘人波逸提難陀跋難陀以佛制戒不得回僧物入己即更互回以相與故制僧祇律中亦有此戒斷宜依此判罪也五九十波逸提法竟六四悔過法三初總標二別列三結問初總標諸大德是四波羅提提舍尼法半月半月説戒經中來釋律攝云謂於住處現在苾芻皆須一一別對陳説不同餘罪故受別名又犯罪已即須陳説不得停息亦異餘罪二別列四初受非親尼食戒至四恐處受食戒初受非親尼食戒大乘但觀可受不可受不問親里非親里然在末世特宜與尼疏絶為是若比丘入村中從非親里比丘尼若無病自手取食食者是比丘應向餘比丘悔過言大德我犯可訶法所不應為我今向大德悔過是法名悔過法緣舍衛城時世穀貴乞求難得蓮華色比丘尼乞食所得輒持與比丘後一長者乘車覲王尼因避道墮深泥中掩地而臥長者慈愍敕人扶出問知其故嫌責比丘不知義讓故制釋僧祇律云病者不謂小小病謂疥癩黃爛瘡痍癰痤人所惡賤相不病而自手受食食咽咽波羅提提舍尼沙彌突吉羅不犯者若親里若有病若置地與若使人與若在僧伽藍中與若在村外與若在尼寺與五分律云若比丘在村外尼在村內若比丘在村內尼在村外若比丘在空尼在地若比丘在地尼在空如是受食皆突吉羅二不止尼代索食戒大乘同學若比丘至白衣家內食是中有比丘尼指示與某甲羮與某甲飯比丘應語彼比丘尼如是言大姊且止須比丘食竟若無一比丘語彼比丘尼如是言大姊且止須比丘食竟者是比丘應悔過言大德我犯可訶法所不應為我今向諸大德悔過是法名悔過法緣六羣比丘與衆比丘在白衣家食六羣尼為六羣索羮飯乃越次與令中間比丘不得食故制相沙彌突吉羅不犯者尼自為檀越檀越令尼處分不故作偏與五分律云餘二女衆教益食不語言小却者突吉羅比丘教益食不平等突吉羅三學家受食戒大乘比丘同學若先作學家羯磨若比丘於如是學家先不請無病自手受食食是比丘應向餘比丘悔過言我犯可訶法所不應為我今向大德悔過是法名悔過法緣羅閲城有居士家夫婦俱得信樂於諸比丘無所愛惜常與飯食及諸供養遂至貧窮衣食乏盡比居譏之佛令僧作學家羯磨而結此戒釋律攝云學家者謂預流果一來果不還果相比丘尼突吉羅後彼學家財物還多從僧乞解學家羯磨佛聽僧與彼解不犯者先受請有病置地與使人與已作解羯磨五分律云若婦是聖夫是凡或夫是聖婦是凡皆不應與作學家羯磨若夫婦俱是聖無慳貪心財物竭盡乃與作學家羯磨若僧有園田應與令知使畢常限餘以自供若無園田僧坊異供養時令其家作使得遺餘若復無此乞食得已就其家食與以所餘若不能爾應將至僧坊給其房舍臥具次第與食非時漿飲皆悉與之有可分衣亦應與分彼學家婦女諸尼亦應如是料理十誦律云若居士財損減不增長若乞不乞不應捨學家羯磨若財物增長乞不乞皆應與捨若不增不減乞應捨不乞不應捨四恐處受食戒大乘同學若比丘在阿蘭若逈遠有疑恐怖處若比丘在如是阿蘭若處住先不語檀越若僧伽藍外不受食在僧伽藍內無病自手受食食者應向餘比丘悔過言大德我犯可訶法所不應為我今向大德悔過是法名悔過法緣諸婦女持飲食詣僧伽藍中供養盜賊聞之於道路嬈觸諸比丘白佛佛言自今應語諸婦女莫出道路有賊恐怖若已出城應語言莫至僧伽藍中道路有賊恐怖乃結此戒相沙彌突吉羅不犯者若先語檀越若有病若置地與若教人與五分律云若軍行經過與食若賊自持食與不犯三結問諸大德我已説四波羅提提舍尼法今問諸大德是中清淨不三説諸大德是中清淨默然故是事如是持六四悔過法竟七衆學法三初總標二別列三結問初總標藏中一一皆云式叉迦羅尼也諸大德是衆學戒法半月半月説戒經中來律攝云此衆學法總為八例一著衣服事二入村事三坐起事四食噉事五護鉢事六説法事七便利事八觀望事佛塔諸條諸部每缺故不在例也二別列此衆學法諸部開合廣略不同或百十以外或五十以內蓋是行護威儀不與上四篇同故無定數唯四分律準有百事今但於每戒之下注其數目不復列科但於初事之中出其因緣餘悉從略乃至釋義罪相等更不復標皆可思得然此百事大乘悉皆同學護衆生故倍應嚴淨除是住首楞嚴三昧示現逆行在所不論其或未然不矜細行終纍大德幸深思之當齊整著涅槃僧應當學一緣起自六羣比丘居士譏嫌似國王大臣長者居士似節會戲笑俳説人故制已下緣起大約多同釋不齊整者繫帶臍下高褰齊膝垂前一角如象鼻垂前二角如多羅樹葉繞腰褶皺相若故作犯應懺突吉羅隨機羯磨云應請一懺主若不故作突吉羅隨機羯磨云但自責心餘四衆突吉羅以下多同若不同者隨事更明不犯者臍中生瘡故下著腳有瘡故高著若僧伽藍內村外作時道行時五分律云若不解不問而作此著突吉羅若解不慎而作此著突吉羅若解輕戒輕人而作此著波逸提比丘尼亦爾辨問著衣不齊整等戒皆云僧伽藍內及村外不犯然人之嚴慎全在平時既僧坊中肆態已成至入村時寧無陋相今悉開許其義云何答寺內村外非謂可作肆態但或有因緣不得齊整情猶可恕入村必宜護惜譏嫌令生信樂故結罪也附根本雜事云苾芻熱時於自房內但著下裙及僧腳崎隨情讀誦説法作衣等四威儀悉皆無犯當齊整著三衣應當學二不齊整者下垂過肘露脅高著過腳上下垂一角垂前兩角後褰高細褶已安緣不犯者肩臂有瘡故下著餘同前舍利弗問經云修供養時應偏袒以便作事作福田時應覆兩肩現田文相云何修供養如見佛時問訊師僧時應拂牀掃地卷衣裳乃至移種種供養云何作福田時應請乞食坐禪誦經經行樹下人見端嚴有可觀也不得反抄衣入白衣舍應當學三或左右反抄衣著肩上也不犯者脅肋邊有瘡不得反抄衣入白衣舍坐應當學四不得衣纏頸入白衣舍應當學五總捉衣兩角著左右肩上也不犯者肩臂有瘡不得衣纏頸入白衣舍坐應當學六不得覆頭入白衣舍應當學七若以樹葉若以碎段物若衣覆頭不犯者或患寒或頭上生瘡或命難梵行難不得覆頭入白衣舍坐應當學八不得跳行入白衣舍應當學九雙腳跳也不犯者若為人所打若有惡獸若有棘刺或渡渠或渡坑塹或渡泥不得跳行入白衣舍坐應當學十不得白衣舍內蹲坐應當學十一蹲坐者若在地若在牀上尻不至地不犯者或尻邊生瘡若有所與若禮若懺悔若受教誡僧祇律云不得抱膝坐交腳坐不得叉腰行入白衣舍應當學十二不犯者脅下生瘡若僧伽藍內等不得手叉腰入白衣舍坐應當學十三手叉腰匡肘妨比座十誦律云不得掌扶頰坐不得搖身行入白衣舍應當學十四搖身者左右戾身趨行比丘尼波逸提不犯者或有如是病或為人所打回戾身避杖或惡象師子等所觸或逢擔棘刺人如是事戾身避或渡坑渠泥水處於中搖身過或時著衣回身看衣齊整不得搖身行入白衣舍坐應當學十五不得掉臂行入白衣舍應當學十六垂臂前却也不犯者伴行不及以手招喚餘同上僧祇律云若欲呼人不得雙舉手當以一手招不得掉臂行入白衣舍坐應當學十七僧祗律云不得動手足坐家內好覆身入白衣舍應當學十八不好覆者處處露現不犯者被縛或風吹衣離體僧祇律云安陀會當用緻物作若疏者當二重三重作若安陀會疏者多羅僧當用緻物作若多羅僧疏者僧伽梨當用緻物若僧伽梨疏者多羅僧當用緻物問今相傳云佛制三衣俱用粗麻布何耶答比丘三衣所以禦寒障暑據律備開共有十種所謂劫貝衣芻摩衣等安有但用粗疏麻布之説止因世尊初出家時既脫珍御樹神獻一麻衣而此麻衣乃百年前辟支佛之所留極為精細亦非粗疏後代展轉訛傳失於考訂故有此語耳今雖此方別有隨常衣服不必兩重三重亦可然謂止許麻布不許用棉布者實非律文好覆身白衣舍坐應當學十九不得左右顧視行入白衣舍應當學二十不犯者仰瞻日時或命難梵行難左右處處求方便道欲逃走僧祇律云諦視行時不得如馬低頭行當平視行防惡象牛馬當如擔輦人行不得東西視瞻若欲看時回身向所看處律攝云不高視者舉目視前一踰伽地踰伽量者長四肘也不得左右顧視白衣舍坐應當學二十一根本律云未請坐不應輒坐不應不善觀察而坐靜默入白衣舍應當學二十二不靜默者高聲大喚不犯者彼聾不聞聲靜默白衣舍坐應當學二十三不得戲笑行入白衣舍應當學二十四露齒笑也不犯者或脣痛不覆齒或念法歡喜而笑僧祇律云若有可笑事不得出齗現齒大笑應忍之起無常苦空無我想死想復不止者當以衣角掩口摩得勒伽云欠時不遮口突吉羅不得戲笑白衣舍坐應當學二十五用意受食應當學二十六不用意者捐棄羮飯不犯者鉢小故飯墮案上五分律云一心受食者左手一心持鉢右手扶緣當平鉢受食應當學二十七不平鉢者溢滿也不犯者或時鉢小故還墮案上平鉢受羮應當學二十八六羣受飯過多不容受羮故制羮飯等食應當學二十九不等者羮未至飯已盡飯未至羮已盡不犯者或時正須羮不須飯或時正須飯不須羮或日時欲過或命難梵行難疾疾食以次食應當學三十不次者鉢中處處取食食不犯者或飯熱挑取冷處或日時欲過等十誦律云不得鉢中擇好食不得挑鉢中而食廣當學三十一置四邊挑中央至鉢底不犯者患食熱開令冷或日時欲過五分律云不曲指收鉢食不嗅食食若比丘不病不得自為己索羮飯應當學三十二如飢餓時故不犯者若病自索若為他他為己索不得以飯覆羮更望得應當學三十三不得視比座鉢中應當學三十四視者視誰多誰少不犯者比座眼暗為看得食不得食淨不淨等當繫鉢想食應當學三十五不繫鉢想者左右顧視也不犯者或為眼暗比座瞻看或看日時等不得大摶飯食應當學三十六口不容受也不犯者日時欲過命難等疾疾食僧祇律云不得大不得小如淫女兩粒三粒而食當可口食不得大張口待飯食應當學三十七不犯同上不得舍飯語應當學三十八不犯者噎而索水命難等作聲食僧祇律云二師上座喚若咽未盡能使聲不異者得應若不能者咽已乃應若前人嫌者答言我口中有食故不即應五分律云益食時聽言須不須不嫌訶食不得摶飯遙擲口中應當學三十九不犯者被繫縛不得遺落飯食應當學四十半入口半在手也不犯者噉薄餅燋飯瓜甘蔗等不得頰食食應當學四十一故作大滿口令兩頰鼓起也不犯者日時欲過等不得嚼飯作聲食應當學四十二不犯者嚼乾餅及燋飯瓜果等十誦律云啜粥不得作聲噉根莖等勿令大作聲僧祇律云不得全吞食使嗗嗗作聲若咽喉病無罪不得大吸飯食應當學四十三張口遙呼吸也不犯者若口痛若食羮酪漿等不得舌舐食應當學四十四不犯者或被縛或手有垢僧祇律云不得舐手食若酥油等著手當就鉢緣上溉聚一處然後取食不得嗾指食若蜜及鹽等著指頭得嗾無罪不得振手食應當學四十五不犯者或食中有草有蟲或手有不淨欲振去之不得手把散飯食應當學四十六散飯者散棄飯也不犯如上説十誦律云食墮所受草葉上者應食若有土者吹土却而食或有多土著者水洗得食不得汙手捉飲器應當學四十七有膩飯著手也不犯者草上受葉上受洗手受不得洗鉢水棄白衣舍內應當學四十八不犯者澡槃承取水持棄外十誦律云問主人棄不犯根本律云不得以殘食置鉢水中僧祇律云食時當稱腹而取不得多受若淨人卒多與者未噉時應減與比座若比座不取應與沙彌及園民洗鉢時不得一粒瀉棄地若有者應聚著板上葉上若細粒若不可聚者無罪音義阿梨吒不見翻譯阿毗曇或云阿毗達磨此翻無比法或翻對法即論藏也契經即修多羅藏也契經契機故言契聖口所宣故言經搏音博手擊也軍師萬二千五百人為軍師者衆也尼師壇此翻坐具或云隨坐衣涅槃僧或云泥縛些那或云泥伐散那此翻裙痍音夷傷也痤才何切癤也俳步皆切雜戲也褰音牽褶皺上音摺衣褶也下音皺蹙也與腨同音軟腓腸也僧腳崎舊云僧祇支此翻掩腋衣用掩右腋覆左肩上尻考平聲脊梁盡處齗音銀齒根肉也欠時欠伸即顰伸也摶音團以手揑聚之也噎音謁食窒氣不通也啜昌悅切同啜嗗音穵飲聲也吸與吸同舐神紙切以舌取物也溉音戲又音蓋拭取也嗾音數
