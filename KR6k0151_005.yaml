body:
  text: 古吳蕅益沙門智旭彚釋三過一月衣戒大乘為衆不犯自為亦犯若比丘衣已竟迦絺那衣已出若比丘得非時衣欲須便受受已疾疾成衣若足者善若不足者得畜一月為滿足故若過畜尼薩耆波逸提緣有比丘僧伽梨弊壞十日中更不能辦恐犯前戒同伴為白佛因聽畜長衣乃至滿足六羣有糞掃衣及餘種衣同者不足取中糞掃衣浣染四角頭點作淨持寄親友比丘已人間遊行受寄者以其行久不還便出曬之諸比丘問知白佛結戒釋時者無迦絺那衣自恣後一月若有迦絺那衣自恣後五月非時者若過此限相若十日中同衣足者應即裁割或線拼或縫作衣或淨施或遣與人不爾者十一日明相出隨衣多少捨墮若同衣不足至十一日同衣足即應裁割等如上不爾者十二日明相出隨衣多少捨墮乃至二十九日亦如是若至三十日不論足不足同不同應即日裁割等不爾者三十一日明相出盡捨墮比丘尼捨墮善見律云若二十九日得所望衣細先衣粗先衣說淨新得衣復得一月為望同故若望得衣粗復得停一月如是展轉隨意所樂為欲同故莫過一月四取非親里尼衣戒此是遮罪大乘不論親里非親里但觀可取不可取然在末法尤宜避嫌若比丘從非親里比丘尼取衣除貿易尼薩耆波逸提緣有一比丘著弊納僧伽梨蓮華色比丘尼見已發慈愍心即以所著貴價衣易之後著此弊衣見佛佛言不應如是聽汝畜持五衣完堅者餘衣隨意與人何以故婦人著上衣服猶尚不好何況弊衣乃集衆結戒是後諸比丘皆畏慎不敢從親里尼取衣佛言若是親里籌量知有無可取不可取故聽又祇桓中二部僧得施衣共分時比丘誤得尼衣尼誤得比丘衣尼持衣至僧伽藍中相易比丘更白世尊乃聽貿易釋親里者父母親里乃至七世有親貿易者以衣貿衣以衣易非衣或以非衣易衣針筒刀線乃至一丸藥等相餘四衆突吉羅沙彌取非親里比丘尼式叉摩那沙彌尼衣皆突吉羅比丘尼式叉摩那沙彌尼取非親里比丘沙彌衣亦皆突吉羅也不犯者為僧為佛圖取五分律云從非親里式叉摩那沙彌尼取衣突吉羅若親里犯戒邪見從取衣突吉羅根本律云非親里非親里想或生疑皆捨墮親里非親里想或疑得惡作罪不犯者若尼將衣施僧或為說法故施或為受具時施或見被賊故施或尼多獲利養持衣物到苾芻所置地求受棄之而去取亦無犯薩婆多論云取應量衣捨墮取不應量衣物等突吉羅五使非親里尼浣衣戒大乘同學末法尤所當戒若比丘使非親里比丘尼浣故衣若染若打尼薩耆波逸提緣迦留陀夷與偷蘭難陀比丘尼露形而坐欲心相視失不淨汙安陀會尼請浣之取不淨著口中及小便道中後遂有身諸尼詰知其故白諸比丘轉白世尊訶責結戒於是諸比丘各畏慎不敢令親里尼浣染打故衣佛更增非親里之言釋故衣者乃至一經身著善見律云得使出家女乃至孫女浣不得使出家婦兒婦浣非親故相若浣若染若打各一捨墮衣但一捨即淨墮罪有三須悔使浣染打彼不浣染打各一突吉羅使非親里式叉摩那沙彌尼突吉羅使非親里尼浣染打新衣突吉羅餘四衆突吉羅僧祇律云若為二師持衣使尼浣越毗尼罪為塔僧使尼浣染打無罪十誦律云先自小浣更令浣等皆突吉羅薩婆多論云此戒應量不應量衣一切犯摩得勒伽云使非親里尼浣尼師壇捨墮浣褥枕等突吉羅附律攝云凡洗浣衣有五種利除臭穢氣蟣蝨不生身無瘙癢能受染色堪久受用不浣衣者翻成五失著染色衣亦有五利順聖形儀故令離傲慢故不受塵垢故不生蟣蝨故觸時柔軟易將護故過分浣衣有五種失能令疾破故不堪苦用故受用勞心故無益煩勞故障諸善品故著好染衣亦有五失自長驕恣生他妬心故令他知是治容好色故能令求時多勞苦故能障善品事故過染損衣用不牢故過打亦有五失如上六從非親乞衣戒大乘為衆生故不同學然須籌量施主堪與不堪若比丘從非親里居士若居士婦乞衣除餘時尼薩耆波逸提餘時者若比丘奪衣失衣燒衣漂衣是謂餘時緣舍衛城有長者詣園遊觀回車詣祇桓精舍見跋難陀釋子禮敬聽法跋難陀說法開化勸令歡喜長者問何所須報言無所須長者固問報言止止即使我有所須不能見與長者復請乃言汝所著者可與我時長者身著貴價廣長白氎衣報言明日來至我家中我當相與跋難陀固求不止長者不悅脫衣與之乘車著一衣入城守門者疑被賊劫長者具說因緣居士譏嫌故制於是諸比丘畏慎不敢從親里索衣佛更增非親里之言後有衆比丘在拘薩羅國安居竟執持衣鉢往世尊所晝日熱不可行夜行失正道為賊所劫露形立祇桓門外諸比丘疑為尼犍子報優波離問知其故即借衣著見佛佛慰問具白因緣佛乃制裸形行突吉羅爾時當以軟草若樹葉覆形應往寺邊若先有長衣應取著若無者知友比丘有長衣應取著若知友無應問僧中有何等衣應分若有者當與若無者應問有臥具不若有者當與若不與者應自開庫看若有褥若地敷若氎若被應擲解取裁作衣以自覆形出外乞衣時諸比丘不敢持此處物往彼處佛言聽時諸比丘奪失燒漂衣畏慎不敢著僧衣佛言聽著彼得衣已僧衣不還本處佛言不應爾若得衣已應浣染縫治安本處若不爾如法治時有比丘奪失燒漂衣畏慎不敢從非親乞衣佛言聽乃更結此戒文相比丘尼捨墮餘三衆突吉羅不犯者或為他乞他為己乞不求而得等僧祇律云若自乞使人乞作寒熱相乞說法乞得者皆捨墮若乞漉水囊小補衣物繫頭物裹瘡物衣褋衣中一條皆不犯若為二師乞越毗尼罪為塔僧乞不犯根本律云乞時得惡作罪所得衣物若價若色若量與所乞相應者捨墮不相應者無犯毗婆沙云二人共乞一衣突吉羅為他索突吉羅得應量衣捨墮得不應量衣突吉羅從親里貧乏者索突吉羅與少更索多突吉羅若非親里先請與衣後貧乏從索突吉羅與少更索多突吉羅為他索亦突吉羅摩得勒伽云從非人畜生天邊乞衣不犯辨問四分為他乞不犯僧祇及薩婆多皆結吉羅此復何從答見他貧苦而生慈愍四分許其無愆欲他為我而作方便婆沙所以結過此必論心乃可定奪七過受衣戒此是遮罪大乘為衆生故不同學隨施應受若比丘失衣奪衣燒衣漂衣若非親里居士居士婦自恣請多與衣是比丘當知足受衣若過者尼薩耆波逸提緣衆比丘遇賊失衣來到祇桓有優婆塞多持好衣隨諸比丘意取比丘自有三衣報云不取六群語言何不取與我等若與餘人耶諸比丘遂取與之少欲者嫌責白佛故制釋若失一衣不應取若失二衣餘一衣或二重三重四重應擲作一一衣若三衣都失應知足受知足有二種一者隨居士所與衣受之不應多索二者三衣也三衣之外不應多受若居士自恣請多與衣或細或薄或不牢應取作二重三重四重當安緣當肩上貼障垢膩處應安鉤鈕若有餘殘語居士言此餘殘衣裁作何等若檀越言我不以失衣故與我自欲與大德耳彼若欲受者便受相比丘尼捨墮餘三衆突吉羅八求益衣價戒大乘同制即是惡求多求若比丘居土居士婦為比丘辦衣價買如是衣與某甲比丘是比丘先不受自恣請到居士家如是說善哉居士為我買如是如是衣與我為好故若得衣者尼薩耆波逸提緣有一比丘入舍衛城乞食至居士家聞居士夫婦共議辦跋難陀衣價還以報跋難陀跋難陀問知其家明日往語之言若欲與我衣者當如是廣大作新好堅緻中我受持居士譏嫌故制是後居士自恣請言大德須何等衣比丘意疑不敢答又有居士欲作貴價衣比丘知足欲須不如者亦意疑不敢隨意索佛言先受自恣請者不犯釋求有二種一求價乃至增一小錢二求衣乃至增一線相求而得捨墮不得突吉羅比丘尼捨墮餘三衆突吉羅不犯者或為他求等五分律云若從親里索好突吉羅律攝云從天等乞或乞縷𦆠及小帛片等不犯九求合買衣戒緣起犯不犯等悉同前若比丘二居士居士婦與比丘辦衣價持如是衣價買如是衣與某甲比丘是比丘先不受居士自恣請到二居士家作如是言善哉辦如是如是衣價與我共作一衣為好故若得衣者尼薩耆波逸提十索衣過六反戒此是遮罪大乘同學若比丘若王若大臣若婆羅門若居士居士婦遣使為比丘送衣價持如是衣價與某甲比丘彼使人至比丘所語比丘言大德今為汝故送是衣價受取是比丘應語彼使如是言我不應受此衣價我若須衣合時清淨當受彼使語比丘言大德有執事人不須衣比丘應語言有僧伽藍民若優婆塞此是比丘執事人常為諸比丘執事時彼使往至執事人所與衣價已還比丘所如是言大德所示某甲執事人我已與衣價大德知時往彼當得衣須衣比丘當往執事人所若二反三反為作憶念應語言我須衣若二反三反為作憶念若得衣者善若不得衣四反五反六反在前默然立若四反五反六反在前默然住得衣者善若不得衣過是求得衣者尼薩耆波逸提若不得衣從所得衣價處若自往若遣使往語言汝先遣使持衣價與某甲比丘是比丘竟不得衣汝還取莫使失此是時緣羅閲城一大臣遣使持衣價與跋難陀跋難陀將此使入城持衣價與親舊長者掌之異時大臣問使人言跋難陀著不報言不著即更遣使索還衣價跋難陀乃疾至長者家索衣時城中諸長者集會先有制不至者罰錢五百長者報言大德小待我赴會還跋難陀不允長者為作衣竟會坐已罷輸錢五百即與居士共相譏嫌故制釋僧祇律云三返往索六默然住時或緩期或急期云何緩急若索衣時答言尊者更一月來比丘滿一月往索若復言更一月來仍滿一月往索若復言更一月來又滿一月往索過三月已不得復索若言半月十日乃至須臾過三須臾不得復索六反默住亦爾過六月乃至六須臾已不得復往若語物主時物主言我先施比丘隨方便更索爾時得如前三反語索六反默住善見律云若不口語索得十二默然求若一語索破二默然二語索破四默然乃至六語索破十二默然相比丘尼捨墮餘三衆突吉羅十誦律云是比丘語衣主已有餘因緣到執事處若問何故來答言我有餘事故來若言持是衣去答言我已語衣主汝自往共分了若言但持去我自解語衣主爾時受衣持去不犯根本律云若苾芻遣使報已彼執事人來作是語聖者可受此衣應報言此衣我已捨訖汝當還彼送衣來處如是報者善若取衣者捨墮若執事人言聖者可受此衣彼之施主我共平章令其心喜若如是者取衣無犯十一蠶綿臥具戒大乘為衆生故得畜然不應自受用緇門警訓云央掘經言繒綿皮物若展轉來離殺者手施持戒人不應受者是比丘法受者非悲南嶽道休二師不衣綿帛並服艾絮故南山律師云佛法東漸幾六百載惟斯衡嶽慈行可歸問既不許野蠶綿復聽用羊毛等並是衆生身分何故一許一遮答蠶綿及毛雖同是衆生身分但煮繭專為取綿殺羊不專為毛又臥具所須約綿則生命甚多約毛則生命尚少此等戒法重在消息人情不必充類致盡也若比丘雜野蠶綿作新臥具尼薩耆波逸提緣六羣作新雜野蠶綿臥具至養蠶家索綿報言待蠶熟時六群在邊住待看彼曝繭蠶蛹作聲居士譏嫌故制根本律云外道嫌賤作如是言若用此者殺多有情如何以好衣食施彼禿人斷物命者乃至佛聞故制釋雜者若毳若劫貝拘遮羅乳葉草若芻摩若麻僧祇律云憍奢耶有二種一者生二者作生者細絲作者紡絲相自作教他作成盡捨墮不成突吉羅為他作成不成盡突吉羅是中捨者若以斤斧細斬和泥塗壁塗埵餘四衆突吉羅不犯者若得已成者斧斬和泥塗壁埵僧祇律云若作三衣若經若緯若中若邊若間紃若緣若細褋若補作成捨墮受用越毗尼罪應僧中捨僧不應還亦不得餘用正得敷地及作簾帳下二戒並同五分律云應捨與僧不得捨與餘人僧以敷地或敷牀上除捨褥比丘餘一切僧隨次坐臥雖不自作不使人作他施而受亦捨墮辨此中捨法當准五分大意衆僧得畜不得私畜正與大乘教意相符十二作黑臥具戒大乘同學義亦如前若比丘以新純黑羺羊毛作新臥具者尼薩耆波逸提緣毗舍離諸梨車子多行邪淫以純黑羊毛作㲲被體夜行使人不見六羣效而作之梨車語言我等為淫欲故汝等作此何所為耶比丘白佛故制釋純黑者或生黑或染黑相犯輕重同上餘四衆突吉羅不犯者作枕作一切小用等五分律云應捨與僧僧以敷牀不得敷地餘如上說十誦律云不犯者為塔為僧作十三不雜色作臥具戒大乘同學若比丘作新臥具應用二分純黑羊毛三分白四分牻若比丘不用二分黑三分白四分牻作新臥具者尼薩耆波逸提緣六羣作純白臥具居士譏嫌似王若大臣故制釋牻色者頭上毛耳毛腳毛或餘牻色毛若作四十鉢羅臥具二十鉢羅黑十鉢羅白十鉢羅牻若作三十二十鉢羅者類此減之十誦律云一鉢羅此四兩也相犯輕重同上餘四衆突吉羅不犯者若得已成者割截壞之若作枕作小用等十誦律云用黑乃至多一兩捨墮用白乃至多一兩突吉羅用牻乃至減一兩捨墮律攝云或黑者易得餘色難求斤數減增並成非犯十四臥具不滿六年持戒大乘同學若比丘作新臥具持至六年若減六年不捨故更作新者除僧羯磨尼薩耆波逸提緣六群嫌臥具或重或輕或薄或厚不捨故更作新者藏積衆多故制後一比丘得乾痟病有因緣欲遊人間糞掃臥具重不堪持行諸比丘白佛佛聽僧與彼作白二羯磨相犯輕重同前餘四衆突吉羅僧祇律云僧中捨已僧不應還僧得受用但不得襯身次戒同十五坐具不帖故者戒大乘同學若比丘作新坐具當取故者縱廣一磔手帖著新者上壞色故若作新坐具不取故者縱廣一磔手帖著新者上用壞色故尼薩耆波逸提餘四部中俱云佛一磔手緣佛在給孤獨園遣人請食諸佛常法諸比丘受請後遍行諸房見故坐具處處狼藉乃令比丘作新坐具取故者縱廣一磔手帖著新者上壞色故六羣不依佛誨故結此戒僧祇律云世尊以五事利益故五日一按行僧房一者聲聞弟子不著有為事不二者不著世俗言論不三者不著睡眠妨行道不四者觀病比丘不五者為年少新出家比丘見如來威儀庠序起歡喜心釋五分律云佛一磔手方二尺壞好色者隨意覆新者上根本律云為壞色者欲令其得堅牢故相餘四衆突吉羅不犯者自無故者得已成者他為我作純故者作十誦律云若減取作乃至半寸突吉羅附律攝云尼師但那應兩重作疊為三分應截斷作葉與三衣葉同十誦律云不應取單尼師壇不應離尼師壇宿十六持羊毛遠行戒大乘同學若比丘道路行得羊毛若無人持得自持乃至三由旬若無人持自持過三由旬尼薩耆波逸提緣跋難陀道路行多得羊毛貫杖頭擔在道行居士嫌責為販賣羊毛故制相自持過三由旬捨墮令餘人持無犯若於中間助持突吉羅令餘四衆持過三由旬突吉羅除羊毛持餘拘遮羅等過三由旬突吉羅若擔餘物著杖頭行亦突吉羅餘四衆突吉羅五分律云應使淨人擔若無淨人乃聽自持不得擔擔頭戴背負犯者突吉羅薩婆多摩得勒伽云空中持羊毛去與化人持去皆突吉羅附律攝云凡諸苾芻不應負擔十七使尼染羊毛戒大乘同學若比丘使非親里比丘尼浣染擘羊毛者尼薩耆波逸提緣六群使大愛道比丘尼浣染擘羊毛染色汙手往見世尊世尊問知其故訶責六群結戒是後比丘畏慎不敢使親里尼浣染擘佛更開之相浣染擘各一捨墮一捨三墮如前說使浣不浣等各一突吉羅使非親里餘二女衆突吉羅餘四衆突吉羅薩婆多論云使浣染僧物突吉羅十八受金銀戒此是遮罪大乘為衆生故聽受然須淨人掌舉設無淨人者心不染著亦得自捉若貪心自畜即是多欲不知足名染汙犯故警訓云一田宅園林二種植生種三貯積穀帛四畜養人僕五養繫禽獸六錢寶貴物七氈褥釜鑊八象金飾牀及諸重物此之八名經論及律盛列通數顯過不應又律經言若有畜者非我弟子由此八種皆長貪壞道汙染梵行有得穢果故名不淨也涅槃云若諸弟子無人供須時世饑饉飲食難得為欲護持建立正法我聽弟子受畜金銀車乘田宅穀米貿易所須雖聽受畜如是等物要須淨施篤信檀越若比丘自手捉錢若金銀若教人捉若置地受者尼薩耆波逸提緣羅閲城有大臣與跋難陀親善彼於異時大得猪肉敕其婦留分與之時城中節會日作衆伎樂竟夜不眠大臣兒饑乏問母有殘肉不母言唯有跋難陀分在兒即取五錢與母言持此錢更市肉與之晨朝跋難陀詣大臣家婦語其故即索錢寄市肆上而去居士及王大臣皆共譏嫌惟珠髻大臣善為說法解釋既解釋已往白世尊世尊讚其所說多有所益大臣當知日月有四患不明不淨不能有所照亦無威神云何為四阿修羅煙雲塵霧是日月大患沙門婆羅門亦有四患不明不淨不能有所照亦無威神云何為四不捨飲酒不捨淫欲不捨手持金銀不捨邪命自活是四大患時少欲比丘亦嫌責跋難陀白佛結戒相是中捨者若彼有信樂守園人或優婆塞當語言此是我所不應汝當知之若彼人取還與比丘者當為彼人物故受敕淨人使掌之若得淨衣鉢針筒尼師壇應貿易受持之若彼優婆塞取已與比丘淨衣鉢尼師壇針筒應取持之若彼取已不還者令餘比丘語言佛有教為淨故與汝汝應還彼比丘物若餘比丘不語者當自往語言佛有教為淨故與汝汝今可與僧與塔與二師與同學知識或還本主何以故不欲使失彼信施故若不語彼人知是看是者突吉羅比丘尼捨墮餘三衆突吉羅第三分云有比丘在塜間得錢自持來佛言不應取彼比丘須銅佛言打破壞相然後得自持去僧祇律云病人得使淨人畜莫貪著若犯捨墮物僧中捨已不得還彼比丘僧亦不應分若多者應著無盡物中所生息利得作房舍中衣不得食用比丘凡得錢及安居訖得衣直不應自取當使淨人知若無淨人指腳邊地語言是中知著地已自用草葉磚瓦等遙擲覆上待淨人來令知隨國土中所用若銅錢鐵錢胡膠錢皮錢竹籌悉不應捉或有國土所用相不成就或相成就國所不用捉者皆越毗尼罪國所不用相不成就作銅鐵捉無罪五分律云僧應白二羯磨差一比丘作棄金銀及錢人彼比丘應棄此物著坑中火中流水中曠野中不應志處若捉著餘處不得更捉彼比丘不應問僧此物當云何僧亦不應教作是作是若不棄不問而使淨人貿僧衣食來與僧僧得受若分者惟犯罪人不得受分不犯者雖施比丘比丘不知淨人受之為買淨物有諸比丘欲遠行從長者索道糧彼即使人賫金銀錢物送之既至所在所長甚多使還白主主言我已為施不應還取汝可持至僧坊施僧佛言聽淨人為僧受之以易僧所須物諸比丘不應知事十誦律云自手取寶若少應棄若多設得同心淨人應語言我以不淨故不應取汝應取淨人取已語比丘言此物與比丘比丘言此是不淨物若淨當受若不得同心淨人應作四方僧臥具應入僧中言諸大德我自手取寶得波逸提罪我今發露不敢覆藏悔過僧應問汝捨是寶不答言已捨僧應問汝見罪不答言見罪僧應語言後莫復作若言未捨僧應約敕令捨若不約敕一切僧得突吉羅若約敕而不捨是比丘突吉羅根本律云若為修營房舍等事應求草木車乘人工不應求金銀錢等若捉方國共所用錢犯捨墮若捉非方國所用錢得惡作罪若捉赤銅鍮石銅鐵鉛鍚者不犯若有他施衣價欲須便受受已即作彼人物心而持畜之應委寄淨人使持不應自捉若無淨人持物對一苾芻作如是語具壽存念我某甲得此不淨物我當持此不淨之物換取淨財如是三說隨情受用勿致疑心若復僧寺有去驚怖所有塔僧金銀錢寶應牢藏舉方可移去若無深信淨人居士應使求寂求寂亦無苾芻自手穿坑藏舉如我為難所開事者難去之後則不應行律攝云若安居時施主持衣價與苾芻衆即作委寄此施主心而受取之應求信敬淨人居士為淨施主作施主物想執捉無犯若無施主可得應持金銀等物對一苾芻說言具壽存念我某甲得此不淨財當持此不淨財換取淨財如是三說應自持舉或令餘人舉之按懷素所集羯磨亦復採取此法此在末世誡為易行方便斷宜遵奉矣若苾芻於行路中得金銀等為道糧故應自持去或令淨人及求寂持去應知求寂於金銀等但制自畜不遮執捉證大般涅槃經云若言佛聽比丘畜諸奴婢不淨之物金銀珍寶穀米倉庫牛羊象馬販賣求利於饑饉世憐愍子故復聽諸比丘儲貯陳宿手自作食不受而啖如是等語所不應依附善見律云有四種受用一者有慚愧用謂無慚愧人親近有慚愧人是名有慚愧受用二者無慚愧用謂有慚愧人親近無慚愧人是名無慚愧受用得罪有慚愧人親近無慚愧人後必隨其作惡故名無慚愧人無慚愧人親近有慚愧人必當改惡修善是名有慚愧人三者有法用謂有慚愧人依法而得四者無法用謂無慚愧人不依法得若得此物如得毒藥無異僧祇律云有一比丘將一沙彌歸看親里路經曠野中有非人化作龍形右繞沙彌散華讚言善哉大得善利捨家出家比丘到親里家問訊已欲還時親里婦言汝今還去道迥多乏可持是錢市易所須沙彌受取繫著衣頭中道非人復化作龍左繞沙彌以土坌上說如是言汝失善利出家修道而捉錢行沙彌便啼比丘顧問其故答言我不憶有過無故得惱師言汝有所捉耶答言持是錢來師令棄已非人復來如前供養比丘以是因緣白佛佛言從今不聽沙彌持金銀錢若比丘使沙彌最初捉金銀錢者越毗尼罪若見沙彌先已捉後使捉者無罪十九賣買寶物戒大乘同制若比丘種種賣買寶物者尼薩耆波逸提緣跋難陀往市肆上以錢易錢持去居士譏嫌故制錢有八種金錢銀錢銅錢鐵錢白鑞錢鉛錫錢木錢胡膠錢相捨法同上比丘尼捨墮餘三衆突吉羅不犯者若以錢貿瓔珞具為佛法僧若以瓔珞具易錢為佛法僧律攝云若為三寶出納或施主作無盡藏設有馳求並成非犯然此等物出利之時應一倍納質求好保證明作契書年終之日應告上座及授事人皆同使知或復告彼信心塢波索迦二十販賣戒大乘同制若比丘種種販賣尼薩耆波逸提緣跋難陀在無住處村中持生薑易食而去舍利弗乞食至賣飯家彼即索價又舍衛城有外道得一貴價衣持至僧伽藍貿易跋難陀語言明日來即其夜浣故衣搗治光澤如新晨朝易之外道得衣還所止園中示諸外道中有智慧者語言汝為他所欺此外道即持衣欲相還跋難陀不允外道譏嫌故制釋種種販賣者以時易時以時易非時易七日易盡形壽易波利迦羅以非時易非時易七日盡形壽及時等乃至以波利迦羅易時非時等賣者價直一錢數數上下增言直三錢五錢買亦如是相種種販賣得者捨墮不得突吉羅比丘尼捨墮餘三衆突吉羅不犯者與五衆出家人貿易自審定不相高下不與餘人貿易若使淨人貿易若悔者應還若以蘇易油以油易蘇僧祇律云若肆上物先有定價比丘持直來買置地時應語物主言此直知是物若不語默持去越毗尼罪若彼物應直五十而索百錢比丘言我以五十知是如是不名為下若比丘知前人欲買物不得抄買買者越毗尼罪若作是念此後穀當貴糴時越毗尼罪糶時捨墮若恐某時穀貴我今糴此穀依是得誦經坐禪行道到時穀大貴食長與二師或作功德餘者糶得利無罪買鉢買藥等亦爾五分律云若欲貿易應使淨人語言為我以此物易彼物又應心念寧使彼得我利我不得彼利若自貿易應於五衆中若與白衣貿易突吉羅根本律云若為利買不為利賣買時惡作賣時無犯若不為利買為利故賣買時無犯賣時捨墮若向餘方買物而去元不求利到處賣時雖得利無犯律攝云若賣買時不依實說或以僞濫斗稱欺誑於他得妄語罪獲物之時犯盜凡持財物欲賣買時先須定意無求利心隨處獲利悉皆無犯尼陀那云苾芻不應為他俗人斷價不應酬價高下若無俗人代酬應可二三得自酬價過此得惡作罪十誦律云以此不淨物買食口口突吉羅買衣隨著波逸提若共貿物前人心悔應還若過七日不應還若以減價索他貴衣突吉羅若必須是物三索不肯者應覓淨人使買薩婆多論云寧作屠兒不為販賣一切欺害故此販賣物設與衆僧作食僧不應食作四方僧房不得住中作塔作像不應向禮又云但佛作意禮作意禮者不必身口致禮也所以如此嚴拒絶者正恐無慚之輩妄以供養三寶為有功德僥幸補過耳凡作持戒比丘不應受用此物若此比丘死此物應羯磨分既死則無復貪心可長故仍同亡比丘物羯磨分之二十一畜長鉢戒大乘為衆生故不同學若比丘畜長鉢不淨施得齊十日過者尼薩耆波逸提緣六羣畜鉢好者持不好者置有居士詣房觀看譏嫌如陶師賣瓦肆故制阿難得蘇摩國貴價鉢欲奉大迦葉而適不在恐犯此戒佛問迦葉幾時當還報言十日乃聽畜齊十日釋鉢有二種鐵鉢瓦鉢根本律云上鉢受二升米飯中者升半小者一升相十日中所得鉢若得若不得至第十一日明相出盡捨墮餘如長衣戒說比丘尼捨墮律攝云若減量若過量若擬與餘人出家近圓濟其所用雖不分別無犯若為貯羮菜或用飲水畜二小鉢及安鹽盤子并匙悉無犯又於大鉢之中隨容小鉢若順所須多畜非犯應更畜一大鉢防闕事故薩婆多論云若畜長白鐵鉢瓦鉢未燒一切不應量鉢突吉羅第三分云鍵𨩲小鉢次鉢聽不作淨施畜五分律云若得二鉢應問師何者勝師若不善分別應各五日用自知勝者受持不如者與人辨問律攝許減量過量等若順所須多畜非犯薩婆多論若畜長白鐵鉢等皆突吉羅此復何從答言順所須則雖多亦有分限若畜白鐵鉢等既非堪用之物必是積聚慳貪安得無犯二十二畜鉢求好戒大乘同學若比丘畜鉢減五綴不漏更求新鉢為好故尼薩耆波逸提彼比丘應往僧中捨展轉取最下鉢與之令持乃至破應持此是時緣跋難陀鉢破入舍衛城向諸居士求鉢破一鉢得多鉢異時居士於一處集各自言得福無量以市鉢與跋難陀故即共譏嫌故制釋五綴者相去兩指間一綴十誦律云聽用若鐵若銅綴鉢根本律云若鉢難得隨意修理若易得處應可棄之更覓好者相滿五綴不漏更求新者突吉羅比丘尼捨墮餘三衆突吉羅不犯者減五綴漏故求若為他求他為己求不求而得施僧次得自價買畜根本律云此鉢不應守持不應分別亦不與人應畜二鉢袋好者安長鉢不好者安舊鉢乞食時應將二鉢得乾飯著長鉢中得濕飯著舊鉢中應於舊鉢中食先洗長鉢曬曝安置皆以長鉢為先安龕及火熏時皆於好處先安長鉢若道行時舊鉢遣人持長鉢自持無人為擎者長鉢安左畔舊鉢安右畔自持而去此之治罰乃至盡形或至破來應好護持違者得越法罪僧祇律云是持綴鉢比丘若故打破波逸提或二師知識等憫其洗鉢妨道藏去不見已更乞無罪乞得一鉢應受持若得兩鉢一入僧淨廚乃至得十鉢九入僧淨廚求得鉢直亦如是薩婆多摩得勒伽云若乞得衆多鉢應捨一意所貪樂者餘者應與同意音義五衣尼於三衣外更加掩腋衣覆肩衣也尼犍子具云薩遮尼乾此翻離繫自餓外道也亦翻不繫拔髮露形無所貯蓄褋音疊𦆠音衛織餘𦆠也蛹音勇繭蟲也毳吹去聲獸毛細者劫貝或云劫波育或云迦波羅即木棉也拘遮羅不見有翻恐即俱蘇摩此翻華芻摩此云細軟亦麻之類憍奢耶即蠶綿也間紃間去聲紃音巡紡縷也羺奴侯切胡羊也犁車子或云離車或云離奢此翻邊地主又翻仙族王又翻傳集國政磔音摘張開手指度物也正作搩賫同齎音虀持遺人也裝也送也行道所用也坌盆去聲塢波索迦即優婆塞鍵𨩲或云犍瓷犍茨建鎡此翻淺鉢今呼為鐼子鐼訛音訓然遍查律中並無鐼子又按海篇鐼音墳鐵也飾也又音奔平木器也字彚雖音火運切而是鐵屬又與錛同亦平木器不知此名起自何人今律堂中皆訛稱之按律云鍵𨩲入小鉢小鉢入次鉢次鉢入大鉢綴音拙又音贅聯也
