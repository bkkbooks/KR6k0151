body:
  text: 重治毗尼事義集要敘如來法震東區始終須賴律檢慈誥頒施有情亘今備盛木叉興替須人頹極時至傷茲遍土傳戒多未依制依法慨今海內授受鮮非誤己誤人皆由師乖率訓不攻制典而我千壽震公和尚精習三宗備諳幽微攜鍚北遊於晉緣聚請居於千壽嗟斯律法無傳誓欲挽回蔽患十有餘載律學為先座下存心數人咸欲事斯學處唯晉遼比丘無瑕者天資特異偏尚律宗廣閱毗柰耶教窮究五篇綱旨惜其律註無多全藏浩繁縱有學者不便攻操唯重治毗尼一書深堪喚醍時弊足以述盡指歸於是誓欲刊板存世唯希泛應羣機意積時懷未甞遂心時值谷邑朝陽傳戒嗣律比丘數人共議末運若重治毗尼登梓流行庶茲律學後昆有冀當時九聖慧石佛璧千壽及餘持律上座數人推舉募資興工遂以浩然厥志勞苦不憚䟦涉未辭剞劂二歲斯工告成願諸見者聞者喜躍受持懸戒日於中天竪正法於末季庶不負為法之婆心俾報佛恩如海一滴耳律學比丘智撰重治毗尼事義集要序子生于萬曆二十七年己亥五月初三日亥時至壬戌五月初七日鬀髮出家是為二十四歲次年臘月八日受具戒於雲棲和尚像前又次年受菩薩戒於雲棲和尚塔前皆古德法師為阿闍棃二十七歲春閱律一遍錄出事義要略僅百餘紙三十歲夏第二閱律錄成四冊三十一歲冬第三閱律乃成六冊計十八卷三十二歲夏為惺谷如是雪航三友細講一遍仍添初後二集共成八冊三十三歲金臺法主梓之於皋亭山佛日寺是冬在靈峰僅講七卷次夏方續講完聽者共十餘人惟徹因比丘能力行之三十五歲結夏金庭西小湖寺徹講一遍聽者九人能留心者惟徹因自觀及緣幻大德耳三十六歲冬在吳門幻住菴又講一過聽者僅五六人惟自觀僧聚二比丘能力行之三十八歲入九華四十歲入閩中四十四歲至苕城從此十三四年自既不能力行人亦無有問者徹因自觀僧聚三人又皆物故毗尼之學真不啻滯貨矣五十一歲冬從金陵歸臥靈峰次年夏日乃有發心學律者十餘人迫予重講此書因念向時所輯雖諸長並採猶未一一折衷又問辯音義二書至今未梓不若會入集要而重治之兼復刪削一二繁蕪之處以歸簡切庶鈍根者亦不致望洋之歎也庚寅六月二十一日古吳蕅益沙門智旭下筆故序原序毗尼藏者佛法之紀綱僧伽之命脈苦海之津梁涅槃之要道也自雞園初唱召善來而戒體斯成迨夫鶴樹潛暉申顧命而木叉是重必因犯以乃遮體則叶於無作若緣開與隨制用復契乎妙圓實大小之通途詎聲聞之獨轍堪嗟像季罕達真宗愚者昧於罔聞狂者置諸弗屑或以禪機而巧遁或以方廣為駕言並屬依文誰思實義且如能師佩心印於黃梅胡以闡化曹溪猶用登壇受具觀師宏華嚴於五頂胡以範模朝野必須十誓律身葢大雄御極則法僧二寶咸由正覺揚輝而善逝藏機則佛法二尊同藉僧伽建立倘惟十重眾輕即與在家奚別自非五篇七聚安知離俗高標是知梵網戒經五道齊收但除地獄則以通而成其大毗尼法藏止許人倫猶遮諸難正以局而成其尊必使仰慕大乘不甘小節自可畜髮捨衣作火中之優鉢如或情悲末法有志住持豈得恣情蕩檢為師子之身蟲智旭自念障深弗克仰修玄理復悲生晚末由隨侍哲人痛隙駒之莫挽捨慈母以披緇思樂土之可歸羨蓮師而私淑綱宗急辨每懷紫柏之風護法忘身願續匡山之派睹時流以長歎讀遺教以增哀爰於甲子季冬禮無量光塔倍復發增上心乞古德闍棃證明學菩薩戒次即備閱大小二律輒宗四分并採餘家錄為事義要略漫率愚蒙之鄙見豈堪呈似大方擬作巖谷之資糧亦無心於兼利戊辰春遇雪航楫公欣然有嚴淨毗尼之志因念向以入山心迫所錄猶多疎漏廼就龍居禪窟再檢藏文不問本部他宗凡切要者悉皆錄出深詳輕重之宜備顯開遮之準兼參大律委示別同俾畏拘執者不招謗小之殃喜儱侗者難開藉大之口考定成帙更名為毗尼事義集要質諸真寂聞谷老人博山無異禪師咸以付梓流通為囑於是復同壁如歸一二友商碓參詳備殫其致而佛日金臺法主遂欣然命付剞劂佛法緣起固自有時嗚呼斯集也雖於妙高之體不啻微塵其在駑劣之資已稱竭力所恨解慧疏庸躬行缺略仰慚往哲俯怍後賢惟願同學善友鑒我苦心愍我不逮一意秉持共扶法運庶報佛恩於萬一爾辛未孟春智旭識於皋亭古永慶寺原䟦摩訶僧祇律云若善男子欲建立佛法者當盡受持此律欲令正法久住者當盡受持此律犯罪恐怖作依怙者當盡受持此律不欲有疑悔請問他人者當盡受持此律欲遊化諸方而無礙者當盡受持此律薩婆多論云毗尼有四義餘經所無一是佛法平地萬善由之生長二一切佛弟子皆依戒住一切眾生由戒而有三趣涅槃之初門四是佛法瓔珞能莊嚴佛法具斯四義功強於彼嗚呼戒之利益何其溥哉柰何去聖時遙魯魚滋長末代眾生罕遘真風自戒筏流入真丹肇興於曹魏鎧公嗣徽及懷素律師迄於今日閴爾無聞間有一二宏通大士既不類出窟獅子又有殊擇乳鵝王近捨五部之綱宗傍取問答之網目急其所當緩緩其所當急矛盾自攻亡羊日甚是以豪傑之士未嘗過而問焉何由朗戒月於重昏維頹綱於絕紐哉受籌竊覩遺文每興寤愾繫我素兄旭師念法情殷悲心願重徧探律宗抽繹數四尊四分為綱骨借餘部以互顯汰其水源酌以甘露輯為集要若干卷咸遵古訓非同臆說庶使飲一滴者沈疴可療恣飽滿者新疾不生戒海重清在此一舉顧籌夙生何幸得與毗尼法席深慶染指先嘗爰贅片言卷末知法之士當必有不謀而集者矣不肖非阿其所好也庚午春日毗尼社弟幽谿後學受籌敬䟦重治毗尼事義集要目次卷首序䟦總問辯凡例提綱律藏總目四分律藏品目旁引諸經論目卷第一四分戒本自題目至偈讚卷第二四分戒本自問答啟白至初婬戒卷第三四分戒本自二盜戒至五媒嫁戒卷第四四分戒本自六私屋過量戒至二離衣宿戒卷第五四分戒本自過一月衣戒至二十二畜鉢求好戒卷第六四分戒本自二十三非親織衣戒至十二異語惱他戒卷第七四分戒本自十三嫌罵戒至三十七非時食戒卷第八四分戒本自三十八殘宿食戒至六十七同賊伴行戒卷第九四分戒本自六十八惡見不捨戒至眾學法第四十八卷第十四分戒本自眾學法第四十九至偈讚迴向卷第十一總辨羯磨法結界法授戒法卷第十二依止法師法弟子事師法上座法同學法禮敬法孝父母法安居法自恣法迦絺那衣法卷第十三治罪法有六法卷第十四衣法鉢法食法藥法受食法看病法房舍臥具法器物法杖法叢林法卷第十五阿蘭若法大眾會法分物法說法法讀誦法坐禪法雜法佛說犯戒罪輕重經戒相攝頌智旭敬述卷第十六比丘尼戒自八波羅夷法至波逸提法第一百十五卷第十七比丘尼戒自波逸提法第一百十六至雜法䟦語重治毗尼事義集要目次終總問辯問毗尼之學重在篤信力行謹守五篇人天固可保矣其福若盡將如之何孰若從宗教先開眼目道共戒生是為急務古云只貴見地不貴行履豈不然乎答毗尼之學出世正因戒波羅蜜佛地方滿豈僅人天福耶宗教開眼言雖相似但欲離戒別談宗教便是撥事求理墮惡知見溈山云毗尼法席尚未叨部了義上乘豈能甄別荊谿云用前四戒通為觀境以六觀之事理相即當知篇聚一不可虧世人蔑事而欲尚深理者驗知此觀孤虗無本既虧觀境觀亦無從然則若宗若教誠訓昭然胡弗思也古所謂只貴見地不貴行履正以有見地者必有行履有行履者未必有見地耳今以如來無上戒法判屬人天捨律儀而空談道共正見已破行履復荒惡趣三塗敢保有分雖欲生人天而不可得矣問末世鈍根只宜要略四分律藏世尚畏其繁瑣支離置之高閣今此集要援引諸家益覺紛雜何不直宗四分戒本略加旁註釋疑有何不可答喜略不喜廣自是末世通病固守癡鈍愈趣愈下終無釋疑之日今欲救其苦必須博學反約乃克有濟倘直宗戒本略加旁釋則開遮持犯安能洞然樂佛法者既難以通達習懈怠者仍未必留心進退失措有何利益問念佛一門廣大簡易信應奉行但能一心念佛自然止惡防非何須矻矻窮年學此律法名相浩繁已非簡易果極聲聞又非廣大恐不若專宏淨土法門之妙也答持戒念佛本是一門原非異轍淨戒為因淨土為果若以持名為徑學律為紆既違顧命誠言寧成念佛三昧夫如海無涯如寶無厭豈不廣大作犯止持保任解脫豈不簡易故一心念佛者雖能止惡防非專精律學者尤為守佛明誨現在則紹隆僧種臨終則上品上生法門之妙孰過於此問如來降生西域毗尼遮罪皆因居士譏嫌故制然亦有隨方戒等今此土雖不遵行居士未必譏毀設捨微細戒何乖聖訓又時丁末運外緣不豐內因微薄欲纖毫無犯演教宏宗則佛法不能廣布完小節而失大益豈菩薩之本心學一乘之真子耶答如來一切知見普為大千眾生而制戒律六羣等亦大權示現曲體末世眾生情態而示犯緣正由人情懈怠不肯輕重等護致成末運今欲宏宗演教必以持戒為本戒律精嚴則內因湻厚外緣自豐白毫相中一分光明決非誑語若以戒為小節便成謗法談宗說教皆是儱侗瞞盰設獲外緣總名魔業有何益於正法哉問西乾列祖三學精通此間地僻時遙人罕聞見唯唐宋來數輩宗匠踪跡彰著人皆景仰然而當其水邊林下則以三條篾一把鋤為清淨自活逮其匡徒領眾則以一日不作一日不食為真實芳規至於揚化接人則以一棒一喝為拈提向上俱與律學不復相應是以好心出家之流由行脚入山乃至登座披衣所倣傚者無非此等今還許從上諸祖仍是真比丘否若非比丘云何可紹祖位若是比丘云何不遵律制又今時紹祖位者例皆輕視律學不識從上諸祖亦輕視否又今時紹祖位者雖不遵戒而仍為人授戒不識從上諸祖亦為人授戒否答從上諸祖各有三類一者嚴淨毗尼宏範三界如遠公智者左谿永嘉荊谿大梅永明覺範高峰中峰楚石等是也覺範非時不食中峰冬夏一衲具載傳記芳軌昭然古今如此知識亦甚眾多所應景仰倣傚二者丁茲末世勢不獲已遵佛遺命捨微細戒故住靜則刀耕火種領眾則墾土開田然於非時食等諸戒仍自遵行故清規晚用藥石不云粥飯秪許非時漿七日藥終身藥耳又德山托鉢亦因視日早晚當知不非時食明矣然而此等知識則便不敢為人授戒所以唐宋以來禪有禪寺講有講寺律有律寺初出家時多先學律律學有得則以律名家律學無得則捨之而習講參禪但捨微細戒不捨重戒及性戒也復有不能學律徑投禪教而參學者此即名為乘急戒緩然亦必護根本五戒斷無毀犯重戒之理而決不敢自稱比丘亦決不敢輕視律學但自愧未能兼修以為慚德故至出世接人之時或重登戒品性遮皆淨如六祖等或單提向上獨接一機如壽昌等有人問壽昌云佛制比丘不得掘地損傷草木今何自耕自種自芸自穫答云我輩秖是悟得佛心堪傳祖意指示當機令識心性耳若以正法格之僅可稱鬀髮居士何敢當比丘之名也又問設令今時有能如法行持比丘事者師將何以視之答云設使果有此人當敬如佛待以師禮我輩非不為也實未能也又紫柏大師生平一粥一飯別無雜食脇不著席四十餘年猶以未能持微細戒故終不敢為人授沙彌戒及比丘戒必不得已則授五戒法耳嗟乎從上諸祖敬視律學如此豈敢輕之若輕律者定屬邪見非真實宗匠也三者大用現前觀機利益破他疑執不拘恒規如文殊菩薩執劒逼佛三處度夏重勝比丘與女同坐令證無生乃至寒山拾得之呵律主歸宗南泉之斬蛇猫並是一時不得不用之權謀譬如良醫用砒霜以治病大將設奇謀以除賊偶一為之不可以為典要又凡訶佛罵祖痛棒毒喝皆是不得已而用之所謂兵者不祥之器非布帛菽粟比也若用得其當則迹似違律實真持律以得律之意旨故例如末利夫人飲酒救殺佛讚其為真持齋戒菩薩戒本亦云菩薩見機得殺盜等於菩薩戒無所違犯生多功德也若用失其宜將作門庭施設譬如優孟之學叔敖宗既非宗律又非律謗大般若疑悞後學三塗劇報何由得免設亦誘引愚流向三寶中作種種福由斯福力所持不即墮落終為外道魔王眷屬非佛弟子末世之中多此妖邪謗惑世間魔所攝助多得供養往往聚眾百人千人眷屬兒孫遍布天下毀戒毀教破壞如來真正法輪愚小無知羨彼名聲而爭倣傚令好心出家者皆墮其黨求升反墜哀哉痛心然由仍以三寶為所緣境故至罪報畢時還藉佛法僧戒之力而得度脫如從地倒還從地起較諸不聞三寶名者猶勝一籌故魔王語佛云吾於汝末法中令諸眷屬食汝飯著汝衣破壞汝法佛言汝但自壞吾法不壞也今若欲不墮三塗徑登聖果請必從持戒始縱不能持亦須讚歎自生慚歉若既掛名受戒而又輕視戒法既不精持戒法而又為人作師授戒既廣為人授戒又不教人如法學戒且言戒是小乘不須習學則決墮三塗為魔眷屬自受其苦無人能代終亦必皆成佛我不敢輕之矣凡例律藏譯文領皆煩複今欲便初學故多約義節文文雖節略義實不敢稍更如不相信請以律藏對觀如來滅後結集律藏原無眾部之殊後因異執致成多部部類既分各宗一轍所以義淨獨宏根本懷素但遵四分皆謂不應會通葢恐彼此逃托捨遮取開就輕避重也今倣南山意旨為之會通意在理優則用實非趨避取捨擬集眾部之大成庶契如來之本意耳問宣公採用諸部尚為懷素所譏今何所據輙生去取倘任凡夫臆見豈符大聖芳規答因諍漸成多部葢是法道之衰採用眾部所長乃集大成之意雖懷素譏訶自大有所據而宣公律學亦未可全非況佛有明訓云多智慧人能取能捨諸愚癡人不能分別則分明以集大成而望後人故今集要乃博採眾長以備參考庶幾得遡流而窮源非敢任臆見為去取也性罪遮罪惟善見律判之然於每戒之下或有或無今仍其舊不敢強增亦可例推故又彼稱制罪今作遮字字別義同取易曉故每戒之下各有緣起釋義及與罪相輕重次則問辯折衷次或引證并餘隨律威儀與本戒相似者亦附於後凡此六科或具或減不復細列但用緣釋相辯證附六字以標其上諸譯有義同音異及文相難明者可註則隨註之如或不便註明各附卷末以備稽考聲聞遮罪大士悉皆同學至於為眾生故善巧權開經中歷歷有據豈容一概儱侗今依梵網經及慈氏戒本每戒指明大略葢倣天台義疏之意提綱五分法身以戒為依三無漏學以戒為首無一如來不具戒體無一菩薩不修戒度無一經典不讚戒法無一聖賢不嚴戒行持戒如地萬善由此而生成持戒如城魔障藉此而遠離論其超勝則才沾戒品便名人世福田極其指歸則惟佛一人方名圓滿淨戒四級重樓級級皆圓頓境八萬細行行行與法界周若不持戒縱能習講坐禪興諸福業皆為魔業必入魔黨故好心出家者決須從持戒始自利利他法皆成就捨此通途更無捷徑問比丘律藏本屬聲聞梵網戒經方為大教今云四級皆圓頓境則大小奚分又既稱圓頓則一種已足何須四級答圓人受法無法不圓既稟法華開顯之旨一色一香無非中道豈有戒法而不圓頓故法華玄義云開麤者毗尼學即大乘學式叉式叉即是大乘第一義光非青黃赤白黑三歸五戒十善二百五十皆是摩訶衍豈有麤戒隔於妙戒戒既即妙人亦復然汝實我子即此義也是名絕待妙戒噫由此觀之級級圓頓其義彰矣圓頓之法一多無礙方成不可思議若謂一種已足則華嚴七處九會亦可云一處一會已足耶又問五戒十戒比丘菩薩喻如重樓四級故曰不受五戒而受十戒乃至不受比丘戒而受菩薩戒俱無有是處是則次第之義昭然今胡許沙彌受菩薩戒豈不違越金口誠言答重樓之喻葢是一往明其次第必欲執之則優婆塞亦不得受菩薩戒矣既可許優婆塞胡獨不許沙彌沙彌乃反不及優婆塞耶然菩薩戒法不惟義疏通列七眾而西域諸寺大小各別豈大乘寺中遂獨無沙彌也又問禪教律三譬如春蘭秋菊各擅其美今獨以戒為通途云何從古立為三宗答西天四七無不總持三藏法流東土方乃各立門庭然終不聞真實禪師講主或可蕩檢踰閑者也凡未學戒者多畏持戒之難正坐不知戒法妄生退委若學此戒始知如來大智曲盡人情開遮得所守護非難憶予初出家時自恃根本清淨深畏琑屑行持尚不肯受沙彌十戒況復具圓秪因叢林隨眾強受十戒既而披覽戒本乃至備閱律藏方信欲得自在無畏必須精熟毗尼毗尼未學觸途成滯儒者云不學禮無以立旨哉言也西域地多蒸溼草菜不生故聽比丘食五淨肉此土多諸蔬品決定不應食肉又西域諸國單習小者乃食五淨大乘國土悉皆遮止今在神州大乘流布若有食肉謗議沸騰護世譏嫌莫此為要縱未受菩薩戒亦決不應食肉設食肉者非沙門也經論二藏貴在流通獨有毗尼極為珍秘以是惟大僧法非外人所得與故所以根本律云在家俗侶得聞二藏謂論及經毗尼耶教是出家軌式俗不合聞戒因緣經序云天竺持律不都通視唯諸十二法人堅明之士乃開緘縢而共相授耶舍見囑見誨湻湻人可使由之不可使知其言切至惟願同我之人尤慎所授未滿五歲非持律人幸勿與之也觀此二律所云則其慎重可知是以沙彌若解五篇便成受具遮難今此集要特為樂簡者便於行持勿令未受者輙先披閱倘或沙彌展覽即應訶止如或不然彼此招罪問世尊說教如一雨所潤凡有霑者無不獲益昔有聞經半偈免墮狗胎牛負大經後世為沙門者何故律藏獨為珍秘豈不能利益人抑不欲利益人耶又設未受具人發心閱藏安知佛禁而不檢閱更有書寫剞劂之輩必已經眸倘後發心受戒為許進具為竟作重難耶若作重難則佛法中亦有限穽甘露反成毒藥也答經貴流通所以成聞熏之種律宜珍秘所以防賊住之愆一秘一通總是如來四悉巧被至於無知悞閱書刻經眸既無盜法之心應非重難之例然書刻者未必能解猶可融通閱藏者必至了知應須嚴禁是在知法者善為開導矣又問毗尼篇聚既不許白衣沙彌等預知何故涅槃會上世尊於人天大眾中廣說五篇七聚囑付後昆使莫違犯豈涅槃經亦止為比丘說亦不可流通世間耶答涅槃會上純是大菩薩眾決無盜法惡人故於篇聚之名總不復諱然僅出其名不出事義今設講演涅槃亦不須細釋可也又問若云沙彌解五篇者便成受具遮難今設有欲受戒人先閱五篇成遮難否答比丘戒法止應受後行持不應未受先閱設不知悞閱情猶可原倘知而故違理難寬宥比丘之體極尊流俗之風甚汙誦經禮懺猶可名為法施吹笙打鈸則何異於倡優若法華聽許供佛本謂使人既形儀已廁僧倫豈應自褻然則應院改禪必須永斷音樂等事如不斷者深乖佛制問若謂吹笙打鈸喻如唱優然寄歸傳云大會自恣皷樂幡華諸廟行香理則皆然何故不許設但使人作則自作教他有何分別得無犯罪否答五逆十惡世間性罪故教他與自作同科今歌舞倡伎是出家遮罪使人作樂仍名福業不可以性罪例也非時食戒經論備顯非宜諸律並無開聽即晚食稱為藥石本非佛言或古人之權巧縱使體弱多病自有非時漿七日藥終身藥等可以支延柰何甘破此大節乎除是喪命因緣不能恪守則或捨比丘沙彌之名但作菩薩近住或半月半月殷重懺悔誓不敢為戒師可耳問非時食戒名之為齋固不可犯然古來知識多有未能持者設令根本清淨其餘戒相稍不清淨還從墮落也無答破戒破齋均名惡法若但護根本寧免負債受用之科至於古來真正知識乘急戒緩者決知慚德不為戒師例如紫柏壽昌又近時知識不遵細戒謬為人師亦或未必墮落者別有殊勝福業所持故也然遠公力拒蜜漿高峰并日一食乃至觀師誓不味過午之餚從前禪教名宿淨持齋法者尤多所應取法不可學後代知識而徼𢔛於萬一也律中十夏未滿決不許為和尚及依止阿闍棃若復急於為師是謂知法犯法問時丁末法人命無常形同朝露焉可待時亦許旁通一線使僧輪不絕否答正由末世不依律法僧輪衰替致成減劫今欲挽回必須全遵佛制下至滿十夏知二部律者乃可度人耳律中雖許日三時中二分學內典一分學外書葢謂利根之士藉此降伏外人亦以西域諸國多有外道與法門作對今在神州其事逈異若但專心本業則白衣咸加敬畏如或耽染詩文則佳者但取其憐而拙者反招其誚吾見其降于外人未見其能降外人也且夫根機有限年歲無多急辦正因猶虞未及若復愛樂詩文決非真實戒子此律乃定慧之基解脫之本基既築必堂構是圖本既培須花果時茂若不造鍊心源但取莊飾外相深乖受戒之正因永絕涅槃之妙果問定慧之基解脫之本無基本固為不可但有基本亦非完局是必以看教參禪為究竟義也豈可以律為究竟義耶答受得律儀是為基本定共道共是為完局故曰必須造鍊心源如大小持戒犍度始自修集聖戒以至五通三明總屬戒中實義豈可向律外別求究竟耶戒法既非局於聲聞發心必須等於大士且具諸戒行乃是上品正因念佛得度今時正符記莂若不神棲安樂未是全遵佛語願同修者知所歸趣問具諸戒行固是上品上生章中三種眾生之一然持戒如地萬善由此生成定共道共皆悉具攝何必更須念佛又念佛橫出三界捷徑法門臨終十念即得往生何必煩瑣戒相既二俱捷徑隨行一途即得何故脚踏兩邊方名全遵佛語答定共道共固能豎出生死苟無淨願止生方便穢土若持戒兼念佛設能斷通別惑任運能生方便實報寂光等三淨土縱未斷惑亦可生同居淨土又念佛以淨其心正是無上妙戒不遵念佛得度之訓亦是虧違如來教敕律制所訶至若恃十念往生之捷徑而輕戒相為煩瑣便非真念佛人臨終十念敢保決難成就故必淨戒為因淨土為果方成出要是為一道清淨豈曰脚踏兩邊此集要專為自利者輯若欲宏律必須更閱全藏乃能備悉源委開發後人既是為師作範豈容樂簡厭詳今若藉戒為基別修教觀禪宗等者可先熟背戒本正文次於此本微細討究亦可免啞羊之誚若決欲宏演毗尼接引後人者先於此本精熟明了後須仍閱全藏庶於律師之名可無愧耳律藏總目四分律藏六十卷姚秦罽賓三藏佛陀耶舍竺佛念等共譯四分戒本一卷佛陀耶舍譯四分戒本一卷比丘尼戒本一卷唐西太原寺沙門懷素依律集出曇無德律雜羯磨一卷前魏天竺三藏康僧鎧譯羯磨曹魏沙門曇諦集四分比丘尼羯磨法一卷劉宋罽賓三藏求那䟦摩譯四分律刪補隨機羯磨二卷京兆崇義寺沙門道宣撰四分僧羯磨三卷尼羯磨三卷唐西太原寺沙門懷素依律集出摩訶僧祇律四十卷東晉三藏法師佛陀䟦陀羅共沙門法顯譯波羅提木叉僧祇戒本一卷佛陀䟦陀羅譯比丘尼僧祇律波羅提木叉戒經一卷東晉平陽沙門法顯共覺賢譯彌沙塞五分律三十卷宋罽賓三藏佛陀什竺道生共譯五分戒本一卷比丘尼戒本一卷梁建初寺沙門明徽集五分律羯磨本一卷大唐開業寺沙門愛同錄十誦律五十八卷姚秦三藏弗若多羅鳩摩羅什共譯十誦毗尼序三卷東晉三藏卑摩羅叉續譯十誦律比丘戒本一卷鳩摩羅什譯十誦律比丘尼戒本一卷宋長干寺沙門法頴集出薩婆多毗尼毗婆沙八卷續一卷失譯人名今附三秦錄薩婆多毗尼摩得勒伽十卷宋三藏法師僧伽䟦摩大沙門百一羯磨法一卷失譯人名今附宋錄十誦羯磨比丘要用一卷劉宋釋僧璩依律撰出根本說一切有部毗柰耶五十卷根本說一切有部苾芻尼毗柰耶二十卷根本說一切有部毗柰耶雜事四十卷根本說一切有部毗柰耶破僧事二十卷根本說一切有部尼陀那五卷目得迦五卷根本說一切有部百一羯磨十卷根本說一切有部戒經一卷苾芻尼戒經一卷尼陀那目得迦攝頌雜事攝頌一卷唐三藏法師義淨奉制譯根本薩婆多部律攝十四卷尊者勝友造義淨法師譯根本說一切有部毗柰耶頌尊者毗舍佉造義淨法師譯根本說一切有部出家授近圓羯磨儀範一卷苾芻習略法一卷元帝師苾芻拔合思巴集戒因緣經十卷姚秦三藏竺佛念譯解脫戒本經一卷出迦葉毗部元魏婆羅門瞿曇般若流支譯善見毗婆沙律十八卷蕭齊外國沙門僧祇䟦陀羅譯毗尼母經八卷失譯人名今附秦錄佛阿毗曇經二卷陳世三藏法師真諦譯舍利弗問經東晉失譯人名優波離問經一卷劉宋元嘉年求那䟦摩譯迦葉禁戒經宋居士沮渠京聲譯佛說犯戒罪輕重經後漢安息三藏安世高譯佛說目連所問經與上經同西天譯經三藏朝散大夫試鴻臚少卿傳教大師法天奉詔譯按此二譯皆即世傳五百問經中之首一品耳意五百問一書乃後人因此而增益附會者與曾細玩之不惟與四分律相違實與五部及諸律論俱多矛盾雖云聖意未可妄測經典不宜輕議然設欲從此則大違眾律豈應捨通途之軌式取疑似之法門不知近代律主偏流通此經者亦曾參考全律否耶今既徧探五律之源不得不列在疑似之科矣律二十二明了論一卷正量部佛陀多羅多法師造陳三藏法師真諦譯大比丘三千威儀二卷後漢安世高譯僧佑云失譯人名沙彌十戒法并威儀一卷失譯人名今附東晉錄沙彌威儀宋天竺三藏求那䟦摩譯沙彌尼戒經失譯人名今在漢錄沙彌尼離戒文失譯人名優婆塞五戒相經一卷宋天竺三藏求那䟦摩譯戒消災經吳月支優婆塞支謙譯南海寄歸內法傳四卷受用三水要行法護命放生儀軌法說罪要行法三法合卷唐三藏沙門義淨撰四分律藏品目第一分二十一卷比丘戒第二分十五卷比丘尼戒受戒犍度說戒犍度第三分十三卷安居犍度自恣犍度皮革犍度衣犍度藥犍度迦絺那衣犍度拘睒彌犍度瞻波犍度訶責犍度人犍度覆藏犍度遮犍度破僧犍度滅諍犍度比丘尼犍度法犍度第四分十一卷房舍犍度雜犍度五百結集法七百結集毗尼調部毗尼毗尼增一旁引諸經論目大般涅槃經謝靈運重治大般若經玄奘法師譯菩薩善戒經求那䟦摩等譯優婆塞戒經曇無讖譯法界次第初門智者大師撰觀心論疏章安尊者撰緇門警訓未詳集人重治毗尼事義集要卷首音義原序雞園西土有雞頭摩寺去鹿苑不遠故大佛頂經云我在鹿苑及於雞園觀見如來最初成道召善來而戒體斯成佛見根熟之人發心出家以無畏口召云善來比丘於我法中快修梵行彼人即時鬚髮自落袈裟著身手中有鉢威儀進止如百臘比丘即名得比丘戒鶴樹潛暉佛入涅槃雙樹皆悉變白猶如鶴色故名鶴樹潛藏也暉日光也佛光如日從此永藏顧命周書有顧命一篇乃成王將崩而遺誡康王者顧回視也法王示滅諄諄付囑亦猶人王之顧命故宏傳序云金河顧命也木叉是重者大涅槃經云我滅度後諸比丘依戒而住以戒為師遺教經云應當珍敬波羅提木叉即是眾等大師若佛住世無異此也因犯乃遮緣開隨制二百五十戒皆因犯緣乃結其三篇以下或因病等諸緣開聽又因更起犯緣則亦隨犯更制如穀還賤不聽入事之類也能師受具六祖名慧能本是嶺南賣柴人偶聞客誦金剛經心即開悟乃詣黃梅見五祖密傳衣鉢隱於獵人隊中十五年後至廣州法性寺值印宗法師講涅槃經時有風吹幡動一曰風動一曰幡動議論不已祖曰不是風動不是幡動仁者心動法師異之訊知是傳衣鉢者乃為鬀髮集三師七證登壇受具然後於菩提樹下開唱大法觀師十誓五臺山亦名五頂亦名清涼山澄觀國師闡華嚴法門於此十誓者體不損沙門之表心不違如來之制坐不背法界之經性不染情礙之境足不履尼寺之塵脇不觸居士之榻目不視非儀之彩舌不味過午之餚手不釋圓明之珠宿不離衣鉢之側大雄御極世尊於三界中最為勇猛丈夫故稱大雄御治也統也用也易曰乘龍御天極寶位也又中也至也要會也書曰惟皇作極御極者處於法王尊位用中道設化統治大千世界也善逝藏機善逝者如來十號之一藏機者眾生緣盡則應化機息但除地獄地獄苦重不能發心受戒故梵網經不列其名或問閻羅王亦地獄道胡得在護法位中既為護法寧不受戒答若準他處經說則閻羅亦可屬鬼神道又是大權示現若準梵網并不列之隙駒莫挽古人云人生如白駒過隙耳言其迅速無量光塔即雲棲蓮池大師肉身塔也護法居士以其專宏淨土題為無量光塔原䟦魯魚滋長魯字與魚字相類易於差譌亦如亥豕之類及烏焉成馬之類也滋長者以喻佛法差悞日甚一日猶如魯魚不辨也真丹或云震旦或云旃丹以日初出曜於東隅故得名也曹魏鎧公按此方如法受戒始於曇摩迦羅及沙門曇諦而康僧鎧同在嘉平年間出曇無德律雜羯磨一卷故云肇興於鎧公耳肇始也懷素律師俗姓范氏京兆人唐貞觀九年出家依道成師學律先居宏濟後住太原集四分僧尼戒本各一卷僧尼羯磨各三卷每每翻宣律師之案致不足之意焉非今相傳善書能飲之懷素也彼與顏魯公同時與今律師相去近百年矛盾矛以刺人盾以自衛昔有一人兼鬻二器售矛則曰可以破堅盾售盾則曰可以禦利矛故名自相矛盾以喻五百問一書與律藏自相反也亡羊語云多岐亡羊以喻不明律學綱宗則異說紛紛不能致一也愾音慨太息也繄音衣又音意發語辭又惟也總問辯用前四戒通為觀境以六觀之事理相即大經一禁戒即智論不缺戒指初篇戒也大經二清淨戒即智論不破戒指二篇戒也大經三善戒即智論不穿戒指三篇以下也大經四不缺戒即智論不雜戒指定共戒也此四並是事戒故通為所觀境也大經五不析戒即智論隨道戒及無著戒此是空觀相應戒也大經六大乘戒即智論智所讚戒大經七不退戒八隨順戒即智論自在戒此是假觀相應戒也大經九畢竟戒即智論隨定戒大經十具足波羅蜜戒即智論具足戒此是中觀相應戒也並以五篇七聚為所觀境故云篇聚一不可虧凡例南山意旨道宣律師住終南山故世稱律學為南山一宗宣師雖宗四分律藏每每採集眾部之長性罪遮罪雖未制戒之前約世法中亦自有罪名為性罪如殺盜邪婬口四惡業之類也世尊為出家人護世譏嫌制立戒法名為遮罪如長衣宿食掘地損草之類也佛制所遮犯者得罪故名遮罪亦名制罪謂從佛制邊得罪也聲聞遮罪大士悉皆同學菩薩戒本經云毗尼建立遮罪護眾生故令不信者信信者增廣同聲聞學何以故聲聞自度尚不離護他何況菩薩為眾生故善巧權開菩薩戒本經云又復遮罪住少利少作少方便者菩薩不同學此戒今按比丘二百五十戒中但有捨墮六事是菩薩戒所開餘皆不妄開也六事者一從非親乞衣二過受自恣與衣三畜長鉢四令非親里織師織衣五畜蠶綿臥具六受金銀皆是為眾生故非許自受用也天台義疏智者大師於梵網經心地品中獨揭十重四十八輕戒法行之名為義疏每戒之下必對小乘料簡同異提綱三無漏學以戒為首佛頂經云因戒生定因定發慧斯則名為三無漏學又云縱有禪定多智現前若不斷婬必落魔道若不斷殺必落神道等式叉此翻為學五淨肉不見殺不聞殺不疑為己殺自死鳥殘十二法人即十二頭陀行也耶舍恐即佛陀耶舍與竺佛念同譯四分律者人可使由之不可使知此言本出論語今借用之謂初受戒人但可使其依律行持未可使閱律藏知其所從結戒之由葢六羣比丘等皆是大權示現曲為末世而示犯緣誠恐愚者不達認為實事將謂佛世尚爾何況今時則反開放恣之心矣
