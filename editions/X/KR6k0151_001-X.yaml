body:
  text: 古吳蕅益沙門智旭彚釋將釋此律大文為二初題目二入文初題目四分戒本釋此律題倣同梵網戒義疏略述三重玄義第一釋名第二出體第三料簡釋名為三初明四分戒本次出眾部源委後釋事義集要初明四分戒本者謂是四分律之比丘戒經也此出曇無德部梵語曇無德翻為法密其律共有四分第一分明比丘事第二分明比丘尼事及受戒說戒法第三分明安居自恣等法第四分明房舍等雜法今此戒本即第一分中如來因事所結戒經也次出眾部源委者眾部皆有通別二名通則同名為律別則僧祇四分等各從部黨所屬及經冊數目為名且通名者梵語毗尼或云毗柰耶此翻善治亦翻調伏亦翻為滅正翻為律律者法也又戒因緣經云鼻秦言去柰耶秦言真去若干非而就真故曰真也降伏此心息此心忍不起故曰真也降伏戒也息定也忍智也文故知才舉一法三學全收若無戒善定慧不起又此戒法凡有三種一者律儀戒亦名波羅提木叉戒二者定共戒亦名禪戒三者道共戒亦名無漏戒律儀戒者律是遮止儀是形儀能止形上諸惡故稱為戒亦曰威儀威是清嚴可畏儀是軌範可則亦曰調御使心行調善也波羅提木叉者此翻保解脫亦翻別別解脫以能保任行人出生死海又隨一一戒護持不犯隨一一處得其解脫即是二百五十學處及隨律威儀也定是靜攝入定之時自然調善防止諸惡道是能通發真以後自無毀犯如初果耕地蟲離四寸是道共力此二戒法既是心上勝用力能發戒道定與律儀並起故稱為共今毗尼藏正詮律儀亦攝定道由持淨戒禪定智慧功德發生則律儀為因定道為果由禪無漏力性業遮業悉得清淨則木叉為果定道為緣薩婆多論云此波羅提木叉戒若佛在世則有佛不在世則無禪戒無漏戒一切時有波羅提木叉戒從教而得禪無漏戒不從教得乃至云波羅提木叉戒但佛弟子有禪戒外道俱有夫能維持佛法有七眾在世間三乘道果相續不斷盡以波羅提木叉為根本禪無漏戒不爾是故於三戒中最為殊勝善見亦云毗尼藏者是佛法壽毗尼藏住佛法亦住是為略釋通名義也次別名者謂僧祇律五分律薩婆多律十誦律及善見律戒因緣經毗尼母論等何以有是眾律按舍利弗問經佛自記云輸柯王孫弗沙密多羅滅法已後有王性甚良善重興佛法時諸比丘好於名聞亟生諍論抄治我律開張增廣迦葉所結別為群黨互言是非求王判決王集二部行籌取舊者多名為摩訶僧祇此云大眾取新者少而是上座名為他俾羅也此云上座是後因於諍故復起多部於三四百年中展轉枝分如是眾多久後流傳若是若非唯餘五部各舉所長名其服色摩訶僧祇部勤學眾經宣講真義以處本居中應著黃衣曇無毱多迦部即曇無德通達理味開導利益表發殊勝應著赤色衣薩婆多部博通敏達以導法化應著皂衣迦葉維部精勤勇猛攝護眾生應著木蘭衣彌沙塞部禪思入微究暢幽密應著青衣摩訶僧祇其味純正其餘部中如被添甘露諸天飲之但飲甘露而棄於水人間飲之水露俱進或時消疾或時結病其讀誦者亦復如是多智慧人能取能捨諸愚癡人不能分別又按翻譯名義集世尊成道三十八年赴王舍城國王食訖令羅云即羅睺羅此翻覆障六年處胎故佛之子也洗鉢失手㩧鉢以為五片佛言表我滅後初五百年中諸比丘分毗尼藏為五部也後果分為五部一曇無德部二薩婆多部此云說一切有法名十誦三迦葉遺部此云重空觀止有解脫戒本經一卷到此四彌沙塞部此云不著有無觀法名五分五婆蹉富羅部此云犢子律本不來五部是別摩訶僧祇是總通則六部也又按南海寄歸傳云諸部流派生起不同西國相承大綱唯四一聖大眾部分出七部二聖上座部分出三部三聖根本說一切有部分出四部四聖正量部分出四部其間離分出沒部別名字事非一致此不繁述有部所分三部之別一法護二化地三迦攝卑所云十誦四分者多是取其經夾以為題目然十誦亦不是根本有部也頻婆娑羅王夢見一氎裂為十八片一金杖斬為十八段怖而問佛佛言我滅度後一百餘年有阿輸迦王威加贍部時諸苾芻即比丘教分十八趣解脫門其致一也即此先兆王勿見憂文已上所說各各不同良以去聖時遠故傳事或訛今若泥迹則觸處多乖取義則有長便用雖聖心難測而比量可憑但令義途得所則事迹不勞辯矣已出眾部源委竟後釋事義集要者事謂制戒緣起義謂隨犯輕重結罪悔過之宜要謂律藏文繁今但取要集謂雖宗四分參用諸家何以獨宗四分二百五十戒相無增減故舉世久流行故何以參用諸家事有詳略故義有短長故不妨互相發明故初釋名竟第二出體者初明無作次明止行二善初明無作者天台師云戒體者不起而已起則性無作假色磬公釋云謂此戒體不起則已起則全性而性修交成必有無作假色無作一發任運止惡任運行善一作之後不俟再作故云無作文言無作假色者十一色法各有假實就法處所攝色中唯定果色名為實色表無表色並名假色善惡二戒各有表及無表表即名作無表即名無作今且釋善戒互跪翹勤名為身表三說乞戒名為語表眾僧和合同集戒場亦名身表白四羯磨亦名語表由此作法受得清淨戒體成比丘性為意家之所緣任運恒得止行二善故云一作之後不俟再作名為無作假色也此無作戒體從第三羯磨畢時便得於一切男女邊得不婬色於一切情非情邊得不盜色於一切有情邊得不殺色於一切有情邊得不欺誑色乃至於一切地得不掘色於一切草木得不壞色於一切酒得不飲色如是二百五十戒法一一各周法界故出家功德經明一日一夜持戒功德不可窮盡正由此妙善戒法徧以法界為所緣故是則無作戒體是法處色是無漏色成論謂是非色非心聚者為遮心無得失果無頑善二種難耳義疏云無作假色經論互說諍論有無一云指心誓不為惡即名受戒都無無作若因中別有頑善共為佛因佛地亦應別有此善共為佛果此以果無頑善難戒是色法也以小乘妄計無作為心外實色故一云大小乘經論盡有無作若直以心為戒發心便應得戒何故七遮不能得戒又都無無作何故犯重便名失戒此以心無得失難戒是心法也成論立非色非心聚可以雙遮兩難故古來律師用義依之若大乘所明戒是假色憑師一受遠至菩提隨定隨道誓修諸善誓度含識亦以此心力大別發戒善為行者所緣止息諸惡實則由心感得借色表成故大乘家則云初番羯磨成十方世界妙善戒法由心業力悉皆震動二番羯磨成十方世界妙善戒法於虗空中如雲如葢覆行人頂三番羯磨成十方世界妙善戒法從行人頂門流入身心充滿正報盡未來際永為佛種此毗尼藏中雖不說如此事亦云羯磨成就名得處所當知有漏五蘊色身為依無漏五蘊戒身為依有漏色身從父精母血和合而生是色處假色無漏戒身從三師七證羯磨而得是法處假色所以和尚名為力生正從能生戒身以得名耳得此戒身便同僧寶能使天龍尊奉神鬼欽承若心不樂道則名戒羸若向人說捨則名還戒苟無此無作戒體則天神何所致敬亦何故名羸名捨也問既是有羸有捨復有破者何得名為任運止行答譬如橋梁任運可以度人池井任運可以汲用倘發撤橋梁壅塞池井功能便失否則常時有用不俟再作故名無作耳次明止行二善如百論息惡不作名之為止信受修習名之為行佛教雖多止行收盡今此戒善不起則已起則伐惡皆是止義皆有進趣皆是行義伐惡者從根隨煩惱起身口七支是惡因三塗劇苦是惡果此律集十句義具如後釋為諸比丘結戒能令受持之者惡因既除惡果亦謝是名伐惡進趣者攝持諸根念無錯亂常一其心習諸善法任運感得人天華報乃至出世解脫實果即是進趣義也二出體竟第三料簡更為二初對大乘辨得捨次就教相辨淺深初辨得捨者大乘重在內因小乘重在外緣重內因故必須發菩提心方堪受戒若不善無記心中不發無作而千里無師許其像前自受重外緣故必須師僧界法事事合制若諸緣有一不備不名得戒而諸緣既具得戒徧於三心謂善不善無記心中並發戒也又大乘一得之後極至佛身小乘但盡形壽大乘上品纏犯十重及退大菩提心則名失戒小乘犯四重禁則名失戒若心不樂道向一人捨則名還戒大乘失戒之後得見好相許其重受小乘失戒無重受理但使絕不覆藏僅可羯磨與學法罪法中明之若捨戒者乃許重受三度返俗始為絕分耳問釋戒體既依大乘辨得捨仍分大小豈不宗趣相違答依大乘釋無作者不違法體也對大小辨得捨者不壞法相也違法體則相無所依壞法相則體無由顯故法華開顯之後涅槃仍扶戒律毗尼軌式分毫不改正謂即此知常方稱絕待之妙宗趣相成思之可得又問大乘既重內因今時律師與人受菩薩戒可知其內因真否如或不真名得戒否如不得戒則設犯十重還以十重定其罪否答彌勒菩薩羯磨文中具有觀察當機之法若不能知其內因而妄相傳授不免無解作師之過然彼受戒之人不善無記心中雖不發戒而既濫膺菩薩之名自當依律判罪非同不得比丘戒人竟以賊住論也次辨淺深者此是酪味教攝初調凡夫令入聖故若約五味互融亦可作四教釋謂於一切禁戒堅固執持永離繫縛即藏教法若達罪如幻病戒如幻藥持犯本空身心清淨即通教法若仰信中道即以此戒先斷見思惑次涉俗利生後悟入中道即別教法若戒為法界一切法趣戒是趣不過住戒秘藏一一戒中明見佛性即圓教法又如來以四悉檀立此戒法隨順世間護眾生故令生歡喜即世界悉檀生善即為人悉滅惡即對治悉能令正法久住即第一義悉又既稟開顯之教則此戒惟是一乘更非前之三教故法華云諸佛滅度後若人善輭心如是諸人等皆已成佛道又云汝等所行是菩薩道也又即未開顯前大乘比丘亦須同學故菩薩戒本經云若菩薩於如來波羅提木叉中毗尼建立遮罪護眾生故令不信者信信者增廣同聲聞學何以故聲聞者乃至自度乃至不離護他何況菩薩第一義度又云若菩薩如是見如是說言菩薩不應聽聲聞經法不應受不應學菩薩何用聲聞法為是名為犯眾多犯是犯染汙起噫可以思矣初題目竟二入文三初說戒序二正列戒相三結勸迴向初中四初偈讚二問答啟白三正說戒序四結問初又六初歸憑三寶二誡眾集聽三師資傳受四喻誡勿毀五顯戒當說六歎勝結示今初稽首禮諸佛及法比丘僧作法之始必先禮敬三寶所以求加被也稽首者身業致敬身致敬時口稱德號心存觀想即是三業供養佛法僧名為三寶以可尊可重故佛者覺義自覺覺他覺行圓滿故名佛陀法者軌持義軌生物解任持自性故名為法比丘此含三義一者乞士義離邪命法一鉢資身捨愚癡垢三慧自淑二者怖魔義甫受具時羯磨成就地神即出大聲唱云此間有善男子已受具戒當使諸天增盛修羅損減如是空行善神聞之展轉大聲唱告須臾便達梵天波旬聞之即生恐怖故曰怖魔三者破惡義修菩提分斷見思惑因中具此三義故於果上隨得應供無生殺賊之號名為阿羅漢也又比丘此翻除饉為大福田開大法施故名除饉僧者具云僧伽此翻和合眾乃四比丘以上之稱和合有二義一理和謂同證擇滅二事和謂戒和同修見和同解身和同住利和同均口和無諍意和同悅復次十誦律云有五種僧一無慚愧僧破戒諸比丘是二羺羊僧凡夫鈍根無智慧如諸羺羊聚在一處不知布薩不知布薩羯磨不知說戒不知法會三別眾僧一界內處處別作諸羯磨四清淨僧凡夫持戒人及凡夫勝者五真實僧學無學人此中所禮正禮後之二種由真實僧能令勝義正法久住由清淨僧能令世俗正法久住故也彼前三種能作非法羯磨能令正法破壞故非所禮復次有住持三寶有一體三寶言住持者佛在世時樹王得道為佛寶說四諦法為法寶度五比丘等為僧寶佛滅度後範金合土紙素丹青為佛寶黃卷赤牘三藏聖教為法寶鬀髮染衣紹隆佛化為僧寶此三住世不絕故名住持三寶然一切像即同真身經典所在即法身舍利今時凡僧亦能荷負正法為世福田是亦皆應禮敬又諸佛者通指十方現坐道場一切大師以覺體遍故雖在他方能於此土而作良祐亦即通指三世次第出興一切世尊以覺性常故雖示過未能於現在而垂感應法僧亦爾言一體者以實相慧覺了諸法非空非有亦空亦有雙忘雙照三智圓覺名為佛寶所覺法性之理三諦具足名為法寶如此覺慧與理事和合名為僧寶復次現前一念本具三諦在迷不覺是為法寶能覺三諦之智是為佛寶諦智相合是為僧寶及之一字正顯一體三寶義也復次言禮敬者不於一體之外而有住持亦不離住持之相而言一體若昧一體之理而行禮敬但得事善不名真禮以禮是體義未達三輪體寂非體義故若離住持之相而談一體墮惡取空不名達理以理居事外未知全事即理非一義故及之一字正顯非一非三而三而一事理行布圓融之旨也二誡眾集聽今演毗尼法令正法久住戒如海無涯如寶求無厭欲護聖法財眾集聽我說欲除四棄法及滅僧殘法障三十捨墮眾集聽我說演者宣布流通之謂毗尼法如釋名中正法者出世聖道也正法住世教行果三皆悉具足今演此律則戒身成就定慧發生大沙門果由是可期故令正法久住此半偈明攝眾生義也如海無涯者說戒犍度云海水有八奇特法所以阿修羅娛樂住一者一切眾流皆往投之二者潮不失限三者五大河投海而失本名四者河及大雨盡歸而無增減五者同一鹽味六者不受死屍七者多出珍寶八者大形所居我法中亦有八奇特使諸弟子見已於中而自娛樂一者我諸弟子漸次學戒皆歸我法於中學諸善法二者我諸弟子住於戒中至死不犯三者四姓捨家皆稱沙門四者於我法中以信堅固捨家學道入無餘涅槃界而涅槃界無增無減五者同一解脫味六者犯戒惡法雖在眾中坐常離眾僧遠眾僧亦離彼遠七者多出珍寶所謂四念處乃至八賢聖道八者受大形所謂四向四果復次初受戒時即於法界徧得不婬不盜不殺等色如是二百五十戒三千威儀八萬細行一一清淨戒色各徧法界又復從此於念念中任運成就戒法善色悉徧法界不可窮盡故云如海無涯也如寶求無厭者寶謂如意珠王此寶於念念中能雨滿閻浮提一切樂具而寶體終無損減戒亦如是於念念中出生一切念處正勤如意根力覺道等法乃至三乘一切聖果而戒體終無變易又此戒者愈學則愈見其精愈修則愈得其利故云如寶求無厭也聖法財者略則信戒聞捨慧慚愧七種廣則六度萬行十力四無所畏百八三昧十八不共法等此等法財莫不以戒為之守護戒如良兵猛將亦如堅城深池亦如憲章典刑亦如主藏臣寶捍禦外侮不被侵凌防訐奸賊不被偷劫整理安頓不令毀壞出納取與令得增長是名護義此一偈明攝善法義也除棄滅殘障止捨墮明攝律儀義也棄等解在後文問三聚之名不共小教胡得約此判釋答未經開顯有實無名已經開顯名實俱有三義顯然豈關強判三師資傳受毗婆尸式棄毗舍拘留孫拘那含牟尼迦葉釋迦文諸世尊大德為我說是事我今欲善說諸賢咸共聽毗婆尸或云維衛此翻勝觀式棄或云尸棄此翻火毗舍浮或云隨葉或云毗葉羅此翻徧一切自在此三世尊在莊嚴劫之末拘留孫或云拘樓秦此翻所應斷又翻作用拘那含牟尼此翻金寂又翻金仙迦葉或云迦攝波此翻飲光釋迦文或云釋迦牟尼此翻能儒又翻能仁寂默此四如來在賢劫次第出世所以處處說此七佛者一謂在百小劫內淨居天人所曾見故二謂本師修相好業從毗婆尸佛時為始故世尊者十號具足九界同仰大德者因圓果滿世無與等又比丘亦可通稱大德以有廣大德行故也是事者四事十三事乃至隨律等事善說者如法和合而說咸共聽者從無夏乃至百臘皆應集聽從戒序乃至偈經皆應諦聽也四喻誡勿毀譬如人毀足不堪有所涉毀戒亦如是不得生天人欲得生天上若生人間者常當護戒足勿令有毀損如御入險道失轄折軸憂毀戒亦如是死時懷恐懼前二偈約障生善處誡後一偈約死墮惡道誡生死喻如險道戒法等於轄軸毀戒則死時惡趣相現猶險道中失轄折軸前後無厝恐怖慞惶也行願品云關閉一切諸惡趣門開闡人天涅槃正路戒實職其功矣然根本律云或願人間或求天上勤修梵行者得生人天暫受快樂彼命終後入地獄中是故當求涅槃以修梵行勿樂人天而致勞苦又律攝云險途有二一是生天二是惡道雖復生天受諸勝樂報盡之後還墮惡趣是則人天非所當欲而第二偈顧云爾者略有二義一謂戒足不可毀故毀則人天尚自無分何況涅槃二謂攝受下種性故語以涅槃則怖語以人天則樂先以欲鉤牽後令入佛智也又復約事實說果能持戒不毀縱無定慧亦決不失人天之身又復應知喻戒以足無遠弗屆若欲超登上品蓮臺若欲承事十方諸佛若欲嚴淨無邊佛土若欲普入法界玄門莫不以此為初方便五顯戒當說如人自照鏡好醜生欣慼說戒亦如是全毀生憂喜如兩陣共戰勇怯有進退說戒亦如是淨穢生安畏憂喜屬於意地安畏現於身行戒若全淨則內不慚己外不愧人故心喜而身安戒或毀穢則內玷於己外汙於僧故憂懷而畏眾六歎勝結示世間王為最眾流海為最眾星月為最眾聖佛為最一切眾律中戒經為上最如來立禁戒半月半月說受此戒者名大沙門大者梵稱摩訶此含三義一者大天人中尊故二者多富有福慧故三者勝超諸外道故今初一句即約大喻歎第二句即約多喻歎第三句即約勝喻歎第四句即總喻歎次半偈正以法合唯此戒經是最故受之者亦成最耳一切眾律謂世間正法及外道等亦有律故又五戒八戒十戒亦不如比丘戒為最故又禪戒無漏戒亦不如波羅提木叉戒為佛法綱維故又三藏十二部亦惟戒經為最若不堅持禁戒縱有禪定多智現前皆成魔業所以根本律云佛說三藏教毗柰耶為首也又第一句喻歎教經獨如來所自說故第二句喻歎行經一切法趣戒故第三句喻歎理經無作戒體清涼如月因於持犯示有盈虧而實無增減故第四句喻歎果經不惟成聲聞果亦復成如來道故問無作戒體從師受得設犯初篇雖絕無覆藏心僅許與學永無僧用若以月體喻無作體則與本性有何分別若以從師受得名為無作是仍有增減矣答無作為當體之體本性清淨為所依之體無作屬修本性屬性無作為事本性為理無作之體為宗本性之體為體然宗之與體非一非二達者即宗而悟體愚者昧體并迷宗今既以月喻歎理經正是指無作戒所依之體當知若得若失總是盈虧邊事不可謂性有增減也復次從譬如人毀足至戒經為上最具四悉檀開人天路閉惡趣門是世界悉檀照鏡二喻是為人對治二種悉檀隨得生善滅惡二種益故四最喻戒即第一義悉檀此戒體是淨法身故如來立禁戒者大千界內佛為法主律是佛敕惟聖制立自餘下位但可依承良以如來行果圓極窮盡眾生輕重業性等覺以下猶非所堪故也問契經說通五人毗尼惟佛自說如禮樂征伐自天子出則諸侯拱手聽命今大明律是天子制文武百官無不觀覽縱使田夫亦可觀之云何此毗尼法惟許比丘閱習不許沙彌白衣觀覽答律惟佛制所以顯法道之尊然不惟僧法名律凡五戒十戒菩薩戒等皆名律也其普被七眾亦猶大明律之頒行天下也至於比丘戒法則如內府秘書及官箴銓選等事非凡庶所敢與聞矣半月半月說者黑白二月表善惡二業白欲其圓黑欲其盡又白表智德黑表斷德於此說戒用自考也故十誦律云布薩法者半月半月諸比丘和合一處自籌量身晝作何罪夜作何罪從前說戒以來將不作罪耶若有罪當向同心淨戒比丘如法懺悔若不得淨戒比丘當生心我後得之應如法懺悔以此安住善法捨離不善根本雜事云我令汝等每於半月說波羅提木叉當知此則是汝大師是汝依處若我住世無有異也附第四分云有五法名為持律一知犯二知不犯三知輕四知重五廣誦二部戒又五法四如前五廣誦毗尼又五法四如前五住毗尼而不動又五法四如前五諍事起善能除滅持律人有五功德戒品堅牢善勝諸怨於眾中決斷無畏若有疑悔能開解令正法久住又云有五法令正法疾滅一者不諦受誦喜忘誤文不具足以教餘人文既不具其義有缺二者為僧中勝人上座若一國所宗而多不持戒但修諸不善法放捨戒行不勤精進後生年少比丘倣習其行三者多聞持法持律持摩夷而不以所誦教餘四眾便自命過持法謂知修多羅藏如阿難等持律謂知毗尼藏如優波離等持摩夷謂善於訓導宰任玄綱如摩訶迦攝等也四者有比丘難可教授不受善言不能忍辱餘善比丘即便捨置五者喜鬬諍共相罵詈彼此諍言口如刀劒互求長短若反上五事者令正法久住又如來滅後若比丘不敬佛法僧及戒定則正法疾滅若在法律中出家不至心為人說法亦不至心聽法憶持設復堅持不能思惟義趣彼不知義不能如法修行不能自利亦不利人以是因緣令法疾滅反上事者正法久住摩訶僧祇律云若篤信善男子欲得五事利益者當盡受持此律何等五欲得建立佛法欲令正法久住不欲有疑悔請問他人諸有比丘比丘尼犯罪恐怖為作依怙欲遊化諸方而無礙皆當盡受持此律又云大迦葉語諸比丘言長老世尊舍利非我等事國王長者婆羅門居士眾求福之人自當供養我等事者宜先結集法藏勿令佛法速滅十誦律云若比丘知布薩知布薩羯磨知說波羅提木叉知會坐是應供給供養何以故無佛時是人補佛處又云隨清淨比丘不壞法說戒時名法住世又云持律有五利知出家法知羯磨知威儀知依止知障道不障道法根本尼陀那云有秉羯磨有如說行者是則名為正法住世不則名為正法滅壞佛告苾芻汝等若以信心投我出家情求涅槃修淨行者此諸苾芻所著衣服直一億金錢所住房舍直金錢五百所噉飲食具足百味如是等事我皆聽受汝並堪銷若有苾芻破重戒者於僧住處乃至不銷一口之食僧伽藍地不容一足汝等應知破戒之人有十種過失自知我是破戒惡人他亦知是所有天神不來親附同梵行者知法善人咸生輕賤罪惡音響四遠共知未證悟者不復能證已證法者悉皆退失曾所聽聞咸皆忘念命欲終時心生懊悔捨命之後生地獄中又諸苾芻應知受用有其五種一者為主受用謂阿羅漢永除三毒二者父母財受用謂諸學人尚有餘惑三者聽許受用謂湻善異生於戒清淨勤修禪誦無懈怠心四者負債受用謂雖防禁戒而不勤修覺品善法五者盜賊受用謂於四重禁中隨犯其一是故汝等應當修學善見毗婆沙云善男子好心出家律藏即是父母何以故與其出家令得具足教學威儀依止律藏自身持戒能斷他疑若入僧中無所畏懼若有犯罪依律結判令法久住持律人即是功德根因根故攝領諸法南海寄歸云大乘小乘律檢不殊齊制五篇通修四諦若禮菩薩讀大乘經名之為大不行斯事號之為小所云大乘無過二種一則中觀二乃瑜伽中觀則俗有真空體虗如幻瑜伽則外無內有事皆唯識斯並咸遵聖教孰是孰非同契涅槃何真何偽意在斷煩惑濟眾生豈欲廣致紛紜重增冗結依行則俱昇彼岸棄背則並溺生津西國雙行理無乖競又云浮囊不洩乃是菩薩本心勿輕小愆還成最後之唱理合大小雙修方順慈尊之訓防小罪觀大空攝物澄心何過之有或恐自迷誤眾準教聊陳一隅空法信是非虗律典何因見慢緇門警訓云律制比丘五夏以前專精律部若達持犯辦比丘事然後乃可習學經論今越次而學行既失序入道無由大聖訶責終非徒爾且才沾戒品便乃聽教參禪為僧行儀一無所曉況復輕陵戒檢毀呰毗尼貶學律為小乘忽持戒為執相於是荒迷塵俗肆恣兇頑嗜杯臠自謂通方行婬怒言稱達道未窮聖旨錯解真乘且戒必可輕汝何登壇而受律必可毀汝何削髮染衣是則輕戒全是自輕毀律還成自毀妄情易習至道難聞拔俗超羣萬中無一請詳聖訓能無從乎又云佛法二寶並假僧宏僧寶所存非戒不立故華嚴云具足受持威儀教法能令三寶不斷溈山警䇿云毗尼法席尚未叨陪了義上乘豈能甄別辯問嗜杯臠行婬怒誠不足論倘不犯重禁根本無虧從此聽教參禪專求上乘亦復何過豈必瑣瑣於事相方合聖訓彼背大向小不習學佛等戒又云何通答若上根利智者能達法義則即此律儀是教是禪豈可視作瑣瑣事相而別覓上乘若中下之流事相尚未能知又何能遠求禪教所謂輿薪不見而欲察秋毫也至若背大向小乃心希自利之謂不習學佛乃退失菩提之謂沙彌五德尚云志求大乘為度人故豈比丘戒法止屬小乘名為不習學佛耶音義輸柯王或云阿輸迦或云阿育此云無憂弗沙密多羅未見翻譯根隨煩惱根本煩惱有六謂貪瞋癡慢疑五見隨煩惱有二十又分三類一大隨有八謂不信懈怠放逸昏沈掉舉失念不正知散亂中隨有二謂無慚無愧小隨有十謂忿恨惱覆誑諂慢害嫉慳身口七支身三支謂殺盜婬口四支謂妄言綺語兩舌惡罵發菩提心方堪受戒菩薩戒羯磨文云先於無上正等菩提發宏願已當審訪求同法菩薩請授淨戒乃至對佛像前問言汝是菩薩否彼應答言是發菩提願未應答言已發上品纏犯十重十重即梵網經十重戒也纏者十纏一瞋二覆三睡四眠五掉六悔七嫉八慳九無慚十無愧也上品者極重煩惱也羯磨文云毀犯重戒數數現行都無慚愧深生愛樂見是功德當知說名上品纏犯離邪命法有四邪命食一方口食謂干謁通使二維口食謂呪術卜算三仰口食謂仰觀星宿四下口食謂種植田園又有五種邪命一為利養故詐現奇特異相二自說功德三占相吉凶為人說法四高聲現威令人畏敬五說所得供養以動人心三慧一聞慧謂至心聽法解其言趣二思慧謂聞已諦思令法入心三修慧謂如說修行令得相應也波旬此云惡或云殺者魔王之名同證擇滅即擇滅無為也唯識論云由簡擇力滅諸雜染究竟證會故名擇滅凡夫勝者謂外凡內凡七賢人也一五停心二別相念三總相念為外凡一煖位二頂位三忍位四世第一位為內凡勝義正法謂三乘道果世俗正法謂法律教誡樹王得道悉達太子六年苦行之後受牧女乳糜上供敷吉祥草坐畢鉢羅樹下覩明星而成正覺因名此樹為菩提樹亦名樹王說四諦法佛詣鹿苑初為五比丘三轉四諦法輪一示轉云此是苦逼迫性此是集招感性此是滅可證性此是道可修性二勸轉云此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修三證轉云此是苦我已知此是集我已斷此是滅我已證此是道我已修度五比丘一阿若憍陳如阿若此翻已知又翻解最初解佛法故憍陳如或云憍陳那或云俱鄰此翻火器其先事火從此命族二頞亦云阿說示此翻馬勝又翻馬師三䟦提亦云婆提此翻小賢四十力迦葉亦名婆敷五拘利太子陳如迦葉二人是佛母黨餘三人是佛父黨舍利或云室利羅或云設利羅此翻靈骨大論云碎骨是生身舍利經卷是法身舍利五大河投海按他經俱言四河入海東殑伽南信度西縛芻北徙多皆從阿耨達池出五字恐悞也四姓一剎帝利是王種二婆羅門是淨行如此間儒流三吠奢亦云毗舍即商估四首陀即農田為業者閻浮提閻浮樹名提洲也洲上有此樹故以為名此翻勝金西域記云正言南贍部洲憲章典刑憲法也章條也典常也刑亦法也謂國家歷世相傳之法令制度主藏臣寶轉輪王七寶之一轄胡八切聲同瞎車軸頭鐵也軸音逐車轂也屆音戒至也世間正法謂人道五常輪王十善等十二部一長行二重頌三授記四諷頌五無問自說六因緣七譬喻八本事九本生十方廣十一未曾有十二論義亦名十二分教大千界即指娑婆世界也四大部洲共一日月共一須彌山名為一四天下一千箇四天下名小千一千箇小千名中千即是百萬一千箇中千名大千共有十萬萬四天下十萬萬日月十萬萬須彌山總稱三千大千世界皆釋迦佛之所治化若以華藏世界觀之則此大千世界僅如極微塵耳等覺一生補處菩薩之名如今彌勒菩薩等是也下地朢之則與佛等尚有極微細一品無明未盡猶名菩薩摩夷具云摩得勒伽亦云摩咀里迦亦云摩德迦亦名目德迦此翻智母以其能生智故湻善異生已登聖位名同生眾未預聖流名異生眾湻善者專修善法也一則中觀二乃瑜伽中觀即龍樹宗世稱法性宗瑜伽即護法宗世稱法相宗以瑜伽師地論為宗故名瑜伽此翻相應也浮囊不洩梵網經云如帶持浮囊欲渡大海謂持戒者仗此戒力得渡生死苦海猶如浮囊設使羅剎欲乞全分或乞半分乞手掌許乞一指許乞微塵許皆悉不可與之持戒亦爾愛見羅剎欲令毀犯初篇乃至五篇皆悉不可毀破以設毀破一微塵許氣便漸洩不復能浮故
