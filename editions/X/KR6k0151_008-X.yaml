body:
  text: 古吳蕅益沙門智旭彚釋三十八殘宿食戒此是遮罪大乘比丘同學若比丘殘宿食而食者波逸提緣尊者迦羅常坐禪思惟時城中乞食易得迦羅作是念何為日日乞食疲苦寧可食先得者後得食當持還即如所念為之諸比丘於食時不見迦羅疑是命終遠行等後見乃問知其故白佛結戒釋宿食者今日受已至明日於諸比丘皆不清淨相比丘尼波逸提不犯者宿受食有餘與父母及作人等後從彼邊乞得十誦律云大比丘未手受而共宿者名曰內宿噉者突吉羅已手受舉共宿者名殘宿食噉者波逸提先自取果後從淨人受而食突吉羅有二種觸食食無罪一清淨比丘誤觸二破戒比丘無慚愧觸天食過中可食可七日受根本尼陀那云所餘餅果持與求寂明旦還得食之若有希望心與時惡作食時犯墮若總無希望心不犯目得迦云若病者貧設是殘觸酥油服之無犯苾芻行路令求寂持路糧亦得為其擎舉擎下又諸苾芻道行應持糧者既無俗人又無求寂應勸施主施主亦無應自持去後見俗人共換而食換處亦無分為兩分告俗人曰汝取一分彼既入手應告彼曰汝取我食我取汝分換易而食此復難求於第一日應須絕食明日如有授人受取而食若無授者自取一彪拳許食之至第三日還無授者食二彪拳至第四日復無授人隨情自取飽食無犯於後路糧罄盡見有熟果墮地應取作淨受已而食若淨人難得者受已應食授者亦無應可自取作北洲想而食樹上果熟未落地者應自上樹搖振令墮自取而食如上開者並為難緣若無難時悉皆制斷善見律云若多比丘共行唯一小沙彌比丘各自擔糧至食時各自分分沙彌得分已語比丘言今持沙彌分與大德易得已復與第二座易展轉乃至眾多食皆無罪若沙彌不解法比丘自持食分與沙彌展轉易得食不犯薩婆多論云若食是佛臘面門臘自恣臘雖先捉後買得食無已想故無罪證根本雜事云佛告阿難無容得有住其家內食殘宿食證阿羅漢無容得有阿羅漢諸漏已盡處白衣家食殘宿食辯問沙彌不食殘宿食者得證阿羅漢果若已證阿羅漢果須受具不答八種比丘中雖有破結使比丘然佛滅後必以白四羯磨為宗要故沙彌設證無學但可即時受具不俟年滿二十未有不登壇受具者也三十九自取食戒此是遮罪大乘比丘同學若比丘不受食若藥著口中除水及楊枝波逸提緣舍衛城有一比丘常乞食著糞掃衣時城中諸居士為命過父母等於四衢道乃至廟中作飲食祭祀供養彼比丘自取食之居士譏嫌故制時諸比丘生疑不敢自取楊枝淨水佛言不犯釋受有五種手與手受或手與持物受或持物與持物受或持物與手受或遙過物與與者受者俱知中無觸礙得墮手中又五種受身與身受衣與衣受曲肘與曲肘受器與器受或有因緣置地與相想疑等六句如常可知比丘尼波逸提五分律云除嘗食但不得咽聽從龍受食天受食鬼受食獼猴受食以施主語受食不得受擲食食辯問四分遙過物與成受五分不得受擲食食此復何從答四分所謂遙過蓋指或有因緣五分所謂擲食則由出於輕慢聽制條別意在於斯四十無病索好食戒大乘有病亦不得食魚肉若得好美飲食乳酪魚及肉若比丘如此美飲食無病自為己索者波逸提緣䟦難陀詣商主家索雜食商主問有何患報言無所患但意欲得雜食耳商主譏嫌故制時病比丘畏慎不敢乞不敢為病人乞得已不敢食故聽相比丘尼悔過法餘三眾突吉羅十誦律云索得波逸提不得突吉羅律攝云無病從乞有病而食乞時惡作食時無犯有病從乞無病而食乞時無犯食得墮罪若施主言有所須者隨意可索或從天龍藥叉舍乞求無犯四十一自與外道食戒大乘同學或觀機得與若比丘外道男外道女自手與食者波逸提緣佛敕阿難分餅與眾僧分已有餘乃與乞人有一裸形外道女顏貌端正阿難付餅餅黏相著謂是一餅與此女人女與傍人轉問所得即生疑謗又一梵志在此食已轉向餘國道逢篤信相士告以從禿頭居士得食相士以白比丘佛聞結戒於是外道皆有怨言佛乃聽置地與使人與相自手與而受波逸提不受突吉羅方便欲與還變悔突吉羅比丘尼波逸提餘三眾突吉羅不犯者與父母及作人等若力勢強奪根本律云或欲以食因緣除彼惡見無犯十誦律云不犯者若彼有病若親里若求出家時與謂四月試時也未受食不應與他先受已後當與他若父若母若閉繫人急須食人姙身女人少多與之畜生應與一口四十二詣餘家不囑授戒大乘同學若比丘先受請已前食後食詣餘家不囑授餘比丘除餘時波逸提餘時者病時作衣時施衣時是謂時緣有長者設食請僧待䟦難陀至䟦難陀小食時更詣餘家時垂欲過方來諸比丘飲食不得滿足又一大臣送甘果至僧伽藍亦待䟦難陀來分彼後食已詣餘家時過乃還使眾僧不得食新果故制是後眾僧不敢入城受請佛聽相囑授入城又以因緣聽病時作衣時施衣時不囑授入城釋前食者明相出至食時後食者從食時至日中餘比丘者同一界共住也相囑已出若中道還等欲出須更囑不囑入餘家波逸提一足入門內等突吉羅比丘尼波逸提餘三眾突吉羅不犯者若無比丘不囑授至庫藏聚落邊房至所囑家若勢力所持命難梵行難律攝云若語施主我設不來應與僧食勿令廢缺若施主不以此人而為先首並無罪四十三食家強坐戒大乘同學若比丘在食家中有寶強安坐者波逸提緣迦留陀夷至齋優婆夷家坐其夫問須何等報言須食即使婦出食與之食已不去其夫瞋恚而出語言隨汝所為佛聞故制釋食者男以女為食女以男為食故名為食家寶者𤥭璖瑪瑙真珠琥珀金銀按此戒正從食家得罪不從有寶得罪言有寶者或有寶則是夫婦可行欲處故耳相盲不聾聾不盲立不坐突吉羅比丘尼波逸提餘三眾突吉羅不犯者舒手及戶處坐有二比丘為伴及被繫等十誦律云不犯者若斷婬欲家若受齋家若更有所尊重人在坐若是舍多人出入若女人受一日戒男子不受若男子受一日戒女人不受是家中坐突吉羅若二俱受者不犯四十四食家屏坐戒大乘同學犯不犯同上若比丘食家中有寶在屏處坐者波逸提緣迦留陀夷更在戶扇後坐與齋優婆夷語故制四十五獨與女人坐戒大乘同學若比丘獨與女人露地坐波逸提緣亦起自前人故制相犯不犯悉同前十誦律云相去一丈坐波逸提相去丈五坐突吉羅過二丈無犯律攝云若與非人女半擇迦女及未堪行婬境若聾騃等共屏坐時咸得惡作四十六故使他不得食戒大乘同學若比丘語餘比丘如是語大德共至聚落當與汝食彼比丘竟不教與是比丘食語言汝去我與汝一處若坐若語不樂獨坐獨語樂以此因緣非餘方便遣去波逸提根本律云語謂讀誦坐謂禪思緣䟦難陀與餘比丘鬬結恨在心異時將至無食處徧行餘有少時乃語言汝是大惡人由汝故并使我不得食汝速去云云彼比丘出城到祇桓日時已過不得食乏極諸比丘聞嫌責白佛故制相方便遣去捨見聞處或自捨見聞處盡波逸提捨聞處至見處捨見處至聞處突吉羅比丘尼波逸提餘三眾突吉羅不犯者與食遣去若病若無威儀人見不喜語言汝去我當送食至僧伽藍若彼破戒破見破威儀被舉被擯應擯若命難梵行難方便遣去不以嫌恨故遣去五分律云作此惱餘四眾突吉羅尼作此惱二眾波逸提惱餘三眾突吉羅十誦律云未入城門令還乃至未入白衣家內門令還皆突吉羅若入內門令還波逸提律攝云若隨醫教為病令斷食者無犯四十七過受藥戒大乘同學為眾故索不犯若比丘受四月請與藥無病比丘應受若過受除常請更請分請盡形壽請波逸提緣摩訶男釋種供僧藥恭敬上座施與好者求亦與不求亦與六羣詣其家故求難得藥報言有者當與無者當詣市買與六羣即以有愛及妄語訶之摩訶男因不復供僧藥故制復以緣開常請等釋四月者夏四月病者醫所教服藥也常請者其人作如是言我常與藥更請者斷已後復更請與分請者持藥至僧伽藍分與盡形壽請者其人言我當盡壽與藥請有四種或夜有限齊藥無限齊或夜有限齊藥有限齊夏四月應受或夜無限齊藥有限齊或夜無限齊藥無限齊隨施時應受僧祇律云或夏四月或冬四月或春四月檀越請不必定或四月或一月半月期滿已不得更索若請前食不得索後食請後食不得索前食藥及餘物亦爾若言盡壽受我四事供養爾時得隨意索相過受咽咽波逸提比丘尼波逸提餘三眾突吉羅十誦律云索得波逸提不得突吉羅索訶梨勒等苦藥得不得盡突吉羅律攝云四月未竟請粗食更求好者得惡作罪食便得墮請好食更索粗者索時惡作食時無犯善見律云檀越施藥應作藥用不得作食用與油乞蘇犯突吉羅附五分律云若人施僧藥執事比丘應問為留聚落中為著僧坊內若言留聚落中須時應語我須如是藥為我辦勿使乏若言留僧坊內應白二羯磨差五法比丘不隨愛恚癡畏知藥非藥者作守僧藥人彼應以新器盛呵梨勒阿摩勒醯勒畢䟦羅乾薑甘蔗糖石蜜若器不漏應盛酥油蜜應持物結口題上藥名若病比丘須者應歡喜與若病者自知須此藥應自取服若不知應問醫若無醫應問二師我如是如是病應服何藥若二師不知應取藥再三服不差復取餘藥服四十八觀軍陣戒大乘同制若比丘往觀軍陣除時因緣波逸提緣波斯匿王自領六軍征伐反叛六羣往觀王見不悅因寄石蜜一裹問訊世尊世尊訶責結戒後梨師達富羅那二大臣在軍中渴仰欲見比丘遣使來請比丘畏慎不敢往故除時因緣相往而見波逸提不見突吉羅欲觀而不去路遇而不避突吉羅比丘尼波逸提餘三眾突吉羅不犯者強力所將一切阻難不得避僧祇律云軍來詣精舍不作意看無罪作意看越毗尼罪下至看人口諍越毗尼罪根本律云若見軍時不應說其好惡十誦律云往觀夜叉軍突吉羅尼陀那云有打鬬者不應往看若見諍者急捨而去四十九軍中過三宿戒大乘同學或觀機不犯若比丘有因緣聽至軍中二宿三宿過者波逸提緣六羣有因緣至軍中宿居士譏嫌故制相第三宿明相未出應離聞處見處若不離至明相出波逸提離聞不離見處離見不離聞處突吉羅比丘尼波逸提餘三眾突吉羅不犯者種種阻難等五分律云雖有因緣若書信得了應遣書信若須自往然後往事訖便還勿經宿若不了應一宿一宿不了應再宿復不了應三宿若了不了過三宿波逸提若事即了不應宿而宿突吉羅五十觀軍事戒大乘同學若比丘二宿三宿軍中住或時觀軍陣鬬戰若觀遊軍象馬力勢者波逸提緣六羣看軍陣為箭所射同伴以衣裹之輿還居士問知其故共相譏嫌故制相犯不犯等同上五分律云觀鳥獸鬬突吉羅五十一飲酒戒大乘同制若比丘飲酒者波逸提緣娑伽陀尊者借宿辮髮梵志家降毒火龍拘睒彌主心生篤信覲禮世尊欲供尊者六羣為索黑酒尊者醉飽中路倒吐眾烏亂鳴佛問阿難知之訶云如今不能降伏小蛇況能降伏大龍凡飲酒者有十過失一者顏色惡二者少力三者眼視不明四者現瞋恚相五者壞田業資生法六者增致疾病七者益鬬訟八者惡名流布九者智慧減少十者身壞命終墮三惡道自今以去以我為師者乃至不得以草木頭內著酒中而入口相比丘尼波逸提餘三眾突吉羅不犯者以酒為藥以酒塗瘡十誦律云飲酢酒甜酒若若糟一切能醉者咽咽波逸提若但作酒色無酒香酒味不能醉人飲者無犯摩得勒伽云若以酒煑時藥非時藥七日藥無酒性得服善見律云若酒煑食煑藥故有酒香味突吉羅無酒香味得食五十二水中戲戒大乘同學若比丘水中嬉戲者波逸提緣十七羣比丘水中戲波斯匿王與末利夫人在樓上見之夫人遣使往白世尊故制釋水中戲者從此岸至彼岸或順流或逆流或此沒彼出或以手畫水或水相澆灒相水中戲波逸提若酪漿苦酒麥汁等器中弄戲突吉羅比丘尼波逸提餘三眾突吉羅不犯者道行渡水牽竹木取石沙尋失物學浮法等五分律云摶雪是草頭露突吉羅十誦律云槃上有水若坐牀上有水以指畫之突吉羅善見律云水深沒脚背於中戲波逸提若搖船弄水突吉羅五十三相擊攊戒大乘同學若比丘以指相擊攊者波逸提謂挃令肉癢以此取笑也緣六羣中一人擊攊十七羣一人乃令命終故制相除手脚指以杖𨷲拂柄等擊攊突吉羅比丘尼波逸提餘三眾突吉羅不犯者眠觸令覺及一切誤觸五分律云擊攊沙彌乃至畜生突吉羅薩婆多摩得勒伽云若身根壞指挃突吉羅五十四不受諫戒大乘同學若比丘不受諫者波逸提緣闡陀欲犯戒諸比丘諫而不從故制相比丘尼波逸提餘三眾突吉羅不犯者來諫人無智及戲笑錯說等附毗尼母經云不應受五種人訶諫一無慚愧二不廣學三常覓人過四喜鬬諍五欲捨服還俗五十五恐怖他戒大乘同學或觀機折伏不犯若比丘恐怖他比丘者波逸提緣佛在經行處經行那迦波羅比丘侍佛初夜請佛歸房世尊默然中夜後夜亦爾乃反被拘執作非人恐怖聲世尊清旦集眾訶責結戒釋恐怖者若以色聲香味觸法恐怖人相前人見聞知恐不恐盡波逸提不見聞知突吉羅比丘尼波逸提餘三眾突吉羅不犯者一切不作恐怖他意律攝云若以可惡色聲等令生畏惱得墮罪若以可愛色聲等令生畏惱惡作罪若於餘人為驚惱者皆惡作罪若說三塗情存化導彼雖生怖無犯苾芻苾芻想六句初二墮罪後四輕罪實無怖事無怖事想六句二重二輕二無犯五十六過洗浴戒大乘同學若比丘半月洗浴無病比丘應受不得過除餘時波逸提餘時者熱時病時作時風雨時道行時此是時緣摩竭國有池水瓶沙王聽諸比丘常在中浴六羣比丘後夜入浴王與綵女亦至聞比丘浴聲靜以待之六羣以種種細末藥更相洗乃至明相出王竟不得浴諸大臣皆共嫌恚故制釋病者下至身體臭穢作者下至掃屋前地風雨者下至一旋一滴著身道行者下至半由旬五分律云熱時者熱悶汗出薩婆多論云隨處熱時早晚數取二月半於中浴相除餘時過一徧澆身或水澆半身波逸提方便不去突吉羅比丘尼波逸提餘三眾突吉羅不犯者力勢所持強使洗浴十誦律云昨日來今日浴明日欲去今日浴波逸提五分律云若洗師及病人身體已濕因浴不犯僧祇律云若無上諸時當作陶家浴法先洗兩䏶兩脚後洗頭面腰背臂肘胸腋辯禮懺結壇日須洗浴乃至三洗並遵佛教非犯叢林普眾有湯亦應非犯附不應共白衣浴若稱歎三寶者聽浴五十七露地然火戒大乘同學若比丘無病自為炙身故在露地然火若教人然除時因緣波逸提緣六羣以在上座前不得隨意即出房外露地然火向炙時空樹中有毒蛇火氣熱逼從樹孔出諸比丘皆驚取所燒薪散擲迸火燒佛講堂故制釋病者若須火炙身時因緣者為病比丘煑粥羮飯若在溫室廚屋浴室若熏鉢染衣然燈燒香相無病露地然火自炙若燒草木枝葉等波逸提燒半燋者然炭突吉羅比丘尼波逸提餘三眾突吉羅五分律云為炙然火𦦨高至四指波逸提薩婆多論云行路盛寒不犯僧祇律云持炬行欲抖擻不得在未燒地當在灰上若瓦上若炬火自落地即在上抖擻無罪附第四分云向火有五過一令人無顏色二無力三眼闇四令多人鬧集五多說俗事僧祇律云然火有七事無利益一壞眼二壞色三身羸四衣垢壞五壞牀褥六生犯戒因緣七增世俗言論附根本雜事云故焚燒林野得吐羅罪五十八戲藏他物戒大乘同學若比丘藏比丘衣鉢坐具針筒若自藏教人藏下至戲笑者波逸提緣十七羣持衣鉢坐具針筒著一面經行望食時到六羣俟彼背向時取而藏之時到尋覓在前調弄餘比丘察知嫌責佛聞制戒相比丘尼波逸提餘三眾突吉羅不犯者實知彼人物體悉故取風雨飄漬故取戒勅慢藏性故取借彼衣著彼不收攝恐失故取或命難梵行難等五分律云藏餘四眾乃至畜生物突吉羅尼藏二眾物波逸提餘皆突吉羅十誦律云彼若覓得突吉羅彼覓不得波逸提若藏空針筒覓得不得盡突吉羅僧祇律云藏餘衣餘物越毗尼罪五十九輙著淨施衣戒大乘同學若比丘與比丘比丘尼式叉摩那沙彌沙彌尼衣後不語主還取著波逸提緣起自六羣故制釋與衣者淨施衣也淨施有二種一真實淨施言此是我長衣未作淨今為淨故與長老作真實淨二展轉淨施言此是我長衣未作淨今為淨故與長老彼應語言長老聽長老有是長衣未作淨今與我為淨故我便受受已問言欲與誰耶報言與某甲彼應語言長老有是長衣未作淨今與我為淨故我便受受已與某甲此衣是某甲所有汝為某甲故守護持隨意用相是中真實淨施應問主然後取著展轉淨施語不語隨意比丘尼波逸提餘三眾突吉羅根本律云受他寄衣後不問主輒自著用波逸底迦若親友物彼聞用時心歡喜者無犯辯按根本律與今四分旨趣兼殊此則為能施者制戒彼則為受寄者防愆雖各不相侔然理應雙護也附五分律云不應淨施與五種人一不相識二未相諳悉三未相狎習四非親友同師五非時類年太老邁為非時未曾出家為非類復有二法不應淨施一不能讚歎人二不能與人作好名稱復有二法一不能受人重物淨施護如己有二己有重物不能淨施彼用不恨復有二法一不知彼在世不二不知彼在道不若比丘獨住有長衣應作遙指淨施若三衣中須有所易應偏袒右肩脫革屣𧿟跪捉衣心生口言我此某衣若干條今捨如是三說然後受所長衣亦如前法心生口言我此某衣若干條受如是三說如是受已所捨之衣應淨施復如前法心生口言我此長衣淨施某甲從彼取用若不須易受者所得長衣應即如是淨施獨淨施法至十一日復應如前法心生口言我此長衣從某甲取還然後更如前法受持淨施若對人淨施應作展轉淨施如前法捉衣言我此長衣於長老邊作淨施彼應問長老此衣於我邊作淨施我持與誰答言於五眾中隨意與之彼即語言我今與某甲長老若須從彼取用好愛護之彼以此事語所稱名比丘比丘恐犯長衣不取受佛言不應語所稱名比丘六十衣不壞色戒大乘同制若比丘得新衣應三種壞色一一色中隨意壞若青若黑若木蘭若不壞色著餘新衣波逸提緣六羣著白色衣行居士譏嫌故制釋若是新衣若初從人得盡名新衣相比丘尼波逸提餘三眾突吉羅十誦律云若得青衣應泥茜淨泥即黑色也茜此見切草名亦作蒨即木蘭色得泥衣應青茜淨得茜衣應青泥淨得黃衣赤衣白衣應青泥茜三種淨五分律云應三種色作誌若不作誌著著波逸提若不著宿宿波逸提僧祇律云作淨時極大齊四指極小如豌豆或一或三或五或七或九不得如華形若得多雜碎新物合補一處者一處作淨各各別補者一一作淨若作新衣趣一角作淨若一條半條補者亦作淨六十一殺生命戒此是性罪大乘犯重若比丘故殺畜生命者波逸提緣迦留陀夷不喜見烏作竹弓射之故制釋五分律云畜生者除龍餘畜生是龍雖是畜而能變化具神力守護國土保綏正法其功用與諸天相類故殺者犯偷蘭遮相自殺教人殺方便殺等一切波逸提方便欲殺而不殺突吉羅比丘尼波逸提餘三眾突吉羅誤傷無犯薩婆多摩得勒伽云欲斫藤誤斫蛇不犯欲斫蛇誤斫藤突吉羅欲殺此蟲悞殺彼蟲欲斫蟲而斫地欲搦蟲而搦土皆突吉羅附律攝云若寺房廊鳥棲宿為喧鬧者應使人檢察巢無兒卵應即除棄有者待去方除若有蜂窠無兒應除有者以線縷纏之便不增長六十二飲用蟲水戒大乘同制若比丘知水有蟲飲用波逸提緣起自六羣比丘故制相想疑等六句可知比丘尼波逸提餘三眾突吉羅不犯者不知有蟲若有粗蟲觸水使去若漉水飲根本律云知蜜糖油醋漿乳酪餅果等物有蟲而受用者皆得墮罪律攝云有五種眼不應觀水一患瘡眼二睛翳眼三狂亂眼四老病眼五天眼齊幾許時應觀水謂六牛車迴轉之頃若順河流一度觀水無蟲齊一拘羅舍隨意飲用然須中間無別河入若不流水及逆流河一度觀時齊一尋內得用有五種淨水一僧伽淨二別人淨三濾羅淨四涌泉淨五井水淨若知彼人是持戒者存護生命縱不觀察得彼水時飯用無犯凡一觀水始從日出迄至明相未出咸隨受用僧祇律云蟲者非魚鼈等謂小小倒孑諸蟲乃至極微細形眼所見者不應以天眼看亦不得使闇眼人看下至能見掌中細文者得使看水不得太速太久當如大象一迴頃若水中蟲極細不得就用洗手面及大小行若檀越家請食應問漉水未若言未漉應看前人是可信者教令漉水若不可信莫語令漉傷蟲比丘應自漉用蟲水著自器中應問從何處取水隨來處還送蟲水瀉中若先取水處遠見有池水七日不消盡者以蟲水著中若無池當器中盛蟲水持來養之俟天大雨有暴流以蟲瀉中作是言汝入大海去若道中行知井水有蟲不得持汲水灌器繩借人若池水汪水有蟲不得唱言長老此水有蟲有蟲令前人生疑不樂若前人問此水無蟲不應答言長老自看若知識同師者應語言此水有蟲當漉用附第四分云不應無漉水囊行乃至半由旬若無應以僧伽棃角漉水五分律云亦聽畜漉水筒用銅鐵竹木瓦石作之以細衣縵口不聽用糞掃衣根本雜事云以絹繫君持口細繩繫項沉放水中擡口出半若全沉口水則不入待滿引出仍須察蟲但是綽口瓶瓨無問大小以絹縵口隨時取水極是省事君持亦云軍遲此翻瓶也南海寄歸云淨瓶用瓦瓷須受二三升者放淨處淨手捉觸瓶任用銅鐵放觸處隨手捉緇門警訓云漉囊乃行慈之具濟物之緣大行由是而生至道因茲而尅證僧祇律云波羅脂國有二比丘共伴來詣舍衛問訊世尊中路渴乏無水前到一井一比丘汲水便飲一比丘看水見蟲不飲飲水比丘問言汝何不飲答言世尊制戒不得飲蟲水故彼復勸言長老但飲勿令渴死不得見佛答言我寧喪身不毀佛戒遂便渴死飲水比丘漸到佛所佛問汝從何來又問汝有伴不彼即具以事答佛言癡人汝不見我謂得見我彼死比丘已先見我十誦律云彼持戒者不飲便死即生三十三天得天身具足先到佛所禮足聞法得法眼淨受三歸依故曰已先見我也根本律中其事亦同若比丘放逸懈怠不攝諸根雖共我一處彼離我遠彼雖見我我不見彼若有比丘在海彼岸能不放逸精進不懈斂攝諸根雖去我遠我常見彼彼常近我此約界論遠近也若約世論則放逸人雖生聖世不異末法不放逸者雖生末世不異正法佛身真常本無出世及與滅度願豪傑之士莫起像法法滅盡想而自委棄誓當精進不懈斂攝諸根嚴淨毗尼勿輕小罪常如面奉慈顏親承明誨修持不已當見靈山一會儼然未散也六十三故惱他戒大乘同學若比丘故惱他比丘令須臾間不樂波逸提緣十七羣比丘問六羣比丘云何入初禪第二第三第四禪云何入空無相無願云何得四果報言如汝等所說者則已犯波羅夷法非比丘時十七羣往問上座知其為作疑惱白佛制戒釋疑惱者若為生若為年歲若受戒若為羯磨若為犯若為法也為生時疑者問言汝生來幾時耶報言爾所時語言汝不爾所時生汝如餘人生非爾所時生乃至法等亦爾相若故以此為作疑惱說而了了波逸提不了了突吉羅比丘尼波逸提餘三眾突吉羅不犯者其事實爾不故作惱乃至錯說等五分律云令餘四眾疑悔突吉羅尼令二眾疑悔波逸提令餘三眾疑悔突吉羅六十四覆他粗罪戒此是性罪大乘同制即是不教悔罪戒也問不覆他罪得非說四眾過耶答但制不得向外人說不制僧中如法舉過也倘姑息縱容養成巨慝既令彼罪日深兼使法門受玷誰有慈心乃甘坐視也哉若比丘知他比丘犯粗罪覆藏者波逸提緣䟦難陀數犯罪向一親厚比丘說之令勿語人後二人共鬬彼比丘即向餘比丘說其所犯餘比丘問知其由白佛制戒釋粗罪者四棄十三僧殘相小食知食後說乃至初夜知中夜說突吉羅中夜知後夜欲說而未說明相出波逸提覆餘罪自覆粗罪覆餘人粗罪盡突吉羅比丘尼覆尼棄罪波羅夷覆尼僧殘波逸提餘三眾突吉羅不犯者先不知或無人可向說或命難梵行難十誦律云見他罪向一人說便止若聞若疑不須說僧祇律云不得趣向人說當向善比丘說若彼罪比丘兇暴或依王力大臣力兇惡人力起奪命因緣傷梵行者應作是念彼罪行業必自有報彼自應知喻如失火但自救身焉知餘事無罪附第三分云內有五法應舉他以時不以非時真實不以不實有益不以減損柔軟不以粗獷慈心不以瞋恚第四分云佛告優波離身威儀不清淨言不清淨命不清淨寡聞不知修多羅寡聞不誦毗尼言辯不了喻若白羊是不應舉他罪若諸法具足應以時以法舉他罪又復此比丘有愛恭敬於我則應舉罪或無愛有恭敬或無恭敬有愛應舉或雖無愛敬能令捨惡就善應舉或彼有所重比丘尊敬信樂者能令捨惡行善應舉若都無者僧應都捨置驅棄語言長老隨汝所去處彼當為汝作舉作憶念作自言遮出罪遮說戒遮自恣譬如調馬師惡馬難調即合韁杙驅棄如此比丘不應先從其求聽即此是聽薩婆多摩得勒伽云天眼舉他罪突吉羅天耳亦如是六十五授戒不如法戒大乘比丘同學年滿二十應受大戒若比丘知年不滿二十與受大戒此人不得戒彼比丘可訶癡故波逸提緣十七羣童子先為親友最大者年十七最小者年十二共求出家諸比丘與受大戒不堪一食夜半患譏大喚啼哭佛聞故問阿難具答而結此戒相和尚若知若疑與受戒三羯磨竟波逸提二羯磨竟三突吉羅一羯磨竟二突吉羅白竟一突吉羅為作方便乃至集僧盡突吉羅眾僧若知若疑一切突吉羅比丘尼波逸提不犯者先不知信受戒人語若傍人證若信父母受戒已疑聽數胎中年月或數一切十四說戒以為年數半月半月說戒每年共有二十四次白月及大黑月皆十五日說戒黑月若小則十四日說戒一年僅有六次是十四日說戒當有十八次是十五日說戒今以權巧方便皆約十四日說戒以算月數則每年省出一十八日十年便有百八十日倘其人是十九歲共省三百四十二日又可算作一年即可名為滿二十歲矣受戒犍度云若得阿羅漢即名受具足律攝云若近圓時年實未滅而作滿想後有親友報云不滿應數胎月閏月若滿者善若不滿者退為求寂更受近圓不爾則成賊住若年滿十九作二十心而受近圓後經一年親友來見報云不滿或自憶知不滿或年十八而受近圓後經二歲同前憶知斯等皆名善受正教難逢是開聽故六十六發起諍事戒大乘同制若比丘知諍事如法懺悔已後更發起者波逸提緣六群知諍事如法滅已更作是言汝不善觀不成觀不善解不成解不善滅不成滅令僧未有諍事而生起已有諍事而不滅故制釋如法者如法如毗尼如佛所教諍者有四種言諍覓諍犯諍事諍相作發起言了了波逸提不了了突吉羅發起餘鬬諍罵詈及已鬬事餘人鬬諍盡突吉羅比丘尼波逸提餘三眾突吉羅不犯者實不善觀等律攝云若眾為眾作羯磨得窣吐羅罪以是破僧方便故若以法除殄作除殄想疑而毀破者得墮罪不如法除殄作如法想疑而遮止者得惡作罪法與非法作非法想而毀破者二俱非犯六十七同賊伴行戒此是遮罪大乘同制若比丘知賊伴結要共同道行乃至一村間波逸提緣眾多比丘與賈客私度關者伴行俱為守關人所捉波斯匿王訶責放去王眾不服佛聞制戒釋賊伴者若作賊還若方欲去相犯輕重如共婦女行戒比丘尼波逸提餘三眾突吉羅不犯者不知不結要及持縛等五分律云共惡比丘期行突吉羅若諸難緣不犯十誦律云若險難處賊送度者不犯音義迦羅不見翻譯彪補尤切小虎也藥叉或云夜叉此翻捷疾鬼半擇迦此云變今生變作不男騃涯上聲癡也波斯匿此翻和悅亦翻勝軍末利或云摩利此翻鬘亦翻柰因施柰得報也灒則諫切汙灑也亦作濺那迦波羅不見翻譯拘執毯也拘羅舍此云五百弓亦云一牛吼地亦云一鼓聲俱舍云二里襍寶藏云五里一尋舒兩臂為一尋綽口瓶瓨綽尺約切寬也瓶口太窄水則不入三十三天梵稱忉利在須彌山頂四方各八天為三十二并中間帝釋為三十三即六欲天之第二天也在四王天上在夜摩天下得法眼淨證須陀洹果斷三界分別惑見真諦理名法眼清淨杙音弋橛也
