body:
  text: 古吳蕅益沙門智旭彚釋不得生草菜上大小便涕唾除病應當學四十九比丘尼波逸提不犯者在無生草菜處大小便流墮生草菜上或風吹鳥䘖而墮生草菜中律攝云棘刺叢處無犯若大林中行枝葉交茂應離人處若涉生草田間無空處應持乾葉布上便利若不可得者無犯不得水中大小便涕唾除病應當學五十不犯同上善見律云若水人所不用或海水不犯水雖中用曠遠無人用不犯不得立大小便除病應當學五十一不犯者被縛脚垢汙不得與反抄衣不恭敬人說法除病應當學五十二不得為衣纏頸者說法除病應當學五十三不得為覆頭者說法除病應當學五十四不得為裹頭者說法除病應當學五十五不得為叉腰者說法除病應當學五十六不得為著革屣者說法除病應當學五十七五分律云若多人著革屣不能令脫但因不著者為說不犯不得為著木屐者說法除病應當學五十八不得為騎乘者說法除病應當學五十九十誦律云波斯匿王乘乘向祇洹見佛六羣為王說法故制人前己後人在道己非道人坐己立人高座己卑座人臥己坐覆頭裹頭肘隱人扠腰偏抄衣覆右肩著革屣著屐捉杖捉蓋捉刀捉楯弓箭緣起並同戒因緣經亦同不得在佛塔中止宿除為守護故應當學六十不犯者被執命難等根本雜事云諸香臺殿旛竿制底等皆誦伽陀然後足蹈不爾者得越法罪不得藏財物置佛塔中除為堅牢應當學六十一不得著革屣入佛塔中應當學六十二不得手捉革屣入佛塔中應當學六十三不得著革屣遶佛塔行應當學六十四不得著富羅入佛塔中應當學六十五不得手捉富羅入佛塔中應當學六十六不犯者或為強者所執喚入塔中不得塔下坐食留草及食汙地應當學六十七不犯者聚著脚邊出時持棄不得擔死屍從塔中下過應當學六十八不犯者或須此道行或強力所將不得塔下埋死屍應當學六十九不得在塔下燒死屍應當學七十不得向塔下燒死屍應當學七十一不得佛塔四邊燒死屍使臭氣來入應當學七十二不得持死人衣及牀從塔下過除浣染香熏應當學七十三不得佛塔下大小便應當學七十四不得向佛塔大小便應當學七十五不得遶佛塔四邊大小便使臭氣來入應當學七十六不得持佛像至大小便處應當學七十七不犯者道由中過強力所持不得在佛塔下嚼楊枝應當學七十八不得向佛塔嚼楊枝應當學七十九不得佛塔四邊嚼楊枝應當學八十不得在佛塔下涕唾應當學八十一不得向佛塔涕唾應當學八十二不得塔四邊涕唾應當學八十三不得向塔舒脚坐應當學八十四不犯者中間有隔強力所持第四分云若僧伽藍內塔滿聽在中間舒脚坐不得安佛塔在下房己在上房住應當學八十五不犯者命難梵行難人坐己立不得為說法除病應當學八十六僧祇律云若比丘為塔事僧事詣王及地主處彼言比丘為我說法不得語令起恐生疑故若邊有立人者即作意為立人說王雖聽比丘無罪人臥己坐不得為說法除病應當學八十七人在座己在非座不得為說法除病應當學八十八人在高坐己在下坐不得為說法除病應當學八十九善見律云佛告比丘往昔波羅柰國有一居士其婦懷姙思菴羅果夫夜入王園偷取果未得明相出樹上藏住時王與婆羅門入園欲食菴羅果婆羅門在下王在高座婆羅門為王說法偷果人念言我應死今得脫我無法王亦無法婆羅門亦無法我為女人故而偷王果王猶憍慢故師在下自在高座聽法婆羅門貪利養故自在下座為王說法我與王婆羅門相與無法我今得脫即下樹向王說偈時偷果人者即如來是人在前行己在後行不得為說法除病應當學九十僧祇律云若比丘眼患前人捉杖牽前為說無罪人在高經行處己在下經行處不應為說法除病應當學九十一人在道己在非道不應為說法除病應當學九十二不得擕手在道行應當學九十三不犯者患眼闇須扶接不得上樹過人除時因緣應當學九十四一比丘在大樹上受夏安居於樹上大小便下樹神瞋之佛制不得樹上安居不得遶樹大小便若先有大小便處大小便無犯後一比丘道值惡獸恐怖上樹不敢過上即為惡獸所害故除時因緣沙彌等取楊枝取華果等上樹無罪安居犍度云欲取樹上乾薪聽作鉤鉤取作梯取若繩羂取若樹通身乾聽上不得絡囊盛鉢貫杖頭著肩上而行應當學九十五䟦難陀如是行居士見之謂是官人皆下道避故制不犯者強力所捉等第四分云不應背負物行除寺內老比丘須杖絡囊聽與作白二羯磨人持杖不恭敬不應為說法除病應當學九十六人持劒不應為說法除病應當學九十七人持鉾不應為說法除病應當學九十八人持刀不應為說法除病應當學九十九人持蓋不應為說法除病應當學一百僧祇律云若比丘在怖畏險道時防衛人言尊者為我說法為說無罪三結問諸大德我已說眾學戒法今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持附第四分云鼻中毛長聽以鑷拔爪極長如一麥應剪不應以綵色染爪不應以剪刀剪鬚髮應鬢髮盡剃髮極長長兩指若二月一剃不應梳鬚髮不應油塗髮不應畫眼臉患眼痛聽著藥不應以鏡若水照面若面患瘡著藥聽獨在一房以水若鏡照不應著耳璫耳環頸瓔臂脚釧指環指印不應作鉛錫腰帶不應用五色線絡腋繫腰臂十誦律云聽載犍牛車當使餘人御不得自御梳頭刷頭突吉羅頂留少髮突吉羅留髮令長突吉羅阿蘭若比丘長至二寸無罪若頭上有瘡當以剪刀剪手摩鬚髮突吉羅洗脚時不得共他語根本雜事云佛告苾芻或時有事我於先來非遮非許然於此事若違不清淨順清淨者此即是淨應可行之若違清淨順不清淨者此是不淨即不應行七眾學法竟八七滅諍法三初總標二別列三結問初總標此七種法大乘比丘悉同學應善和鬬諍故一一緣起皆在第三分滅諍犍度中諸大德是七滅諍法半月半月說戒經中來若比丘有諍事起即應除滅釋有四種諍一言諍者比丘共比丘諍言引十八諍事法非法乃至說不說若以如是相共諍言語遂彼此共鬪二覓諍者比丘與比丘覓罪以三舉事破戒破見破威儀見聞疑作如是相覓罪三犯諍者犯七種罪一波羅夷二僧殘三墮四悔過五偷蘭遮六突吉羅七惡說四事諍者前三諍中事作是中言諍以二毗尼滅謂現前多人語或但一毗尼滅謂現前覓諍共四毗尼滅謂現前憶念或現前不癡或現前罪處所犯諍共三毗尼滅謂現前自言治或現前草覆地事諍以一切毗尼滅隨所犯十誦律云有六諍本一瞋恨不語二惡性欲害三貪嫉四諂曲五無慚愧六惡欲邪見相十誦律云自言滅諍有十種非法若犯五篇罪自言不犯又不犯五篇自言犯有十種如法若犯五篇罪自言犯若不犯五篇自言不犯現前滅諍有二種非法若非法者約勅非法者令折伏若非法者約勅如法者令折伏有二種如法若如法者約勅如法者令折伏若如法者約勅非法者令折伏憶念毗尼有三非法有比丘犯無殘罪自言犯有殘罪從僧乞憶念毗尼若與者非法應滅擯故有比丘狂癡還得心從僧乞憶念毗尼若與者非法應與不癡毗尼故有比丘有見聞疑罪自言我有是罪後言我無是罪從僧乞憶念毗尼若與者非法應與實覓毗尼故即覓罪相有三如法有比丘被無根謗若人常說是事應與憶念毗尼有比丘犯罪已悔除若人猶說是事應與憶念毗尼有比丘未犯是罪將必當犯若人說犯是事應與憶念毗尼不癡毗尼有四種非法有比丘不癡狂現癡狂相問時答言我憶念癡故作他人教我使作憶夢中作憶裸形東西走立大小便是人乞不癡毗尼若與者非法有四如法有比丘實狂癡心顛倒問時答言不憶念他不教我不憶夢中作不憶裸形東西走立大小便是人乞不癡毗尼若與者如法實覓滅諍有五非法有比丘犯五篇罪先言不犯後言犯若與實覓毗尼者非法應隨所犯治故有五如法有比丘犯五篇罪先言犯後言不犯是人應與實覓毗尼根本目得迦云有二苾芻共生瑕隙種種異言互相謗讟於此二人應信持戒者若二俱持戒應信多聞者若二俱多聞應信少欲者若二俱少欲應信極少欲者若二俱極少欲而生瑕隙無有是處僧祇律云若有大德勝人欲聽眾僧斷事者得聞斷事令眾中有辯才能語使事相分明者說若凡庶人前斷事者越毗尼罪辯問凡斷事者惟四種諍此四種諍皆比丘過失向外人說並有重禁今既不許向凡庶人前斷事何故大德勝人獨許得聞設令彼有智慧未免仍是未受具人向之斷事豈不違律答斷事雖則通指四諍大約言諍中事居多其間法非法等辯析折伏能使大德勝人聞之增長信心故許向說非指治罪羯磨等事也言大德勝人者如波斯匿王給孤長者之類以其慧深正信不謗故名大德以其福重能護正法故名勝人豈尋常富貴而已哉附比丘有十法者應差別平斷事一持戒具足二多聞三誦二部毗尼極利四廣解其義五善巧言語辭辯了了堪任問答令彼歡喜六諍事起能滅七不愛八不恚九不怖十不癡第四分云佛告比丘以二十二種行知是平斷事人具持二百五十戒一多聞善解阿毗曇毗尼二三不與人諍四亦不堅住此事五應訶者訶然後住六應教者教然後住七應滅擯者滅擯然後住八不愛九不恚十不怖十一不癡十二不受此部飲食十三亦不受彼部飲食十四不受此部衣鉢坐具針筒十五亦不受彼部衣鉢坐具針筒十六不供給此部十七亦不供給彼部十八不共此部入村十九亦不共彼部入村二十不與作期要二十一亦不至彼後來後坐二十二僧祇律云比丘成就五法能滅諍事知是實非是不實是利益非不利益得伴非不得伴得平等伴非不得平等伴得時非不得時成就十四法是名持律最第一除如來應供正徧知何等十四知罪知無罪知重知輕知覆知不覆知可治知不可治知得清淨知不得清淨得四福功德住現法樂謂天眼天耳宿命通盡有漏得無漏是名十四法有七事非他邏咃似他邏咃亦作關賴吒薩婆多論云闥賴名地吒利名住智勝自在於正法不動如人住地無傾覆也何等七或有狂故不著此眾不著彼眾謂是他邏咃是最初非他邏咃似他邏咃如是心亂鈍癡病病故不著此眾不著彼眾復次或有人為利故作是念若我著此眾失彼利著彼眾失此利是二俱不著復次或有人得二眾利故作是念我為得二邊利故不著此眾不著彼眾是名非他邏咃似他邏咃有二他邏咃一者自護心見他是非作是念業行作者自知譬如失火但自救身焉知他事二者待時見他諍訟相言作是念此諍訟相言時到自當判斷是名二他邏咃共此眾法食味食亦共彼眾法食味食或請斷當事或不請而斷當事十誦律云用瞋恨者不滅瞋恨惟忍辱力乃能滅之有五事諍難滅不求僧斷不順佛語不如法白二眾諍心不息所犯不求清淨反上五事者易滅闥利吒比丘取諍時應以五事觀此中誰先來持戒清淨誰多聞智慧善誦阿含誰於師如法誰信佛法僧誰不輕佛戒烏迥鳩羅比丘有十事僧應差薩婆多論云烏逈名二鳩羅名平等心無二其平如稱知諍來往處根本善知諍能分別諍知諍起因緣知諍義善滅諍滅諍已更不令起持戒清淨多聞多智闥利吒比丘行有二十二法當知是利根多聞一善知事起根本二善分別事相三善知事差別四善知事本末五善知事輕重六善知除滅事七善知滅事更不起八善知作事人有事人九有教勅力十能使人受力十一有方便軟語力十二亦能使人受十三有自折伏力十四亦能使人受十五知慚愧十六心不憍慢十七無憍慢語十八身口意業無偏著十九不隨愛行二十不隨瞋行二十一不隨怖行二十二不隨癡行二別列七初現前滅諍法至七草覆地滅諍法初現前滅諍法應與現前毗尼當與現前毗尼釋不應人不現前而作羯磨云何現前法毗尼人僧界云何法現前所持法滅諍者是云何毗尼現前所持毗尼滅諍者是云何人現前言義往返者是云何僧現前同羯磨和合集一處不來者囑授在現前得訶而不訶者是云何界現前在界內羯磨作制限者是相若諍事若滅更發起者波逸提與欲已後悔者波逸提後六毗尼滅亦如是附薩婆多摩得勒伽云十種不現前作羯磨覆鉢捨覆鉢學家捨學家作房沙彌狂不禮拜不共不語供養一覆鉢者治罰俗人但可遙作羯磨故二捨覆鉢者彼既三乞令彼在眼見耳不聞處乃為捨故三學家者護惜檀信亦遙作故四捨學家者彼若三乞亦令彼在眼見耳不聞處乃為捨故五作房者謂以故廢僧地羯磨與彼白衣任其為僧更作房屋亦三乞已令彼在眼見耳不聞處而與之故六沙彌者滅擯惡見沙彌亦令彼在眼見耳不聞處作滅擯故七狂者癡狂羯磨其人既有狂病不可以法拘攝故八不禮拜九不共語十不供養者謂比丘作諸非法觸惱比丘尼僧尼僧作此三種羯磨但可遙作不可令大比丘現前而治罰故惟此十種不須現前餘皆須現前明矣二憶念滅諍法應與憶念毗尼當與憶念毗尼緣沓婆摩羅子不犯粗罪彼人故問不已應與憶念毗尼彼應僧中三乞大德僧聽我某甲不犯重罪諸比丘言我犯重罪波羅夷僧殘偷蘭遮問我言汝憶犯重罪不我不憶犯重罪答言我不憶犯如是重罪諸長老不須數數難詰問我而諸比丘故難詰不止我今不憶念從僧乞憶念毗尼願僧與我憶念毗尼慈愍故僧應為作白四羯磨釋云何憶念毗尼彼比丘此罪更不應舉不應作憶念因眾比丘數數令其憶念今作此憶念毗尼使莫更問也三不癡滅諍法應與不癡毗尼當與不癡毗尼緣難提癲狂心亂多犯眾罪後還得心諸比丘詰問不止應與不癡毗尼彼應三乞僧與白四羯磨釋云何不癡毗尼彼比丘此罪更不應舉不應作憶念者是四自言滅諍法應與自言治當與自言治緣世尊說戒時有犯戒者近佛而坐佛默然不說目連知之捉臂牽出佛言不應爾令彼伏罪然後與罪五分律云慈比丘尼以無根波羅夷法謗陀婆比丘自言陀婆汙我即與自言滅擯釋云何自言說罪名罪種懺悔者是云何治語言自責汝心生厭離也五覓罪相滅諍法應與覓罪相當與覓罪相十誦作實覓五分作本言治根本作求罪自性緣僧祇律云尸利耶娑比丘於僧中言見罪復言不見不見復言見作是語言不憶與作覓相羯磨釋結罪處所也云何罪處所彼比丘此罪與作舉作憶念者是相僧祇律云此人盡壽應行八事不得度人不得與人受具足不得與人依止不得受比丘按摩供給不得作比丘使不得受次第差會不得為僧作說法人及說毗尼人盡壽不應與捨五分律云本言有二種一可悔二不可悔若本言犯重仍覆藏者應作盡壽不可悔白四羯磨六多人語滅諍法應與多人覓罪當與多人覓罪釋用多人知法者語聽行籌差行籌人白二羯磨有五法不應差愛恚怖癡不知己行不行反上五法者應差有三種行籌一顯露二覆藏三耳語若眾中雖非法比丘多然彼二師或上座多知等皆如法應顯露行籌作二種籌一破二完白言作如是語者捉不破籌作如是語者捉破籌行籌已應別處數若如法者多應作白作如是語者諍事滅若如法者少應作禮便去遣信往比丘住處僧中白言彼住處非法比丘多善哉長老能往至彼若如法比丘多諍事滅功德多此比丘聞應往若不往如法治若眾中雖如法者多而彼二師及上座等不如法恐顯露行籌諸比丘隨二師等捉籌應覆藏行籌若眾中雖如法者多而彼二師等非法說應耳語行籌行籌時應稀坐間容一人身小障翳彼比丘作耳語語言汝和尚等已捉籌善哉汝亦當捉籌慈愍故若如法比丘多諍事得滅功德多行捉已在一面數之十誦律云說如法者為作長籌說非法者為作短籌說如法者為作白籌說非法者為作黑籌說如法籌以右手捉說非法籌以左手捉說如法籌緩捉說非法籌急捉先行說如法籌後行說非法籌一切僧應和合集一處不得取欲僧祇律云行籌訖若非法籌乃至多一者不應唱非法人多如法人少當作方便解坐或前食欲至者應唱令前食或後食時浴時說法時說毗尼時隨應唱之若非法者覺言我等得勝為我故解坐我等今不起要即此坐決斷是事爾時精舍邊若有小屋無蟲者應使淨人放火已唱言火起火起即便散起救火乃往覓如法伴七草覆地滅諍法應與如草覆地當與如草覆地緣舍衛國諸比丘共諍多犯眾戒非沙門法亦作亦說出入無限後彼自作是念我曹若還共問此事或令此諍轉深重經歷年月不得滅令僧不得安樂以是白佛佛言應滅此事諍如草覆地彼一眾中有智慧堪能比丘從座起胡跪合掌作是言諸長老我等此諍事多犯眾罪非沙門法言無限齊出入行來不順威儀若我等尋究此事恐令罪深重不得如法如毗尼如佛所教諍事滅令諸比丘不安樂若長老忍者我今為諸長老作如草覆地懺悔此罪第二眾中亦如是說彼應作白大德僧聽若僧時到僧忍聽僧令此諍事作草覆地懺悔白如是白已作草覆地懺悔有智慧堪能者胡跪合掌白言諸長老我今此諍事己所犯罪除重罪遮不至白衣家羯磨若諸長老聽者為諸長老及己作草覆地懺悔第二眾亦應作如是說除重罪等者謂此如草覆地法一切因諍所起波逸提突吉羅等輕罪皆悉悔除但除波羅夷重罪仍須滅擯僧殘及偷蘭遮重罪仍須別行懺悔非此所滅又除遮不至白衣家羯磨亦不因此而解也釋云何草覆地不稱說罪名罪種懺悔者是十誦律云草布地有二種義一鬬諍數起諍人亦多其事轉眾推其原本難可知處佛聽布草除滅如亂草難可整理亂來棄之二者有德上座勸喻諍者使向兩眾羊皮四布悔過即五分所謂皆舒手脚伏地故如羊皮也二眾者各有所助故令各在一處五分律云若有比丘鬬諍相罵作身口意惡業後欲於僧中除罪作草布地悔過應三乞已皆舒手脚伏地向羯磨師一心聽受羯磨彼為白四羯磨是名現前毗尼草布地滅犯罪諍何謂草布地彼諸比丘不復說鬬原僧亦不更問事根本三結問諸大德我已說七滅諍法今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持二正示戒相竟三結勸迴向三初結前示餘二述七佛戒經三偈讚迴向初中二初結前二示餘今初諸大德我已說戒經序已說四波羅夷法已說十三僧伽婆尸沙法已說二不定法已說三十尼薩耆波逸提法已說九十波逸提法已說四波羅提提舍尼法已說眾學戒法已說七滅諍法此是佛所說半月半月說戒經中來二示餘若更有餘佛法是中皆共和合應當學餘佛法指餘隨律威儀及一切修多羅阿毗曇也諸佛慧命寄於三藏不學則世間眼滅不和合學則說食不飽故必如法同住朝夕研求俾正義昭然道明德備方無忝於僧寶方能紹隆佛種否則不惟招羺羊之誚亦且墮無聞之禍矣可不勉哉二述七佛戒經七初毗婆尸佛所說至七本師釋迦佛所說今初忍辱第一道佛說無為最出家惱他人不名為沙門此是毗婆尸如來無所著等正覺說是戒經略說戒經乃偏讚忍辱者以持戒者未必能忍辱而忍辱者決無不持戒故遺教經云忍之為德持戒苦行所不能及也若見有辱可忍縱使身口不行報復心中決難脫然只此未得脫然一念便與沙門勤息名義不得相應惟深觀無為法性若生若法俱不可得尚無有辱將誰名忍是為第一義忍故稱第一道也梵云多陀阿伽度此翻如來梵云阿羅訶此翻應供亦翻無所著梵云三藐三佛陀此翻正徧知亦翻等正覺即略舉十號之三也二尸棄佛所說譬如明眼人能避嶮惡道世有聰明人能遠離諸惡此是尸棄如來無所著等正覺說是戒經三界之中無非是嶮是惡愚人無智不思出要故使長受輪迴聰則能聞道明則能見道信佛妙法深識苦因但離諸惡便無惡果諸惡謂見思塵沙無明三惑一切現行及種子也三毗葉羅佛所說不謗亦不嫉當奉行於戒飲食知止足常樂在空閑心定樂精進是名諸佛教此是毗葉羅如來無所著等正覺說是戒經謗是口出惡言嫉是心存惡念無此二者奉行於戒乃三業皆淨也知足遠離皆頭陀勝法息世間馳求故心定勤出世道業故精進三世諸佛所有法要俱不出於此矣四拘留孫佛所說譬如蜂採華不壞色與香但取其味去比丘入聚然不違戾他事不觀作不作但自觀身行若正若不正此是拘留孫如來無所著等正覺說是戒經聚謂聚落然謂乞食之法亦應爾也又復聚謂大眾然謂求法之道亦應爾也不違戾他正所謂不壞色香也不觀句謂不觀他人之作善不作善也問曰不違戾他是所宜矣不觀作不作得無偏於自利而闕慈悲耶答曰其身正不令而行其身不正雖令不從故欲利他先須自利為利他而自利雖自利實包利他何名偏也若捨身行於不觀而欲觀他作與不作他未必利自先受害自既受害亦能害他如癩病人賣好瘡藥著鬼人施好符呪其不被訶笑者鮮矣故大乘理趣經云若諸凡夫自不清淨為毀戒者雖說正法勸他持戒終不信從反被輕訶以是當知先自檢身離諸放逸堅持淨戒波羅蜜多然後為人說正法要有情聞已便能信受又云知己過戒省察自心故不見他過戒護彼意故正與此偈義同也嗚呼時丁末運道法陵夷持律者輕重罔知開遮莫辨習教者徒事口耳縱恣身心參禪者接響承虗如狂似醉舉世滔滔狂瀾誰砥稍為舉目血淚便流故佛藏經云當爾之時不應入眾乃至一宿當應自處山林空靜乃至畢命如野獸死應生如是厭心我當云何見法破亂見此沙門惡世難時我當勤心精進早獲道果夫佛藏乃大乘經律而所言若此正謂宏法利生原不在虗張聲勢但使南閻浮提深山窮谷之中有五清淨持戒比丘即是僧寶種性不斷有一清淨正見比丘即是正法眼藏不滅願我同志念正教之將湮悲含生之永溺欽慈尊明誨𤀹護法遠懷覷開名利兩關痛絕偷心一點深求出要厚蓄資糧朗戒珠而澄定水揭慧日而拓願輪但期上契佛心何患下遺生界倘或欲速見小未免之楚北轅高明者自不以人廢言異見者必且因言罪我然則海運而圖南亦惟自擇決起而控地亦惟自取矣五拘那含牟尼佛所說心莫作放逸聖法當勤學如是無憂愁心定入涅槃此是拘那含牟尼如來無所著等正覺說是戒經不放逸故無憂患學聖法故無愁慮無憂愁故心定也憂愁屬苦放逸是集聖法是道入涅槃是滅若約四種四諦解釋則浩然無涯思之六迦葉佛所說一切惡莫作當奉行諸善自淨其志意是則諸佛教此是迦葉如來無所著等正覺說是戒經五住煩惱皆名為惡一切莫作即圓伏圓斷義也性具功德皆名為善盡當奉行即圓修圓證義也終日止惡而無能止之相終日行善而無能行之相是名自淨其志意也七本師釋迦佛所說善護於口言自淨其志意身莫作諸惡此三業道淨能得如是行是大仙人道此是釋迦牟尼如來無所著等正覺於十二年中為無事僧說是戒經從是以後廣分別說諸比丘自為樂法樂沙門者有慚有愧樂學戒者當於中學三業道淨即是十善道法若人天若聲聞若緣覺若菩薩若諸佛無不依之具如華嚴十地品中廣明也無事僧謂不犯戒者此七戒經各逗時機而說故旨趣各有所重所謂應病與藥至於會歸涅槃則一而已諸部中惟根本部敘厥緣起為詳而字句文義與此略殊故不錄之廣分別說者有漏法生乃結二百五十戒法為斷彼有漏法故一一戒中復有根本從生方便等流之不同為比丘者皆應學之除非不自為者不樂法者樂作非沙門非釋子者無慚無愧者不樂學戒者可不學耳問曰十二年前學箇甚麼答曰其無事者即是無學其未登無學者即學淨三業道問曰我今亦但淨三業道何用學此煩瑣戒相答曰汝今為在十二年後為在十二年前又且不論時前時後且問汝今三業為同無事僧為不同無事僧既不同無事僧若不學此戒何由知持知犯若謂戒不必學即犯輕戒波逸提只此輕戒一念為是淨為是不淨若謂持取犯戒俱不可得汝今何獨不得持戒却得犯戒若謂犯即無犯則亦可持即無持何乃捨持取犯若謂情無取捨即不應取略捨廣若謂淨穢平等則地獄天堂亦平等惡罵美稱亦平等檀麝糞穢亦平等甘露膿血亦平等天衣刀杖亦平等汝何不常處地獄汝何不名猪狗畜生禿奴禿賊汝何不常嗅糞穢汝何不飡噉膿血汝何不刀杖打割其身若汝實證平等法性自然不壞俗諦必將受現法樂善化有情若汝勉強受上等事即是魔入汝心亦非正道若汝既未證平等法性亦未能受如上等事而獨隨情逐意懶惰懈怠不肯學此戒法即是賊住即非沙門即無慚愧即師子身蟲即最上大賊即惡魔眷屬即地獄種子汝何不觀如來證得色平等故能使地獄天宮皆為淨土如來證得聲平等故能使天魔惡聲化為讚頌如來證得香平等故能使幻士廁室化為香殿如來證得味平等故能使食中毒藥化成甘露如來證得觸平等故能使魔軍刀箭化成天華如來證得法平等故不為物轉恒能轉物具足無量不可思議神通妙用如來證得持犯平等故三業無不隨智慧行能使破戒眾生還得清淨汝既妄稱持犯平等何乃三業仍多蕪穢且於戒法作留難耶如此欺心但為自害嗚呼痛哉二述七佛戒經竟三偈讚迴向七初讚護戒勝益至七迴向佛道今初明人能護戒能得三種樂名譽及利養死得生天上當觀如是處有智勤護戒戒淨有智慧便得第一道明人者以護戒非愚癡人所堪故三種樂者先舉現在未來華報以為勸誘非謂護戒本意實圖此也如是處指學處言因智故使戒清淨因戒故智慧性顯更相由藉以成福慧二嚴直至成佛乃護戒之實果也前智是聞思正見後智是無漏始覺始覺合乎本覺名究竟覺故便得第一道二明諸佛道同如過去諸佛及以未來者現在諸世尊能勝一切憂皆共尊敬戒此是諸佛法一切憂者煩惱所知二障為因分段變易二種生死為果惟尊敬此戒乃能勝之以一一戒能治煩惱通達戒性能離所知愚故三勸遵佛教若有自為身欲求於佛道當尊重正法此是諸佛教自為身揀非為名為利求佛道揀非聲聞緣覺正法者指此波羅提木叉惟佛出世方有不同定共道共及治世五常十善故名正法又有此戒乃有僧寶有僧寶乃使佛法不滅故名正法也欲求佛道必當尊重此法詎可忽為小檢謗諸佛之明訓四證戒經利益七佛為世尊滅除諸結使說是七戒經諸縛得解脫已入於涅槃諸戲永滅盡尊行大仙說聖賢稱譽戒弟子之所行入寂滅涅槃言七佛世尊為欲滅除眾生諸結使故所以說是戒經普令眾生解脫諸縛同入涅槃滅諸三界種種戲論故知此大仙所說之戒聖賢所讚之戒凡為佛弟子者無不行此而入涅槃者也五重述顧命世尊涅槃時興起於大悲集諸比丘眾與如是教誡莫謂我涅槃淨行者無護我今說戒經亦善說毗尼我雖般涅槃當視如世尊此經久住世佛法得熾盛以是熾盛故得入於涅槃若不持此戒如所應布薩喻如日沒時世界皆闇冥臨涅槃而與教誡正如父母顧命其子較諸平日拔苦之心更切矣戒經指五篇學處毗尼謂滅罪之方此即如來法身常住世間故當視如世尊有秉羯磨有如說行者名為此經住世名為正法住世教行果三皆悉具足否則法輪墜地惡道充滿故喻如日沒之時闇冥不見道路矣六申誡護持當護持是戒如犛牛愛尾和合一處坐如佛之所說𤛆音茅牛名也𤛆牛惜尾而忘身喻持戒者應護戒而不顧身命也如佛所說者半月半月如法說不犯非法別眾等過也七迴向佛道我已說戒竟眾僧布薩竟我今說戒經所說諸功德施一切眾生皆共成佛道問此戒本為聲聞建立何以迴向佛道若聲聞法果同佛道何故經中有云聲聞持戒名菩薩破戒聲聞破戒名菩薩持戒耶答處處經中但訶聲聞心不訶聲聞律以但欲自度不思度人墮無為坑缺大悲用所以被訶又聲聞以趣寂為志故瞋心犯輕貪心犯重菩薩以度生為本故瞋心犯重貪心犯輕至於比丘之名本通大小有聲聞比丘有菩薩比丘所趨雖異比丘體同體同則戒亦同若無此戒則同在家菩薩何必捨家趣於非家故知比丘戒法大小通持喻如不龜手藥顧所用何如耳迴向佛道豈有違於經說哉音義肘隱人隱蔽也又安也亦憑著也楯乳允切與盾同富羅此翻短靿靴靿音要靴統也菴羅果亦云菴婆羅亦云菴摩羅舊翻為奈新翻為難分別其果似桃非桃似柰非柰又生熟難分鉾音矛同矛長二丈建於兵車其端如劒鑷音聶也璫音當穿耳垂珠犍音堅犗牛也犗音界凡畜之強健者曰犗讟音讀怨謗也阿含亦云阿笈多此翻教又翻無比法即如來所說之言教也又翻法歸所謂萬法之淵府總持之林苑也又翻傳所說義通則大小二教皆號阿含別則小開四部謂增一阿含明人天因果長阿含破邪見中阿含明諸深義雜阿含明諸禪法罪名罪種五篇七聚為罪名二百五十事為罪種之楚北轅楚在中州之南欲往楚而北其轅則愈馳愈遠海運圖南決起控地莊子逍遙游篇明北溟鯤魚化為鵬鳥海風發動乃徙於南溟水擊三千里摶風而上者九萬里去以六月乃息此譬大人境界所養者厚所行者遠所持者久也又云斥鷃笑之曰我決起而飛搶榆枋時則不至而控於地而已矣奚以之九萬里而南為此譬庸流境界急於自用猶如決起眼前活計如搶榆枋無有忍力如不至則控於地也決起者輕急妄舉搶者飛集榆枋者小樹控者仆地以自安息也五住煩惱一者見一切住地煩惱三界中分別見惑見道之所斷也二者欲愛住地煩惱欲界中任運俱生思惑三者色愛住地煩惱四禪天任運俱生思惑四者無色愛住地煩惱四空天任運俱生思惑皆修道之所斷也五者無始無明住地煩惱即界外二種別惑障俗諦者名為塵沙障中道者名為無明非二乘見修之所能斷故但合為一住菩薩諸佛修假中二觀乃能斷之前四住名煩惱障後一住即所知障根本從生方便等流二百五十戒各就本條結罪名根本罪非僅以四重為根本也犯罪而不發露懺悔則覆藏之罪日日倍增名從生罪將犯罪而其事未成名方便罪罪已成而輕於根本名等流罪後文治罪法中有從生偷蘭遮當知即是此中初篇二篇之方便罪所攝與今從生二字不同彼約從罪前生今約從罪後生也有獨頭偷蘭遮當知即是此中初篇二篇之等流罪所攝以其自成罪性故名獨頭以是兩篇根本罪之同等流類故名等流也五常仁義禮智信不龜手藥龜音均手凍拆也莊子中明宋人有善為不龜手之藥者世世以漂布為業客聞之請以百金買其方往說吳王冬與越人水戰由此藥力手不凍拆大敗越人吳王遂分地而封之此藥是一或以封爵或不免於作漂工則所用者異耳今此比丘戒法亦爾聲聞持之僅得阿羅漢果如彼漂工菩薩持之迴向眾生同成無上菩提猶如吳客之受封也
