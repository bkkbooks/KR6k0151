body:
  text: 古吳蕅益沙門智旭彚釋二盜戒此是性罪大乘同制見機得作具如菩薩戒本問大乘見機得作殺盜淫妄於菩薩戒無所違犯生多功德於比丘戒有違犯否答出家淫戒大小同遮殺盜妄三大開小制若果屬慈心濟物於菩薩戒雖無違犯於比丘法仍須依律結罪夫菩薩本懷尚欲普代衆生受地獄苦豈不能受僧中治罰苦耶倘自稱大士不服僧規既非比丘亦非菩薩矣若比丘若在村落若間靜處不與盜心取隨不與取法若為王王大臣所捉若殺若縛若驅出國汝是賊汝癡汝無所知是比丘波羅夷不共住緣佛遊羅閲城耆闍崛山中時城中有陶師子比丘字檀尼迦在間靜處止一草屋入村乞食取薪人破屋持歸乃和泥作全成瓦屋取柴薪牛屎燒之屋成色赤如火佛制不得作赤色全成瓦屋作者突吉羅敕諸比丘往詣打破檀尼迦乃誑摩竭國守材人取瓶沙王所留要材大臣白王王念不應以少材而斷出家人命訶責放去諸臣不平居士譏嫌少欲比丘白佛訶責結戒釋隨不與取法者王法若取五錢若直五錢物應死十誦云一銅錢直十六小銅錢律攝云五磨灑者一磨灑有八十貝齒相取離本處波羅夷方便欲舉而不得偷蘭遮取減五錢偷蘭遮不得突吉羅教人取教人求同上方便教人求五錢以上受教者取異物異處取取者波羅夷教者偷蘭遮受教者無盜心而取得五錢以上取者無犯教者波羅夷受教者謂盜取而得五錢以上犯波羅夷教者無犯有主有主想不與取五錢以上波羅夷減五錢偷蘭遮有主疑五錢以上偷蘭遮若根本部亦波羅夷減五錢突吉羅準根本部亦偷蘭遮無主有主想及疑五錢以上偷蘭遮減五錢突吉羅比丘尼波羅夷餘三衆突吉羅滅擯不犯者與想己有想糞掃想暫取想親厚意想及最初未制戒等親厚意想者第三分云有七法是親友利益慈愍故何等七難與能與難作能作雖忍能忍密事相語不相發露遭苦不捨貧賤不輕根本雜事云凡是親友可委寄人有其五種一心相愛愍二近為得意三是所尊重四久故通懷五聞用己財心生歡喜第四分云以盜心為人輸稅物私度關價直五錢波羅夷衆多比丘遣一人取他物得五錢以上共分雖各得減五錢盡波羅夷以盜心取他物離本處時滿五錢故於彼處得直五錢物到此處直減五錢波羅夷於彼處得減五錢物到此處直過五錢偷蘭遮知前人以盜心使我取物先可之後悔不往突吉羅欲盜他衣錯取己衣偷蘭遮他盜取物而奪彼取盜者波羅夷前後取滿五錢者波羅夷盜他地水果菜等滿五錢若自受用若令損減一切波羅夷畢陵伽婆蹉檀越有二小兒黠了不畏人尊者至時小兒便抱腳婉轉戲後為賊偷去父母向尊者涕泣尊者還寺以天眼見小兒在賊船中即以神足持還父母諸比丘嫌責佛問以何心取答言慈心取無有盜意佛言無犯僧祇律云若比丘在道行為賊所劫或賊少比丘多或賊藏物已更往餘處是比丘若未作失想還奪還取無罪若已作失想還奪還取便為賊復劫賊又或賊順道去漸近聚落持物將分比丘還從乞得無罪若以勢力恐怖令還無罪若告聚落主方便慰喻令還無罪若知令彼或殺或縛則不應告若比丘作摩摩帝此云寺主塔無物衆僧有物便作是念天人所以供養衆僧者皆蒙佛恩供養佛者便為供養衆僧即持僧物修治塔者此摩摩帝得波羅夷若塔有物衆僧無物便作是念供養僧者佛亦在中便持塔物供養衆僧摩摩帝用者得波羅夷若塔無物僧有物者得如法貸用但分明疏記信某時貸用某時得當還若僧無物塔有物亦如是若交代時應僧中讀疏分明付授若不讀疏越毗尼罪若有二比丘共財物應分一比丘盜心獨取除自分他分滿波羅夷若同意取者無罪若作是念我今用後當償還無罪若共作制限得物共分既得物便言各任相祿是中半分滿者波羅夷置物施家作是語者偷蘭遮知有施主作是語者越毗尼罪二糞掃比丘相約亦然若比丘知僧物有應與有不應與云何應與若損者若益者應與云何損者有賊詣寺索種種飲食若不與或能燒劫寺內雖不應與畏作損事故隨多少與云何益者若治衆僧房舍泥工土工畫工及料理僧物事者應與前食後食及塗身油非時漿等若王及諸天勢力者應與飲食是名益者應與有比丘失衣鉢若未作捨想後知處應從彼索若已作捨想後知處從索者越毗尼罪若先作念言後若知處當從索取如是索得無罪有二比丘作制限當共受經當共誦經後不受不誦者越毗尼罪根本律云起盜心興方便得惡作罪突吉羅也觸彼物窣吐羅底也即偷蘭遮舉離處滿五錢波羅市迦不滿者得粗罪亦即偷蘭遮若是畜生邊物觸彼物惡作罪舉離處滿五者得粗罪不滿者惡作罪律攝云獵師逐鹿走入寺中隨傷不傷不還無犯若鹿被箭入寺便死應還勿留若與賊同心示彼舍處後時受分隨得招罪問此與教他取有何差別倘不受分寧無罪耶答教他為我取則物離處時罪已在我示賊彼舍處則賊劫彼時未必與我故須從受分時結罪然雖不受分亦得方便偷蘭遮罪若後生悔向彼物家報遣防護勿令失脫設彼賊偷皆方便罪後雖受分亦窣吐羅與賊同行欲為盜事中路而退但得惡作同心作賊為他守道分物受分者成犯由怖為伴無心共盜彼雖偷得苾芻非犯若持自物或是他物作如是語我欲偷稅得越法罪教偷稅者從異道去得惡作罪若作惡心指他異道冀免稅直得窣吐羅若持他物過彼稅處無心取分者粗罪未至稅處或取半分或取全分而未過處得窣吐羅若過稅處數滿本罪若持己物到於稅處使他越過亦得本罪實是己財決心回與父母兄等告掌稅者此非我物不與汝稅或乘空去或口含或衣裏或避路並得粗罪問此亦仍同為他越過云何不犯本罪答為他過物利必歸己故結本罪今決心回施既無得利之愆但有違稅之過故但粗罪也若為父母及三寶事持過稅處應為稅官種種説法稱讚三寶説父母恩彼不取稅直者無犯若猶索者應與盜事略有五種一對面強取二竊盜取三調弄取四因寄取五與更奪取此之五種咸是盜收有施物來知非己分言我合得者窣吐羅罪若受其分準數成犯他不請食輒去食者得惡作罪本師有緣須向餘處為受利者非犯若取分時須告他知勿不囑言輒取他分若為他將物擬濟病人聞彼身亡物還本主若及命在後方死者此成亡物若賊盜他物為恐怖故持施苾芻此不應受若作還彼主心受之無犯若知是賊首領者隨意應受受已刀割染壞方可畜持本主來索應還若興方便欲盜他財觸著之後便從主乞彼與得時得前粗罪初為貸借後欲不還決絶之時便得本罪若他所寄物先作盜心得窣吐羅後時移處便得本罪若先移處後心決絶亦得本罪博奕偷子迷惑取物準數成犯凡是賭物皆得惡作意偷彼物而錯得此既乖本心但得粗罪若被他盜物已作捨心即是屬他重奪彼財準數成犯是故不應輒作捨意若見賊來恐喝令去捉得賊者不應付官先為説法從乞其物若不肯與當酬半價或復全還凡受事人閉寺門時有其五別謂上下轉鳴鎖并副鎖門關及扂不閉賊偷準事酬直若闕一者應還一分乃至若總不著即應全償若施主本心造立房寺於此住者與其供養苾芻輒將餘食計直全還若為病人欲覓藥者應問病人何處求藥如所教處覓之根本目得迦云凡主人見客來至先應問彼是汝伴不若索衣鉢與不若言莫與而將與者應酬彼價若言與者失不須酬凡客苾芻至他房內應問主人若有人來索衣鉢者可與不若言莫與而與者計直酬價若言與者失不須酬為人過衣袋者乃至未受不應輒放若故放者應須賠直五分律云非同意人輒作同意取其衣食突吉羅十誦律云若水中浮物來比丘以偷奪心取選擇時偷蘭遮若捉留住後水到前或沈著水底或舉離水直五錢以上波羅夷若相言奪他田地得勝者波羅夷不如者偷蘭遮盜佛舍利偷蘭遮若尊敬清淨心取無罪盜經卷隨計直犯盜塔寺精舍中供養具若有守護隨計直犯取西拘耶尼人物隨計彼物價犯弗于逮亦如是取單越物無犯檀越請僧食次未至自言我應去波逸提得食時隨計直犯破鳥巢取鳥巢皆突吉羅憐愍心解放他人畜生突吉羅奪神像物偷蘭遮一切捕獵物以快心壞偷蘭遮憐愍心壞突吉羅善見律云若受人寄物物主還取答言我不受汝寄突吉羅令物主狐疑偷蘭遮物主言我不得此物波羅夷若偷人取物比丘以偷心奪取物離偷人身分若此人健又奪物去比丘雖不得物亦波羅夷以決定得偷心離本處故若檀越施衆僧果樹或擬衣服或擬湯藥衆僧不得分食若以果樹為四事布施比丘以盜心過分食隨直多少結罪若為作房舍施衆僧回食得偷蘭遮應還直若為衣施應作衣若飢儉時衆僧羯磨和合食用無罪以衣施作房舍以房舍施作飲食亦如是又寺中房舍多無人修治敗壞應留好者餘粗敗得壞賣為食用為護住處故三殺戒此是性罪大乘同制聲聞殺傍生犯波逸提大士亦犯重聲聞於父母阿羅漢成逆大士於二師亦成逆逆則不通懺悔重則雖許懺悔須要得見好相問大士殺傍生義疏結罪既有二途云何僅用其一又二師法恩是同云何大士成逆而比丘不名逆耶答受菩薩戒必是發菩提心自應了知衆生同有佛性慈悲愛愍如子如身豈可輕視傍生橫加殺害故單用結重一途也二師法恩實無差別然比丘犯殺已成邊罪永無重受之科菩薩犯殺猶堪見相重受若殺二師必障戒品是以稱逆耳若比丘故自手斷人命持刀與人歎譽死快勸死咄男子用此惡活為寧死不生作如是心思惟種種方便歎譽死快勸死是比丘波羅夷不共住緣佛遊毗舍離獼猴江邊講堂中説不淨觀歎不淨觀歎思惟不淨觀比丘聞已習不淨觀厭患身命求刀欲自殺時有比丘字勿力伽難提手執利刀入婆裘園有一比丘語言大德斷我命來我以衣鉢與汝即受雇斷其命詣江洗刀尋生悔恨天魔立水勸讚悔心即滅復入園中殺諸比丘至六十人園中死尸狼籍居士驚怪譏嫌時佛觀衆減少知而故問阿難具白上事佛乃集衆為説阿那般那三昧而結此戒善見律云如來以天眼觀往昔有五百獵人共入阿蘭若處殺諸群鹿以此為業墮三惡道受諸苦惱經久得出昔有微福得生人間出家為道宿殃未盡於半月中更相殺害諸佛所不能救於此五百人中有四果聖衆生死有際有餘凡人輪轉無際是故為説不淨觀令離愛欲得生天上本不教死但不可以神力救護是故為説不淨觀已半月入於靜室唯聽一人送食勿使諸人作如是言佛是一切智而不能斷諸弟子相殺以世尊入定無人得往説如此事耳薩婆多毗婆沙云佛一切智何故教諸比丘令得如是衰惱若不知者不名一切智答曰佛一切等教爾時不但六十人受不淨觀佛教法無有偏但受得利有多有少佛深知衆生根業始終必以此法因緣後得大利六十比丘迦葉佛所受不淨觀法不能專修多犯惡行命終入地獄中今佛出世罪畢得生人間墮下賤家出家入道以本緣故應受此法既命終已得生天上於天來下從佛聽法得獲道迹以是因緣佛無偏也釋阿那般那此翻遣來遣去即十六特勝法門也法界次第初門云一知息入二知息出三知息長短四知息遍身五除諸身行並屬身念處觀六受喜七受樂八受諸心行此三屬受念處觀九心作喜十心作攝十一心作解脫此三屬心念處觀十二觀無常十三觀出散十四觀離欲十五觀滅十六觀棄捨此五並屬法念處觀又知入知出正依隨息為門得粗細住及欲界定則知長短入未到地則知遍身得初禪則除身行受喜受樂受諸心行得二禪則心作喜作攝得三禪則心作解脫得四禪則觀無常得空處則觀出散得識處則觀離欲得無所有時則能觀滅得非有想非無想時則觀棄捨此與根本四禪四定一往雖同觀行有別行人若於地地修觀照了則地地之中顛倒不起心不染著隨其因緣會處即於是地發真無漏證三乘道相是中自殺教他殺遣使殺勸殺方便殺一切波羅夷不死偷蘭遮八部及畜生解語變形求殺殺者偷蘭遮不死突吉羅實人人想殺波羅夷人疑偷蘭遮依根本律亦波羅夷人作非人想非人人想非人疑非人想一切偷蘭遮比丘尼波羅夷餘三衆突吉羅滅擯不犯者誤殺無害心最初未制戒等第四分云方便墮他胎波羅夷母死兒活母死無犯但得偷蘭罪衆多比丘遣一人斷他命一切波羅夷方便欲自殺偷蘭遮僧祇律云方便欲自殺時偷蘭罪若自殺已波羅夷用刀治愛處偷蘭遮愛處者離穀道邊各四指根本尼陀那云不應截痔五分律云入母胎後至四十九日名為似人過此盡名為人若人若似人殺者盡波羅夷若作書令彼殺字字偷蘭遮書至彼彼因是死波羅夷若作相似語教人殺彼因此死波羅夷獨作獨想突吉羅不獨獨想獨不獨想皆偷蘭遮凡發殺心時突吉羅作方便時偷蘭遮死者波羅夷有二比丘相瞋後共道行於路相打一人遂死佛言無殺心不犯重瞋打比丘波逸提從今不聽相瞋未悔謝者共道行犯者突吉羅欲殺彼而誤殺此偷蘭遮十誦律云若為人作坑桁弶羂等人因是死波羅夷若不即死後因是死亦波羅夷後不因死偷蘭遮若為非人作非人死者偷蘭遮人死畜生死皆突吉羅應云人畜死無犯本無殺心故但於非人邊得方便罪若為畜生作畜生死者波逸提人非人死皆突吉羅亦但從畜生邊結方便罪若不定為一事作諸有來者皆令死人死波羅夷非人死偷蘭遮畜生死波逸提都無死者一偷蘭遮二突吉羅自斷陰偷蘭遮自斷指突吉羅殺化人偷蘭遮殺心打人不死偷蘭遮看病久生厭心置令死偷蘭遮令趣得藥食便服食死者偷蘭遮破未熟癰瘡死者偷蘭遮破熟癰無罪薩婆多毗婆沙云若以比丘語故征統異國兼得財寶皆得殺盜二波羅夷摩得勒伽云欲殺凡人誤殺羅漢欲殺羅漢誤殺凡人欲殺父誤殺母欲殺母誤殺父皆偷蘭遮不得逆罪辨問出世聖人生身父母雖是誤殺寧免三塗苦報豈無世人譏嫌乃於戒身無恙猶可安心進道耶答殺盜二戒論心不論事今於所欲殺者事猶未遂故僅結方便罪所誤殺者實無殺心故不得罪既四緣未備則戒體仍存至於三塗苦報世人譏嫌一切遮罪亦皆有之豈以此論失戒也四大妄語戒此是性罪大乘同制若比丘實無所知自稱言我得上人法我已入聖智勝法我知是我見是彼於異時若問若不問欲自清淨故作是説我實不知不見言知言見虗誑妄語除增上慢是比丘波羅夷不共住緣佛遊毗舍離獼猴江邊時世穀貴乞食難得婆裘河邊有諸比丘向居士自説得上人法等諸居士信樂供養不為飲食所苦安居既竟往見世尊慰問及此具白上事佛言汝等愚人有實尚不應向人説況復無實世有二賊一者實非淨行自稱淨行二者為口腹故不真實非己有在大衆中故作妄語自稱得上人法是中為口腹者最上大賊以盜受人飲食故除增上慢者僧祇律云有二比丘在阿練若住其一比丘暫成就根力覺道貪恚不起語第二比丘言長老我得阿羅漢後時遊諸聚落放縱諸根廢習止觀便起煩惱覺癡愛生還語其伴彼言長老妄稱得過人法犯波羅夷是比丘言我非知而妄語謂為實耳以是白佛佛言此是增上慢云何於正法中捨家出家起增上慢汝當方便除增上慢可得羅漢彼時比丘大自慚愧即精進方便修習正觀除增上慢得羅漢果辨問增上慢人未得謂得未證謂證如第四禪無聞比丘罪亦重矣云何不結罪耶答除增上慢者謂其不達法相錯認消息得小輕安自謂究竟乃是如心而語故不結妄語罪耳是以覺悟之後悔過精修尚堪入道若使硬作主宰不復虗心乃有無聞之禍非如大妄語人當下失戒決定沉淪也釋人法者人陰人界人入上人法者諸法能出要成就自言念在身乃至有得有果聖智者法智比智等見者見苦見集等乃至隨衆生業報如實知之相如是虗而不實口向人説若遣使若書若作知相前人知波羅夷不知偷蘭遮靜作不靜想不靜作靜想口自説者偷蘭遮向鬼畜等説知者偷蘭遮不知突吉羅人作人想六句準知依根本部二重四輕比丘尼波羅夷餘三衆突吉羅滅擯不犯者向人説根力覺意解脫三昧正受法不言自得乃至獨説夢説錯説最初未制戒等五分律云寧噉燒石吞飲煬銅不以虗妄食人信施世間有五大賊一者作百人千人主破城聚落害人取物二者有惡比丘將諸比丘遊行人間邪命説法三者有惡比丘於佛所説法自稱是我所造四者有惡比丘不修梵行自言我修梵行五者有惡比丘為利養故空無過人法自稱我得此第五賊名為一切世間天人魔梵沙門婆羅門中之最大賊又云為利養故種種讚歎他戒定慧解脫解脫知見成就而密以自美偷蘭遮為利養故坐起行立言語安庠以此現得道相欲令人知偷蘭遮十誦律云説我是阿羅漢乃至得阿那般那念不實犯波羅夷若説我善持戒淫欲不起不實偷蘭遮若説天來乃至羅剎鬼來互相問答不實者波羅夷若説旋風土鬼來至我所不實者偷蘭遮有人問比丘言汝是阿羅漢不若默然者偷蘭遮應言我非阿羅漢薩婆多毗婆沙云無所誦習而言我有所誦習悉偷蘭遮摩得勒伽云若言我不墮三塗偷蘭遮言我已離結使煩惱波羅夷向聾人啞人聾啞人入定人説偷蘭遮若問得果不答言得而示以手中果偷蘭遮善見律云若有阿練若比丘立制坐此樹下此處經行者得阿羅漢我等應以香華供養有惡比丘欲得此供養往坐行者犯波羅夷若有白衣作寺入我寺者是阿羅漢有惡比丘入此寺者犯波羅夷若衆僧立制於夏三月中莫語莫眠莫受檀越供養如是非法制不從無犯辨問經中有一行三昧但坐不臥常行三昧不坐不臥又懺法制專莫雜語及接對問訊先德亦有終身不出山者與善見律相違云何可通答依大乘教如法進修決不名為犯律佛律儀外重加精進斯則名為非法以義通之實不相違今更細釋者一行等三昧皆是自誓精修非繫僧中條約懺法雖制雜語亦非受行啞法獨宿孤峰迹絶人世一身之高蹈可然大衆又豈能齊奉耶證大般涅槃經云一切衆生雖有佛性要因持戒然後乃見因見佛性得成阿耨多羅三藐三菩提若有説言佛説一切衆生悉有佛性煩惱覆故不知不見是故應當勤修方便斷壞煩惱作是説者當知不犯四重若有説言我已成就阿耨多羅三藐三菩提何以故以有佛性故有佛性者必定當成阿耨多羅三藐三菩提以是因緣我今已得成就菩提當知是人犯波羅夷何以故雖有佛性以未修習諸善方便是故未見以未見故不能得成阿耨多羅三藐三菩提三結問諸大德我已説四波羅夷法若比丘犯一一法不得與諸比丘共住如前後亦如是是比丘得波羅夷罪不應共住今問諸大德是中清淨不三説諸大德是中清淨默然故是事如是持釋律攝云前是俗人無比丘分後犯戒時與前俗人體無有異故云如前後亦如是證第四分云死人有五不好一不淨二臭三有恐畏四令人恐畏惡鬼得便五惡獸非人所住處犯戒人亦如是一身口意業不淨二惡聲流布三諸善比丘畏避四諸善比丘見之生惡心言我云何乃見如是惡人五與不善人共住破戒有五過失自害為智者所訶有惡名流布臨終時生悔恨死墮惡道復有五事先所未得物不能得既得不護隨所在衆中有愧恥無數由旬內人稱説其惡死墮惡道有五法名為大賊長壽作大罪不被繫縛何等五若住無定處有好伴若多刀杖若大富多有財寶有捉者賂之若有大人親友或依止王及大臣有捉者護之若於遠處作賊而還破戒比丘亦有五法多作衆罪不速為他所舉若住無定處有伴黨若多聞能憶持初中下言悉善有文有義具説淨行而不能善心思惟深入正見若能得四事供養有舉者賂之若有大人為親厚或上座及次座有舉者護之若在空野中住來至大家求覓利養是為五法同彼大賊善見律云一切作諸惡法無人不知初作者護身神見次知他心天人知如此之人天神俱見是故大叫喚展轉相承傳至梵天置無色界餘者悉聞薩婆多毗婆沙云初犯一戒已毀破受道器名波羅夷後更殺人得突吉羅實罪雖重無波羅夷名以更無道器可破故優婆塞五戒相經云佛告比丘吾有二身生身戒身若善男子為吾生身起七寶塔至於梵天若人虧之其罪尚有可悔虧吾戒身其罪無量初四棄法竟二十三僧殘法三初總標二別列三結問初總標諸大德是十三僧伽婆尸沙法半月半月説戒經中來釋十誦云僧伽婆尸沙者是罪屬僧僧中有殘因衆僧前悔過得滅是名僧伽婆尸沙根本律云僧伽者若犯此罪應依僧伽而行其法及依僧伽而得出罪婆尸沙者是餘殘義若於四事隨犯其一無有餘殘不得共住此十三法有餘殘可治故名僧殘律攝云由奉衆教罪方除滅毗尼母經云如人為他所斫殘有咽喉名之為殘如二人共入陳間一為他所害命絶二為他所害命根少在不斷若得好醫良藥可得除瘥若無者不可瘥也犯僧殘者亦復如是有少可懺悔之理若得清淨大衆為如法説懺悔除罪之法此罪可除若無清淨大衆不可除滅是名僧殘二別列十三初弄陰失精戒至十三不捨惡性戒初弄陰失精戒大乘同制梵網經云寧以利斧斬破其身終不以此破戒之心貪著好觸菩薩戒本經云起五蓋心不開覺者是名為犯衆多犯是犯染汙起也若比丘故弄陰失精除夢中僧伽婆尸沙緣迦留陀夷欲意熾盛顏色憔悴身體損瘦異時隨念憶想弄失不淨諸根悅豫顏色光澤親友比丘問知其故白佛結戒時一比丘亂意睡眠夢中失精疑犯此戒佛言無犯然亂意眠有五過失一惡夢二諸天不護三心不入法四不思惟明相五於夢中失精善意眠五功德反上可知相弄失僧殘不失偷蘭遮教他比丘者弄失偷蘭遮不失突吉羅教餘人弄失不失一切突吉羅比丘尼波逸提餘三衆突吉羅第四分云若女人捉比丘前彼動身失不淨僧殘不動身失不淨突吉羅捉後亦如是捉足禮時亦如是若以男根逆水或順水或水灑或逆風或順風或口噓或空中憶想身動失不淨一切僧殘根本律云寧以手執可畏黑蛇不以染心自捉生支以染心視生支得惡作罪五分律云散亂心眠突吉羅憶行淫事突吉羅大涅槃經云應於淫欲生臭穢想乃至不生一念淨想若夢行淫寤應生悔二女身相觸戒大乘同制若比丘淫欲意與女人身相觸若捉手若捉髮若觸一一身分者僧伽婆尸沙緣迦留陀夷因佛制戒不得弄陰墮精便伺婦女至房捫摸嗚口樂者笑其所作不樂者瞋恚罵詈語諸比丘比丘白佛結戒相觸女人一觸一僧殘觸鬼女及畜女能變形者偷蘭遮不變形者突吉羅若女人作禮捉足覺觸樂動身僧殘不動身突吉羅若欲心觸衣鉢等乃至自觸身一切突吉羅比丘尼波羅夷餘三衆突吉羅不犯者有所取與若相解勸等第四分云作女想與男身相觸作男想與女身相觸皆偷蘭遮此女餘女想餘女此女想身相觸皆僧殘與死女人身未壞者相觸僧殘半分壞多分壞者相觸偷蘭遮隨女人所倚處比丘以欲心動之偷蘭遮女人為水所漂慈念接出不受觸樂無犯僧祇律云若比丘坐時有女人來禮足若起欲心當正身住應語言小遠住禮若女人篤信卒來接足者應自嚙舌令痛不令覺女人細滑若女人從比丘索水者不應自捉罐澆女手應以器盛與若無器令淨人與若無淨人應持罐著牀几上令其自取若女人落水求救者比丘作地想捉出不犯若授竹木繩牽出不犯若言知汝雖苦當任宿命者無罪根本律云凡觸女身若是堪行淫者無衣隔時僧殘有衣粗罪若不堪者無衣粗罪有衣惡作若觸男及黃門堪行淫者無衣粗罪有衣惡作若不堪者有衣無衣俱得惡作若觸傍生堪與不堪並得惡作若見女人被水所漂或自縊噉毒等為救濟時觸皆無犯十誦律云女人以欲心摩觸無衣比丘比丘有欲心身動受細滑僧殘有衣比丘偷蘭遮若救火難水難刀難惡蟲難惡鬼難高處墮難一切不犯若無染心誤觸不犯女人為水所漂應救雖淫心起但捉一處莫放到岸不應更觸更觸得罪若繡畫女木女故觸突吉羅善見律云女人打比丘比丘以欲心喜受突吉羅若有力女人捉比丘若衆多女人共捉不受樂無罪戒因緣經云阿難為摩鄧伽呪所惑不犯罪辨問據僧祇律若不能作地想并無竹木繩等可授則當任其宿命而十誦律雖淫心起亦許救出此復何從答僧祇重在防過十誦急於救人今宜自審倘染習偏強應守僧祇之制若慈心果勝方行十誦之權三粗惡語戒此是性罪大乘同制若比丘淫欲意與女人粗惡淫欲語隨所説粗惡淫欲語僧伽婆尸沙緣亦起自前人故制釋粗惡者非梵行淫欲語者稱説二道好惡若自求若教他求若問若答若説若教若罵相説而了了一一僧殘不了了偷蘭遮若與書若遣使若作相令彼女人知者僧殘不知者偷蘭遮説餘處好惡偷蘭遮向二根非人女及能變形畜生女説偷蘭遮不知突吉羅向不能變形畜生女及向男子説盡突吉羅比丘尼偷蘭遮餘三衆突吉羅不犯者若為女人説不淨觀若説毗尼言次及此并夢説錯説等第四分云女作男想男作女想粗惡語偷蘭遮此女作餘女想餘女作此女想僧殘性好粗惡語非欲心突吉羅十誦律云若女人於比丘前説粗惡語比丘隨順其心少多語出隨一一語僧殘四歎身索供戒大乘同制若比丘淫欲意於女人前自歎身言大妹我修梵行持戒精進修集善法可持是淫欲法供養我如是供養第一最僧伽婆尸沙緣亦起自前人故制釋歎身者歎身端正好顏色種姓等梵行者勤修離穢濁持戒者不缺不穿漏無染汙善法者樂間靜處及十二杜多行多聞能説法持律坐禪等相隨稱歎多少了了者一一僧殘不了了偷蘭遮鬼畜女知不知想疑等同上比丘尼等同上五媒嫁戒此是遮罪大乘同制若比丘往來彼此媒嫁持男意語女持女意語男若為成婦事若為私通乃至須臾頃僧伽婆尸沙緣迦羅比丘善知俗法作是媒嫁時諸男女婚娶適意者供養讚歎不適意者怨詈譏毀故制相隨媒嫁多少一一僧殘受語往彼説不還報偷蘭遮不受語往彼説還報偷蘭遮受語不往彼説不還報突吉羅不受語往彼説不還報突吉羅鬼畜女知不知想疑等同上若持他書往不檢看若為白衣作餘使盡突吉羅比丘尼僧殘餘三衆突吉羅不犯者為和合別離為父母病及繫閉在獄為信心優婆塞病及繫閉在獄為三寶為病比丘等看書持往僧祇律云若男子有衆多婦有念者有不念者比丘語言當等看視務令均平答言當如師教比丘爾時得偷蘭罪若夫婦鬬諍比丘便勸喻和合得偷蘭罪若彼夫婦不和或於佛事僧事有缺為福事故勸令和合無罪若有婦女還家勸其早還夫舍得偷蘭罪有人多畜馬而無好種生者倩比丘語某家有生馬為我求之比丘為求得偷蘭罪有二比丘一有子一有女即自為婚配二俱僧殘十誦律云媒事已成比丘後來佐助偷蘭遮根本部云若苾芻至施主家作是語此女長成何不出適此男既大何不娶妻若言此女何不往夫家此男何不向婦舍皆惡作罪戒因緣經云解放畜生合其牝牡僧伽婆尸沙辨問諸部媒嫁畜生不結本罪戒因緣解放畜生合其牝牡獨結僧殘何耶答但作媒嫁則淫機尚遠故非人畜生以次漸降解放令合則目覩非法故雖畜生亦結本罪也今時叢林放生難豕不知難雄各別安頓罪那可言音義羅閲城具云羅閲祇伽羅此翻王舍城耆闍崛此翻靈鷲亦云鷲峰亦云鷲臺既棲鷲鳥又類高臺陶師子比丘窑匠之子出家為比丘也檀尼迦未見翻譯畢陵伽婆蹉此云餘習五百世為婆羅門慢習猶在黠胡八切音轄黠慧也西拘耶尼亦云瞿耶尼瞿陀尼此翻牛貸弗于逮亦云毗提訶此翻勝又翻初單越亦云拘盧此翻勝處亦翻勝生亦翻高出天魔梵語魔羅此翻奪命亦翻殺者又翻為障又翻惡者魔有四種一煩惱魔百八煩惱八萬四千諸煩惱也二五陰魔煩惱因緣和合得是色受想行識有漏色心也三死魔無常因緣令一期五陰身心壽命斷也四天魔居第六天為欲界主深著世樂障人修出世道也八部或云一天二龍三夜叉四乾闥婆五阿修羅六迦樓羅七緊那羅八摩睺羅伽或云四天王各領二部東方持國天王領乾闥婆及毗舍闍南方增長天王領鳩槃茶及薜荔多西方廣目天王領龍及富樓那多北方多聞天王領夜叉及羅剎桁音杭械也弶其亮切強去切設罟於道以掩鳥獸也羂吉券切涓去聲罟也又上聲邪命説法即五種邪命由旬或云由延正云踰繕那乃輪王巡狩一停之舍舊傳四十里西國乃三十里聖教所載唯十六里又大論云由旬三別大者八十里中者六十里下者四十里謂中邊山川不同致行里不等賂音路以財與人迦留陀夷此翻黑光摩鄧伽亦云摩登伽此云本性阿難為呪所惑因緣具在摩登伽經中十二杜多行舊云頭陀此翻抖擻亦翻修治亦翻淘汰十二行者一住阿蘭若處二常乞食三次第乞食四受一食法五節量食六中後不飲果漿蜜漿七著糞掃衣八但三衣九冢間住十樹下止十一露地坐十二但坐不臥牝牡牝婢忍切畜母也牡音某畜父也禽曰雌雄獸曰牝牡
