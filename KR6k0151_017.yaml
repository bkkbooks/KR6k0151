那至布薩自恣日入僧中長跪合掌作是言阿梨耶僧我某甲清淨僧憶念持如是三說而去後四波羅夷犯者更從始學十九僧殘已下若一一犯隨所犯作突吉羅悔若破非時食停食食捉錢金銀飲酒著華香五戒者隨犯日數更學二歲學戒滿已欲受具者和尚尼應白僧乞畜弟子羯磨然後二部僧中受具比丘尼犍度云應求和尚作如是言阿夷一心念我某甲今求阿夷為和尚願阿夷為我作和尚我依阿夷故得受大戒如是三說和尚答言可爾三明授比丘尼戒法若式叉摩那學戒已年滿二十若滿十二應與受大戒白四羯磨和尚尼為料理五衣鉢具請羯磨阿闍梨尼教授阿闍梨尼及尊證七比丘尼已邊地二證亦得將受戒人至戒場上立眼見耳不聞處羯磨師應作白差教授師大姊僧聽彼某甲從和尚尼某甲求授具足戒若僧時到僧思聽某甲為教授師白如是教授師當往至欲受戒人所語言妹此是安陀會此是多羅僧此是僧伽梨此是僧祇支此是覆肩衣此是鉢此衣鉢是汝有不彼答言是教受師復應語言妹聽今是至誠時實語時我今問汝實當言實不實當言不實汝字何等答云某甲和尚字誰答云某甲年滿二十未答云滿衣鉢具足不答云具足父母聽汝不答云聽若已嫁者問云夫主聽汝否答云聽汝不負債不答云不負汝非婢不答云非汝是女人不答云是女人有如是諸病癩癰疽白癩乾痟顛狂二形二道合大小便常漏涕唾常流出汝有此諸病不答云無如我向問汝事在衆中亦當如是問如汝向者答我衆僧中亦當如是答教授師還來僧中舒手相及處立作如是白大姊僧聽彼某甲從和尚尼某甲求授具足戒若僧時到僧忍聽我已問竟聽將來白如是白已回身將彼欲受戒人來至僧中為捉衣鉢教禮尼僧足已在羯磨師前長跪合掌教作如是乞大姊僧聽我某甲從和尚尼某甲求授具足戒我某甲今從僧乞授具足戒某甲尼為和尚願僧慈愍故拔濟我如是三乞已羯磨師應作白大姊僧聽此某甲從和尚尼某甲求授具足戒此某甲今從衆僧乞授具足戒某甲尼為和尚若僧時到僧忍聽我問諸難事白如是妹諦聽今是至誠時乃至汝有此諸病不一一問答如前竟次為白四羯磨大姊僧聽此某甲從和尚尼某甲求授具足戒此某甲今從衆僧乞授具足戒某甲尼為和尚某甲自說清淨無諸難事年滿二十衣鉢具足若僧時到僧忍聽授某甲具足戒某甲尼為和尚白如是大姊僧聽此某甲從和尚尼某甲求授具足戒此某甲今從衆僧乞授具足戒某甲尼為和尚某甲自說清淨無諸難事年滿二十衣鉢具足今僧授某甲具足戒某甲尼為和尚誰諸大姊忍僧授某甲具足戒某甲尼為和尚者默然誰不忍者說此是初羯磨第二第三亦如是說僧已忍授某甲具足戒某甲尼為和尚竟僧忍默然故是事如是持和尚尼應先為請一比丘羯磨師并九比丘為證邊地或四證亦得時諸尼應將彼受戒者至比丘僧所禮僧足已長跪合掌教授阿闍梨尼應教作如是語大德僧聽我某甲從和尚尼某甲求受具足戒我某甲今從衆僧乞受具足戒某甲尼為和尚願僧慈愍故拔濟我如是三乞已比丘僧中羯磨師當問汝字何等乃至汝有此諸病不一一問答並如前說又問汝已學戒清淨不若言學戒清淨當更問餘尼此人學戒清淨不餘尼若答言學戒清淨者羯磨師當作白大德僧聽此某甲從和尚尼某甲求受具足戒此某甲今從衆僧乞受具足戒和尚尼某甲某甲已學戒清淨若僧時到僧忍聽僧今授某甲具足戒某甲尼為和尚白如是大德僧聽此某甲從和尚尼某甲求受具足戒此某甲今從衆僧乞受具足戒某甲尼為和尚某甲已學戒清淨今僧授某甲具足戒某甲尼為和尚誰諸長老忍僧授某甲具足戒某甲尼為和尚者默然誰不忍者說此是初羯磨第二第三亦如是說僧已忍與某甲受具足戒某甲尼為和尚竟僧忍默然故是事如是持羯磨竟應語言汝今受戒某年某月某日某時應盡壽憶是事次為說戒善女人諦聽此是如來無所著等正覺說八波羅夷法犯者非比丘尼非釋種女不得作不淨行行淫欲法若比丘尼意樂作不淨行行淫欲法乃至共畜生此非比丘尼非釋種女汝是中盡形壽不得作能持不答言能不得盜乃至草葉若比丘尼偷人五錢若過五錢若自取教人取若自折教人折若自斫教人斫若自破教人破若燒若埋若壞色彼非比丘尼非釋種女汝是中盡形壽不得犯能持不答言能不得故斷衆生命乃至蟻子若比丘尼故自手斷人命若持刀授與人教死讚死勸死若與人非藥若墮人胎厭禱呪呾殺若自作若教人作彼非比丘尼非釋種女汝是中盡形壽不得犯能持不答言能不得妄語乃至戲笑若比丘尼不真實非己有自稱言我得上人法我得禪得解脫得三昧正受得須陀洹果斯陀含果阿那含果阿羅漢果言天來龍來鬼神來供養我此非比丘尼非釋種女汝是中盡形壽不得作能持不答言能不得身相觸乃至共畜生若比丘尼有染汙心與染汙心男子身相觸從腋已下膝已上身相觸若捉若摩若牽若逆摩順摩若舉若下若捉若捺彼非比丘尼非釋種女是中盡形壽不得犯能持不答言能不得犯八事乃至共畜生若比丘尼染汙心受染汙心男子捉手捉衣入屏處屏處共立共語共行身相近共期犯此八事彼非比丘尼非釋種女犯此八事故汝是中盡形壽不得犯能持不答言能不得覆他罪乃至突吉羅惡說若比丘尼知他比丘尼犯波羅夷罪若不自舉不白僧若衆多人後於異時此比丘尼若罷道若滅擯若遮不共僧事若入外道後便作是說我先知有如是如是事彼非比丘尼非釋種女覆重罪故汝是中盡形壽不得作能持不答言能不得隨順被舉比丘乃至守園人及沙彌若比丘尼知比丘為僧所舉如法如律如佛所教不隨順不懺悔僧未與作共住而隨順是比丘尼諫彼比丘尼言汝妹知不今僧舉此比丘如法如律如佛所教不隨順不懺悔僧未與作共住汝莫隨順是比丘尼諫彼比丘尼時堅持不捨是比丘尼當三諫捨此事故乃至三諫捨者善不捨者彼非比丘尼非釋種女由隨舉故汝是中盡形壽不得犯能持不答言能善女人諦聽如來無所著等正覺說四依法比丘尼依此得出家受具足戒成比丘尼依糞掃衣得出家受具足戒成比丘尼法汝是中盡形壽能持不答言能若得長利檀越施衣割壞衣得受依乞食得出家受具足戒成比丘尼法汝是中盡形壽能持不答言能若得長利若僧差食檀越送食月八日食十四十五日食若月初日食若衆僧常食若檀越請食應受依樹下坐得出家受具足戒成比丘尼法汝是中盡形壽能持不答言能若得長利別房尖頭屋小房石室兩房一戶應受按尼犍度又云尼不應在阿蘭若處住除王園中根本雜事云不應城外安置尼寺故根本律為尼但說三依法也依腐爛藥得出家受具足戒成比丘尼法汝是中盡形壽能持不答言能若得長利蘇油生蘇蜜石蜜應受汝已受具足戒竟白四羯磨如法成就得處所和尚如法阿闍梨如法二部僧如法具足滿汝當善受教法應勸化作福治塔供養衆僧若和尚阿闍梨一切如法教授不得違逆應學問誦經勤求方便於佛法中得須陀洹果斯陀含果阿那含果阿羅漢果汝始發心出家功不唐捐果報不絶餘所未知當問和尚阿闍梨隨意結撮回向令受戒人在前餘尼在後而去若欲受大戒時道路有賊難者聽遣使為受戒尼僧白二羯磨遣一清淨無難比丘尼復差二三尼共去受使尼禮僧足長跪合掌代為三乞僧應問彼字何等和尚尼是誰已學戒清淨不答言已學戒清淨者復應問伴尼已學戒清淨未耶若答言已學戒清淨應為白四羯磨彼使應還尼寺內語言大妹我已與汝受大戒竟不應以小小顏貌便遣使受戒十誦律云比丘尼一返戒不復聽出家受具若捨戒已轉根作男子與受比丘戒不犯薩婆多摩得勒伽云犯不共波羅夷轉根成男子得與出家受具雜法比丘尼犍度云迦留陀夷罵打比丘尼乃至詭語勸喻佛聽尼僧為作不禮白二羯磨彼隨順尼僧不敢違逆求解不禮羯磨應解六羣比丘至尼住處與六群尼更相調弄亂諸坐禪者佛言應隨亂閙處遮尼至比丘住處亦爾六群比丘所有沙彌至尼住處共彼沙彌尼式叉摩那更相調弄亂諸坐禪者佛言應喚來謫罰若不改應為彼沙彌二師作不禮羯磨六群尼所有沙彌尼式叉摩那至比丘住處共彼沙彌更相調弄亂諸坐禪者佛言應喚來謫罰若不改應為彼沙彌尼式叉摩那二師作捨教授羯磨尼不應結加趺坐聽半坐僧祇律云比丘教誡尼時應如女想尼於教誡人如佛想根本雜事云勸他歸俗得吐羅罪苾芻小鉢是尼大鉢諸尼不應觸他孩子尼陀那云若時饑儉乞求難得聽尼從衆乞法於父母舍而作往還白四羯磨此尼得獨行無犯往親族家隨意而食復至豐時即不應往目得迦云凡尼食處於上座首留一座處假令求寂在後來至就座而食是上衆故音義阿夷具云阿梨夷亦云阿梨耶此翻尊者或翻聖者有人云以大愛道是佛母姨故倣喚阿姨未必然不共波羅夷即觸八覆隨四戒也跋語嗚呼律學之不明也久矣律既不明教安得明教既不明宗安得明賢者過之不肖者不及焉況復流俗知見淪骨浹髓語以如來正法不啻驚若河漢顧安肯寓目於五百卷之佛世芳規也哉豫愧行門疏缺辜負佛門故年來杜口不敢輒辨時人得失而一隙之明仰藉佛祖借牖庶可稱跛足導師倘有人焉師豫意而篤行之其安隱達清涼池斷無疑也庚寅八月初八日閣筆故跋梵網經云凡長上亡故皆宜請法師諷誦經律以資冥福夫講經不過一時尚利益無邊能資冥福況刻板流通印施無盡展轉無窮其善根福德因緣盡虗空遍法界不可思議矣古人云以善書傳一人者當十善傳十人者當百善傳大豪傑大貴人者當千善廣布無疆重刊不朽者萬萬善噫世間善書功德尚爾況佛書出世之大法乎可以悟矣又云世間一切好話被佛一人說竟豈可不急急流通耶佛弟子楊淨超一心上叩常住三寶釋迦世尊文殊普賢諸大菩薩慈悲攝受冥熏加被證明發願曰淨超謹遵佛語刻印毗尼集要仗此勝因以資冥福願宿障頓消心地光明早脫輪回速往樂快見彌陀頓悟無生回入娑婆度盡恩冤齊成佛道惟願彌陀世尊觀音勢至清淨海衆諸大菩薩同垂慈愍滿此微願卍云原本有十八卷末卷收犍度略釋今從別行本編次別處
