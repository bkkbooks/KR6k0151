body:
  text: 古吳蕅益沙門智旭彚輯若比丘尼至白衣舍語主人敷座止宿明日不辭主人而去波逸提一百十六有衆尼至無住處村語舍主於舍內宿清旦不辭而去村舍失火居士謂舍內有人便不往救火燒舍盡問尼何處答言已去皆共譏嫌故制出門波逸提一腳在內等突吉羅比丘等突吉羅不犯者若先有人在舍內住若舍先空若先為福舍若親厚者語令但去當為汝語主人若舍崩壞若為火燒若中有毒蛇惡獸若有賊入或強力所執等若比丘尼誦習世俗呪術者波逸提一百十七若口授若執文誦波逸提比丘等突吉羅不犯者誦治腹內蟲病呪治宿食不消呪治毒呪護身故若比丘尼教人誦習呪術者波逸提一百十八若比丘尼知女人妊身度與授具足戒者波逸提一百十九三羯磨竟和尚尼波逸提餘可例知不犯者若不知若信彼人言若信可信人語或信父母語與授具後生兒疑不敢抱捉佛言若未能離母自活聽一切如母法乳哺長養聽未斷乳時共宿若比丘尼知歸女乳兒與授具足戒波逸提一百二十有尼度他乳兒歸女留兒在家後家中送兒還之此尼抱兒入村乞食居士譏嫌故制若比丘尼知年不滿二十與授具足戒波逸提百二十一犯輕重如前不犯者若不知若自言滿等若受戒後疑當數胎中月數閏月數十四日說戒日無犯若比丘尼年十八童女不與二歲學戒年滿二十便與授具足戒者波逸提百二十二若比丘尼年十八童女與二歲學戒不與六法滿二十便與授具足戒波逸提百二十三若式叉摩那犯淫應滅擯若染汙心男子身相觸缺戒應更與戒若偷五錢過五錢斷人命自言得上人法應滅擯若減五錢斷畜生命衆中故妄語非時食飲酒缺戒應更與戒犯輕重同上若比丘尼年十八童女與二歲學戒與六法滿二十衆僧不聽便與受具足戒者波逸提百二十四諸尼度盲瞎癃躃跛聾瘖啞等毀辱衆僧故制若比丘尼度曾嫁歸女年十歲與二歲學戒年滿十二聽與受具足戒若減十二與受具足戒者波逸提百二十五謂嫁後有十歲方可作式叉摩那又二歲方可受比丘尼戒非謂生年僅有十二歲也諸尼度年少婦女受戒已與男子共立語調故制若比丘尼度小年曾嫁婦女與二歲學戒年滿十二不白衆僧便與受具足戒波逸提百二十六若比丘尼知如是人與受具足戒者波逸提百二十七如是人者淫女也應將至五六由延若深藏安處之不爾者波逸提不犯者先不知若比丘尼多度弟子不教二歲學戒不以二法攝取波逸提百二十八二法者一者法二者衣食比丘突吉羅不犯者若受具已離去若破戒等若比丘尼不二歲隨和尚尼者波逸提百二十九五分律云不六年隨和尚波逸提比丘等突吉羅不犯者和尚聽去和尚破戒等若比丘尼僧不聽而授人具足戒者波逸提百三十諸尼癡者度人不知教授故制欲度人者當往僧中求具威儀白大姊僧聽我某甲比丘尼從僧乞度人授具足戒如是三說尼僧當觀察此人堪能教授二歲學戒二事攝取不若不堪當語言妹止勿度人若有智慧堪能者為作白二羯磨若僧不聽授人具足波逸提與依止畜餘二衆突吉羅若比丘尼年未滿十二歲授人具足戒者波逸提百三十一受比丘尼戒滿足十二夏也若比丘尼年滿十二歲衆僧不聽便授人具足戒者波逸提百三十二若比丘尼僧不聽授人具足戒便言衆僧有愛有恚有怖有癡欲聽者便聽不欲聽者便不聽波逸提百三十三若比丘尼父母夫主不聽與受具足戒者波逸提百三十四犯輕重如前比丘突吉羅不犯者若無父母夫主若比丘尼知女人與童男男子相敬愛愁憂瞋恚女人度令出家授具足戒者波逸提百三十五犯輕重如前不犯者先不知若受具已病生若比丘尼語式叉摩那言汝妹捨是學是我當與汝授具足戒若不方便與授具足戒波逸提百三十六偷羅難陀語式叉摩那言汝學是捨是我當授汝具戒報言爾彼式叉摩那聰慧能勸化偷羅難陀欲令久勸化供養故不與方便料理受具式叉摩那嫌責故制比丘突吉羅不犯者若彼病若更無共活者若無五衣無十衆若缺戒破戒等若比丘尼語式叉摩那言持衣來與我我當與汝授具足戒而不方便與授具足戒波逸提百三十七若比丘尼不滿十二歲授人具足戒者波逸提百三十八安隱尼多度弟子不能一一教授故制與百三十一戒似重祥緣起意或是度一弟子待彼滿十二歲方許再度一人例如比丘每年度一人意方不重前也若比丘尼與人授具足戒已經宿方往比丘僧中與授具足戒者波逸提百三十九諸尼授具已經宿方往比丘僧中而受具者或得盲聾跛躃等病故制不犯者即日授具即日往若欲往彼病若水陸道斷惡獸難乃至梵行難等若比丘尼不病不往受教授者波逸提百四十不犯者佛法僧事及瞻視病人囑授無犯若比丘尼半月應往比丘僧中求教授若不求者波逸提百四十一白二羯磨差一尼往求教授應差二三尼共行往大僧中禮僧足已曲躬低頭合掌作是語比丘尼僧和合禮比丘僧足求教授如是三說彼待僧說戒竟久立疲極佛言聽囑一大比丘便去不應囑客比丘遠行者病者無智慧者囑已明日應往問可不比丘應期往尼應期來不往不迎皆突吉羅若聞教授師來當半由旬迎供給所須不者突吉羅若比丘僧盡病應遣信往禮拜問訊若別衆若衆不和合若衆不滿當遣信往禮拜問訊若尼衆盡病乃至衆不滿亦當遣信往禮拜問訊若不往者突吉羅不犯者水陸道斷及衆難等若比丘尼僧夏安居竟應往比丘僧中說三事自恣見聞疑若不者波逸提百四十二往法同上比丘僧十四日自恣尼僧十五日自恣若比丘尼在無比丘處夏安居者波逸提百四十三教授日無受教授處有所疑無可咨問故制餘三衆突吉羅不犯者依比丘僧安居其間命過遠行乃至被難等若比丘尼知有比丘僧伽藍不白而入者波逸提百四十四有一多知識尼命過餘尼於比丘寺中為起塔諸尼數來住立言笑或唄或悲亂諸坐禪比丘長老迦毗羅壞其塔除棄之彼尼皆執刀杖瓦石來欲打擲迦毗羅飛在虛空諸尼訶責乃至白佛結戒入門波逸提一腳在門內等突吉羅不犯者先不知若無比丘若禮佛塔聲聞塔若被請道由中過在中止宿乃至命難等若比丘尼罵比丘者波逸提百四十五了了者波逸提不了了突吉羅下戒同若比丘尼喜鬬諍不善憶持諍事後瞋恚不喜罵比丘尼衆者波逸提百四十六若比丘尼身生癰及種種瘡不白衆及餘人輒使男子破若裹者波逸提百四十七不犯者強力所捉五分律云若欲使男子治病應打犍椎集尼僧來在病人前然後衣裹身體惟留可應治處若比丘尼先受請若足食已後食飯乾飯魚及肉者波逸提百四十八謂先受人正足食請者不得食此五種而後往應彼足食之請也一居士辦飲食請尼僧時節會日諸居士各持飯等來就寺中與諸尼諸尼食已方詣居士家不復能多食居士譏嫌故制一咽一波逸提比丘波逸提不犯者受非正食請若不足食請若先不被請若即於食上更得食若於其家受前食後食十誦律云聽尼數數食若受請都不食者波逸提若比丘尼於家生嫉妬心波逸提百四十九提舍尼是安隱尼弟子同往知舊檀越家安隱衣服齊整不失威儀檀越生歡喜心便與供養安隱還寺語提舍言此檀越篤信好施時提舍有嫉妬心作是語檀越篤信好施供養於汝諸尼嫌責故制了了波逸提不了了突吉羅比丘等突吉羅若比丘尼以香塗摩身者波逸提百五十比丘等突吉羅不犯者或有如是病或強力所執若比丘尼以胡麻滓塗摩身者波逸提百五十一若比丘尼使比丘尼塗摩身波逸提百五十二若比丘尼使式叉摩那塗摩身者波逸提百五十三若比丘尼使沙彌尼塗摩身波逸提百五十四若比丘尼使白衣婦女塗摩身者波逸提百五十五若比丘尼著貯跨衣者波逸提百五十六令身粗大居士譏嫌故制若用毳若劫貝若蠶綿等盡波逸提不犯者有如是病內著病衣外著涅槃僧次著袈裟或為強力者所執若比丘尼畜歸女莊嚴身具除時因緣波逸提百五十七有命難梵行難許著莊嚴身具走故除時因緣比丘等突吉羅若比丘尼著革屣持蓋行除時因緣波逸提百五十八天雨時在寺內聽作樹皮蓋葉蓋竹蓋著革屣著革屣持蓋行一一村波逸提無村處十里一波逸提減一村界減十里突吉羅比丘等突吉羅不犯者強力所執乃至命難等若比丘尼無病乘乘行除時因緣波逸提百五十九老者病者聽乘步挽乘一切女乘命難梵行難等聽乘乘去謂象乘馬乘車乘步乘犯輕重同上若比丘尼不著僧祇支入村者波逸提百六十露胸掖乳腰帶居士譏嫌故制入村門波逸提一腳在外等突吉羅比丘等突吉羅不犯者或掖下有瘡或強力所執命難梵行難若比丘尼向暮至白衣家先不被喚波逸提百六十一不被喚入門波逸提一腳在外等突吉羅若至白衣家不語主人去出門波逸提方便欲去等突吉羅比丘等突吉羅不犯者強力所執等不喚而入彼舍火燒崩壞有毒蛇等或強力所執不語而出若比丘尼向暮開僧伽藍門不囑授餘比丘尼而出者波逸提百六十二三寶事看病事聽囑授出不囑出門波逸提一腳在內等突吉羅比丘等突吉羅不犯者破壞燒等若比丘尼日沒開僧伽藍門不囑而出者波逸提百六十三前戒因賊入劫物而制此戒因獄因逃入而制究竟原無二法分作二戒結集者失檢點也若比丘尼不前安居不後安居者波逸提百六十四為三寶或看病事不及前安居聽後安居若不前安居突吉羅不後安居波逸提僧祇律中比丘亦爾餘三衆突吉羅若比丘尼知女人常漏大小便涕唾常出者授具足戒波逸提百六十五不犯者先不知若信可信人語若受具後如是病若比丘尼知二形人與受具足戒者波逸提百六十六二形者男形女形若比丘尼知二道合者與受具足戒波逸提百六十七二道合者大小便道不別若比丘尼知有負債難者病難者與受具足戒波逸提百六十八債主來牽捉病者常須人守視不得遠離故制負債者乃至一錢十六分之一病者乃至常頭痛若比丘尼學世俗伎術以自活命波逸提百六十九若比丘尼以世俗呪術教授白衣波逸提百七十六羣尼以世俗伎術教白衣語言汝等莫向日月神祀廟舍大小便除糞掃蕩器不淨水及舒腳若欲起房耕田種作當向日月神祀又言今日某星宿好宜種作宜作舍宜使作人宜與小兒剃髮宜長髮宜舉取財物宜遠行少欲者嫌責乃至白佛結戒若欲說者當語言莫向佛塔聲聞塔大小便乃至舒腳欲起房耕田種作者當向佛塔聲聞塔八日十四日十五日現變化日宜入塔寺供養僧受齊法比丘等突吉羅若比丘尼被擯不去者波逸提百七十一比丘等突吉羅不犯者若隨順不逆下意悔過求解擯羯磨或得病或無伴去或水陸道斷諸難等若比丘尼欲問比丘義先不求而問者波逸提百七十二安隱尼大智慧問諸比丘義比丘不能答皆慚愧故制欲問義先求聽不聽而問波逸提比丘等突吉羅不犯者若先常聽問若先親厚若親厚者語令但問當為汝求若彼從此受若二人俱從他受若彼問此答二人共誦乃至錯說等若比丘尼知先住後至後至先住欲惱彼故在前經行若立若坐若臥波逸提百七十三意與前第九十二戒同比丘等突吉羅不犯者若不知若問若先聽經行若更互經行若是親厚若親厚者語令但經行我當為汝語若病倒地若強力所執乃至命難等若比丘尼知有比丘僧伽藍中起塔波逸提百七十四隨所取洗足石若泥團若草團一一波逸提不犯者先不知若故壞僧伽藍若先起塔後作僧伽藍若比丘尼見