body:
  text: 古吳蕅益沙門智旭彚輯比丘尼戒尼布薩法與比丘同共戒亦如前説惟不共戒隨文輯録意在簡要不復詳釋八波羅夷法一淫戒二盜戒三殺戒四大妄語戒並同比丘五男身相觸戒若比丘尼染汙心共染汙心男子從腋已下膝已上身相觸若捉若摩若牽若推若上摩若下摩若舉若下若捉若捺是比丘尼波羅夷不共住是身相觸也鹿樂長者與偷羅難陀比丘尼互相繫意長者異時請諸尼食偷羅難陀知其為己故請僧即住寺不往長者遍觀尼衆問偷羅難陀何處而不來耶答言在寺不來長者疾行食已即往寺中偷羅難陀遙見長者來即臥牀上長者問何所患苦答言無患苦我所欲者而彼不欲彼言我欲非不欲即前抱臥以手摩口嗚守房小沙彌尼見之向諸尼説諸尼嫌責白比丘轉白世尊集僧訶責結戒男子男子想手摩身身相觸受觸樂波羅夷男子疑偷蘭遮乃至捉捺亦如是以身觸男衣瓔珞具男以衣瓔珞具觸尼身欲心染著偷蘭遮以身衣瓔珞具觸身衣瓔珞具欲心染著突吉羅欲心染著身相觸不受觸樂偷蘭遮乃至捉捺亦如是若天男阿修羅男乃至畜生男能變形者身相觸偷蘭遮不變形者突吉羅女人身相觸突吉羅二形身相觸偷蘭遮欲心觸衣鉢等乃至自觸身一切突吉羅不犯者若取與時誤觸若有所救解時觸一切無欲心及最初未制戒癡狂心亂痛惱所纏六犯八事戒若比丘尼染汙心知男子染汙心受捉手捉衣入屏處共立共語共行或身相倚或共期是比丘尼波羅夷不共住犯此八事故亦起自前人故制捉手乃至身相倚一一偷蘭遮犯第八事波羅夷天子龍子乃至畜生能變形者犯七事一一突吉羅犯第八事偷蘭遮畜生不能變形及染汙心女人犯第八事突吉羅不犯者若有所取與時手相觸或有所救解捉衣若有所施與若禮拜若悔過若受法入屏處共立共語共行若為人打若有賊來象來惡獸來刺來回身避誤相倚若來求教授若聽法若受請若來至寺內若共期不可作惡事處七覆他重罪戒若比丘尼知比丘尼犯波羅夷不自發露不語衆人不白大衆若於異時彼比丘尼或命終或衆中舉或休道或入外道衆後作是言我先知有如是如是罪是比丘尼波羅夷不共住覆藏重罪故偷羅難陀妹字坻舍難陀犯波羅夷姊懼彼得惡名稱默然不説異時坻舍休道諸尼語言見汝妹捨道不答言我先知彼有如是如是事諸尼責言汝何覆他重罪白諸比丘轉白世尊結戒食前知食後説乃至中夜知後夜説偷蘭遮後夜知不説至明相出波羅夷除八波羅夷覆餘罪隨所犯自覆重罪偷蘭遮覆餘人罪突吉羅不犯者若不知若無人可向説若説時有命難梵行難十誦律云若僧與是尼作不見等擯若狂心亂心病壞心爾時不説他罪無犯若僧與是尼解擯若苦痛止還得本心爾時覆他罪至地了時謂明相出波羅夷八隨舉三諫不捨戒若比丘尼知比丘僧為作舉如法如律如佛所教不順從不懺悔僧未與作共住而順從諸比丘尼語言大姊此比丘為僧所舉如法如律如佛所教不順從不懺悔僧未與作共住汝莫順從如是比丘尼諫彼比丘尼時是事堅持不捨彼比丘尼應乃至第二第三諫令捨此事故若乃至三諫捨者善若不捨者是比丘尼波羅夷不共住犯隨舉尊者闡提為僧所舉尉次比丘尼往返承事諸尼諫之答言此是我兄今不供養更待何時猶故隨順不止諸尼嫌責語諸比丘白佛佛令尼僧作訶諫白四羯磨而結此戒隨順有二種一法二衣食三羯磨竟波羅夷二羯磨竟捨者三偷蘭遮一羯磨竟捨者二偷蘭遮白竟捨者一偷蘭遮教言莫捨者偷蘭遮若不訶諫突吉羅不犯者非法別衆羯磨等十誦律云諸尼應語是擯比丘汝應折伏下意向大僧若不折伏下意尼僧當作不禮拜不共語不供養羯磨若尼僧未作不禮拜羯磨時教法受法與物受物一一突吉羅若已作羯磨後一一偷蘭遮諸尼先應軟語約敕若捨者教作多突吉羅多偷蘭遮悔過若不捨與白四羯磨十七僧伽婆尸沙法僧祇律十九根本律二十一媒嫁二無根謗三取片謗並同比丘若比丘尼詣官言居士若居士兒若奴若客作人若晝若夜若一念頃若彈指頃若須臾頃是比丘尼犯初法應捨僧伽婆尸沙四初法者初作便犯也應捨者應捨而不犯也舍衛國有居士作一精舍施尼異時諸尼捨精舍去居士命終居士兒即耕此精舍地諸尼語言此是僧地莫耕居士兒答言實爾我父在時作此精舍與尼僧尼僧捨去我父命終我今自由何為空此地彼此無用耶諸尼即往斷事官所言之官喚居士兒依法決斷罰故財貨盡入官佛聞制戒時波斯匿王小婦作一精舍施尼尼受住已後遊人間王小婦輒轉與女梵志尼還精舍語女梵志令去答言此實是汝精舍施主為汝作汝出遊行持與我我今不能去尼瞋牽曳令出彼即詣斷事官言官喚尼尼不敢往佛言有喚應往尼即往官所答言此一切地皆屬王家事屬居士房舍屬施主牀座臥具亦爾修治房舍令僧住止得福多何以故由其施我得安住故斷事官即以精舍與女梵志佛告比丘此尼不善説官亦不善斷何以故前施是法稱本心故後施非法違本心故相言者詣官共諍曲直奴者或買得或家生客作者財雇使作也女梵志者在此法外出家者是若斷事官下手疏事僧殘口説不著名字偷蘭遮比丘等突吉羅不犯者若被喚若欲有所啓若為強力所持去若被繫將去若命難梵行難雖口説不告官五分律云若尼為人輕陵應語其父母若無父母應語其親族若無親族應語比丘乃至優婆夷若比丘及尼有勢力不援護突吉羅語時應云彼輕陵我為我訶諫不應言之若比丘尼先知是賊女罪應死人所知不問王大臣不問種姓便度出家受戒是比丘尼犯初法應捨僧伽婆尸沙五有賊女偷離奢婦財物逃走諸離奢遣人覓殺賊女即詣王舍城至尼園中出家離奢告瓶沙王覓之聞已出家遣信語離奢離奢譏嫌故制時諸尼或不知賊非賊應死不應死佛言不知無犯賊者若盜五錢若過五錢三羯磨竟和尚尼僧殘不犯者若不知或白王大臣種姓聽出家若繫中放令出家若救使得脫十誦律云和尚尼知者僧殘阿闍梨尼知者偷蘭遮僧知者突吉羅若比丘尼知比丘尼為僧所舉如法如律如佛所教不順從未懺悔僧未與作共住羯磨為愛故不問僧僧不約敕出界外作羯磨與解罪是比丘尼犯初法應捨僧伽婆尸沙六尉次為僧所舉偷羅難陀不白尼僧僧不約敕輒自出界外與作解罪羯磨故制三羯磨竟僧殘二羯磨竟三偷蘭遮一羯磨竟二偷蘭遮白竟一偷蘭遮方便集僧突吉羅比丘突吉羅不犯者白僧僧約敕若能下意悔罪僧以恚故不與解罪彼與解無犯若先與作羯磨僧移去或死或遠行休道等彼與解不犯若比丘尼獨渡水獨入村獨宿獨在後行犯初法應捨僧伽婆尸沙七他部或有分作四戒者有尼獨高褰衣渡水賊見繫意便捉觸嬈居士嫌為猶如淫女又差摩多諸弟子去僧伽藍不遠有親里村有少緣事獨入村村中獨宿居士謂其欲得男子又六羣尼與衆尼行常在後獨行下道諸尼問之答言我等欲得男子諸尼嫌責白比丘轉白世尊結戒當求一尼共渡應漸褰衣入水待伴前尼疾入水令伴不及僧殘若入水時隨水深淺褰衣待伴若疾入水不待後伴偷蘭遮若至彼岸漸漸下衣待伴若不漸漸下衣上岸不待後伴偷蘭遮若獨行詣村隨所至村僧殘若獨詣空曠處一鼓聲聞僧殘未至村減一鼓聲聞偷蘭遮獨行村中一界突吉羅方便欲行而不去突吉羅若共在村中宿臥時使舒手相及若不相及僧殘共在道行離見聞處僧殘離見處不離聞處離聞處不離見處偷蘭遮不犯者或神足渡乘船渡橋上渡躡梁渡石渡若伴尼命終休道等若命難梵行難惡獸難或強力者將去或為水所漂入村亦爾二尼舒手相及處宿若一尼出大小便或受經誦經或為病尼煮羮粥作飯及命終等共行亦爾若比丘尼染汙心知染汙心男子從彼受可食者及食并餘物是比丘尼犯初法應捨僧伽婆尸沙八時世穀貴乞食難得提捨難陀到一販賣家乞食販賣人繫心在彼便與滿鉢羮飯提舍後數詣其家乞得食復於一時彼人遙見尼來便自計念如我前後與食價可五百金錢足直一女人即前捉尼欲行淫尼喚言莫爾莫爾比近問知其故且問尼知彼與食意不答言知彼言汝若知者何故大喚時諸尼嫌責白比丘轉白世尊結戒可食者根莖葉華果油胡麻黑石蜜細末食也食者飯乾飯等餘物者金銀珍寶等染汙心知染汙心男子從受者僧殘天子阿修羅子乃至畜生能變形者偷蘭遮不變形者突吉羅比丘突吉羅餘三衆突吉羅不犯者不知彼有染汙心根本律云尼有染心男子無染者得吐羅罪尼無染心男子有染心得惡作罪有比丘尼教比丘尼作如是語大姊彼若染汙心無染汙心能那汝何汝自無染汙心於彼若得食以時清淨受取此比丘尼犯初法應捨僧伽婆尸沙九提捨入城乞食空鉢而還六羣尼及提舍母語彼作如是語故制餘四衆突吉羅不犯者戲説等十不捨壞僧法十一不捨黨破僧十二被擯不服十三不捨惡性此四戒亦同比丘若比丘尼相親近住共作惡行惡聲流布展轉共相覆罪是比丘尼當諫彼比丘尼言大姊汝等莫相親近共作惡行惡聲流布共相覆罪汝等若不相親近於佛法中得增益安樂住是比丘尼諫彼比丘尼時堅持不捨是比丘尼應三諫捨此事故乃至三諫捨者善不捨者是比丘尼犯三法應捨僧伽婆尸沙十四三法者三諫不捨方獲僧殘罪也應捨者亦應捨而不犯也有二比丘尼常相親近住乃至共相覆罪諸尼諫而不改佛令尼僧作訶諫羯磨而結此戒親近者數共戲笑數相調數共語惡行者自種華樹教人種溉灌採貫乃至若人若童子共牀坐同器食歌舞鼓吹等惡聲者惡言流遍四方無不聞者罪者除八棄法覆餘罪者是三羯磨竟僧殘餘如上十誦律云若作不善因緣偷蘭遮有惡名聲惱尼僧互相覆罪皆偷蘭遮先應軟語約敕如前若比丘尼比丘尼僧為作訶責時餘比丘尼教作如是言汝等莫別住當共住我亦見餘比丘尼不別住共住作惡行惡聲流布共相覆罪僧以恚故教汝別住是比丘尼應諫彼比丘尼言大姊汝莫教餘比丘尼言汝等莫別住我亦見餘比丘尼共住作惡行惡聲流布共相覆罪僧以恚故教汝別住今正有此二比丘尼共住作惡行惡聲流布共相覆罪更無有餘若此比丘尼別住於佛法有增益安樂住是比丘尼諫彼比丘尼時堅持不捨是比丘尼應三諫令捨此事故乃至三諫捨者善不捨者是比丘尼犯三法應捨僧伽婆尸沙十五六羣尼教彼二尼作是言故制犯輕重同前十誦律云若言汝等莫別離行當同心行別離行者不得增長同心行者便得增長皆偷蘭遮僧瞋故教汝別離行波逸提先應軟語約敕如前説若比丘尼輒以一小事瞋恚不喜便作是語我捨佛捨法捨僧不獨有此沙門釋子亦更有餘沙門婆羅門修梵行者我等亦可於彼修梵行是比丘尼當諫彼比丘尼言大姊汝莫輒以一小事瞋恚不喜便作是語我捨佛捨法捨僧不獨有此沙門釋子亦更有餘沙門婆羅門修梵行者我等亦可於彼修梵行若是比丘尼諫彼比丘尼時堅持不捨彼比丘尼應三諫捨此事故乃至三諫捨者善不捨者是比丘尼犯三法應捨僧伽婆尸沙十六起自六羣尼故制犯輕重同前十誦律云若言我捨佛捨法捨僧捨戒皆偷蘭遮若言非但沙門釋子知道等訶僧故波逸提先應軟語約敕若比丘尼喜鬬諍不善憶持諍事後瞋恚作是語僧有愛有恚有怖有癡是比丘尼應諫彼比丘尼言妹汝莫喜鬪諍不善憶持諍事後瞋恚作是語僧有愛有恚有怖有癡而僧不愛不恚不怖不癡汝自有愛有恚有怖有癡是比丘尼諫彼比丘尼時堅持不捨彼比丘尼應三諫捨此事故乃至三諫捨者善不捨者是比丘尼犯三法應捨僧伽婆尸沙十七起自黑比丘尼故制犯輕重同前三十尼薩耆波逸提法根本律三十三一畜長衣僧祇律云尼聽畜二十衣五衣受持十五衣淨施已受用若過是畜捨墮比丘無限齊淨施受用無犯二離五衣宿三過一月衣四從非親乞衣五過受衣六求益衣價七求合買衣八索衣過六反九受金銀十賣買寶物十一販賣十二畜鉢求好十三非親織衣十四求織好衣十五與衣瞋奪十六過七日藥十七過時畜急施衣十八回僧物入己並同比丘若比丘尼欲索是更索彼者尼薩耆波逸提十九偷羅難陀詣檀越家須酥彼買酥與之言不須酥須油檀越譏嫌故制求餘物亦如是應捨與尼僧若多人若一人不得別衆捨若捨不成捨突吉羅捨已應懺悔受懺人白已然後受懺語彼言自責汝心答言爾尼僧即應還彼捨物白二羯磨不還者突吉羅教言莫還突吉羅餘四衆突吉羅不犯者須酥索酥須油索油須餘物便索餘物若比丘尼知檀越所為僧施異回作餘用者尼薩耆波逸提二十尼僧露地説戒居士與作説戒堂物尼作是念我曹趣得處便坐説戒衣服難得應具五衣即持物貿衣共分仍在露地説戒居士譏嫌故制與作衣用作房與此處乃彼處用同犯餘四衆突吉羅不犯者問主用隨所處分用與物時語言隨意用若此丘尼所為施物異自求為僧回作餘用者尼薩耆波逸提二十一舍衛國舊住尼聞安隱尼欲來為家家乞求大得財物衣食至期彼尼不到即取此物貿易共分異時安隱來入城乞食居士問知僧中無食至舊住所問知其故共相譏嫌故制求作衣用作食求為餘處更為餘用同犯餘四衆突吉羅不犯者語居士隨意用若居士與物已語言隨意用下並同若比丘尼檀越所施物異回作餘用者尼薩耆波逸提二十二有居士問安隱尼住止樂不答言憒閙不樂又問無別房舍耶答言無彼即以舍直與之尼念作舍多事衣服難得以舍直貿衣居士譏嫌故制若比丘尼檀越所為施物異自求為僧回作餘用尼薩耆波逸提二十三衆尼為作房處處索得財物貿衣共分故制若比丘尼畜長鉢尼薩耆波逸提二十四起自六羣尼故制即日得鉢即日應受持一鉢餘當淨施根本律云得經一宿僧祇律云尼得畜十六枚鉢一受持三作淨施四過鉢四減鉢四隨鉢若過畜者捨墮若比丘尼多畜好色器者尼薩耆波逸提二十五亦起自六羣尼故制即日得器應受可須用者十六枚餘當淨施十六者大釜釜蓋大盆及杓小釜釜蓋小盆杓水瓶瓶蓋盆杓洗瓶瓶蓋盆杓若比丘尼許比丘尼病衣後不與者尼薩耆波逸提二十六旃檀輸那常自謂無欲想語餘一尼言汝若月水出從我取此衣異時輸那月期水出餘尼亦出遣使來索衣不得相與彼尼嫌責故制病衣者月水出時遮內身著涅槃僧除病衣許餘衣及所須物不與突吉羅不犯者若無病衣若作病衣若彼尼破戒乃至命難等若比丘尼以非時衣受作時衣者尼薩耆波逸提二十七起自六羣尼故制時者安居竟無迦絺那衣一月有迦絺那衣五月非時者除此於餘時得長衣是不犯者非時衣受作非時衣時衣受作時衣十誦律云時衣作非時衣分非時衣作時衣分皆捨墮時衣安居僧應分非時衣現前僧應分若比丘尼與比丘尼貿易衣後瞋恚還自奪取若使人奪妹還我衣來我不與汝汝衣屬汝我衣還我者尼薩耆波逸提二十八起自偷羅難陀故制貿易者以衣貿衣或以衣貿非衣或以非衣貿衣或以非衣貿非衣針刀縷碎段物乃至一丸藥奪藏捨墮不藏突吉羅取離處捨墮不離處突吉羅餘四衆突吉羅不犯者和喻語妹我悔還我衣彼知有悔意還衣若餘尼語彼令還或彼借著無道理故還取若豫知當失若恐壞若彼人破戒等乃至命難等奪而不藏若比丘尼乞重衣齊價直四張氎過者尼薩耆波逸提二十九重衣者障寒衣也求重衣極至十六條不犯者索齊四張氎若減若不索而自得若比丘尼欲乞輕衣極至價直兩張半氎過者尼薩耆波逸提三十輕衣者障熱衣乞輕衣極至十條不犯同上一百七十八波逸提法僧祇律一百四十一五分律二百十根本律一百八十一妄語二毀呰三兩舌四與男子同室宿五同未受戒女過三宿六與未受戒人共誦七向外人説他粗罪八向外人説證法九與男子過説法十掘地十一壞鬼神村十二異語惱他十三嫌罵十四敷僧臥具不舉十五僧房不舉臥具十六強奪止宿十七牽他出房十八重閣坐脫腳牀十九蟲水澆泥草二十覆房過三節二十一過受一食施二十二別衆食二十三過三鉢受請二十四非時食二十五殘宿食二十六自取食二十七詣餘家不囑授二十八食家強坐二十九食家屏坐三十獨與男子坐三十一故使他不得食三十二過受藥三十三觀軍陳三十四軍中過三宿三十五觀軍事三十六飲酒三十七水中戲三十八相擊攊三十九不受諫四十恐怖他四十一過洗浴四十二露地然火四十三戲藏他物四十四輒著淨施衣四十五衣不壞色四十六殺生命四十七飲用蟲水四十八故惱他四十九覆他粗罪除八重同犯重五十發起諍事五十一同賊伴行五十二惡見不捨五十三黨惡見人五十四畜被擯沙彌尼五十五拒諫難問五十六輕訶説戒五十七無知五十八違反羯磨五十九不與欲六十與欲後悔六十一屏聽諍後語六十二瞋打比丘尼六十三瞋摶比丘尼六十四無根僧殘瞋謗六十五輒入宮閾六十六捉寶物六十七非時入聚落六十八作高牀六十九兜羅綿貯褥並同比丘若比丘尼噉蒜者波逸提七十偷羅難陀取園都盡園主譏嫌故制餘四衆突吉羅不犯者病非服蒜不差聽服若塗瘡若比丘尼剃三處毛者波逸提七十一如淫女賊女故三處毛者大小便處及腋下一動刀一波逸提若拔若剪若燒皆突吉羅比丘偷蘭遮餘三衆突吉羅不犯者有瘡須剃去著藥若比丘尼以水作淨應齊兩指各一節若過者波逸提七十二餘二女衆突吉羅不犯者或內有草有蟲挽出若比丘尼以胡膠作男根波逸提七十三以諸物作盡波逸提不磨治突吉羅餘二女衆突吉羅不犯者或病須著藥或衣塞月水若比丘尼共相拍波逸提七十四若以手掌若腳拍拍者突吉羅受拍者波逸提若二女根相拍二俱波逸提餘二女衆突吉羅若比丘尼比丘不病食時供給水在前立以扇扇者波逸提七十五有一長者與婦俱出家食時本婦持水在前立并以扇扇比丘語言小避我羞人尼言我在前立便言可羞本作如是如是事何不羞乃以扇柄打水澆頭捨入房故制時諸尼不敢瞻病比丘無人與水不敢問佛言聽諸尼看病比丘若無水聽問若比丘尼乞生穀者波逸提七十六乞生穀胡麻米豆大小麥一切波逸提餘四衆突吉羅不犯者從親里乞從出家人乞不乞自得若比丘尼在生草上大小便波逸提七十七去尼精舍不遠有好草生諸居士數來坐臥調戲亂諸坐禪尼諸尼患之以糞掃置上諸居士還來戲時汙身及衣皆共譏嫌故制餘四衆突吉羅不犯者在無生草處大小便流墮草上等若比丘尼夜後大小便器中旦不看牆外棄者波逸提七十八六羣尼夜便器中旦不看牆外棄之有大臣清旦乘車欲見瓶沙王路由精舍邊過大小便墮其頭上大臣欲向斷事官説有篤信知相婆羅門諫止之即詣尼精舍語令後莫復爾乃至比丘白佛結戒若夜不謦咳彈指棄者突吉羅餘四衆突吉羅不犯者若彼先有瓦石諸不淨等若比丘尼往觀聽伎樂者波逸提七十九往而見波逸提不見突吉羅欲去中還等皆突吉羅餘四衆突吉羅不犯者或有所啓白若被喚道由邊過或彼止宿處或為強力將去或命難等若比丘尼入村內與男子在屏處共立語波逸提八十若同伴盲不聾聾不盲突吉羅立而不語突吉羅不犯者二尼為伴有可知人為伴有多女人共立或不盲不聾或行不住或病倒地乃至命難等若比丘尼與男子共入屏障處者波逸提八十一若比丘尼入村內巷中遣伴遠去在屏處與男子共立耳語者波逸提八十二遣伴離見處不離聞處離聞處不離見處突吉羅若比丘尼入白衣家內坐不語主人捨去波逸提八十三有尼詣居士家居士婦敷獨坐牀令坐捨入屋內此尼不語主便去有一摩納來入其家四顧不見人即持牀去故制一腳在門外等盡突吉羅餘四衆突吉羅不犯者座上更有人坐若囑比坐人比坐語令去或坐石上木上塹上草敷上埵上若屋欲崩或火燒若有毒蛇惡獸盜賊乃至命難等若比丘尼入白衣家內不語主人輒坐牀者波逸提八十四羅閲城有一不信樂大臣有獨坐牀無人敢坐者偷羅難陀不語便坐月水汙他牀蓐大臣嫌恚故制餘四衆突吉羅不犯者或有常處坐若是親厚若有親厚人語令坐若坐石上木上等若比丘尼入白衣家內不語主人輒自敷座宿者波逸提八十五餘四衆突吉羅不犯者若空舍作福舍或知識等若比丘尼與男子共入暗室中者波逸提八十六餘四衆突吉羅不犯者有燈火向牖乃至命難等若比丘尼不審諦受語便向人説波逸提八十七讖摩比丘尼語弟子令取衣鉢坐具針筒弟子受不審諦語諸尼言師教我偷衣鉢等諸尼問知嫌責乃至白佛制戒餘四衆突吉羅不犯者其事實爾或戲笑語乃至錯説等若比丘尼有小因緣事便呪咀墮三惡道不生佛法中若我有如是事墮三惡道不生佛法中若汝有如是事亦墮三惡道不生佛法中波逸提八十八佛言自今已去聽稱南無佛若我有如是事南無佛若汝有如是事亦南無佛若呪咀語波逸提餘四衆突吉羅若比丘尼共鬬諍不善憶持諍事椎胸啼哭者波逸提八十九一椎胸一波逸提一滴淚墮一波逸提餘四衆突吉羅不犯者或食噎自椎打或因大小便或因風寒熱或煙薰或聞法心生厭離或眼痛著藥淚出若比丘尼無病二人共牀臥波逸提九十不犯者有病或被縛等若比丘尼共一褥共一被臥除餘時波逸提九十一同褥別被同被別褥突吉羅餘四衆突吉羅不犯者若寒時止有一被聽各內著襯身衣若比丘尼知先住後至知後至先住為惱故在前誦經問義教授者波逸提九十二不犯者若不知若先聽若是親厚若親厚人語令但教授若先住者從後至者受經若後至者從先住受誦若二人共從他受若彼問此答若共誦等若比丘尼同活比丘尼病不瞻視者波逸提九十三除同法病若二師乃至親厚知識不瞻視盡突吉羅餘四衆突吉羅不犯者若己身病若命難等若比丘尼安居初聽餘比丘尼在房中安牀後瞋恚驅出者波逸提九十四隨多人多戶一一波逸提出餘衣物若閉戶使不得入突吉羅餘四衆突吉羅不犯者不以瞋恚隨上座次令下座出未受戒人共二宿第三宿令出若彼破戒乃至應滅擯若以此事命難梵行難若比丘尼春夏冬一切時人間遊行除餘因緣者波逸提九十五若為三寶事病尼事聽受七日法出界去若比丘尼夏安居訖不去者波逸提九十六安居竟應出行乃至一宿不出行波逸提不犯者彼居士更請住若家家傳食若親里男女請若遇病無伴瞻視或水難乃至被縛命難等五分律云若不齊限請若非受請處安居不去不犯若比丘尼邊界有疑恐怖處人間遊行者波逸提九十七邊界者遠城處入村行一一界波逸提阿蘭若處行十里一波逸提減一村減十里突吉羅不犯者被喚若有所白若被執等若先至後有恐怖事起五分律云若飛行不犯若比丘尼於界內有疑恐怖處在人間遊行波逸提九十八界內者繞城四面犯不犯同上若比丘尼親近居士居士兒共住作不隨順行餘比丘尼諫此比丘尼言妹汝莫親近居士居士兒共住作不隨順行大姊汝可別住若別住於佛法中有增益安樂住彼比丘尼諫此比丘尼時堅持不捨彼比丘尼應三諫捨此事故乃至三諫捨此事善若不捨者波逸提九十九親近者數數語笑調戲三羯磨竟波逸提二羯磨竟捨三突吉羅一羯磨竟捨二突吉羅白已捨一突吉羅未白前作不隨順行一切突吉羅餘四衆突吉羅不犯者初語時捨非法別衆訶責等若比丘尼往觀王宮文飾畫堂園林浴池者波逸提一百去而見波逸提不見突吉羅方便欲去等盡突吉羅餘四衆突吉羅不犯者有所白若喚請若道由中過若寄宿若被執等若為僧事塔事看取模法若比丘尼露身形在河水泉水渠水池水中浴波逸提一百一餘四衆突吉羅不犯者為強力所執若比丘尼作浴衣應量作應量作者長佛六搩手廣二搩手半若過者波逸提一百二浴衣者障身浴也長中過量廣中足長中足廣中過量若二俱過量自作語他作成盡波逸提不成盡突吉羅為他作成不成皆突吉羅比丘波逸提餘三衆突吉羅不犯者如量作減量作若得已成者裁令如法若重疊若比丘尼縫僧伽梨過五日除求索僧伽梨出迦絺那衣六難事起者波逸提一百三八難中除非人惡獸二難故云六難尼衆不住阿蘭若故偷羅難陀為一尼裁衣欲使彼尼久作供養故不即為縫時精舍失火衣財被燒故制比丘等突吉羅不犯者無刀針線若少不足若命難等若比丘尼過五日不看僧伽梨波逸提一百四有尼置僧伽梨在房不看曬治蟲爛色壞故制餘衣及所須物不五日五日看突吉羅比丘等突吉羅不犯者舉處堅牢若受寄人為看若看恐失若比丘尼與衆僧衣作留難者波逸提一百五偷羅難陀有親舊知識欲為僧設食施衣往語之言僧大威德多檀越施汝供給處多今但施食不須施衣親舊聽之明日觀尼僧威儀庠序發聲悔不施衣諸尼問知乃至白佛制戒餘物作留難突吉羅與餘人作留難突吉羅比丘等突吉羅若比丘尼不問主便著他衣者波逸提一百六比丘等突吉羅不犯者親厚語言汝但著去若比丘尼持沙門衣施與外道白衣者波逸提一百七白衣者在家人外道者在佛法外出家人沙門衣者染色衣彼受波逸提彼不受突吉羅方便欲與等突吉羅比丘等突吉羅不犯者與父母與塔作人講堂屋舍作人計食直與或為強力所奪五分律云若貿尼衣若負債用償皆不犯僧祇律云尼有戒德人索破袈裟片禳災應使淨人與若比丘尼作如是意衆僧如法分衣遮令不分恐弟子不得者波逸提一百八比丘等突吉羅不犯者或非時非法別衆等故遮若比丘尼作如是意令衆僧今不得出迦絺那衣後當出欲令五事久得放捨波逸提一百九比丘突吉羅不犯者非時出非法別衆等若比丘尼作如是意遮比丘尼僧不出迦絺那衣欲令久得五事放捨波逸提一百十説而了了波逸提不了了突吉羅若比丘尼餘比丘尼語言為我滅此諍事而不與作方便令滅者波逸提一百十一餘小諍不方便滅突吉羅若身諍事不方便滅若餘人諍不方便滅皆突吉羅比丘等突吉羅不犯者若病若言不行若彼破戒等若由此有命難等若比丘尼自手持食與白衣及外道食者波逸提一百十二犯不犯同前與衣戒又不犯者或置地與使人與若比丘尼為白衣作使者波逸提一百十三六羣尼營理家事舂磨炊飯炒麥煮食或敷牀座臥具或掃地取水或受人使令居士嗤笑不復恭敬故制比丘隨所犯餘三衆突吉羅不犯者若父母病或被繫閉為敷牀臥具掃地取水供給所須受使若信心優婆塞病等亦爾若強力者所執若比丘尼自手紡縷者波逸提一百十四一引一波逸提比丘等突吉羅不犯者若自索線合接線或強力所執若比丘尼入白衣舍內在小牀大牀上若坐若臥波逸提一百十五偷羅難陀詣一居士家居士婦脫瓔珞衣服入後園浴彼輒著他瓔珞衣服在居士牀上臥居士還家卒見謂是己婦即就臥捫摸嗚口覺其頭禿問知嫌責故制脅著牀波逸提比丘等突吉羅不犯者若坐獨坐牀若為尼僧敷衆多座若病倒地若強力所執等
