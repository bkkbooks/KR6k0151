body:
  text: 古吳蕅益沙門智旭彚釋二問答啟白僧集不答云僧已集和合不答云和合未受具戒者出若有即遣出答云未受具戒者已出若無即云此中無未受具戒者不來諸比丘說欲及清淨若有人說欲即云某甲等說欲及清淨若無人傳欲即云此眾無說欲及清淨者誰遣比丘尼來請教誡答云此眾無尼來請教誡僧今和合何所作為答云說戒羯磨大德僧聽今白月十五日或黑月十五日或黑月十四日眾僧說戒若僧時到僧忍聽和合說戒白如是說戒犍度云大迦賓㝹在仙人住處黑石山側靜處思惟而作是念我今若往說戒若不往我常第一清淨爾時世尊知其所念譬如壯士屈伸臂頃從耆闍崛山忽然不現乃至迦賓㝹前敷座而坐時迦賓㝹禮世尊足在一面坐世尊知而故問汝在此作是念不答言爾佛言說戒法當應恭敬尊重承事若汝不恭敬布薩尊重承事者誰當恭敬尊重承事是故汝應往說戒不應不往應當步往不應承神足往我亦當往隨所住處人多少共集一處說戒不和合說戒者突吉羅年少比丘於布薩日應先至說戒堂中掃灑敷坐具具淨水瓶洗足瓶然燈火具舍羅此云籌五分律云麤不過小指細不過著若不知者上座當教不教不隨教皆突吉羅說戒竟應收攝若一比丘獨住者至布薩日應詣說戒堂掃灑如上若有客比丘來若四若過四應先白已然後說戒若有三人若二人各各相向說今僧十五日說戒或十四日我某甲清淨如是三說若有一人應心念口言亦如是三說不得非法別眾非法和合及法別眾羯磨說戒解在羯磨法中應法和合羯磨說戒有病及三寶事聽與欲清淨應口言若身現相與欲清淨若不現身相不口說者不成與欲清淨若受欲清淨已便命過乃至應滅擯等不成與欲清淨若睡入定或忘不故作名成與欲清淨若故不說者突吉羅若不能如是者應扶病比丘至僧中若慮或能死一切僧應往病比丘所圍遶與作羯磨若病者眾多能集一處者善若不能者諸比丘當出界外作羯磨更無方便得別眾作羯磨不應稱事與欲清淨聽如法僧事與欲清淨稱事者我與某事欲不與某事欲也聽受多人與欲清淨受者有事聽轉與欲清淨若事畢應自往說戒時八難事起及有餘緣聽略說戒八難者王賊水火病惡蟲人非人餘緣者若大眾集牀坐少若眾多病若覆葢不周值天雨若鬬諍事或說法夜已久應齊明相未出時作羯磨說戒有五種說戒一者說序餘以常聞告知二者說序及四棄法三者說至僧殘法四者說至不定法皆以餘者僧常聞告知五者說序乃至終若八難中一一難起隨難遠近以為廣略若無難緣不得略說若比丘心亂狂癡或憶說戒或不憶或來或不來應與作癡狂羯磨病止應解有犯者不得說戒不得聞戒不得向犯戒比丘懺悔犯者不得受他懺悔如法懺悔已然後說戒若比丘正說戒時或知有罪或心疑若向眾說則致閙亂當語比座或心念言須座罷已如法懺悔如是者得聽說戒若一切僧盡有犯或生疑當向清淨客比丘懺悔決疑然後說戒若無客比丘來當差二三人向比近清淨僧中決疑懺悔已還所住處住處比丘當向此二三人懺悔然後說戒若比近無清淨僧應作白普同懺悔然後說戒若不識罪名罪相俟有客比丘持律者來應請問之如法懺悔問普同懺悔法式云何答一人作白之後各自改往修來他時若遇清淨比丘仍須發露悔除也若客比丘聞見有舊住比丘應求應喚作羯磨若不求若求不得便作若不喚作皆不成羯磨得罪若不得便喚作亦不成羯磨無罪舊住於客亦爾處處尋覓為求高聲唱告為喚不應於比丘尼乃至未受大戒人前作羯磨及遮說戒除天龍鬼神第三分云若僧破重得和合聽作白羯磨和合布薩大德僧聽彼所因事令僧鬬諍誹謗罵詈互求長短令僧破令僧別住令僧塵垢彼令僧為作舉罪今已還解已滅僧塵垢若僧時到僧忍聽僧作和合布薩白如是若有比丘犯僧殘或應與波利婆沙此云別住法隨覆藏若干日應行若干日或本日治解在治罪法中或摩那埵解在第二篇中或出罪皆隨應與之然後說戒若有比丘犯波逸提是中比丘或言波逸提或言提舍尼彼見犯波逸提者將此比丘至眼見耳不聞處教如法懺悔已至彼言提舍尼比丘所語言此比丘已如法懺悔應作如是已說戒若有比丘犯偷蘭遮是中比丘或言偷蘭遮或言波羅夷而皆是多聞知識彼作是念若今日說戒或能令僧破壞聽遮說戒若未說時遮若說竟遮皆不成遮若正說時遮成遮若彼遮說戒人三業有不清淨無智不分明不知問不能答餘比丘應語言止長老不須起此鬬諍事莫用此比丘語便應說戒若其人三業清淨等應問言以何事遮為以破戒為以破見為以破威儀為見何事為聞何事為疑何事若不能具答隨所舉無根與罪然後僧應說戒以無根初篇舉者與僧殘罪以無根僧殘舉者與波逸提罪以無根餘罪舉者與突吉羅令懺若有病比丘遮病比丘說戒或與無病者互相遮應語言佛如是語須待病瘥應如法說彼亦當如法說如是作已然後說戒或有異住處比丘鬪諍不和合欲來此說戒此眾應十四日若十三日說戒若聞今來便疾集僧說戒若聞已至界內便出界外說戒若聞已入寺內應為具浴器等密出界外說戒若客比丘喚說戒應答言我曹已說戒竟若舊比丘說戒竟客不得遮客說戒時舊比丘得遮能如是方便得作者善若不得應作白却說戒大德僧聽今不說戒至黑月當說戒白如是若客待不去應作白第二却說戒若仍不去應如法強與客問答僧祇律云說戒有三種若十四日月小故若十五日白月及月大故若中間布薩和合義故中間布薩者布薩時若僧不和合一比丘於中唱言若僧和合時當作布薩若無一比丘唱者一切僧得越毗尼罪或云越法罪即應懺突吉羅也一比丘唱者一切僧無罪若十五日不和合應初日布薩初日不和合者應二日乃至十二日布薩若十四日應正布薩者十三日不應作中間布薩便就十四日布薩亦是中間布薩亦名正布薩若月大者乃至十三日和合得作中間布薩若不和合不得十四日應就十五日布薩何以故不得頻日布薩應隔日布薩是名中間布薩應十四日布薩者不得停至十五日應十五日布薩者不得逆就十四日若有因緣者得作應示布薩處得晝日布薩賊是林中王能作不饒益事若布薩時賊入者即應誦餘經偈若賊知比丘法作是言沙門我已知但說先所誦者爾時比丘應急誦使章句不辨令彼不知初中後若有王來亦應如是比丘受具足已應誦二部毗尼若不能應誦一部乃至應誦一綖經謂初篇四事布薩應廣說五綖經謂五篇二百五十戒若有因緣不得者乃至應誦四波羅夷及偈餘者僧常聞若不誦作布薩者越毗尼罪若舉眾不利者應遣上座出界外心念口言作布薩餘三人界內作三語布薩即是罰上座不聽合誦布薩若誦時忘者餘人得授不聽逆誦若誦時有忘失者得還補誦順若布薩誦將畢有客比丘來及座者即名得布薩不應為更誦若客比丘言我未曾聞廣說波羅提木叉願為我廣說待僧罷已然後與誦不聽向未受具足人說五篇罪得教語汝不得作非梵行不得盜不得殺生不得妄語如是比得為說不應早作布薩若一比丘住者應待客比丘來共作布薩若無客來有罪者應作是念若得清淨比丘此事當如法除作是念已應心念口言今十五日僧作布薩我某甲比丘清淨受布薩如是三說若布薩竟有客比丘來者應隨喜言長老已作布薩我某甲隨喜若不隨喜應出界外作布薩一住處不得再作布薩若比丘遠行布薩日至比丘住處作布薩已不應默然去應囑沙彌若園民若放牧者有比丘來語令知此中已作布薩若無人者應書柱戶扇或散華作相彼後來者應問應求相不得輙作布薩與欲時應與能持欲入僧中說者取欲時應自思惟能傳欲不不得取眾欲得至三人不聽與欲者多集者少不聽與欲者與集者等應與欲者少集者多比丘尼與欲比丘應受若上座應言我是僧上座不應受若教授尼人若誦戒人應各自說不應受若守房人若病人應言我不至僧中更與餘人若言我是乞食我是阿練若我是糞掃衣我是大德人不取欲者越毗尼罪布薩不肯來者偷蘭罪若為衣鉢等事不來不與欲者越毗尼罪時集應與清淨欲非時集應與羯磨欲時集亦得與兩種欲若比丘共商客行至布薩日有恐怖難商人行不待得行作布薩先應籌量齊幾許得誦戒竟若山若石作標幟伸手相及羯磨作布薩界然後作布薩復次若比丘多無牀坐一切伸手相及得立作布薩若有坐坐作布薩若比丘老病不能入坐牀角相接得臥作布薩十一事不名與欲一者我與長老欲我向取某甲欲并與問四分聽轉與欲亦聽受多人欲僧祗不許此將安從答不許之意大約恐其疎漏設能善為憶持則從四分亦得二者明日當布薩今日與欲三者出界外與欲四者與比丘尼欲五者與未受具足人欲六者取欲已出界外七者與欲已出界外八者取欲已還戒九者與欲已還戒十者比丘病與欲已聞僧中說法毗尼自力就聽坐久疲苦以先與欲默離坐去不名與欲應更與十一者布薩日僧集不來者與清淨欲若暴風雨若火若賊諸比丘盡驚散不名持欲到僧中若一人在是名到僧中布薩有七事應遮一者不共住人二者別住人三者未受具足人四未說欲五未行籌六為和合義故七和合未竟五分律云遣沙彌應著不見不聞處應看牀下以燈籠徧照聽向有罪比丘悔過不得向同犯者悔過若病比丘聽向同犯悔過若守護杖士不肯去者但說戒序竟言餘僧所常聞應作如是布薩若有王來亦爾若有因緣不得五種說戒應言今十五日布薩時各共正身口意莫放逸此亦得名布薩不得不布薩說戒時中忘應傍人授猶忘更授三忘應更差人續次誦不應重誦若鬪諍若說法說律論議若多得布施不容說戒皆聽至明日應先請說戒人應先作諸羯磨然後說戒不應並誦戒不應歌詠聲說戒應直說之十誦律云聽二種布薩一十四日月小二十五日白月及月大一食前二食後一晝二夜毗尼序云比丘及尼得互聽說戒不得互為說戒問四分云不應於比丘尼及未受大戒人前作羯磨及遮說戒今云比丘及尼得互聽說戒豈說戒前定無羯磨等事耶答作羯磨及遮說戒皆是舉過治罰之事故不應令尼等知若既作誰請教誡之問尼方入眾禮請此時但有布薩一事雖復坐聽自應無過先相嫌人不應與清淨欲不應與懺悔不得為小因緣故住道中說戒若欲說戒當上高處立觀知近處有精舍無若有應入中作布薩說戒若共賈客行時賈客住廣說戒若小住略說戒若不住三語說若都不聽住各各口語今日布薩說戒若有白衣在比丘中不得口語應一心念今日布薩說戒若有賊難龍難鬼難亦爾辯問僧祇開行布薩與此不同畢竟安從答僧祇開行說之條重在必說十誦分廣略之致意在隨機今亦隨力隨機可也問毗尼法藏是比丘規式一切未受具人不得為說而梵網獨聽國王發隱復援十誦毗尼序為證乃僧祇五分並皆不許不知安從答若論通途軌式則僧祇五分應從倘有格外機緣則十誦毗尼可用至於梵網自指菩薩戒非指比丘戒也根本尼陀那云不得與授學者欲得取其欲律攝云褒薩是長養義陀是持義謂由集眾說戒便能長養善法持自心故又陀是淨除義謂增長善法淨除不善故若於住處但有四人皆可同集不應別住亦不取欲若當處無說戒者應就餘處長淨若於無說戒人處坐前安居不得過第二長淨應向有說戒處若眾破重得和合可作吉祥長淨得解捨置法應乞大眾作別時長淨附五歲比丘當誦戒誦羯磨使利聽依能誦戒者夏安居誦戒者安居中命終乃至五逆等若後安居未至當詣比近處結後安居若請比近能誦戒者來過安居若已結後安居諸比丘應詣比丘處有學誦序者若誦四事者誦十三事者二不定者三十事者九十事者若誦餘殘法者彼各誦所得已還本住處教一人使誦若一人不能盡誦者隨先所誦各次第誦不得重誦若爾者善不者但說法誦經十誦云說戒比丘先當暗誦令利莫眾僧中說時錯謬毗尼母云不應用歌音誦戒當以高聲了了誦戒歌音有五事過一心染著此音二為世人所嫌三與世人無異四妨廢行道五妨廢入定出家至五臘要誦戒使利不誦戒者有四種過一不得畜弟子二不得離依止三不得作和尚四不得作阿闍棃比丘法要誦波羅提木叉若不誦者有誦毗尼處三時就彼處住何以故若所犯所疑懺悔解疑得除罪也何故名布薩斷名布薩能斷所犯能斷煩惱斷一切不善法名布薩義清淨名布薩三正說戒序諸大德我今欲說波羅提木叉戒汝等諦聽善思念之若自知有犯者即應自懺悔不犯者默然默然者知諸大德清淨若有他問者亦如是答如是比丘在眾中乃至三問憶念有罪不懺悔者得故妄語罪故妄語者佛說障道法若彼比丘憶念有罪欲求清淨者應懺悔懺悔得安樂緣舍利弗於閒靜處作是念何者等正覺修梵行佛法久住何者等正覺修梵行佛法不久住往問世尊佛言隨葉佛拘那含佛不為諸弟子廣說十二部經不結戒不說戒爾時彼佛及諸聲聞在世佛法廣流布佛及聲聞滅後世間人種種名種種姓種種家出家以是故疾滅佛法不久住何以故不以經法攝故如種種華散置案上風吹則散毗婆尸佛式佛拘留孫佛迦葉佛為諸弟子廣說經法亦結戒亦說戒彼諸佛及聲聞眾在世佛法流布佛及聲聞滅後諸世間人種種名種種姓種種家出家不令佛法疾滅何以故以經法善攝故如以線貫種種華置案上雖為風吹而不分散爾時舍利弗即請世尊結戒說戒佛言且止佛自知時若有比丘犯有漏法然後結戒為斷彼有漏法故比丘若得利養若得名稱為人所識多聞多財業便生有漏法有漏法生當為結戒斷彼有漏法故一句乃戒學之綱宗向此著眼則于開遮持犯思過半矣證根本律云芭蕉若結子竹葦生其實如騾懷姙時斯皆還自害利養及名譽愚人所愛樂能壞眾善法如劍斬人頭律攝云五因犯罪無羞恥心無敬教心情懷放逸稟性癡鈍忘失正念釋障道法者障初禪二禪三禪四禪空無相無願障須陀洹果乃至阿羅漢果懺悔得安樂者得初禪乃至阿羅漢果律攝云先有犯今默不言更招其罪如餘時中他問實答此亦如是設令有犯而不憶知無妄語罪憶知而默亦為妄語由現身相表語業故障礙法者一於現世障諸善法二於未來礙生善趣欲求清淨者清淨謂是涅槃為求涅槃故不為畏他詰責治罰而說於罪發露即安樂者有五種相一切勤策治諸懈怠故二由無罪治諸過失故三由敬重治慢式叉故四由無悔治諸惡作故五由寂定治散亂心故五分律云波羅提木叉者以此戒防護諸根增長善法於諸善法最為初門四結問諸大德我已說戒經序今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持釋律攝云但為三問者略則闇昧之人卒難知廣則恐多延時令眾倦初說戒序竟二正列戒相八初四棄法二十三僧殘法三二不定法四三十捨墮法五十九波逸提法六四悔過法七眾學法八七滅諍法此之八科總為五篇初即初篇二即二篇三乃徧通初二三篇故名不定四五皆第三篇六是四篇七八皆第五篇言七聚者依初二篇方便等流別立偷蘭遮聚因三篇下諸輕方便等流別立惡說聚也初四棄法三初總標二別列三結問今初諸大德是四波羅夷法半月半月說戒經中來釋僧祇律云波羅夷者謂於法智退沒墮落無道果分如是未知智等智他心智苦集盡道智盡智無生智於彼諸智退沒墮落無道果分又於涅槃退沒墮落無證果分於梵行退沒墮落無道果分所可犯罪不可發露悔過故名波羅夷一法智知五蘊等各別自性二未知智亦名類智知五蘊等差別之相謂苦無常空無我等三等智亦名世俗智知諸有情修行差別及知諸法名相等異四他心智知他補特伽羅心心所法無所疑滯五苦智五陰無常苦空無我觀時得無漏智六習智亦名集智知諸法因因集生緣觀無漏智七盡智亦名滅智滅止妙出觀時無漏智八道智道正行遠觀時無漏智九盡智我見苦已斷集已證滅已修道已如是念時無漏智慧見明覺十無生智我見苦已不復更見乃至修道已不復更修如是念時無漏智慧見明覺已上即聲聞十智德也涅槃即聲聞斷德梵行即清淨戒品乃智斷二種果德之因今皆退沒墮落無復出世因果分也五分律云波羅夷者名為墮法名為惡法名斷頭法名非沙門法如鍼鼻缺不可復用如人命盡不可復活如石破不可復合如斷多羅樹心不可復生多羅舊名貝多此翻岸形直而且高葉可書經此樹若斷其心即便枯死律攝云波羅市迦者是極惡義又他勝義纔犯之時被他淨行者所欺勝故又被煩惱所摧勝故出家近圓為除煩惱今破禁戒反被降伏又能害善品令使銷滅故又復能生惡趣之罪名波羅市迦近圓者圓謂涅槃受比丘戒則能親近涅槃故名近圓亦名具圓以此具戒是涅槃正因緣故二別列四初婬戒二盜戒三殺戒四大妄語戒律攝云先婬後殺此依犯緣前後而說又依由前引生後故而為次第由不淨行便行偷盜既行盜已遂殺怨家殺已問時便作妄語又復煩惱最強盛者在前而制此四他勝其相云何謂無厭離不忍不證然無厭離最強盛者立為初二一於婬欲二於資財不忍故行殺不證故妄語初婬戒大乘同制大乘雖許懺悔須見好相或復得遇佛菩薩等為說深法頓發大心如淨業障經維摩詰經等所明然必具大慚愧生大厭離絕不覆藏篤切悔過者乃能承當此事則與此中授學法原相倣也如或無恐怖心無決斷心雖大乘亦豈輒通懺悔哉若夫見機得作止謂在家菩薩非謂比丘菩薩戒本具有明文請詳觀之問菩薩比丘根本若破一失永失不得名為菩薩比丘沙彌若大乘許通懺悔要見好相可得重受小乘決無重受之理既小乘不許豈有單菩薩耶答大乘重受雖以見相為期比丘法中畢竟永無僧用今設菩薩比丘破根本後依大懺除得見好相者若先已作與學羯磨即是菩薩與學比丘若先已作滅擯即是菩薩優婆塞不名單菩薩也又問懺法有三一作法二取相三無生倘有犯重戒者或顧體面或無清淨僧不依作法但依取相無生二種可得滅罪否答犯罪是惡法尚自不顧體面懺悔是善法云何反顧體面若有顧體面心則全墮分別妄識雖欲取相決無感通雖觀無生決難契會至於缺清淨僧無處作法以殷淨心專修取相無生二懺既非故欲覆藏亦定可滅重罪古云寧缺前前莫缺後後正謂此也非謂顧體面而缺前前也又問授學一法似與大乘相倣然終無任僧用未審依大行懺見好相已仍得入僧數否答荊谿大師輔行記云小乘教門尚不開懺雖曰還生無任僧用沙彌犯已懺成進具大乘所許事可通行儻聽大僧招姦來詐況寶梁誠訓足數無文信大小區分聽制條別小無懺重之說仍成重罪未亡安用大教懺夷以足小乘僧數依大懺已內進己道何須混濫以惑時情文夫深譚玄妙無過台宗而闡揚教門終不壞於事相良以開權顯實則即事純真故藏教之法一不可廢倘欲以大破小便非絕待妙矣若比丘共比丘同戒若不還戒戒羸不自悔犯不淨行乃至共畜生是比丘波羅夷不共住緣佛在毗舍離時迦蘭陀村須提那子饒財多寶持信堅固出家為道時世穀貴比丘乞食難得須提那子將諸比丘詣迦蘭陀村乞食母聞子歸往勸捨道還家再三不允乃令與婦安子使種不斷便捉婦臂將至園中三行不淨時園中有鬼命終即處其胎九月生男字為種子後亦出家成道時須提那行不淨已常懷愁憂同學問知其故具白世尊世尊集諸比丘以無數方便訶責言汝所為非非威儀非沙門非淨行非隨順行所不應為汝須提那云何於此清淨法中行乃至愛盡涅槃與故二行不淨耶告諸比丘寧以男根著毒蛇口中不持著女根中何以故不以此緣墮於惡道若犯女人身壞命終墮三惡道何以故我無數方便說斷欲法斷於欲想滅欲念除散欲熱越度愛結我說欲如火如把草炬亦如樹果又如假借猶如枯骨亦如段肉如夢所見如履鋒刀如新瓦器盛水著於日中如毒蛇頭如輪轉刀如在尖標如利戟刺甚可穢惡佛所訶責訶責已與諸比丘結戒集十句義一攝取於僧事理二和二令僧歡喜各護三業無相惱觸三令僧安樂各護身口不相惱亂四令未信者信入五停心及四念處五已信者令增長由四正勤得煖法觀六難調者令調順以戒淨故能得四如意定登頂法觀折伏煩惱七慚愧者得安樂慚第一義天愧內凡位人成就五根住忍法位不復退轉八斷現在有漏五力能排五障世第一法伏道滿足九斷未來有漏七覺八正道發苦忍真明訖金剛心斷一切見思種子十正法得久住阿羅漢所作已辦令勝義正法不滅欲說戒者當如是說若比丘犯不淨行行婬欲法是比丘波羅夷不共住如是結戒已時有䟦闍子比丘愁憂不樂淨行即還家共故二婬欲諸比丘白佛佛言汝癡人犯波羅夷不共住若比丘不樂淨行聽捨戒還家若復欲出家修淨行應度令出家受大戒乃更加不捨戒戒羸不自悔之言復有一乞食比丘依林中住與雌獼猴共行不淨按行比丘見之具白世尊故更結戒文如上釋若比丘者名字比丘相似比丘白稱比丘善來比丘乞求比丘著割截衣比丘破結使比丘受大戒白四羯磨如法成就得處所比丘是中比丘取最後義共比丘同戒者佛為諸弟子結戒已寧死不犯是中共餘比丘一戒戒體無二同戒戒相無別等戒具足受持是名同戒云何名為不捨戒顛狂捨戒心亂捨戒痛惱捨戒瘂捨戒聾捨戒瘂聾捨戒顛狂心亂痛惱瘂聾人前捨戒中國人邊地人前捨戒邊地人中國人前捨戒不靜靜想捨戒靜作不靜想捨戒戲笑捨戒若天龍夜叉餓鬼睡眠人死人無知人前捨戒若自不語若語前人不解如是等不名捨戒云何捨戒若比丘厭比丘法便云我捨佛捨法捨比丘僧等作如是語了了說是名捨戒戒羸者或有戒羸不捨戒或有戒羸而捨戒若比丘厭比丘法常懷慚愧意樂在家等但作是言我念父母兄弟姊妹婦兒村落城邑園田浴池我欲捨佛法僧乃至學事我欲受持家業乃至欲作非沙門非釋子法是謂戒羸不捨戒若作是思惟我欲捨戒便了了捨戒是謂戒羸而捨戒云何名波羅夷如斷人頭不可復起比丘犯此法者不復成比丘故名波羅夷共住者同一羯磨同一說戒不得於是二事中住名不共住僧祇律云若向五眾及白衣等言我捨佛捨法捨僧捨學捨說捨共住捨共利捨經論捨比丘捨沙門捨釋種我非法門非釋種非比丘我是沙彌是外道是俗人如本五欲我盡受之是名還戒云何捨佛捨正覺捨最勝捨一切智捨一切見捨無餘智見捨羅睺羅父捨真金身捨圓光捨三十二相捨八十種好若捨一一佛名號皆名捨佛即名捨戒若言捨過去未來佛不名捨戒得偷蘭罪又外道等亦各言有佛若實欲捨佛假言提外道佛不名捨戒得偷蘭罪若戲笑說捨佛越毗尼罪若誤說心狂無罪云何捨法法者非三世所攝其相當住所謂無為涅槃離眾煩惱一切苦患永盡無餘若言捨此法若言捨過去未來法盡名捨戒若假言捨外道法得偷蘭罪若戲笑說越毗尼罪云何捨僧僧者世尊弟子僧謂四雙八輩信成就戒成就聞成就三昧成就慧成就解脫成就解脫智見成就應所恭敬無上福田若言我捨是僧是名捨戒若言捨過未僧若言捨多比丘皆不名捨戒得偷蘭罪若言捨過未多比丘若言捨一比丘越毗尼罪若言捨過未一比丘越毗尼心悔即責心突吉羅比丘尼亦如是若言捨和尚是名捨戒若言捨阿闍棃不名捨戒得偷蘭罪過未差別及假言戲笑等同上云何捨學學有三種一增上戒學謂波羅提木叉廣略說二增上意學謂九次第正受三增上慧學謂四真諦若言捨此學皆名捨戒假說戲笑等同前云何捨說謂三種說戒十五日十四日及中間布薩若言我捨是說是名捨戒云何捨共住共住有二種一者清淨共住眾悉清淨共作布薩二者相似共住不清淨作清淨相與清淨者共作布薩若言我捨共住是名捨戒云何捨共利利者有二種一者法利受誦問答二者衣食利同受一施若言我捨此利是名捨戒若但言我捨衣食利不名捨戒得偷蘭罪云何捨經論經論有九部即前十二部中除方廣授記及無問自說若言我捨此經論是名捨戒若言捨過未經論不名捨戒得偷蘭罪復次若比丘言我捨佛佛捨我我離佛佛離我我遠佛佛遠我我厭佛佛厭我我休佛佛休我如是皆名捨戒乃至經論亦如是是名還戒若瞋說卒說獨說不了說因諍說獨想說向眠者說向狂者說向嬰兒說向非人說向畜生說向不解者說皆不名捨戒戒羸者彼作是念我不如捨佛法僧乃至捨諸經論復作是念我當作沙彌作俗人作外道彼心念口言未決定向他人說是名戒羸若說戒羸事者語語偷蘭罪復作是心念口言我捨佛者勝乃至我習本俗人者勝是名說戒羸事語語偷蘭罪五分律云若言我當行外道儀法語語偷蘭遮若言我當行白衣儀法突吉羅是不名捨戒若口言我捨戒名為捨戒律攝云行謂聖道淨謂涅槃由八正道方能證會作不淨行正違彼故相是中犯者若與一切人非人畜生男女二形黃門大便道小便道及口中若自若他入如毛頭於初住出三時中隨有樂想盡波羅夷方便而不入偷蘭遮於根壞者及非道行婬盡偷蘭遮教他者偷蘭遮教他而不作突吉羅比丘尼波羅夷式叉摩那沙彌沙彌尼突吉羅滅擯不犯者睡眠無所覺知不受樂一切無有婬意及最初未制戒癡狂心亂痛惱所纏十誦律云有五相名狂人親里死盡故狂財物失盡故狂田業人民失盡故狂或四大錯亂故狂或先世業報故狂若雖有如是狂病自知我是比丘作婬欲得波羅夷有五種因緣令心散亂為非人所打故心散亂或非人令心散亂或非人食心精氣故心散亂或四大錯故心散亂或先世業報故心散亂若雖有是散亂自覺是比丘作婬欲犯波羅夷有五種病壞心即痛惱所纏也或風發故病壞心或熟發故病壞心或冷發故病壞心或三種俱發故病壞心或時節氣發故病壞心雖有如是病壞心若自覺是比丘作婬欲得波羅夷若不自知不犯善見律云見火而捉如金無異見屎而捉如旃檀無異如是顛狂犯戒無罪僧祇律云若比丘以染汙心欲看女人得越毗尼心悔若眼見若聞聲犯越毗尼罪相觸得偷蘭罪乃至入如胡麻波羅夷若身大雖入不觸其邊者得偷蘭罪若女人身裂為二分就二分行婬者偷蘭罪繫縛令合行婬者波羅夷云何名受樂如饑得食如渴得飲云何不受樂如好淨人以種種死屍繫其頸上又如破癰熱鐵燒身又云若欲心隨女人後行步步越毗尼罪欲心與女人隔壁語語語越毗尼罪附善見律云若長老聞此不淨行慎勿驚怪何以故如來憐愍我輩為結戒故說此惡言若不說者云何得知波羅夷偷蘭遮突吉羅若法師為人講聽者慎勿露齒笑若有笑者驅出何以故佛憐愍眾生金口所說汝等應生慚愧心而聽何以笑音義誰遣比丘尼來請教誡比丘尼八敬法中半月半月應從大僧求教授人故須致問若有尼來請即於此時出眾致禮然後白云比丘尼僧某甲等和合禮比丘僧足今從僧乞教授人爾時眾僧如常差耆宿往教授之若無耆宿可差但語言謹慎莫放逸今此事久已不行故但答云無尼來請也迦賓㝹或云劫賓那此翻房宿禱房星生舊云金毗羅此翻威如王舍利弗舍利此翻鶖鷺其母眼明似之故以為名弗此翻子即是因母立字故名舍利子也又翻身子其母好形身也尊者名優波提舍智慧第一為羅睺羅和尚芭蕉若結子四句芭焦生華狀如蓮瓣中有甘露其甜如蜜若生此華則此枝便壞竹葦開華結子則竹林隨敗騾不自生皆驢共馬交遘而生騾若懷姙必傷其母毗舍羅或云毗耶離維耶離舍隸吠舍離此翻廣嚴亦翻好稻亦翻好道也迦蘭陀此云好聲鳥或云是山鼠之名須提那䟦闍子俱未見翻譯四雙八輩即四向四果九次第正受一初禪二二禪三三禪四四禪五空處六識處七無所有處八非想非非想處九滅受想通言次第定者若入禪時深心智慧深利能從一禪入一禪心心相續無異念間雜也
