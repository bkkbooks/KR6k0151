body:
  text: 古吳蕅益沙門智旭彚釋十三嫌罵戒此是性罪大乘同制若比丘嫌罵波逸提緣沓婆摩羅子知僧臥具及差僧食慈地比丘於眼見耳不聞處言其有愛恚怖癡故制後更於耳聞眼不見處言其有愛恚怖癡乃更結戒相若面見譏嫌若背面罵了了波逸提不了了突吉羅比丘尼波逸提餘三眾突吉羅不犯者其人實有是事恐後有悔語令如法發露及戲笑說獨說夢說錯說善見律云譏嫌被僧差人波逸提嫌餘人突吉羅十四敷僧臥具不舉戒此是遮罪大乘同制若比丘取僧繩牀木牀若臥具坐褥露地敷若教人敷去時不自舉不教人舉波逸提緣舍衛城有長者飯僧十七群比丘取僧坐具在露地敷而經行望食時到時到已不收攝便赴食僧坐具為風塵土坌蟲鳥啄壞汙穢不淨故制釋繩牀木牀各有五種旋脚直脚曲脚入陛無脚相初出門波逸提一足在門外一足在門內欲去而不去還悔一切突吉羅若二人共一牀下座應收而去下座謂上座當收而上座不收下座犯波逸提復以非威儀犯突吉羅上座謂下座當收而下座不收上座犯波逸提若二人不前後俱不收二俱波逸提若餘空繩牀木牀踞牀几浴牀或臥具表裏或地敷繩索毳紵放在露地不收便去突吉羅敷僧臥具在露地不收而入房坐思惟突吉羅比丘尼波逸提餘三眾突吉羅善見律云他人私物不舉突吉羅薩婆多論云好持戒大沙彌亦得付囑之摩得勒伽云自臥具不舉不使人舉突吉羅十誦律云諸比丘食竟有諸白衣即坐僧臥具牀上應待白衣食竟若有病者不能久待應去隨見者應舉若失戶鈎戶鑰無舉處若八難中一一難起不舉無犯律攝云有五種人不堪囑授謂無慚愧有讐隙年衰老身帶病未圓人憶而不舉得本罪若忘念者但得惡作凡是僧伽所有衣服不將餘物儭替不合受用其所替物亦非疎破若僧敷具有破穿處應須縫補若斷壞者應為連接若不堪修補者用充燈炷或為拂帚或斬和泥用塗牆壁填孔隙令施福增凡聽法時不應與苾芻尼及俗人求寂授學人相近而坐有難緣者非犯無夏者不應共三夏者同座一夏者不得與四夏者同座二夏以去得共大三夏者同座若白衣舍處所迮時雖鄔波䭾耶同座非犯不應一牀二人同臥有慚愧者無犯若在行途得大帔中間衣隔同臥非犯若有施主以衣布地延請法眾願為蹈者或寶莊飾師子座上以俗人衣敷設應生愍念作無常想蹈坐非犯若施主借僧褥席應與事了應令送歸有汙應洗若火燒寺先出自己衣鉢次出常住貲財令無力人一處看守其火若盛不應輒入大水來漂亦應准此十五僧房不舉臥具戒此是遮罪大乘同制若比丘於僧房中敷僧臥具若自敷若教人敷若坐若臥去時不自舉不教人舉波逸提緣佛在祇桓有客比丘語舊住我在邊僧房中敷臥具宿後不語舊住便去僧臥具爛壞蟲嚙舊住久不見客比丘到房看之見已譏嫌白佛結戒相出界外波逸提一脚在界外等突吉羅比丘尼波逸提餘三眾突吉羅不犯者時還不久及諸難緣等十六強奪止宿戒此是性罪大乘同學若比丘知先比丘住處後來強於中間敷臥具止宿念言彼若嫌迮者自當避我去作如是因緣非餘非威儀波逸提緣六羣與十七羣道路行至無比丘住處十七羣語六羣言汝是我等上座應先求住處六羣報言汝等自去我不求住處十七羣即往求住處自敷臥具止宿六羣乃往語言汝等起當以大小次第止十七羣不允即強敷臥具十七羣高聲言諸尊莫爾少欲比丘聞而譏嫌白佛結戒於是比丘不知先住處非先住處後乃知是先住處或有波逸提懺者或有畏慎者佛言不知無犯釋中間者若頭邊若脚邊若兩脇邊相比丘尼波逸提餘三眾突吉羅不犯者寬廣不相妨礙若有親舊教若病倒繫縛等僧祇律云若住處少一比丘當一柱間敷牀褥尼師壇覆上已向二師或禮拜問訊或受誦去後比丘來却先尼師壇自敷尼師壇而坐作細聲唄先住比丘來見已作是念誰能斷他法即持尼師壇去是後比丘波逸提罪坐禪病亦如是若復來眠他牀是上座者應語言長老不知世尊制戒那若眠比丘是下座者應訶責汝不善不知戒相云何後來眠他牀上若比丘在他處經行者見先比丘來應避去若夜眠時雖振動寱語不作擾亂意無罪十誦律云能敷者波逸提不能敷者突吉羅若為惱他故閉戶開戶閉向開向然火滅火然燈滅燈梵唄讀經說法問難隨他不喜事作一一波逸提十七牽他出房戒大乘同制若比丘瞋他比丘不喜僧房舍中若自牽出教他牽出波逸提緣亦起自六羣牽十七羣出故制相隨所牽多少隨出戶多少一一波逸提若持他物著戶外及閉他著戶外盡突吉羅比丘尼波逸提餘三眾突吉羅不犯者無恚心隨次第出若遣共宿至三夜未受戒人出若破戒破見乃至應擯等五分律云若將其所不喜人來共房住欲令自出若出若不出皆突吉羅牽餘四眾出突吉羅尼牽比丘比丘尼出波逸提牽餘三眾出突吉羅若牽無慚愧人若欲降伏弟子而牽出者不犯律攝云舍欲崩倒牽出病人不犯若有苾芻是鬬諍者戒見軌式多有虧違如此之人瞋而曳出若無善心亦得惡作若於非僧房處曳出清淨苾芻得惡作罪若破戒人大眾應共驅出若倚門若抱柱咸應斫去并推出之事殄息後所斫截處僧應修補或門徒等冀其懲惡牽出房時無犯然不應令出其住處若無破戒罪但難共語者應為曳韁法而折伏之仍遣智人就彼開諫令其息惡而來懺謝曳韁法解現第六十四戒若於住處龍蛇忽至應彈指語曰賢首汝應遠去勿惱苾芻若告已不去者應持軟物而羂去之勿以毛繩等繫勿令傷損於草叢處安詳解放待入穴已然後捨去若棄蚤蝨等應於故布帛上觀時冷熱而安置之此若無者應安壁隙柱孔任其自活僧祇律云若駱駝牛馬在塔寺中畏汙壞塔寺驅出者無罪十八重閣坐脫脚牀戒大乘同學若比丘若房若重閣上脫脚繩牀木牀若坐若臥波逸提緣有比丘住重閣上坐脫脚牀坐不安詳牀脚下脫打在下比丘身傷血出故制釋重閣者立頭不至上者是相除脫脚牀已若在獨坐牀或一板牀或浴牀一切突吉羅比丘尼逸波提餘三眾突吉羅不犯者坐旋脚直脚曲脚無脚牀及閣有板覆等僧祇律云閣下無人坐無犯薩婆多論云凡坐臥法一切安詳不審詳者必有所傷兼壞威儀十九蟲水澆泥草戒此是性罪大乘同制若比丘知水有蟲若自澆泥若草若教人澆者波逸提緣闡陀起大屋以蟲水和泥教人和諸長者見而嫌責故制相比丘尼波逸提餘三眾突吉羅不犯者不知有蟲若蟲大以手觸水令去若漉水灑地五分律云有蟲水者囊漉所得肉眼所見若有蟲有蟲想疑皆波逸提無蟲有蟲想疑皆突吉羅用有內外內用者飲食之屬外用者澆灌浣濯洗浴之屬十誦律云隨蟲死一一波逸提僧祗律云若比丘營作房舍須水若池若河若井漉取滿器看無蟲然後用若故有蟲當重囊漉諦觀之若故有蟲至三重若故有蟲當更作井如前諦觀若故有蟲當捨所營事至餘處去蟲生無常或先無今有或今有後無是故比丘日日諦觀無蟲便用薩婆多論云若三重作漉囊故有蟲者此處不應住二十覆房過三節戒此是遮罪大乘同學若比丘作大房舍戶扉窻牖及餘莊飾具指授覆苫齊二三節若過波逸提緣闡陀起大房覆有餘草復更重覆三猶不止屋便摧破諸居士見而嫌責故制相比丘尼波逸提餘三眾突吉羅五分律云若至第四重若草若瓦若板覆一一波逸提方便及燒斫時皆突吉羅根本律云若是熟磚及以石木或可施主欲得疾成雖過重數並皆無犯二十一自往教尼戒此是遮罪大乘比丘同學必若觀機知有大益不犯然在末法尤宜慎重若比丘僧不差教戒比丘尼者波逸提緣佛在祇洹大愛道請佛聽諸比丘與尼教戒說法佛勅阿難隨次差上座往時般陀尊者當往而所誦惟一偈三說已三入第四禪諸羅漢尼皆大歡喜六羣尼調戲譏嫌於是尊者現通而去時六羣比丘自往教戒不說正法惟說一切世論乃至笑儛跛行等六羣尼大歡喜大愛道白佛佛制僧中差教授尼人白二羯磨於是六羣即出界外更互相差大愛道重白佛佛制成就十法然後得教授尼戒律具足一多聞誦二部戒利二決斷無疑三善能說法四族姓出家五顏貌端正六尼眾見便歡喜七堪任與尼眾說法勸令歡喜八不為佛出家而被法服犯重法九滿二十歲若過十如此等可與尼教戒遂結此戒根本律云具七法者眾應差教授尼一持戒二多聞三住耆宿位四善都城語五不曾以身汙尼六於八他勝法善能分別七於八尊重法能善解釋釋教授者八不可違法百臘比丘尼見初受戒比丘當迎逆問訊禮拜請坐一不得罵詈訶謗比丘二不得舉比丘罪及遮他覓罪遮說戒遮自恣三從眾僧求授大戒四若犯僧殘應在二部僧中半月行摩那埵五於半月當從僧中求教授人六不應在無比丘處夏安居七安居竟應比丘僧中求三事自恣見聞疑八如此八事應尊重恭敬讚歎盡形壽不應違相非教授日往說八不可違法突吉羅若僧差往應尅時到尼亦尅時迎尅時不到突吉羅僧祇律云教誡尼不得從日沒至明相未出不得深猥處不得露現處當在不深不露處若講堂若樹下不得十四日十五日月一日二日三日應從四日至十三日往教誡不得教誡不和合尼眾到已應問尼僧和合不若言和合應遣使呼來若不得來者應與教誡欲不得偏教誡不得長語教誡五分律云若不差教誡尼語語波逸提教誡餘二女眾突吉羅善見律云若不說八敬先說餘法突吉羅十誦律云比丘應誦尼戒莫令忘失何以故諸女人喜忘智慧散亂我泥洹後諸尼當從大僧問戒法附五分律云若比丘僧不差為教授故入比丘尼住處除因緣波逸提因緣者比丘尼病是名因緣若僧不差為教授故入尼住處隨入多少步步波逸提若一脚入門突吉羅僧祇律亦有此戒故并附此二十二教尼至暮戒大乘同學若比丘為僧差教授比丘尼乃至日暮者波逸提緣難陀好音聲薩婆多論云非佛弟難陀也為尼說法聽者樂聞遂至日暮尼出祇洹入城城門已閉即依城壍中宿晨旦在前入城諸長者謗為與比丘宿故制相除教授若受經誦經等事至日暮突吉羅為餘婦女受經等至日暮突吉羅不犯者船濟處說法尼聽共賈客行夜說法尼聽若至尼寺中說法若說戒日來請教誡人值說法便聽律攝云雖在時中若諸尼立而不坐或營務紛擾未息或時有拘礙而為說者亦名非時日暮日暮想等六句二重二輕二無犯若通夜說法或寺門相近或城門不閉或同在城中或尼眾在白衣舍此皆無犯其教授尼人一被差已盡壽教授不須差二十三譏論教尼戒大乘同學若比丘語諸比丘作如是語比丘為飲食故教授比丘尼者波逸提緣尼聞教授師來半由旬迎安處房舍辦飲食洗浴處六群不為僧差心生嫉妬作如是言故制相說而了了波逸提不了了突吉羅餘四眾突吉羅不犯者其事實爾乃至夢說錯說等五分律云若言為供養故教誡比丘及餘三眾突吉羅若言比丘行十二頭陀行坐禪誦經作諸功德皆為供養利故語語突吉羅二十四與非親里尼衣戒大乘不同學然在未法應須審慎若比丘與非親里比丘尼衣除貿易波逸提緣舍衛城有一乞食比丘威儀具足時有尼見便生善心數請彼比丘比丘不受異時眾僧分衣物此比丘持衣分出祇桓門見此尼來即以與之意彼不受尼輒便受比丘數數同人嫌責故制相餘四眾突吉羅五分律云若與破戒邪見親里尼衣突吉羅根本律云若親親想非親親想與衣無犯若見遭難無衣服者與之或因受戒而施無犯薩婆多論云與餘二女眾衣同犯二十五與非親里尼作衣戒大乘同學若比丘與非親里比丘尼作衣者波逸提緣迦留陀夷為一尼作衣乃作男女行欲像襞衣與之語令不得披看亦莫示人若白時到當著此衣在尼僧後行尼如其教諸居士見而譏笑大愛道問知其故諸尼白諸比丘轉白世尊結戒相餘四眾突吉羅五分律云取衣時突吉羅割截時染時皆波逸提縫時針針波逸提二十六與尼屏坐戒大乘同學若比丘與比丘尼在屏處坐者波逸提緣迦留陀夷至偷蘭難陀所在門外共一處坐居士譏嫌故制釋屏處如不定法中說相盲不聾聾不盲突吉羅餘四眾突吉羅不犯者有伴若行過卒倒地等五分律云與餘二女眾屏處坐亦波逸提律攝云設餘威儀亦皆同犯二十七與尼同行戒此是遮罪大乘同學若比丘與比丘尼期同一道行從一村乃至一村除異時波逸提異時者與估客行若疑畏怖時是謂異時緣六羣與六羣尼人間遊行居士嫌之故制於是道路卒相遇者畏慎不敢共行佛言不期無犯又眾比丘及比丘尼從舍衛國至毗舍離以不得同行諸尼在後為賊所劫故更開異時釋十誦律云疑有二種一疑失衣鉢二疑失糧食若有疑者尼之衣食比丘應取持去至安隱處應還語言姊妹汝等隨意不得共行相若與尼期行乃至村間分齊處隨眾多少界多少一一波逸提空處行十里波逸提若減一村減十里若力便欲行盡突吉羅餘四眾突吉羅不犯者力勢所持等僧祇律云若共隨車伴行止息發去時喚尼來勿使不及伴波逸提若言去去勿使失伴無罪乃至問路問檀越家亦爾律攝云地行為契後遂乘空現身共期隱形而去皆得惡作乘船亦爾薩婆多論云不期而偶共同道當使相去不聞聲處若相聞已內突吉羅與餘二女眾期行同犯十誦律云若有王夫人共行不犯附律攝云苾芻有讐隙者不應共行若有因緣須共行時應懺摩已同去凡涉路時應為法語勿出惡言或為聖默然勿令心散亂若至天神祠廟誦佛伽陀彈指而進苾芻不應供養天神若路次暫止息處或泉池取水之處皆誦伽陀其止宿處應誦三啟汲水繩索亦應持行若有機緣與尼同行尼食苾芻應持食時更相授與有病苾芻應共卑去若人少者尼亦助卑若至村落為覓醫藥若乞食時令人看物持食來與若尼有病准此應知二十八與尼同船戒大乘同學若丘丘與比丘尼共期同乘一船上水下水除直渡者波逸提緣緣起同前直渡者有眾比丘及尼欲度恒水諸尼在後暴雨水漲船未還日已暮為賊所劫故開相期同船上水下水入船裏波逸提一脚上船方便欲入等突吉羅餘四眾突吉羅不犯者不共期及被繫等十誦律云若欲直渡為水漂去不犯二十九尼讚得食戒大乘同制是邪命故若比丘知比丘尼讚歎教化因緣得食食除檀越先有意者波逸提緣舍衛城有一居士請舍利弗目犍連飯食偷蘭難陀謗為下賤人讚提婆達等為龍中之龍頃二人至即言龍中之龍已至居士嫌責偷蘭難陀二人食已還白佛佛乃訶責提婆達等結戒是後比丘不知有勸化無勸化佛言不知無犯又羅閱城有大長者欲待梨師達至供養眾僧後梨師達至城有尼往語長者因即設齋梨師達恐犯戒不受食故更除檀越先有意者釋教化者十二頭陀行乃至多聞法師持律坐禪也食者從旦至中得食相知尼讚歎得食食咽咽波逸提得餘襯體衣燈油等突吉羅餘四眾突吉羅五分律云以餘四眾讚歎因緣得食食突吉羅薩婆多論云若不曲讚功德但說布施沙門福德甚大食者無罪三十婦女同行戒大乘同學若比丘與婦女共期同一道行乃至村間波逸提緣有毗舍離女嫁舍衛國人與姑共諍還詣本國時阿那律從舍衛至毗舍離彼婦女欲隨行尊者許之夫主追至打尊者幾死尊者下道靜處加趺入火光三昧夫主待其定起禮拜懺悔尊者為說法而去還告眾僧白佛結戒不期無犯因緣如前相犯輕重如前餘四眾突吉羅根本律云若他遣女人引道或迷於道路女人為指授無犯三十一過受一食施戒大乘同學若比丘施一食處無病比丘應一食若過受者波逸提緣有無住處村居士為比丘作住處常供給飲食止聽一食六羣得美好飲食復住第二宿乃至於此數數食居士譏嫌故制後舍利弗於彼處得病恐犯此戒扶病而去病遂增劇故更增無病之言釋十誦律云病者下至竹葉所傷相丘丘尼波逸提餘三眾突吉羅不犯者有心請留及諸阻難等十誦律云過一宿不食突吉羅餘處宿是中食波逸提三十二展轉食戒此是遮罪大乘比丘同學若比丘展轉食除餘時波逸提餘時者病時施衣時是謂餘時根本律云餘時者病時作時道行時施衣時此是時緣有沙㝹婆羅門以五百乘車載滿飲食經冬涉夏隨逐世尊伺候空缺設供而不得便阿難為其白佛佛聽作餅粥供僧時諸居士聞佛聽僧食粥及餅皆大歡喜有一少信大臣見佛及僧大得供養生福田想辦肥美飲食請僧僧先食濃粥不復能多食大臣嫌之羅閱城少信樂師其事亦爾佛乃結戒於是諸病比丘所請食處無隨病食及藥若有隨病食及藥畏慎不敢食佛聽病比丘展轉食又一居士既請佛僧復有居士亦請佛僧施食及衣比丘畏慎白佛佛聽施衣時展轉食釋濃粥者以草畫之不合不得食展轉食者請也請有二種若僧次請別請也施衣時如捨墮中說相若今日得多請食應自受一請餘者當施於人如是施與言長老我應往彼今布施汝若不捨前請受後請食咽咽波逸提若不捨後請受前請食咽咽突吉羅不犯者若請與非食或食不足或無請食者或食已更得食或一處有前食後食十誦律云病比丘若一請處不能飽應受二請若第二處不能飽應受三請若第三處不能飽應受已漸漸食乃至日中不應受第四請聽節日數數食毗尼序云阿難先受他請時忘不憶復同佛受波斯匿王請以食著口乃憶知有二請不與他一請不敢吐食為恭敬佛故又不敢咽食為持戒故佛知阿難心悔告令心念與他便食優波離問佛餘人亦得爾不佛言除五人一坐禪人專心在道故二獨處無人可對說故三遠行造次就路容有忘念故又或同根本部許數數食故四長病五饑餓時依親里住餘悉不聽摩得勒伽云語比丘言就此食當為汝覓衣食食不犯語比丘此間食餘處隨意食食不犯律攝云若於一舍或在寺中或阿蘭若為求肥悅或樂美食而數食者得惡作罪若輕賤心矯詐不食亦得惡作三十三別眾食戒此是遮罪大乘比丘同學若比丘別眾食除餘時波逸提餘時者病時作衣時施衣時道行時乘船時大眾集時沙門施食時此是時緣提婆達利養斷絕與五比丘俱家家乞食故制釋別眾食者若四人若過四人食者飯乾餅魚肉病者下至脚跛躄作衣施衣時如上道行者下至半由旬乘船亦爾沙門施食者在此沙門釋子外諸出家者及從外道出家者是十誦律云大眾集者極少八人四舊比丘四客比丘五分律云若於界內別請四人以上名別眾食若次請不犯根本律云別眾食者謂別別而食律攝云別眾者謂不同處食若四苾芻同一界內下至一人不共同食並名別眾此言食者謂是正食餘食無犯辯按此別眾凡有二義一者別為眾如四分等所明二者別於眾如律攝中所釋然則乞食不得四人同行受請必須僧次差往僧中淨食要打楗椎請食私房無緣不聽聖制昭然不可越矣相無因緣別眾食咽咽波逸提有因緣不說者突吉羅比丘尼波逸提十誦律云以二利故遮別眾食一者隨護檀越以憐愍故二者破諸惡欲比丘力勢故若三比丘別共一處食第四人取食分不犯若道行乘船昨日來今日食明日行今日食皆波逸提僧祇律云若三人食一人不食若三圓具一未圓具皆無犯若以食送彼乃至鹽一匕與彼眾處食皆無犯或施主言但來入者我皆與食或施主別造房施住我房者我皆與食斯亦無過戒因緣經云若比丘眾中不唱私去會者犯墮起自毗舍佉母別請五百僧故制凡欲別請大德人等必須兼請僧伽乃至眾中若有一人隨次受請便不名別眾也附根本律云有五因緣早請食來在房中食一是客新來二將欲行去三身嬰病苦四是看病人五身充知事目得迦云若檢校人應於齋食先取自分食之無過三十四過三鉢受請戒此是遮罪大乘同學若比丘至白衣家請比丘與餅飯若比丘欲須者當二三鉢受還至僧伽藍中應分與餘比丘食若比丘無病過兩三鉢受持還至僧伽藍中不分與餘比丘食者波逸提緣舍衛國大村女嫁禪國逸父母家施比丘食其夫呼還因諸比丘盡取其食方更辦具其夫已更取婦又波羅柰城外眾商賈車伴共宿有比丘於一信樂商賈處得食展轉告餘比丘乞令食盡彼方更市糧食諸伴先去道路為賊所劫故制相比丘尼波逸提餘三眾突吉羅不犯者有病故受乃至彼自送來十誦律云過取波逸提出外見比丘不與者突吉羅根本律云若取他食時過四升半米飯分量已上皆得墮罪若施主任取多少者無犯律攝云有五處不應乞食謂唱令家婬女家酟酒家王宮內旃陀羅家若知女人性多婬染亦不從乞恐生患故若於非人及外道家過三鉢取咸得惡作若即此座過三而食或除餅但將餘物或施主歡喜隨意將去並皆無犯有三種虗損信施一施主信心施持戒者受已與犯戒人二信心施正見者受已與邪見人三過量而受不自噉食乃至長受一掬之食除其施主先有隨意如斯三事並名虗損信施當招惡報三十五不作餘食法戒是遮罪大乘比丘同學若比丘足食竟或時受請不作餘食法而食者波逸提緣世尊讚歎一食法比丘奉行體色枯悴佛聽一坐食乃至飽足又聽食飯等五種食令飽足又聽病比丘數數食因棄餘食眾鳥爭鳴又聽瞻病人食殘食及聽取所受食作餘食法又聽諸比丘從彼處持食還作餘食法而食之當作如是餘食法言大德我足食已知是看是此作餘食法彼應取少許食已語言我止汝取食之是名餘食法時舍衛國有一貪餮比丘不知足食不足食不知餘食不餘食得便食之故制釋有五種足食知是飯謂五正食也餘不名足食知持來從人受也知遮言不須也知威儀行住坐臥四威儀皆得受食也知捨威儀行者止住者移步坐者離座臥者轉側身起是名捨威儀十誦律云以二利故聽受殘食法即作餘食法也一者看病比丘因緣故二者比丘有因緣食不足故相足食已捨威儀不作餘食法而食咽咽波逸提若已足食為他作餘食法若知他足食已向之作餘食法若自手捉食作餘食法若置地作若使淨人作若向淨人作若以不好食覆好食上作若受他餘食法盡持去皆不成餘食法盡突吉羅僧祇律云若作殘食時即於鉢上碗中作殘者正得碗中名作殘食鉢中食不名作若碗中食汁流入鉢中得俱名殘食若並兩鉢求作殘前人止食一鉢中食者正一鉢名作殘食若或餅或菜通覆橫二鉢上者二俱得名作殘食餘種種器亦爾若比丘足食已有大檀越持種種飲食至應問有直月維那知事人未足食者從彼作殘食若彼已足食當從上座未足者作若上座羞不能人中作者當合坐舉至屏處作若上座已足食有客比丘來應問彼若未足即向彼作若客已足食僧應作方便勿破檀越善心或眾中有大沙彌將至戒場與受具教作殘食法已然後當食五分律與此同律攝云有五蒲膳尼即可噉食一飯二麥豆飯三四肉五餅又五珂但尼即可嚼食謂根莖葉華果若先食五嚼食及乳酪菜等後食五噉食無犯若先食五噉食更食五嚼食及乳酪菜等名犯應知有五未足之言謂授食時未即須者應報言且待且去且有且待我食且待我盡若兼且言名曰未足若無且聲便是遮足若未為足意設作足言亦不成足得惡作罪由言不稱法故若得餘食作法食者自身樂住施主得福欲作法時洗手受食持就一未足苾芻或雖已足未離座者對彼作法彼若自未遮足應取兩三口食若自足已便不合食應以手按而告之言斯是汝物隨意食之有五不成作餘食法一身在界內對界外人二不相及處三在傍邊四在背後五前人離座翻此便成若一人作法設餘人食並皆無犯若遮足已作遮足想疑不作餘食法而吞咽者便得墮罪雖未遮足為遮足想疑俱得惡作後二無犯若北方果及天神蕅斯等難得之物或復饑年飲食難得不作餘食法食之無犯證毗尼母經云比丘受人施不如法為施所墮墮有二種一者食他人施不如法修道放心縱逸無善可記二者與施轉施施不如法因此二處當墮三塗應施者若父母貧苦應先受三歸五戒十善然後施與若不貧雖受歸戒不中施與復有施處治塔人奉僧人治僧房人計其功勞當酬作價若過分與為施所墮施病者食當作慈心隨所宜與之若錯誤與食為施所墮嬰兒牢獄繫人懷姙者當以慈心施之勿望出入得報詣僧坊乞者若自有糧不須施之若無糧食施之無咎若比丘不坐禪不誦經不營佛法僧事受人施為施所墮若前人無此三業知而轉施與者受者皆為施所墮寧吞鐵丸而死不以無戒食人信施若足食已更強食者不加色力但增其患是故不應無度食也大般涅槃經云若一切法無常苦無我云何為食起身口意三種惡業若為貪食起三惡業所得財物眾皆共言後受苦果無共分者復觀一切眾生為飲食故身心受苦我當云何於是食中而生貪著復次因於飲食身為增長我今出家受戒修道為欲捨身今貪此食云何當得捨此身耶如是觀已雖復受食猶如曠野食其子肉其心厭惡都不甘樂深觀揣食有如是過次觀觸食如被剝牛為無量蟲之所啑食次觀思食如大火聚識食猶如三百䂎矛若有比丘乞食預作是念願得好者願必多得亦願速得不名於食得厭離想所修善法日夜衰耗不善之法慚當增長若欲乞食先當願言令諸乞者悉得飽滿其施食者得無量福我若得食為療毒身修習善法利益眾生作是願時所修善法日夜增長不善之法慚當消滅三十六使他犯餘食法戒大乘比丘同學若比丘知他比丘足食已若受請不作餘食法殷勤請與食長老取是食以是因緣非餘欲使他犯波逸提緣貪餮比丘為他所訶心懷恚恨故令他犯故制相若彼受食咽咽二俱波逸提若彼不食與者突吉羅想疑等同上不犯者不知已足食不令他犯三十七非時食戒大乘同學若比丘非時受食食者波逸提緣迦留陀夷日暮乞食一姙婦持食出門值天雷電暫見其面怖稱是鬼即便墮身恚言沙門釋子寧自破腹不應夜乞食故制根本律云十七眾入城乞食聞女人作可愧恥語即忍饑不復巡家有諸俗侶在園遊讌日時已過持與飽食鄔波難陀問之答曰午前不得中後不䬸豈我忍饑而取命過佛聞訶責而制學處釋時者明相出至日中非時者日中至明相未出相比丘尼波逸提餘三眾突吉羅不犯者噉黑石蜜病服吐下藥煑麥不令皮破漉汁飲之若喉中哯出還咽根本律云非時非時想疑皆墮罪時非時想疑皆惡作罪時時想非時時想不犯證舍利弗問經云舍利弗復白佛言世尊有諸檀越造僧伽藍厚置資給供來世僧有似出家人非時就典食者索食與者食者得何等罪其本檀越得何等福佛言非時食者是破戒人是犯盜人非時與者亦破戒人亦犯盜人盜檀越物非施主意施主無福以失物故但有發心置立之善舍利弗言時受時食食不盡者非時復食或有時受至非時食復得福不佛言時食淨者是即福田是即出家是即僧伽是即天人良友是即天人導師其不淨者猶為破戒劫盜餓鬼為罪窟宅非時索者以時非時非時輙與是典食者是名退道惡魔名三惡道破器癩病人壞善果故諸婆羅門不非時食外道梵志亦不邪食況我弟子知法行法而當爾耶凡如此者非我弟子非法之人盜與盜受一團一撮片鹽片酢死墮燋腸地獄吞熱鐵丸從地獄出生猪狗中食諸不淨又生惡鳥人怪其聲後生餓鬼還伽藍中處都圊內噉食糞穢並百千萬歲更生人中貧窮下賤所可言說人不信用不如盜一人物其罪尚輕割奪多人福田故斷出世道故附根本尼陀那云有病苾芻醫令以水和非時可食佛言有無齒牛食麥後時便出其粒仍全用此為非時應服服猶不瘥用生麥多將水攪以物濾之然後應服服猶不瘥佛言醫人處方令服飲若稠若團隨意應服凡所有事我為病人非時開者於病瘥後咸不應作百一羯磨云有五種果若時非時若病無病並隨意食一訶梨勒此云天主持來二毗醯勒三菴摩勒即嶺南餘甘子形似梹榔食之除風四末粟者即胡椒五畢茇利即蒟醬刪補羯磨云有渴病因緣許受非時漿謂果漿蜜漿等澄如水色以水渧淨受之有風熱病因緣許受五種七日藥有諸病因緣聽受盡形壽藥謂一切鹹苦酸辛不任食者如薑椒之類乃至白术散丸湯膏之類若非時漿不得留至明日若七日藥不得畜至八日南海寄歸云牙中食在舌上膩存未將淨水重漱已來涎唾必須外棄若日時過更犯非時觀水觀時是曰律師音義迮音摘迫也苫詩廉切草覆屋也般陀亦云娑伽陀此翻繼道亦翻小路邊生八他勝法尼有八棄罪於婬盜殺妄外更加觸八覆隨四戒具如尼戒中廣明泥洹即涅槃此翻滅度卑音忌亦音其舉也俗作舁讀如异並訛優波離或云鄔波離此翻上首以其持律為眾綱紀或翻近執佛為太子時彼為親近執事之臣餮音帖貪食也維那梵云羯磨陀那此翻事知亦翻悅眾維那二字華梵雙舉維是綱維華言也那是梵語略去羯磨陀三字也北方果北俱盧州自然粳等天神蕅阿耨達池中之蕅也揣食即摶食亦名段食有形段故觸食前六識相應之觸心所對前境生喜樂如觀劇戲終日不食而自飽等又涼援諸觸能滋養身思食第六識相應之思心所於可意境而生希望意思資潤諸根增長又思想飲食令人不死如小兒視梁上懸袋及望梅止渴等識食第八識執持之相由前三食勢分所資令此識增勝能持諸根大種故又第七識執第八識為自內我此是三界生因名之為食若入滅受想定令第七識染分心心所滅不復執第八識為我便於三界不得久住故知識是食也若約六道分別者人畜具四食段食顯勝鬼神欲天除段食則具三食觸食顯勝禪天除段觸二食則具二食思食顯勝無想四空并無間獄除段觸思三食唯依識食而住啑作答切齧也䂎作管切音纘鋋也鋋音禪小矛也矛音謀兵器如鋋而有三廉十七眾即十七羣童子最大者年十七最小者年十二共求出家因呼為十七羣比丘鄔波難陀即䟦難陀也哯以淺切音衍圊音清溷也廁也至穢之處宜常修治使清潔也蒟音舉果也似王瓜蔓生子長大苗為留藤實似桑椹皮黑肉白食之辛香今嶺南人取其葉合檳榔食之
