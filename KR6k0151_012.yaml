body:
  text: 古吳蕅益沙門智旭彚輯依止法第二分云時諸新受戒比丘和尚命終無人教授故不案威儀乃至如婆羅門聚會法比丘白佛佛言聽有阿闍棃猶如和尚中說應作是請大德一心念我某甲今求大德為依止願大德與我依止我依止大德住如是三說彼當言可爾與汝依止汝莫放逸新受戒比丘樂閑靜者聽餘處依止即日得往還不應遣使受依止與依止不得不選擇受依止與依止病及瞻病者無依止得住僧祇律云請依止有五法一愛念二恭敬三慚四愧五樂住復次有四種阿闍棃一者無食無法應不問而去二者有食無法應問而去三者無食有法雖苦盡壽不應去四者有食有法雖驅遣盡壽不應去若弟子不受教應語知牀褥人奪牀褥知食人斷食若彼兇惡有勢力能作不饒益者和尚應避去依止師應擔衣鉢出界外一宿還即離依止若和尚阿闍棃有過弟子應諫不得麤語如教誡法應輭語言師不應作是事若從者善若反加訶斥者彼是和尚應捨遠去是阿闍棃應持衣鉢出界一宿還依止餘人若彼有勢力應遠去或依止有德重人若和尚命終罷道被舉出界宿或弟子自出界宿是名離依止若阿闍棃命終罷道被舉出界宿或弟子自出界宿若滿五歲善知法善知毗尼得離依止是名捨依止若比丘不善知法不善知毗尼不能自立不能立他盡壽應依止住若滿十歲善知法善知毗尼能自立復能立他如是比丘得受人依止五分律云聽不受依止乃至六宿弟子欲移餘處要先二三日白師師應籌量所往處有可依止人乃聽去到彼處應先禮塔次禮上座索房然後求依止彼應問汝二師是誰先住何處誦何經答若如法應與依止若不如法應語言汝不識我我不識汝汝可往識汝處求依止若疑應語小住是人應小住乃至六宿觀之合意者應與依止若不合意應語如上不應依止僧及塔住應依止上座如法比丘能教誡者十誦律云五法成就滿五歲不受依止一知犯二知不犯三知輕四知重五誦波羅提木叉學利廣說雖復受戒多歲不知五法應盡壽依止他住大比丘亦應從小比丘受依止亦應承事供養小比丘但除禮足聽五六夜無依止不犯若有好依止師者乃至一夜不依止突吉羅乃至不得取僧洗脚水用若饑餓時可得日日見和尚處聽住應日日來若不能者可至五日若五日不得來布薩時應來若布薩不得來乃至二由旬半至自恣日應來見和尚根本尼陀那云未滿五歲雖五法成就乃至善通三藏具證三明除盡三垢亦須依止若滿五夏許離依止遊行然所到處仍須依止若有心求依止師得至五夜若無心求一夜不得於僧受用飲食之類皆不合受乃至十夏之內皆爾百一羯磨云若受近圓滿六十夏生年八十於別解脫經未曾讀誦不了其義亦須依止老者如無老者小者亦得惟除禮拜餘悉應作此人名為老小苾芻雜事云有緣暫去即擬還來宜依舊師無勞更受依止教讀俱應供侍設二俱染患有能則並看二人無力則但供依止若無教讀隨處得住若無依止不合停居有一住處苾芻多有門人依止此師命過無依止人佛令更覓有德之人供給好房放免知事侍人臥具咸令無缺若無其人不應於此經第二褒灑陀復有作前安居依止師死佛令同前更求依止若其無者餘處求依止師而為後夏復有作後安居師遂身亡佛令於兩月間共相檢察謹慎而住過兩月已有依止人同前供給若其無者不得更過第二長淨可向餘處求依止師若本師身死皆悉同前毗尼母經云受依止竟乞七日法出界外七日滿還來到寺不失依止師法第二分云尊者和先始二歲將一歲弟子往世尊所世尊知而故問此是何等比丘報言是我弟子問言汝今幾歲報言二歲復問弟子幾歲報言一歲爾時世尊種種訶責汝所為非非威儀非沙門法非淨行非隨順行所不應為云何和先汝自未斷乳應受人教授云何教授人從今聽十歲智慧比丘授人具足戒與人依止當行和尚阿闍棃法若眾僧欲為弟子作羯磨作訶責作擯作依止作遮不至白衣家作不見罪舉不懺悔舉不捨惡見舉和尚當於中如法料理令僧不與弟子作羯磨若作令如法復次若僧與弟子作羯磨等和尚於中如法料理令弟子順從於僧不違逆求除罪令僧疾與解羯磨復次若弟子犯僧殘和尚當如法料理若應與波利婆沙應與本日治應與摩那埵應與出罪皆隨應與之復次弟子得病和尚當瞻視或令餘人看乃至差若命終弟子若不樂住處當自移或教人移弟子若有疑事當以法以律如佛所教如法除之曇諦所集羯磨云法者謂五種遠離行一出離非世法二越度非受法三無欲非有欲四無結非有結五不親近生死非親近律者謂五種出要行一少欲非多欲二知足非無厭三易護非難護四易養非難養五智慧非愚癡佛所教者謂五種教誡行一有罪者制二無罪者聽三若制若聽法有減缺者如法舉之四數數違犯折伏與念五真實功德愛念稱歎若惡見生當教令捨惡見住善見當以二事將護以法以衣食應教增戒增心增慧教學問誦經當與衣食臥具醫藥隨力所堪為辦以五事訶責弟子汝去莫入我房莫為我作使莫至我所阿闍棃則云莫依止我住不與汝語有五事應訶責無慚無愧不受教作非威儀不恭敬復有五事無慚無愧難與語與不好人為友好往婬女家又好往婦女家大童女家黃門家比丘尼精舍式叉摩那沙彌尼精舍好往看捕龜鼈如是等應訶責不應盡形訶責不應竟安居訶責不得訶責病者不應不現前訶責不應不出其過而訶責訶責已不應便受供給作使不應與依止聽餘人作如是意受為其二師欲令如法懺悔和合故不應引誘將他弟子若彼二師破戒等應作如是意所以誘進將去欲令其長益沙門法故弟子如法懺悔師當受弟子辭二師遠行應問為何事伴是誰詣何處有一不好者遮令莫去第四分云不得畜二沙彌若能教持戒增心增慧學問諷誦聽畜僧祇律云不得立心為供給自己故度人出家應作是念當使彼人因我度故修諸善法得成道果不能自降欲降伏他無有是處不能自調而欲調御他人不能自度而欲度人自未解脫欲解脫餘人俱無有是處十法成就聽度人出家受具一持戒二多聞阿毗曇三多聞毗尼四學戒五學定六學慧七能出罪能使人出罪八能看病能使人看病九弟子有難能送脫難能使人送脫十滿十歲下至滿十歲知二部律亦得度人受依止者亦爾不聽畜眾沙彌若畜一極至三若大德比丘多人宗重應語與餘人復白言我知有餘人但欲在阿闍棃下受誦經法增長修學故如是應語與餘人得自教授律攝云滿足十夏方住師位復須成就五法一知有犯二知無犯三知輕四知重五於別解脫經廣能開解於諸學處創結隨開若遇難緣善知通塞常誦戒本能決他疑戒見多聞自他俱利威儀行法無有虧犯具如是德名親教師由親能教出離法故若雖近圓於諸學處不識重輕設六十夏仍須依止明德而住若師小者唯除禮足自餘咸作此即名為老小苾芻不得與他出家及受近圓也寧作屠兒為殺害業不與出家受近圓已捨而不問令我正法速時滅壞應訶不訶不應訶而訶應恕不恕不應恕而恕皆得惡作罪若已近圓人不行恭敬不堪教誨者應與六物驅令出去若是求寂與上下二衣亦驅令去若父母信心持小童子施苾芻者應受若索應還若酬價者任彼多少取亦無犯此小童子在苾芻邊以袈裟片而繫於頸隨時濟養後時長大念報恩者持物來施隨意應受五分律云若度人時應先問汝為何等出家若言為飲食故不應度若言為求善法厭生老病死憂悲苦惱應度根本雜事云凡欲與他出家先當為辦所須六物三衣敷具鉢及水羅尼陀那云欲度求寂應與鉢及小鉢銅椀無令廢缺毗尼母經云授大道人即比丘也具足戒已於一歲中教授一切大道人所作法竟然後更有求受具者當為授未滿歲不得授也沙彌受大戒後更得受一沙彌依止法亦一歲竟得更受不得一時受二人依止善見律云和尚者漢言知罪知無罪薩婆多論云凡受戒法先與說法引導開解令於一切眾生起慈愍心既得增上心便得增上戒此應在未登壇前善巧開示要使領解豈容僧眾已集將秉羯磨方乃宣讀文辭虗應故典徒令大眾坐久遲延叩諸受者茫無所解斯誠無謂也南海寄歸云凡諸白衣詣苾芻所若專誦佛典情希落髮畢願緇衣號為童子或求外典無心出離名曰學生斯之二流並須自食若䬸常住聖教全遮必其於眾有勞準功亦合䬸食或是普通之食或可施主先心雖噉無罪西國僧寺多有學生來就苾芻習學外典一得驅馳給使二乃教發好心既有自利利他畜之非損必是杜多一鉢理則不勞若也片有供承亦成是要遣給齒木令其受食足應時須不傷悲道也菩薩善戒經云旃陀羅等及以屠兒雖行惡業不能破壞如來正法不必定墮三惡道中為師不能教訶弟子則破佛法必墮地獄優婆塞戒經云寧受惡戒一日中斷無量命根終不畜養弊惡弟子不能調伏何以故是惡律儀殃齊自身畜惡弟子不能教誨乃令無量眾生作惡能謗無量善妙之法壞和合僧令多眾生作五無間是故劇於惡律儀罪弟子事師法第三分云和尚者從受得戒和尚等者多己十歲阿闍棃者有五種一出家阿闍棃所依得出家者是二受戒阿闍棃受戒時作羯磨者是三教授阿闍棃教授威儀者是四受經阿闍棃所從受經若說義乃至一四句偈五依止阿闍棃乃至依止一宿阿闍棃等者多己五歲第二分云若僧欲為師作羯磨等弟子當如法料理令僧不作若作令輕若僧與師作訶責等弟子當如法料理令師順從於僧求除罪疾解羯磨師犯僧殘若病若不樂住處若有疑事並如師法中說若惡見生當勸令捨當以二事將護亦如師法中說弟子不白師不得入村不得入他家不得從餘比丘或將餘比丘為伴不得與不得受不得佐助眾事不得受他佐助眾事不得與他鬀髮不得使他鬀髮不得入浴室不得為人揩身不得受他揩身不得至晝日住處房不得至塜間不得至界外不得行他方彼當清旦入師房受經問義當除去小便器應白時到若澡豆灰淨洗手若有可食物當為取若僧中有利養當為取當授澡豆楊枝令師洗手漱口授可食物僧中有利養當白言得如是如是物是和尚分當問師欲入村不若言不入當問何處取食若言某處取當如敕往取若言入村當洗手已架上徐取衣勿使倒錯取安陀會舒張抖擻看次取腰帶僧祇支多羅僧舒張抖擻看授與師應疊僧伽棃著頭上或肩上次取鉢盛囊中持去應取師襯身衣疊舉復取洗足物臥㲲被舉之師出行時當捉行道革屣出房時當還顧閉戶復以手推扉看牢不若不牢當重閉若牢當取戶扉孔中繩內之持戶𨷲著屏處令師在前行道逢相識人當共善語善心憶念行時當避人道若欲入村時應小下道安鉢置一面舒張看僧伽棃授與師若村外有客舍坐肆作坊當持行道革屣置中應問師我得尋從不若言可爾即當尋從若言不須在某處住應如言在某處住若師入村不時出當作是意入村乞食此分與師此分屬我出村已還取革屣下道持鉢置地疊僧伽棃著頭上或肩上到師所住食處當掃淨敷坐具具淨水瓶洗浴器盛食器復安置洗浴座洗足石具拭脚巾若遙見師來即起奉迎取手中鉢置可放處取僧伽棃舒張看勿令有脂膩沾污等若有應去之宜浣者浣之師洗足竟當棄水持洗足石拭足巾還置本處復自淨洗手授淨水與師洗手自所有食當取與師白言此是我食分可食彼須者當取若師食時當侍立看供給所須日時若欲過當即同時食師食已當手中取鉢行澡漱水若自食竟有餘食當與人或非人或著淨地無草處或著淨無蟲水中取盛食器淨洗還置本處取坐具洗足牀淨水瓶澡洗瓶還置本處食處淨掃復次入師房時當看若有塵土當出繩牀及地敷等當記本處出在外曬之淨掃房中糞土棄時當看若有鍼線刀等下至一丸二丸藥取置現處若有主識者當取復當拂拭嚮上杙上衣架上若房有破壞處蟲鼠孔穴可泥者便泥之可擣便擣可平治便平治極令潔淨若本敷座不齊整當更齊整若本齊整當如本齊整所著衣不著衣應各各別一處鉢囊鍼筒置一處革屣囊與油器著一處中庭有塵土即掃除去取水瓶淨洗已還盛淨水置本處復當與師具水瓶洗浴瓶飲水器若浴室中有洗浴時當問欲洗浴不若言洗浴當先至浴室中看應灑便灑應掃便掃應棄水便棄應內水便內應破薪便破應內竈中便內應與師備諸洗浴具先白上座然後然火然火已白時到若師病羸老極當扶抱當與師揩摩身當立師後若欲為異人揩身或受他揩身當白師使知與師洗自洗已若師病羸老極當扶出浴室乃至輿還房中還至浴室遍看諸洗浴物還置本處彼當日三問訊師朝中暮當為師執二事勞苦不得辭誕一修理房舍二補浣衣服師如法所教事盡當奉行若遣往方面周旋不得辭誕被訶責已應向師如是懺悔偏露右肩脫革屣胡跪合掌作是語大德我今懺悔更不復作若聽懺悔者善若不聽者當下意隨順求方便解其所犯師有五非法弟子應懺悔而去應語言我如法師不知我不如法亦不知若我犯戒捨不教訶若犯亦不知犯而懺悔亦不知根本雜事云若復有人依托師主於佛法中鬀除鬚髮而被法服以淨信心出家修行彼人於師乃至盡壽四事供養未能報恩律攝云若是父母二師此之四人縱是破戒亦應供養不應輕慢善見律云智慧之人往到宿德所避六法然後可坐一極遠二極近三上風四高處五當眼前六在後若弟子隨師行路值說法貪聞法故至明相出不犯離師罪何以故心無決定住故問五種阿闍棃四種定是上座惟教讀者或是下座侍奉之法應當云何答惟除禮拜一切皆如奉事師法問比丘餘食應與人及非人或著淨地施諸鳥獸或著水中施諸魚蟲今何故云當著無蟲水中答如僧祇云蟲者非謂魚鼈之類乃小小倒孑之屬正恐飲食鹹膩或致傷生故也上座法毗婆沙云有三種上座一生年上座戒臘最高二世俗上座大福大慧雖年二十皆應和合推為上座三法性上座即阿羅漢梵語悉替那此云上座亦云上士無自利利他行者名下士單自利為中士具二利為上士問初學比丘設通經論未諳律法必須五夏依止縱使大福大慧云何推為上座耶答推為上座亦秪令其宏經演論營修福業非謂便離依止也毗尼母經云無臘至九臘名下座十臘至十九臘名中座二十臘至四十九臘名上座過五十臘以上名耆舊長宿第四分云佛告比丘若上座既不學戒亦不讚歎戒若有餘比丘樂學戒讚歎戒者亦復不能以時勸勉讚歎此上座不應親近不應習學其法若習學其法者長夜受苦十誦律云有五法正法滅亡沒一無欲二鈍根三雖誦義句不能正受亦不能令他解了四不能令受者有恭敬威儀有說法者不能如法教五鬬諍相言不在阿練若處亦不愛敬阿練若處反上五法者正法不滅不亡不沒更有五法正法滅亡沒不隨法教隨非法教不隨忍法隨不忍法不敬上座無有威儀上座不以法教授上座說法時愁惱令後生不得受學三藏自命終已比丘放逸習非法失諸善法反上五法者正法不滅不亡不沒又有七法令正法滅亡沒無信懈怠無慚無愧喜忘無定少智正法滅像法時有五非法在世一者有比丘心得小止便謂已得聖法二者白衣生天或有出家者墮惡道中三者有人捨世間業出家破戒四者有破戒者多助有持戒者無助五者無不被罵乃至阿羅漢亦被罵佛告優波離當來有五怖畏今未有應知是事方便求滅何等五有比丘不修身不修戒不修心不修智度他出家受戒不能令修身戒心智是名第一怖畏不修身戒心智與他依止畜沙彌不能令修身戒心智是第二第三怖畏不修身戒心智與淨人沙彌相近住不知三相掘地斷草用水溉灌是第四怖畏不修身戒心智共誦修多羅毗尼阿毗曇以前後著中以中著前後現見不知白法犯非犯是第五怖畏更有五怖畏今未有當來有應知是事求方便滅何等五當來比丘不修身戒心智無欲根鈍雖誦句義不能正受是初怖畏不修身戒心智與尼相近或犯大事捨戒還俗是第二怖畏不修身戒心智如來所說甚深修多羅空無相無願十二因緣諸深要法不能信樂受持雖受不能通利如是說時無憐愍心無愛樂心好作文頌莊嚴章句樂世俗法隨世所欲有信樂心說俗事時有愛樂心是故如來所說甚深修多羅空無相無願十二因緣諸深法滅是第三怖畏不修身戒心智為衣食故捨阿蘭若處捨林樹下入聚落中為衣食故多所求覓求覓時優亂是第四第五怖畏法門怖畏責在耆年故并錄之以作警䇿同學法第四分云比丘有五法不應與作親厚若喜鬬諍若多作業若與眾中勝比丘共諍若喜遊行不止若不為人說法言示人善惡復有五法不應將作伴行喜太在前行喜太在後行喜抄斷人語次不別善惡語善語不讚稱美惡語如法得利不以時為彼受根本雜事云阿難白佛善知識者是半梵行佛言阿難善知識者是全梵行僧祇律云比丘有十事為人所不愛何等十不相習近輕數習近為利習近愛者不愛不愛者愛諦言不愛好豫他事實無威德而欲凌物好屏私語多所求欲阿練若比丘不應輕聚落中比丘言汝必味舌頭少味而在此住應讚言汝聚落中住說法教化為法作護覆陰我等聚落中比丘不應輕訶阿練若言汝在阿練若住希望名利麞鹿禽獸亦在阿練若住汝從朝竟日正數歲耳數月耳應讚言汝遠聚落閒靜思惟上業所崇此是難行之處能於此住而息心意不應議論互諍勝負禮敬法律攝云有四種應禮一是如來一切人天並應致敬故二出家者不禮俗人是彼所敬故三應禮敬先受近圓者惟除尼眾彼敬亦爾四未近圓者應禮近圓有十種不應禮行別住等四人授學人三種被捨置人諸在家人及未近圓禮敬之儀有其二別一謂五輪著地二謂執捉腨足口云畔睇乃西域致敬之辭未見翻譯恐即是槃那寐或云槃談譌云和南皆翻我禮若知他身有穢觸而為禮敬或自身有穢觸而禮他者俱得惡作有二種穢觸一食竟未澡漱二便利未洗淨闇中禮拜不應至地口云畔睇即是致敬第四分云比丘有十種威儀時不應禮大行時小行時若躶身若鬀髮若說法若嚼楊枝若洗口若飲若食若噉果根本雜事云不應著一衣禮他亦不得一衣受禮孝父母法五分律云畢陵伽婆蹉父母貧窮欲以衣供養而不敢以是白佛佛告諸比丘若人百年之中右肩擔父左肩擔母於上大小便利極世珍奇衣食供養猶不能報須臾之恩從今聽諸比丘盡心盡壽供養父母若不供養得重罪根本尼陀那云父母於子能為難事荷負眾苦假令出家於父母處應須供給但除衣鉢餘物可供若無餘物可從施主隨時乞求若乞求難得應以僧常所得利物共相供給若無利物應以僧常所食之分減取其半而為供濟若常乞食者以己所須滿腹食內應取其半濟於父母安居法不應一切時人間遊行聽三月夏安居白所依人言我於此處夏安居長老一心念我比丘某甲依某甲聚落某甲僧伽藍某甲房前三月夏安居房舍破修治故如是三說後安居法亦如是若無所依人心念安居但為安居故來便成安居安居竟客比丘來不應移亦不應去若欲安居先自往看房舍臥具然後方受應白二羯磨差分房臥具人彼應數比丘數房數臥具乃至有福饒無福饒等已至上座前如是言大德上座如是房舍臥具隨意所樂便取先與上座以次展轉乃至下座應受房隨力當治不應分僧都集處欲在如是處安居應先作相已去應滅名不得移此房牀褥臥具置餘房中或問舊住人等然後移之去時應還本處若房舍缺壞應移至餘房已治應還若於餘寺亦爾若有不定臥具乃至杖扇等房中無者付之若有餘從上座付有前安居有後安居皆住三月後安居者亦聽受自恣聽受所得物聽受臥具不應三月未足便數歲應住待日足不應露地安居聽在樹下安居小屋內安居山窟中安居樹空中安居安居中若有種種因緣聽受七日法去及七日須還更有七日不得還者聽白二羯磨受過七日法若半月若一月還若有命難梵行難應去若有破僧事應去若為止破僧事應去若為和合彼僧應去受七日出界有留難不還者不失歲在前安居處聞彼處大得利養即便往彼不得前歲違本要得罪或無事便去或受七日法過七日違本要得罪及七日還無罪末後受七日出界外若來若不來無罪後安居亦如是受他安居請有命難梵行難應往白檀越求移去聽者善若不聽便應去第四分云若此處安居聞異處僧大得安居衣物而往彼住即失此處於彼少住已復還此處復失彼處僧祇律云若行道未到住處安居日至即於路側若依樹若車應受安居至明相出趣所住處到後安居日偏袒胡跪合掌作是言長老憶念我某甲比丘於此僧伽藍雨安居後三月如是三說夏月亦名雨時故稱雨安居也若比丘行道前安居日不受安居一越毗尼罪到所住處後安居日不受後安居二越毗尼罪是人破安居不得衣施若春冬時付房舍有上座來隨次第住安居時付房舍上座來不應次第住若安居時驅他起者越毗尼罪不聽不共語欲方便少事不語得半月至布薩日應共語共相問訊事答事呪願過布薩日續復如前五分律云聽在結加趺坐及衣鉢雨漏所不及處安居無事應前安居有事聽後安居欲安居時應先籌量此處有難無難有一比丘安居麤食不足佛聽以此因緣破安居無罪梵行難命難等亦爾十誦律云後安居上座不應從前安居上座取房舍臥具若前上座有二分臥具應與後一分七日法從五眾受不得心念受除阿蘭若獨住人若船簿上水下水者不得安居繫住不移去者得安居若欲安居先應籌量住處安隱有好同伴坐禪說法隨病藥食等然後安居若無佛所聽因緣不聽出界宿乃至一夜受啞法偷蘭遮不共語是外道法故根本羯磨云有緣事守持一日乃至七日法可白一人過七日乃至四十日當僧中乞過四十日失夏若有難緣不名失夏問後安居三月未足尚不許數歲受七日留難不還乃名不失歲今有不受安居或輙破安居者可數歲不若不數歲則戒次先後得無亂不又僧祇云前安居日不受安居一越毗尼罪他部不結此復何從答結夏安居比丘要務若違律制失利良多必有他緣聽結後夏苟無事故須受前三僧祇結罪為懲藐法之愆實與他部不甚相遠然所謂失歲者但是不得衣施不得作迦絺那衣人及未滿十歲不得作和尚等非謂先受戒次今更退令小也寄歸傳中已首明斯義矣自恣法有眾比丘於異住處夏安居共作制不得共語禮拜問訊先後乞食者各隨所應作若共持器以手招伴如是得安樂住安居竟怨佛所佛慰勞之以此具白佛言汝曹癡人自以無患其實是患汝曹癡人共住如似怨家猶如白羊我無數方便教諸比丘彼此相教共相受語展轉覺悟汝曹癡人同於外道受行瘂法時六羣便舉他清淨比丘罪佛言若欲舉有事比丘應先求聽時六羣嫌清淨比丘曾從求聽故復從清淨比丘求聽佛言具五法得求聽知時不以非時如實不以虗妄利益不以無利益柔輭不以麤獷慈心不以瞋恚彼六羣內無五法餘具五法者從求聽六羣不聽佛言自今安居竟應自恣聽遮自恣不應求聽何以故自恣即是聽不應一時自恣聽一一自恣不應隨意自恣應次第從上座自恣聽差授自恣人具五法不愛恚怖癡知自恣未自恣者應差白二羯磨大德僧聽若僧時到僧忍聽僧差某甲比丘作授自恣人白如是羯磨準作不應在座上自恣上座離座互跪一切僧亦應離座互跪自恣竟者復坐應了了自恣徐徐自恣三說自恣偏袒胡跪合掌作是語大德眾僧今日自恣我某甲比丘亦自恣若見聞疑罪大德長老哀愍故語我我若見罪當如法懺悔如是三說受差者應先白已然後授自恣大德僧聽今日眾僧自恣若僧時到僧忍聽和合自恣白如是不應非法別眾非法和合法別眾自恣應法和合自恣聽在說戒處自恣若在道路行得和合自恣者善若不得和合隨親厚同意移異處結小界自恣應解而去若一比丘住者於自恣日往說戒處掃灑乃至具舍羅待客比丘來若有五人或過五人差授自恣人若四人以下互為自恣言今日眾僧自恣我某甲比丘亦自恣清淨如是三說若無人來者應心念口言亦如是三說有事應囑授受囑者有事應轉囑授事竟應自往若有八難及餘事緣應略自恣若二說若一說若共三說若共二說若共一說若即去隨難事遠近若今日自恣必有諍事或能破僧者不應即日自恣應小停若遮自恣人三業有不清淨等如布薩中說病亦如布薩中說若有眾比丘得增上果證恐今自恣便不得如是樂應作白增益自恣至四月滿自恣或有異住處比丘不和合欲來此自恣並如布薩中說按十誦律云至八月客仍不去應不自恣而去不應鬬諍相言故不應在比丘尼及未受大戒人前作羯磨自恣不應自恣竟復說戒自恣即是說戒十誦律云自恣竟應至上座前唱言僧一心自恣竟僧祇律云若安居眾中有一人前安居者至七月十五日舉眾應同此一人受自恣自恣竟坐至八月十五日若一切後安居一切應八月十五日自恣若比丘聚落中安居聞城中自恣日種種供養竟夜說法眾欲往者應十四日自恣已得去應拜差也自恣人若一若二不得過若二人作自恣人者一人受上座自恣一人應次座前立上座說已次座復說如是展轉次第下到自座處應受自恣不得受僧自恣竟然後自恣五分律云聽上座八人一一自恣自下同歲同歲一時自恣毗尼母經云眾中若有不清淨止不應自恣當作止自恣羯磨應檢校不清淨者若重驅出輕者令其懺悔然後自恣若此不清淨者自恃聰明多智亦恃徒眾國王大臣力不可驅出者當至後自恣後自恣時到猶不出者眾僧可出界外自恣得清淨耳南海寄歸云梵語鉢剌婆剌拏譯為隨意即是隨他於三事中任意舉發說罪除愆之義舊云自恣是義翻也必須於十四夜請一經師昇座誦經於時緇素雲集然燈續明香華供養明朝總出旋遶村城各並虔心禮諸制底棚車輿像鼓樂張天旛葢縈羅飄揚蔽日禺中始還入寺日午方為大齋過午咸集作隨意事先乃苾芻後方尼眾次下三眾若其眾大恐延時者應差多人分受隨意被他舉罪則準法說除當此時也或俗人行施或眾僧自為所有施物將至眾前其五德不愛恚怖癡知可分不可分者應問上座云此物得與眾僧為隨意物不上座等答言得所有衣服刀子鍼錐之流受已均分隨意既訖任各東西言說罪者意欲陳罪說已先愆改往修來至誠懇責半月半月為褒灑陀朝朝暮暮憶所犯罪初篇若犯事不可治第二有違人須二十若作輕過對不同者而除悔之說己之非冀令清淨自須各依局分則罪滅可期若總相談愆非律所許問僧祇差自恣人不過一二寄歸許差多人四分僧祇皆次第一一自恣五分除上座八人餘同歲者得並自恣此復何從答受自恣人若多則未免喧雜應準僧祇必令一一自恣則眾大難周應從五分也迦絺那衣法眾比丘安居自恣竟往見世尊路值天雨衣服皆濕僧伽棃重疲極佛告比丘安居竟有四事應作自恣解界結界若欲重結或大或小故須先解後結若不重結則亦不須解也受功德衣受功德衣已得五事一畜長衣二離衣宿三別眾食四展轉食五食前後不囑比丘入聚落云何成受功德衣若得新衣檀越施衣糞掃衣若是新衣若是故衣新物貼作淨若已浣浣已納作淨非邪命得非諂曲得不以相得不以激發得不經宿不捨墮作淨即日來應法四周安緣五條作十隔若過是數亦應受應自浣染舒張輾治裁作十隔縫治在眾僧前受如是白大德僧聽今日眾僧受功德衣若僧時到僧忍聽眾僧和合受功德衣白如是次應問誰能持功德衣若言能者白二羯磨差之大德僧聽若僧時到僧忍聽僧差某甲比丘為僧持功德衣白如是羯磨準作次作白二羯磨付持大德僧聽此住處得可分衣物現前僧應分若僧時到僧忍聽僧持此衣與某甲比丘此比丘當持此衣為僧受作功德衣於此住處持白如是羯磨準作持衣比丘應起捉衣隨諸比丘手得及衣言相了處作是言此衣眾僧當受作功德衣此衣眾僧今受作功德衣此衣眾僧已受作功德衣竟如是三說彼諸比丘應如是言其受者已善受此中所有功德名稱屬我持衣人應答言爾如是次第乃至下座若得未成衣應僧中羯磨差比丘作若作得已成者應如法受冬四月竟僧應出功德衣應如是出僧集和合未受大戒者出不來者說欲僧今和合何所作為答言出功德衣大德僧聽今日眾僧出功德衣若僧時到僧忍聽僧今和合出功德衣白如是若不出過功德衣分齊突吉羅僧祇律云若一人獨作者取時應言此迦絺那衣截今受如是三說截時應作是言此迦絺那衣我當受縫時浣時染時點時刀淨時亦如上說作成已應心念口言我某甲比丘受此迦絺那衣如是三說有十事捨迦絺那衣一衣竟捨受時作是念我作衣竟當捨二受時捨本作是念受衣當捨三時竟捨本作是念爾許時我當捨四聞捨本作是念聞二師捨時我當捨五送捨本作是念我是衣與他已當捨六壞捨受迦絺那衣已中間自言我今捨七失捨本作是念中間壞敗失不現我當捨八出去捨本作是念我此中住出去時當捨九時過捨臘月十五日不捨至十六日即名為捨得越毗尼罪十究竟捨至臘月十五日一人僧中唱捨五分律云若浣染打縫不如法若小者大若是錦綺衣若未自恣竟受若貪利養若欲故捨五事皆不成受受有三十日捨亦有三十日若前安居七月十六日受至十一月十五日捨若七月十七日受至十一月十六日捨乃至若八月十五日受至十二月十四日捨若後安居八月十六日受至十二月十五日捨十誦律云五比丘不得作迦絺那衣人一無歲二破安居三後安居四擯五別住問佛聽自恣後受功德衣至十二月十五日當捨今乃造功德衣平時著用無有節限且有云一納當三衣者是耶非耶答本因僧自恣後持衣見佛雨濕疲極乃聽作功德衣兼得五事利益極其勢分止許冬盡為期稍踰分限即便招過況復僧中唱受高供箱中原非披著之物五條十隔似安陀會那當一納之名流俗譌傳深為罪濫問五分許後安居者八月十六日受十誦不許後安居比丘作迦絺那衣此復何從答準僧祇律乃至一人受前安居舉眾皆同此人受前自恣然後坐滿三月當知後安居人雖同受前自恣猶未滿歲所以不得作持衣人也若舉眾皆後安居則八月十五夏滿自恣十六乃作迦絺那衣何過之有音義辭誕誕壇上聲又去聲放也欺也又大也又闊也義不相應恐是憚字音悞五條十隔每條二隔故五條共成十隔今作每條十隔者非若爾則五條五十隔矣
