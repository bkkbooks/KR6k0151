body:
  text: 古吳蕅益沙門智旭彚輯治罪法夫罪從緣起緣起無性故對治道生罪種則滅名為罪性本空非撥相以求性也而無慚之輩往往藉口觀心實相不思作法除愆嗟嗟罪相尚自不知何況通達實相夫罪雖從心生必因事而成業則罪雖從心滅豈離事而取空況事有挾理之功理無隻立之能故説悔而不觀心猶能決罪之流倘談理而不發露決難清罪之源所願各懷深信勿致猶豫各秉直心莫隨放逸本從理而立事還因事以合理庶得戒珠與慧日咸輝三輪與七支同淨紹隆佛種光顯僧輪永遮惡趣之門速導菩提之路問古人謂三種懺法寧可缺於前前不可缺於後後良以罪如霜露慧日能消故必以理觀為主也今獨扶作法得無拘泥小教未達大乘實相之奧旨耶答寧缺前前不缺後後者為緣缺者言也如欲出罪而無二十清淨僧可得者是也又為顯示前前不兼後後後後必具前前故也若必耻作法而不肯奉行則是顧惜體面隱忍覆藏全未了知罪性本空豈名慧日故今獨扶作法正所以為理觀之本智者固達全事即理愚者亦可因事入理荊溪云既云犯重不獨觀心言觀心者行於事懺必藉觀心若無觀心重罪不滅必事理合行方辦前事又云事戒為三觀本故云尸羅清淨三昧現前若無事戒世禪尚無何況三諦有言大乘何須執戒者謬矣言不執者乃是持而不執若令不持名不執者乃是執破何名不執執持尚無忘持安在文今苟欲廢作法便非時戒事戒既缺理觀何從藉口實相大乘止成惡取空見自誤誤他其失匪細思之思之文分為六初明治四棄法二明治僧殘法三明治偷蘭遮法四明治輕罪法五明諸羯磨法六明覆鉢法初明治四棄法第二分云難提比丘為魔所引就死馬邊犯不淨行無覆藏心語諸比丘往白世尊佛聽僧與波羅夷戒謂此人既犯重罪則已毀破波羅夷戒但以無覆藏心啼泣不欲離袈裟服故令衆僧和合白四羯磨重復與其波羅夷戒仍得與諸比丘共住也彼應三乞僧為白四羯磨既與戒已當隨順行法不得授人具戒不得與人依止不得畜沙彌不得受差教授比丘尼不應為僧説戒此謂講演戒法不應住僧中問答毗尼不應受僧差使作知事人及處斷事作使命不應早入聚落逼暮還當親近比丘不得親近外道白衣當順從比丘法不得説餘俗語不得衆中誦律若無能誦者聽此謂半月半月誦戒不得更犯罪不得非僧羯磨及作羯磨者不得受清淨比丘敷座洗足水拭革屣揩摩身禮拜迎逆問訊及捉衣鉢不得舉清淨比丘為作憶念作自言治不應證正人事不得遮清淨比丘説戒自恣不得與清淨比丘共諍説戒及羯磨時來與不來衆僧無犯若重犯波羅夷戒應滅擯根本雜事云乃至斷盡煩惱以來常應順行不行得罪斷盡煩惱謂證阿羅漢果以來謂未證果以前也若獲果證以後不應更行僧祇律云與波羅夷學者應在一切比丘下坐一切沙彌上坐不得與比丘同屋過三宿復不得與沙彌過三宿比丘不淨食彼亦不淨彼不淨食比丘亦不淨十誦律云與學沙彌法者佛所結一切戒法盡應受行得與比丘作布薩自恣二羯磨不得足數作布薩自恣羯磨謂布薩羯磨須有四清淨比丘若止有三清淨比丘一與學者便不可作布薩羯磨止可對首布薩也自恣須五人亦爾餘一切羯磨悉不得作毗尼母經云此比丘得羯磨已名為清淨持戒者但此一身不得超生離死亦不得無漏功德然障不入地獄耳喻如樹葉落已還生樹上無有是處問與學之人根本許其證果可捨行法母論則謂不得證果此云何通答根本約難提示現故證果可期母論指佛法通途故證果絶分葉落無還生之理造罪者寧不寒心作法通無生之致懺悔者大須努力善見律云淫欲妄語其相易現殺盜二戒其相難知因細而得從細而解是故莫向狐疑人道汝得波羅夷罪應令往問師及同學或弟子等若見有罪相者令靜坐一房使其自觀若戒無病心便入定若破戒者心即不定然後隨應決之問犯不淨行絶不覆藏得與波羅夷戒未審犯餘三重亦得爾不答難言也雖然請試言之且如盜戒以五緣成重一是他物二他物想三盜心取四直五錢五離本處設有比丘偶見一物生貪愛心盜心舉離本處爾時已成重罪次念尋悔仍置不取無覆藏心急求與學寧得不與倘既取物後方發露輒濫與之寧不招過又如殺戒若欲殺此人誤殺彼人戒雖未失世法已不可容況復遂彼殺心縱令不覆何當與學然準維摩及淨業障二經亦未始不稍通一線也次則大妄語戒若為利養故大妄語則必不能無覆藏心理無聽許設因命難及梵行難作大妄語而得脫之隨即發露求哀亦安可終杜絶當知須是善能滅諍不愛不恚不怖不癡之人方可宰任其事耳大般涅槃經云有持戒比丘威儀具足護持正法見壞法者即能驅遣訶責糾治當知是人得福無量不可稱計若善比丘見壞法者置不驅遣訶責舉處當知是人佛法中怨若犯四重作五逆罪自知定犯如是重事而心初無怖畏慚愧不肯發露於佛正法永無護惜建立之心毀呰輕賤言多過咎如是等人亦名趣向一闡提道若復説言無佛法衆如是等人亦名趣向一闡提道梵語闡底迦此云多貪深樂生死故又阿闡底迦此云無欲不樂涅槃故又阿顛底迦此云極惡斷盡善根故問依律則比丘犯棄如有羅已斷不復還生犯二篇者須別住意喜復須二十僧中出罪乃至惡作亦必對首懺悔方得清淨何故大佛頂經云若造五逆無間重罪及犯四棄八棄誦此呪者悉皆除滅更無毫髮諸佛菩薩不但不將為過亦將功德與之乃至悟無生忍如是觀之罪無大小只須持呪曾無發露向彼之科經律宵壤義云何通答佛頂光聚微妙章句名為呪心亦名心呪即是密詮首稜嚴王三昧試觀於顯説中最初便敕直心酬問心言直故永無諸委曲相倘罪無大小不肯發露向人既違如來一道豈合無上呪心經中為顯密印神功故云罪無不滅不惟此經為然舉凡尊勝大悲方等諸呪乃至三十五佛五十三佛五千五百佛名等經皆有此義正由衆生惑業障深無知造罪難調難伏難拔難除故毗尼嚴擯絶之科經呪開自新之路一折一攝相為表裏令未造罪者不敢故造已造罪者還得滅除可謂徹底悲心勝妙方便倘無律制則住持僧寶不尊倘無經呪則罪障衆生永墜四悉巧被同出一音豈容妄生軒輊哉二明治僧殘法第三分云犯僧殘罪覆藏隨覆藏日與治覆藏罪彼應僧中偏露右肩脫革屣禮僧足合掌胡跪白言大德僧聽我某甲比丘犯僧殘罪覆藏我某甲比丘犯僧殘罪隨覆藏日今從僧乞隨覆藏日羯磨願僧與我隨覆藏日羯磨慈愍故如是三説僧應白四羯磨與之若覆藏一日則行一日別住法若覆藏二日則行二日別住法乃至五日十日半月一月半年一年等亦爾行覆藏時更犯重罪應乞作覆藏本日治白四羯磨謂正行別住又犯僧殘則前所行行法皆壞應更乞僧從本日再治罪起如前行之行覆藏竟應乞作六夜摩那埵白四羯磨行已次作白四羯磨出罪犯僧殘罪不覆藏應乞六夜摩那埵行已出罪行摩那埵時重犯應乞摩那埵本日治同覆藏本日治義行已出罪有犯衆多僧殘罪或覆藏一夜或乃至十夜聽與共作衆多僧殘罪覆藏十夜白四羯磨次與摩那埵出罪若犯二罪二俱覆藏或憶一不憶一或一有疑一無疑或識一不識一或説一不説一應隨所憶所識識即無疑所説與覆藏羯磨後還憶還識還説者應隨所犯仍與覆藏羯磨覆藏兩月憶一月不憶一月等亦如是若犯二僧殘罪罷道罷道已還受大戒或先後俱覆藏或先覆藏後發露或先發露後覆藏隨所覆藏日與覆藏羯磨或先後俱發露即與摩那埵行已出罪覆一不覆一等作四句亦如是憶一不憶一等各作四句亦如是乞覆藏時説一不説一作四句亦如是行覆藏時乃至行摩那埵竟各作二十句亦如是作沙彌還受大戒百句亦如是顛狂心亂痛惱所纏各百句亦如是僧與作不見罪舉不懺悔舉不捨惡見舉各百句亦如是種種四句二十句乃至百句之圖覆一罪不覆一罪作四句之圖憶一罪不憶一罪作四句之圖疑一罪不疑一罪作四句之圖識一罪不識一罪作四句之圖乞覆藏時説一不説一四句圖右五圖每圖四句共有二十句且約犯罪乃至乞覆藏時罷道而言之也復有行覆藏時罷道行覆藏竟罷道行摩那埵時罷道行摩那埵竟罷道亦各具二十句通前共成罷道百句以例作沙彌等七事亦各有百句以圖示之罷道共有百句圖七百句圖且如作沙彌一句上含五時一一時中下含覆一不覆一等各各四句一時中凡含五箇四句成二十句五時各二十句共成百句即是捨具戒作沙彌重來受具有此百句差別不同皆當隨其所應而與之以種種羯磨法也其顛狂等三病約還得本心例各百句不見罪等三舉約乞得解擯亦例各百句共成七百句也若行覆藏時罷道或應作本日治者罷道或行覆藏竟罷道或行摩那埵時罷道或行竟罷道後還受戒各隨應與之作沙彌等各五句亦如是罷道重受具戒五句之圖作沙彌重受具亦同此五句顛狂心亂痛惱所纏還得本心亦各同此五句不見罪舉不懺悔舉不捨惡見舉得解羯磨亦各同此五句共成四十句有犯僧殘罪謂犯棄覆藏謂犯波逸提乃至惡説覆藏彼應作突吉羅懺即與摩那埵有犯波逸提謂是棄罪等而覆藏者皆先作突吉羅懺後如法懺若犯僧殘作僧殘意覆藏應作突吉羅懺已與覆藏羯磨若犯僧殘不憶犯數不憶日數或憶犯數不憶日數皆應與清淨已來覆藏若憶日數不憶犯數應數日與覆藏疑不疑等亦如是若行摩那埵時重犯罪覆藏應更與摩那埵次與本日治然後出罪自行覆藏乃至出罪等不應更互作覆藏羯應本日治摩那埵足論二十人出罪行覆藏比丘有八事失夜得突吉羅罪謂如下文所明如此八種應白而不白則此日不名行別住法應悔突吉羅罪已更補行一日也一往餘寺不白二客比丘來不白三有緣事自出外不白四寺內除行者不白五病不遣信白六二三人共一屋宿七在無比丘處住八不半月説戒時白應如是具威儀白大德僧聽我某甲比丘犯僧殘罪覆藏我某甲比丘隨覆藏日從僧乞覆藏日羯磨僧已與我隨覆藏日羯磨我某甲比丘已行若干日未行若干日白大德令知我行覆藏若行摩那埵者應嘗在僧中宿日日如是白若布薩日彼人軟柔多有羞愧應至清淨比丘所白言大德上座我今日捨教敕不作若欲作時應至清淨比丘所白言我今日隨所教敕當作根本百一羯磨云如行遍住即別住及行摩那𭅤時聞有苾芻是鬬諍者是評論者或復無慚懈怠之類欲至於此應對苾芻捨其行法其人去已還就善淨苾芻受其行法五分律云別住比丘欲遠行應捨竟去向一如法比丘言大德聽我今捨別住法後更行之如是三説若不捨而去於路上見比丘便應自説大德我某甲比丘行別住法已若干日餘若干日大德憶持若捨別住到餘處應求彼僧更行別住破僧應聽有比丘或行別住時或行摩那埵時或阿浮阿那時命過諸比丘白佛彼為具戒命過為破戒命過佛言皆是具戒律攝云有六種人犯衆教罪對一苾芻説除其罪得名清淨一者持蘇呾羅藏二者遍持毗奈耶藏三者遍持摩嘻里迦藏四者性極羞恥若説其罪懷慚致死五者衆中最老上座六者大福德人此六人者人見治罰謗議便生若能於所犯罪決情斷絶誓不更為深生慚恥心無欺誑便得除滅若犯不共衆教罪者根轉之時過亦隨滅比丘於十三事中一弄陰二觸女三粗語四欺身五無主作房六有主作房皆不與尼同尼於十七事中亦有十事不同比丘故名不共十誦毗尼序云上座犯僧殘行摩那埵令人生不信心得一心生念從今日更不作即得清淨大德多知亦爾寧當反戒不能行摩那埵者亦爾病比丘無力不能行摩那埵者亦爾有一比丘犯僧殘衆不滿二十欲至他處懺悔道路遇賊奪命又一比丘犯僧殘衆不清淨欲至他處懺悔道路遇賊奪命是人一心生念如法懺悔即得清淨不墮惡道注曰凡有六種懺悔法一上座二大德三羞恥四病弱五衆不滿六衆不清淨不可妄用及有僥幸也唐有自欺罪亦不除要須廣問明律者能斷之耳問律攝所謂六種人乃人天眼目僧中首領當觀突吉羅罪與四棄等今犯粗罪寬恕若此則其餘學處應無礙耶答既作僧中首領自然輕重無虧止因煩惱習強或致偶違淨法發露則反動羣疑自誓必永無欺誑此等懺法原非可徼幸自欺豈得輒漫云無礙三明治偷蘭遮法十誦律云從波羅夷生重偷蘭遮應一切僧前悔過除滅淫則二身相觸而未入盜則擇取五錢而未離本處殺則傷彼前人而不死妄則誑稱證得而不了了也從波羅夷生輕偷蘭遮淫則兩身相向而未觸盜則觸他重物未擇取或擇取輕物未離處殺則興害方便未傷人妄則未出口中止從僧殘生重偷蘭遮弄陰則精未出而中止觸女身則一有衣一無衣粗語及索供則説不了了媒嫁則不受語而往説還報大小房則作而不成瞋謗則説不了了破僧主破僧伴訶僧不受諫並至羯磨時方捨皆是重方便罪皆應出界外四比丘前悔過除滅從僧殘生輕偷蘭遮一比丘前悔過除滅以手捉陰而未弄二俱有衣互相觸粗語索供未出口而止媒嫁往説不還報大房小房規度而未作瞋謗未出口中止破僧至惡性初白時便捨皆名輕方便罪此從生罪亦名方便蘭亦名因蘭四分羯磨云獨頭偷蘭遮有三差別如破法輪主盜四錢殺天等名上品若破羯磨主破法輪伴盜三二錢等名中品若破羯磨伴剃毛裸形畜人皮石鉢食生血肉著外道衣盜一錢等名下品準如從生偷蘭遮罪三種懺法應知此獨頭罪亦名自性蘭亦名果蘭所謂等流罪也問破僧是逆罪重難云何可作偷蘭遮罪懺耶答破法輪主是逆伴即非逆破羯磨僧若主若伴並不名逆又破法輪主雖是逆罪仍不失比丘戒故亦僅名偷蘭遮罪不名為波羅夷若僧輪未破仍可懺悔破則成逆不可單作法懺須是無生懺也至於破法輪伴破羯磨主並通懺悔但設捨戒還來受具則便成重難矣四明治輕罪法治尼薩耆已如三十事説今但總明治波逸提突吉羅等諸罪也第三分云比丘犯罪若欲在一比丘前懺謂尋誓波逸提突吉羅等小罪應至一清淨比丘所偏露右肩若上座禮足下座則除此法胡跪合掌説罪名説罪種作是言長老一心念我某甲比丘犯某甲罪今從長老懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不覆藏長老憶念我清淨戒身具足清淨布薩如是三説彼應語言自責汝心應生厭離答言爾若欲在二比丘邊懺悔謂就波逸提中其情稍重須向二人説悔其心始安或住處通己但三人應至彼二清淨比丘所偏袒説罪等如土受懺者應先問彼第二比丘若長老聽我受某甲比丘懺者我當受彼應言可爾若欲在三比丘邊懺亦如是亦是波逸提中罪性重者意須向三人悔其心始安或彼住處通己共四人也彼應轉語二人方受若欲在僧中懺者從四比丘乃至無數皆名為僧即是懺上中二品偷蘭遮罪及僧中捨衣僧中懺也應往僧中偏袒脫屣禮僧足胡跪合掌作是白大德僧聽我某甲比丘犯某甲罪今從僧乞懺悔如是三説受懺者應作白然後受彼懺大德僧聽彼某甲比丘犯某甲罪今從僧懺悔若僧時到僧忍聽我受某甲比丘懺白如是作是白已受懺彼應如前三説懺悔應語言自責汝心生厭離答言爾毗尼母經云上座於下座有所犯罪現前應立四法發露一偏袒右肩二脫革屣三合掌四説所犯罪下座向上座悔所犯者現前應立五法加第三胡跪此上下座不約九夏內二十夏外論也但先受戒乃至須臾頃者即名上座又依四分則上座向下座悔但除禮足亦須胡跪根本雜事云具五種法應作懺摩一者有信心二者發精進三者生恭敬四者口出美言五者近善知識十誦毗尼序云若賊捕得若病人雖相應罪聽心念口言懺後從清淨比丘懺悔後聽受彼懺悔相應罪者同犯此一罪也平居之時不得向同犯者懺悔同犯者亦不得受他懺悔今在難中故令不病之人不被賊捕之人先作意曰我今此罪後更當從清淨比丘懺悔作此意已即得受彼病人賊捕得人懺悔使彼死後不墮落也五明諸羯磨法第三分云有二比丘喜鬬諍共相罵詈口出刀劒互求長短亦復勸助餘人鬬諍佛令僧作訶責白四羯磨集僧已為作舉作舉已為作憶念憶念念已與罪大德僧聽此某甲比丘喜共鬬諍共相罵詈口出刀劒互求長短彼共自鬬諍已若有餘比丘鬬諍者復往彼勸言汝等勉力莫不如他汝等多聞智慧財富亦勝多有知識我等當為汝作伴黨令僧未有諍事而有諍事已有諍事而不除滅若僧時到僧忍聽為某等比丘作訶責羯磨若後復更鬪諍共相罵詈者僧當更增罪治白如是羯磨準作若隨順衆僧無所違逆求解羯磨者應解僧中三乞為作白四被擯比丘不應不喚來至界內聽遣好信來至僧中白懺悔謂汙他家行惡行者與依止比丘學法毗尼得智慧隨順衆僧不敢違逆求解羯磨應解比丘有十法應與作遮不至白衣家羯磨惡説罵白衣家一方便令白衣家損減作無利作無住處二三四鬪亂白衣五於白衣前謗佛法僧六七八在白衣前作下賤罵九如法許白衣而不實十有五法比丘不應為作此羯磨不恭敬父母沙門婆羅門所應持者而不堅持別應作訶責折伏等法也若恭敬父母沙門婆羅門所應持者堅持不捨如是比丘犯前十法應住遮不至白衣家羯磨作已應差一比丘至白衣家為此比丘懺悔有八法應差一聞二能善説三己自解四能解人意五受人語六能憶持七無缺失八解善惡言義有如是八法應白二羯磨差至白衣家如是語居士懺悔僧已為此比丘作罰謫彼若受懺者善若不受應安此比丘著居士眼見耳不聞處教令如法懺悔復來語言居士懺悔彼比丘先犯罪今已為懺悔罪已除彼若受懺者善若不受犯罪比丘應自往懺悔懺悔已順從於僧不敢違逆乞解羯磨聽解犯罪而言不見有罪而不懺悔不捨惡見皆為作舉若作訶責羯磨擯羯磨依止羯磨遮不至白衣家羯磨不見罪舉羯磨不懺悔舉羯磨不捨惡見舉羯磨隨覆藏日羯磨本日治羯磨六夜摩那埵羯磨作如是等羯磨已有五事不應作一授人大戒二受人依止三畜沙彌四授僧差教授比丘尼五若僧差不應教授又五事不應作一説戒二答僧問毗尼義三僧差作羯磨四在僧中簡集智慧者共平論衆事例五僧差作信命又不應早出暮還不應親近外道不應作異語不應更犯罪不應嫌羯磨及羯磨人不應受善比丘供養禮拜等不應舉善比丘不應遮布薩自恣不應與善比丘共諍應在大比丘下行坐在後行應為清淨比丘掃灑敷座乃至持衣鉢揩摩身等如事師法應日三時見清淨比丘若至布薩日應掃灑乃至具舍羅布薩竟應收攝僧祇律云有五事與折伏羯磨即所謂訶責羯磨也一習近八事謂身習近住口習近住身口習近住身習近住者共牀坐共牀眠共器食迭共著衣共出共入口習近住者迭互染汙心語身口習近住者共牀坐乃至語時展轉相為迭互染汙心語身有六口有二共八事也二數數犯罪三諫不止三太早入聚落太冥出惡友惡伴非宜處行四諍訟相言三諫不止五法成就諍訟更起一自高二粗弊凶性三無義語四非時語五不親附善人五恭敬年少三諫不止若作折伏羯磨不隨順行若數犯小罪口雖受諫而仍犯者皆應與不共語羯磨即所謂依止羯磨也汙他家行惡行與擯羯磨擾亂俗人生不歡喜與發喜羯磨即所謂遮不至白衣家羯磨也不見罪不如法作即不懺悔不捨惡見與舉羯磨行波利婆沙比丘應隨順行七事何等七比丘事比丘尼事眷屬事入聚落事執衆苦事受拜事謂受僧差王事云何比丘事不得受比丘禮不得説比丘罪不得與比丘語論不得説沙彌罪不得福罰沙彌謂賞罰也不得與沙彌語論不得作比丘使衆集時不得為衆作説法人除別處是名比丘事云何比丘尼事不得受尼禮不得説尼罪不得與尼語論不得説式叉摩那沙彌尼罪不得福罰彼不得與彼語論不得遮尼布薩自恣不得遮尼齊門止因諸比丘尼打迦毗盧尊者佛敕比丘見尼入寺當遮令齊門而止必有正務白已方許其入今行別住等比丘則不得遮尼也不得往教誡尼若已受者不得往謂未犯前雖曾受差今罪未除不可往教是名比丘尼事云何眷屬事不得與人受具不得受人依止及畜沙彌不得受比丘供給不得授人經不得從他受經本所誦經當細聲讀若先有依止弟子教令依他當斷眷屬是名眷屬事云何入聚落事不得太早入太晚出不得作前後行沙門入別住等比丘應在一切清淨比丘下行坐在後行若別在前行或別作後行即是不肯隨順行法也不得到知識檀越家不得無比丘僧伽藍中住坐時食時在比丘下不得使人迎食不得與人迎食除次到輪番直日與人迎食不犯是名入聚落事云何執衆苦事晨起掃塔院僧院洗僧大小行處如是一切可作事應隨力作不得與欲不得受他欲除次到輪番為人傳欲不犯是名執衆苦事云何受拜事不得受一切拜白一羯磨白三羯磨盡不得受是名拜事云何王事不得恃王大臣居士凶人力勢不得嫌佛嫌法嫌僧嫌羯磨人但自責不得嫌他是名王事波利婆沙及磨那埵比丘行此七事是名隨順行不行者是名不隨順行作折伏羯磨者應隨順行五事比丘事尼事眷屬事羯磨事即受拜事王事但除入聚落事執衆苦事作羯磨已應語言長老汝莫更犯犯者僧更重治汝是五事應一一隨順行行已折伏下意僧應與作捨羯磨作不語羯磨者亦應隨順行上五事作羯磨已復應隨順行五事雖復百歲應驅依止持戒下至知二部律十歲比丘一晨起應問訊與出大小行器唾壺舉置常處與齒木與掃地迎食浣衣熏鉢一切盡供給唯除禮拜按摩若病時得令按摩二應教二部律若不能者乃至應教五篇戒三應教善知陰界入十二因緣四應教善知罪相非罪相威儀應教非威儀應遮五若學已即名為捨作擯出羯磨者亦應隨順行上五事羯磨已應安著僧伽藍邊住隨順行五事一一如法已應與捨作法喜羯磨者亦應隨順行上五事羯磨已應遣到所犯俗人家悔過令其歡喜若彼喜者即名為捨作舉羯磨者亦應隨順行上五事羯磨已應安著僧伽藍外邊門向阿蘭若處若來入塔院僧院掃地者比丘應逆掃其迹若來益洗腳處水大小行處水者應還瀉棄若共行弟子依止弟子不得喚作和尚阿闍梨不應語言餘人應語令隨順行應捨惡邪惡邪比丘不應共語不應共住不應共法食不共佛不共法不共僧不共布薩不共自恣不共羯磨得語外道欲坐便坐不得語被舉者令坐若病者不應看病得語彼檀越若親里言被舉人病汝往看若無常者不應與華香供養尸不應為作飲食非時漿供養僧不應分衣鉢不應與燒身取其所眠牀以尸著上衣鉢繫咽曳牀而出作是言衆僧事淨衆僧事淨於惡邪比丘不應起惡心何以故乃至燋炷不應起惡應作是念莫令後人習此邪見若放牧人取薪人持衣鉢來施者得取即彼為施主若被舉人隨順行五事得正見心意調柔者得與捨有三事得舉戒不淨見不淨或謂淫不障道或謂殺無果報或執斷執常及計世界有邊無邊等命不淨有三因緣得舉見聞疑復次比丘成就五法得舉他罪是實非虗是時非非時是饒益非不饒益是軟語非粗獷是慈心非瞋惡又成就五法得舉他淨身業淨口業正命多聞阿毗曇多聞毗尼復次有五種舉他有罵而後舉有舉而後罵有即舉而罵有罵而不舉有舉而不罵是中先罵後舉舉已後罵即舉而罵者僧不應受舉而不罵者應檢校有五法成就不應舉他隨愛隨恚隨怖隨癡為利故若成就此五事舉他身壞命終墮惡道入泥犁有五法成就應舉他不愛不恚不怖不癡不為利若成就此五法得舉他身壞命終生善道梵行人所讚歎若比丘被舉至餘處僧者應作是言長老我被舉行隨順法心柔軟為我捨僧應問以何事被舉若答言我無事被舉應語言我共汝法食味食若言有事被舉應語言汝還本處僧中捨去若彼處僧伽藍空若無常若罷道若餘處去都無僧者應問汝何事被舉答言我以是事被舉心柔軟見過行隨順法已應與捨根本尼陀那云苾芻共鬪若現有二師者應為誨諫若滿十夏離依止者諸苾芻應諫即是訶責羯磨若不止者應與作捨置羯磨即是依止羯磨驅令依止持律人餘人悉不與共語也十誦律云作下意羯磨已即發喜羯磨也令一比丘將至居士所悔過若三反不受居士欲作不饒益者遣是比丘遠去若強住者衆僧無罪若比丘與尼共戲笑言語惱亂諸比丘應為作不清淨羯磨亦即訶責羯磨所攝毗尼序云若比丘一處僧擯不得餘處懺悔除是精舍空聽餘處懺悔六明覆鉢法第四分云白衣家有十法應與作覆鉢羯磨罵謗比丘為比丘作損減作無利益方便令無住處鬬亂比丘於比丘前説佛法僧惡以無根不淨法謗比丘犯比丘尼此中隨有一法應作覆鉢羯磨作已應差一具八法者如遮不至白衣家羯磨中説至彼家語言今僧為汝作覆鉢不相往來以如是事故若彼如法懺悔隨順衆僧不敢違逆乞解覆鉢還相往來者僧應為解僧祇律云舍衛城法豫優婆塞常請僧食比丘到已詰問其義能解釋者便大歡喜手自與種種食不能答者便毀呰之使下人與粗食諸比丘皆不肯去佛令僧與作覆鉢羯磨優婆塞有八事僧應與作覆鉢何等八現前誹謗比丘現前訶責比丘現前瞋罵比丘斷比丘利養不樂與比丘共事罵佛罵法罵僧是名八事時法豫常飯比丘已然後自食其日待比丘時過不來往問佛佛言汝輕慢比丘僧欲饒益汝故與汝作覆鉢羯磨爾時去佛不遠有一羅漢佛語法豫汝可往問云何名鹽鹽有幾種即便往問羅漢答言我知汝是法豫優婆塞輕慢比丘僧已與汝作覆鉢羯磨故不足耶我此間樂住復來惱我鹽正是鹽法豫聞已心懷罔然還到佛所佛言汝問鹽義得悉意不答言是比丘少聞未從師學問鹽故言鹽時去佛不遠復有一法師比丘名弗絺盧佛語法豫汝往彼問即便往問法師答言鹽義二種味性味者如海水同一鹹味性者黑鹽赤鹽辛頭鹽味拔遮鹽毗攬鹽迦遮鹽私多鹽比迦鹽略説二種若生若煮是名鹽法豫聞已歡悅來白佛言是比丘善解分別廣略鹽義順逆能答佛言此是凡夫於我法中未得法味前比丘者是阿羅漢而汝憍慢不識真偽長夜作不饒益事於是法豫怖懼懺悔佛令沐浴更衣與眷屬相隨到僧中三乞捨覆鉢羯磨僧令在界內眼見耳不聞處住白四羯磨與捨若僧與作覆鉢羯磨已比丘乃至優婆夷盡不應往應持袈裟繫其門上巷中唱言某甲作覆鉢羯磨若有客比丘來應語令知覆鉢羯磨不得趣作若彼言沙門不入我家者善如是人不應作若有慚愧者應與作若自見過已行隨順心柔軟應捨五分律云比丘不應以小小事便與白衣作覆鉢羯磨優婆塞亦不應以小小事便不敬信比丘若比丘成就八法然後優婆塞不應敬信毀呰佛法僧戒欲不利諸優婆塞與優婆塞作惡名聲欲奪優婆塞住處以非法為正欺優婆塞若優婆塞瞋比丘比丘不應往其家若聚落皆瞋比丘比丘不應住此聚落音義糾音久督也彈也急也又察也
