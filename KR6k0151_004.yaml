body:
  text: 古吳藕益沙門智旭彚釋六私屋過量戒大乘同制梵網經所謂惡求多求菩薩戒本經所謂多欲不知足也為衆不犯若比丘自求作屋無主自為己當應量作是中量者長佛十二磔手內廣七磔手當將比丘指授處所彼比丘當指授處所無難處無妨處若比丘有難處妨處自求作屋無主自為己不將比丘指授處所若過量作者僧伽婆尸沙緣佛聽比丘作私房舍曠野國比丘即私作大房舍功力繁多常行求索居士畏避有一比丘欲起房舍自斫樹時樹神念打比丘恐違道理乃往白佛佛讚慰之時大迦葉乞食曠野城中居士遙避尊者問知其故白佛結戒釋無主者彼無有若一若兩若衆多難處者有虎狼師子諸惡獸下至蟻子比丘若不為此諸蟲獸所惱應修治平地若有石樹株荊棘當使人掘出若有陷溝坑陂池處當使人填滿若畏水淹漬當豫設隄防若地為人所認當共斷當無使他有語妨處者不通草車回轉往來彼比丘看彼難處無妨處已到僧中脫革屣偏露右肩右膝著地合掌作如是白大德僧聽我某甲比丘自乞作屋無主自為己今從衆僧乞知無難處無妨處如是再三爾時衆僧當觀察此比丘若可信即聽使作若不可信衆僧應到彼處看或遣僧中可信者看若有難有妨無難有妨有難無妨皆不應與處分若無難無妨應與處分相若不被僧處分若過量作各一僧殘作而不成偷蘭遮使他作亦然若為他作成偷蘭遮不成突吉羅若難處妨處各一突吉羅使他為他成不成皆突吉羅比丘尼等不得住阿蘭若處沙彌突吉羅僧祇律云作竟時得僧殘受用時得越毗尼罪十誦律云若得先成舍無犯七作大房不處分戒大乘同制梵網經云頭陀行道乃至夏坐安居是諸難處皆不得入也若比丘欲作大房有主為己作當將餘比丘指授處所彼比丘應指授處所無難處無妨處若比丘有難處妨處作大房有主為己作不將餘比丘往看指授處所僧伽婆尸沙根本律云為衆作緣優填王與尊者闡陀親善任作大房時拘睒彌城有尼拘律神樹往返者多止息其下闡陀伐之居士譏嫌故制相除過量作餘犯輕重同前十誦律云若得先成舍無犯八無根謗戒此是性罪大乘同制若向外人說犯重若向同法者說犯輕若比丘瞋恚所覆故非波羅夷比丘以無根波羅夷法謗欲壞彼清淨行彼於異時若問若不問知此事無根說我瞋恚故作是語若比丘作是語者僧伽婆尸沙緣佛在耆闍崛山尊者沓婆摩羅子分僧臥具差次受請有慈地比丘來隨次得惡房臥具便生瞋恚明日差僧受請檀越聞是慈地比丘便於門外敷弊坐具施設惡食慈地倍瞋乃倩其妹慈比丘尼誣尊者相犯世尊審問知實告諸比丘有二種人一向入地獄何謂二若非梵行自稱梵行若真梵行以無根非梵行謗之是為二乃訶責結戒釋根者見根聞根疑根疑有二從見生從聞生相無此三根以四棄法謗若更以餘非比丘法謗言犯邊罪乃至五逆二根等不論前人清淨與否說而了了僧殘不了了偷蘭遮謗尼同上謗餘人突吉羅比丘尼僧殘餘三衆突吉羅不犯者有見聞疑夢說錯說等附律攝云若塢波索迦即優婆塞謗苾芻者應與作覆鉢羯磨治罪法中明之九取片謗戒大乘輕重同上若比丘以瞋恚故於異分事中取片非波羅夷比丘以無根波羅夷法謗欲壞彼清淨行彼於異時若問若不問知是異分事中取片是比丘自言我瞋恚故作是語作是語者僧伽婆尸沙緣慈地比丘從耆闍崛山下見大羝羊共母羊行淫便以羝羊比尊者母羊比慈比丘尼語諸比丘云親自見比丘審實白佛制戒釋十誦律云異分者四棄是是中若犯一事非沙門非釋子失比丘法故名異分片者諸威儀中事相若同名同姓同相或在家時所犯一切取片謗者了了不了了等同上十不捨壞僧法戒大乘同制僧輪未破即是惡心瞋心僻教戒攝僧輪破則成逆不通懺悔若比丘欲壞和合僧方便受壞和合僧法堅持不捨彼比丘應諫是比丘大德莫壞和合僧莫方便壞和合僧莫受壞僧法堅持不捨大德應與僧和合與僧和合歡喜不諍同一師學如水乳合於佛法中有增益安樂住是比丘如是諫時堅持不捨彼比丘應三諫捨此事故乃至三諫捨者善不捨者僧伽婆尸沙緣提婆達既欲害佛復教阿闍世害父惡名流布利養斷絶即通己五人家家乞食佛制不得別衆食提婆達即生此念瞿曇乃斷人口食我寧可破彼僧輪即以五法教諸比丘盡壽乞食著糞掃衣露坐不食蘇鹽不食魚肉令其信樂方便破彼僧輪諸比丘白佛佛令僧作訶諫羯磨而結此戒第三分云提婆達行籌曰誰諸長老忍此五事是法是毗尼是佛所教者捉籌於是五百新學無智比丘捉籌隨提婆達去舍利弗目犍連說法現通將還佛令作偷蘭遮懺悔釋和合者同一羯磨同一說戒僧者四比丘乃至無數破有十八事法非法律非律犯非犯若輕若重有殘無殘粗惡非粗惡常所行非常所行五分律云用羯磨出罪不用羯磨出罪十誦律云常所行事者若單白羯磨白二羯磨白四羯磨布薩自恣立十四人羯磨制非制說非說住破僧法者即住此十八事第三分云有二事破僧妄語相似語復有二事破僧作羯磨取籌若一比丘乃至二人三人雖求方便亦不能破僧亦非比丘尼等能破僧若此衆四人若過彼衆四人若過行破僧籌作羯磨是為破和合僧泥犁中受罪一劫不療能和合者得梵天福一劫受樂五分律云我不見餘法壞人道意如名聞利養者調達所以破僧為利養故調達成就八非法故破僧利不利稱無稱敬不敬樂惡隨惡知識有四事名破僧說五法自行籌捉籌於界內別行僧事復次若王若大臣若餘六衆令僧不和合而非破若一比丘乃至七比丘不和合亦非破若不問上座而行僧事是即不和亦非僧破若不共同食於食時異坐鬬諍罵詈亦不名破要於界內八比丘以上分作二部別行僧事乃名為破是中作主者一劫墮大地獄不可救十誦律云破僧有二種破羯磨破法輪破羯磨者一界內別作布薩羯磨破法輪者輪名八聖道分令人捨八聖道入邪道中薩婆多毗婆沙云破僧輪犯逆罪偷蘭遮不可悔破羯磨僧犯非逆罪可懺偷蘭遮破僧輪下至九人一人自稱佛破羯磨僧下至八人不自稱作佛破僧輪界內界外盡破破羯磨僧要在界內別作羯磨破僧輪必比丘破羯磨僧比丘尼亦能破僧輪破俗諦僧破羯磨僧亦破第一義僧破僧輪但南洲破羯磨僧通三天下相說第三羯磨竟僧殘二羯磨竟捨者三偷蘭遮一羯磨竟捨者二偷蘭遮作白竟捨者一偷蘭遮初白未竟捨乃至受破僧法一切突吉羅若僧作訶諫時教言莫捨者偷蘭遮若不訶諫突吉羅比丘尼僧殘不犯者初諫便捨及破非法非律非和合一切惡友等五分律云若餘僧知彼比丘欲破僧當差一親厚比丘往諫若捨者應一突吉羅悔過若不捨當遣二三比丘往諫若捨者二突吉羅若復不捨應僧往諫若捨者三突吉羅若不捨復應白四羯磨諫之白已捨者一偷蘭遮三突吉羅乃至第三羯磨竟捨不捨皆僧殘十誦律云三約敕竟不捨者僧殘是比丘即入僧中自唱諸長老我某甲比丘得僧殘罪若即說者善若不說者從是時來名覆藏日數又云不先軟語約敕便白四羯磨約敕作羯磨人得突吉羅未白四羯磨便擯出去作羯磨人得突吉羅未作三語約敕於界內別請人作羯磨得偷蘭遮破僧因緣故若衆僧知衆僧得罪附僧祇律云若知是欲破僧人者諸比丘應語長老莫破僧破僧罪重墮惡道入泥犁我當與汝衣鉢授經讀經問事教誡若故不止者應語有力勢優婆塞言長壽此人欲破僧當往諫曉語令止優婆塞應語尊者莫破僧破僧罪重墮惡道入泥犁我當與尊者衣鉢病瘦湯藥若不樂修梵行者可還俗我當與汝婦供給所須若故不止者應拔籌驅出出已應唱言諸大德有破僧人來宜當自知若如是備猶故破僧者是名破僧若於中布施故名良福田於中受具足故名善受具足若覺已應去若不去者是名破僧伴是破僧伴黨盡壽不應共語共住共食不共佛法僧不共布薩安居自恣不共羯磨得語餘外道出家人有牀座欲坐便坐不得語彼令坐辨問僧輪既破何故猶名良福田何故猶名善受具既善受具何故覺已應去答破僧是偷蘭罪未曾失戒故云猶是福田如金杖雖斷兩處皆金既不失戒仍是僧伽初出家時未嘗覺知從之受戒豈不得戒但後若覺知便不應甘心作破僧伴故應去也十一不捨黨破僧戒大乘輕重與上同若比丘伴黨若一若二若三乃至無數是比丘語彼比丘言大德莫諫此比丘此比丘是法語比丘律語比丘此比丘所說我等喜樂此比丘所說我等忍可彼比丘言大德莫作是說言此比丘是法語比丘律語比丘此比丘所說我等喜樂此比丘所說我等忍可然此比丘非法語比丘非律語比丘大德莫欲破壞和合僧汝等當樂欲和合僧大德與僧和合歡喜不諍同一師學如水乳合於佛法中有增益安樂住是比丘如是諫時堅持不捨彼比丘應三諫捨是事故乃至三諫捨者善不捨者僧伽婆尸沙緣提婆達伴黨語諸比丘莫訶諫提婆達諸比丘白佛佛令僧作訶諫羯磨而結此戒釋律攝云法語者語辭圓足律語者合理無差又能引實義名曰法語出柔軟言名曰律語相犯輕重同上十誦律云若一比丘被擯而四比丘隨之名為破僧若多知多識多聞大德明解三藏義人不應與作不見擯若擯得偷蘭罪近破僧故又云若一人擯一人一突吉羅一人擯二三四人隨得二三四突吉羅二人三人擯二三四一人亦爾若四比丘擯四比丘得偷蘭罪以破僧因緣故辨問一比丘被擯四比丘隨之名為破僧此破僧罪屬能𢷤耶屬所擯耶屬隨者耶答若能擯者如法則罪屬所擯及隨擯人若能擯者非法則罪屬能擯者及僧然如法比丘雖枉受擯決不在界內別行僧事也又問若多知多識等不應與作不見擯則此等人有過豈便可容恕耶答多知識人有過雖非可以容恕但須善權勸誘令其見罪若輒作羯磨必致破僧之咎故得罪也十二被擯不服戒大乘同制汙他家即因利求利經理白衣等戒行惡行即邪業覺觀邪命自活等戒言僧有愛等即謗僧戒所攝若比丘依聚落若城邑住汙他家行惡行汙他家亦見亦聞行惡行亦見亦聞諸比丘當語是比丘言大德汙他家行惡行汙他家亦見亦聞行惡行亦見亦聞大德汝汙他家行惡行今可遠此聚落去不須住此是比丘語彼比丘作是語大德諸比丘有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者諸比丘報言大德莫作是語有愛有恚有怖有癡有如是同罪比丘有驅者有不驅者而諸比丘不愛不恚不怖不癡大德汙他家行惡行汙他家亦見亦聞行惡行亦見亦聞是比丘如是諫時堅持不捨者彼比丘應三諫捨此事故乃至三諫捨者善不捨者僧伽婆尸沙緣䩭連有二比丘一名阿濕婆二名富那婆娑作非法行自種華樹教人種華樹溉灌摘華乃至歌舞倡伎彈鼓吹貝受雇戲笑等時有衆多比丘乞食䩭連齊整庠序低目直前居士反以為過比丘知之具以白佛佛遣舍利弗目犍連往作擯羯磨時二比丘作如是言舍利弗目犍連還白佛佛令僧作訶諫羯磨而結此戒釋汙他家有四種事一依家汙家謂從一家得物與一家所得物處聞之不喜所與物處思當報恩即作是言若有與我者我當報之若不與我者我何故與二依利養汙家若比丘如法得利乃至鉢中之餘或與一居士不與一居士彼得者念當報恩如上三依親友汙家若比丘依王若大臣或為一居士不為一居士所為者思當報恩其為我者我當供養不為我者我不供養四依僧伽藍汙家若比丘取僧華果與一居士不與一居士乃至不與我者我不供養行惡行者即自種華樹等根本律云有二因緣而汙他家一謂共住與女人同牀坐同盤食等二謂受用同受用樹葉華果及齒木等毗婆沙云凡出家人無為無欲清淨自守以修道為心若與俗人信使往來廢亂正業又復以物贈遺則破前人平等好心於得物者歡喜愛敬不得物者縱使賢聖無為敬心失他前人深厚福利又復倒亂佛法凡在家人應供養出家人而出家人反供養白衣又在家人常於三寶求清淨福田割損血肉以種善根以出家人贈遺因緣故反於出家人生悕望心破他清淨信敬又失一切出家人種種利養若以少物贈遺白衣縱使起七寶塔種種莊嚴不如靜坐清淨持戒即是供養如來真實法身若以少物贈遺白衣正使得立精舍猶如祇洹不如靜坐清淨持戒即是清淨供養三寶若以少物贈遺白衣縱令四事供滿閻浮提一切聖衆不如靜坐清淨持戒即是清淨供養一切聖衆若有強力欲破塔壞像必以贈遺得全濟者當賣塔地華果若塔有錢若餘緣得物隨宜消息若有強力欲於僧祇作破亂折減僧祇地中隨有何物賣以作錢隨緣消息若僧常臘若面門臘或有強力欲作折減隨此地中所可出物以消息之父母是福田則聽供養僧祇人作役此則應與若施主欲與衆僧作食欲知法則此亦應與一切孤窮乞丐憐愍心故應與乃至父母喪亡一切不聽啼哭四衆突吉羅比丘尼波逸提以愛戀心深故相犯輕重同上比丘尼僧殘餘三衆突吉羅不犯者初語時捨不犯本罪若與父母病人小兒妊身婦女牢獄繫人寺中客作不犯汙他家若為三寶種華樹等教人取華供養三寶若走避恐難若跳躑坑渠若嘯喚伴行不犯行一惡行十踊律云若未作驅出羯磨時言諸比丘隨愛恚怖癡行突吉羅是不應約敕附第三分云不應為白衣剃髮除欲出家者第四分云不應禮白衣不應禮白衣塔廟亦不應故左繞行不應與人卜占不應從人卜占不應自作伎若吹貝供養塔聽令白衣作不應畜鸚鵡等鳥不應畜狗不應乘象馬車乘輦輿捉持刀劒老病者聽乘步挽車若男乘避難聽乘象馬白衣持刀劒寄聽藏舉於聖法律中歌戲猶如哭儛如狂者戲笑似小兒不應向暮至白衣家除為三寶事病比丘事或檀越相喚常喜往反白衣家有五過一數見女人二漸相附近三轉親厚四生欲意五或犯死罪若次死罪白衣家有九法未作檀越不應作若至其家不應坐何等九見比丘不喜起立不喜作禮不喜請比丘坐不喜比丘坐設有所說而不信受若有衣服飲食所須之具輕慢比丘而不與若多有而少與若有精細而與粗惡或不恭敬與是為九五分律云不應以僧果餉白衣若乞應與學迷人呪起死人呪者偷蘭遮十誦律云比丘有五不應行處童女寡婦婦淫女比丘尼又五賊家旃陀羅家酤酒家淫女家屠兒家根本雜事云五非處不應住立唱令家淫女家酤酒家王家旃陀羅家善見律云檀越請比丘送喪不得去南海寄歸云死喪之際不得與俗同哀理應為其亡者淨飾一房或可隨時權施蓋幔讀經念佛具設香華冀使亡魂托生善處方成孝子始是報恩若苾芻亡者以火焚之送者在一邊坐令一能者誦無常經半紙一紙勿令疲久然後各念無常還歸住處寺外連衣並浴皆用故衣不損新服別著乾者然後歸房衣服之儀曾無片別豈容號咷數月麻服三年者哉根本尼陀那云不應賣藥若善醫方起慈愍心應病與藥不得受他價直緇門警訓云但以邪心有涉貪染為利賣法禮佛讀經斷食諸業所獲贓賄皆曰邪命物正乖佛化十三不捨惡性戒大乘同制若比丘惡性不受人語於戒法中諸比丘如法諫已自身不受諫語言諸大德莫向我說若好若惡我亦不向諸大德說若好若惡諸大德且止莫諫我彼比丘諫是比丘言大德莫自身不受諫語大德自身當受諫語大德如法諫諸比丘諸比丘亦如法諫大德如是佛弟子衆得增益展轉相諫展轉相教展轉懺悔是比丘如是諫時堅持不捨彼比丘應三諫捨是事故乃至三諫捨者善不捨者僧伽婆尸沙緣尊者闡陀惡性不受人語佛令僧作訶諫羯磨而結此戒相犯輕重同上未白前惡性不受人語突吉羅比丘尼僧殘餘三衆突吉羅不犯者若為無智人訶諫時語言汝和尚阿闍梨所行亦如是汝可更學問誦經十誦律云若諸比丘不舉不憶念自身作不可共語突吉羅是不應約敕善誦云舉者比丘應語長老汝作某罪當發露莫覆藏當如法除減憶念者比丘應語長老汝憶念某時某處作如是罪不附第四分云佛告比丘我為汝等說八種惡馬及八種惡人或有惡馬授勒與鞭欲令其去而更觸躓不去一或反倚傍兩轅而不前進二或顛倒地既傷其膝又折轅𨍮三或更卻行不進四或更趣非道破輪折軸五或不畏御者亦不畏鞭方便咋銜奔突不可禁制六或雙腳人立吐沫七或反蹲臥八是為八種惡馬或有比丘舉彼見聞疑罪便言我不憶我不憶一或不言犯不言不犯默然而住二或言長老亦自犯罪云何能除他罪三或言長老自癡猶須人教而欲教我四或說餘事答反生瞋恚五或不畏衆僧亦不畏犯不受舉罪者語便捉坐具置肩而出不可訶制六或左抄衣在衆中舉手大語乃令汝等教授我耶七或言長老亦不與我衣鉢臥具醫藥何故教我彼即捨戒取於下道至比丘所作如是言我已休道於意快耶八是為八種惡人如彼惡馬無異佛所慈愍三結問諸大德我已說十三僧伽婆尸沙法九戒初犯四乃至三諫若比丘犯一一法知而覆藏應強與波利婆沙行波利婆沙竟增上與六夜摩那埵行摩那埵已餘有出罪應二十僧中出是比丘罪若少一人不滿二十衆出是比丘罪是比丘罪不得除諸比丘亦可訶此是時今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持釋僧祇律云佛訶覆藏比丘癡人此是惡事犯戒尚不漸羞悔過何以慚羞即說偈言覆蓋者則漏開者則不漏是故諸覆者常開令不漏善見律云摩那埵者漢言折伏貢高亦言下意下意者承事衆僧阿浮訶那者漢言喚入亦言拔罪云何喚入拔罪與同布薩說戒自恣法事共同故名喚入拔罪薩婆多摩得勒伽云於一切比丘下意名摩那埵於不善處舉著善處名阿浮呵那毗尼母經云摩那埵者秦言意喜自意歡喜亦使衆僧歡喜阿浮呵那者清淨戒生得淨解脫於此戒中清淨無犯辨問犯二篇者出罪須二十僧而今去聖遙遠律法久蕪設犯此罪無二十僧云何得出罪耶答雖無二十僧可以出罪倘有四清淨僧亦可如法作覆藏本日治摩那埵等羯磨依法行已後值二十衆滿再求出罪設竟不值亦名清淨如治罪法中所廣明也二十三僧殘法竟三二不定法三初總標二別列三結問初總標諸大德是二不定法半月半月說戒經中來二別列二初三法不定二二法不定初三法不定此是性罪大乘同學若比丘共女人獨在屏覆處障處可作淫處坐說非法語有住信優婆夷於三法中一一法說若波羅夷若僧伽婆尸沙若波逸提是坐比丘自言我犯是罪於三法中應一一法若波羅夷若僧伽婆尸沙若波逸提如住信優婆夷所說應如法治是比丘是名不定法緣迦留陀夷與親友婦齊優婆夷互相繫意於乞食時往至其家共一牀坐說非法語毗舍佉母聞聲窺見白佛結戒釋獨者一比丘一女人屏覆二種一者見屏覆若塵若霧若黑暗中二者聞屏覆乃至常語不聞聲處障處者若樹若牆壁若籬若衣及餘物障住信優婆夷者三歸五戒善憶持事不錯不妄薩婆多毗婆沙云可信優婆夷者若人語言汝若妄語不害汝命若不妄語當害汝命即思我不妄語害此肉身滅此一身若妄語者滅無量身兼害法身誓不妄語人復語言汝若妄語活汝父母兄弟姊妹一切親族若不妄語一切殺之尋思我不妄語害此一世生死親族我若妄語流轉三惡永失人天纍世親族眷屬又失賢聖出世眷屬誓不妄語又復語言汝若妄語與汝珍寶種種財利若不妄語則不與汝即思我不妄語失此俗財我若妄語失聖法財誓不妄語是名可信優婆夷也相若比丘自言所趣向處自言所到處自言坐自言臥自言作即應如比丘語治若不自言作不自言臥不自言坐不自言所到處但言所趣向處所到處若坐若臥等應如優婆夷所說治是中無定法故名不定十誦律云若不自說有是罪應隨可信優婆夷語作實覓羯磨作已應隨順行不與他受具等若不如法行者盡壽不得出是羯磨薩婆多毗婆沙云作羯磨已若說先罪應解羯磨隨罪輕重治之若不說者盡壽不解羯磨二二法不定緣起同前若比丘共女人在露現處不可作淫處坐作粗惡語有住信優婆夷於二法中一一法說若僧伽婆尸沙若波逸提是坐比丘自言我犯是罪於二法中應一一治若僧伽婆尸沙若波逸提如住信優婆夷所說應如法治是比丘是名不定法三結問諸大德我已說二不定法今問諸大德是中清淨不三說諸大德是中清淨默然故是事如是持三二不定法竟四三十捨墮法三初總標二別列三結問初總標諸大德是三十尼薩耆波逸提法半月半月說戒經中來釋尼薩耆此翻捨波逸提此翻墮謂三十事皆從財物犯罪此物應捨波逸提罪應悔除也二別列三十初畜長衣戒至三十回僧物入己戒初畜長衣戒此是遮罪大乘為衆生故雖不同學然亦同須說淨緇門警訓云地持論言菩薩先於一切所畜資具為非淨故以清淨心捨與十方諸佛菩薩如比丘將現前衣物捨與和尚阿闍梨等涅槃經云雖聽受畜要須淨施篤信檀越是也今時講學專務利名不恥五邪多畜八穢但隨浮俗豈念聖言自下壇場經多臘夏至於淨法一未霑身寧知日用所資無非穢物箱囊所積並是犯財慢法欺心自貽伊戚學律者知而故犯餘宗者固不足言誰知報逐心成豈信果由因結現見袈裟離體當來鐵葉纏身為人則生處貧窮衣裳垢穢為畜則墮於不淨毛羽腥臊況大小兩乘通名淨法倘懷深信豈憚奉行故荊溪輔行記云有人言凡諸所有非己物想有益便用說淨何為今問等非己財何不任於四海有益便用何不直付兩田悲田敬田而閉之深房封於囊篋實懷他想用必招愆犯盜忽謂己財仍違說淨說淨而施於理何妨任己執心後生倣效故知不說淨人深乖佛制兩乘不攝三根不收若此出家豈非虗喪若比丘衣已竟迦絺那衣已出畜長衣經十日不淨施得畜若過十日尼薩耆波逸提長去聲緣佛聽比丘畜三衣不得長六羣比丘畜長衣或早起衣或中時衣或晡時衣故制阿難得一糞掃衣欲奉大迦葉迦葉不在阿難白佛佛問迦葉何時當還報言却後十日乃聽畜十日衣犍度云佛見諸比丘在路行多擔衣物作是念可為制衣多少不得過畜時佛初夜在露地坐著一衣中夜覺寒即著第二衣後夜覺寒復著第三衣便安隱住乃聽比丘畜三衣不得過僧祇律云我諸弟子齊是三衣足遮大寒大熱防蠅蚊虻覆障慚愧不壞聖種若性不堪寒者聽故弊衣隨意重納釋衣竟者三衣迦絺那衣此云功德衣解在後文長衣者若長如來八指若廣四指是長一尺六寸闊八寸便可作三衣條隔故律攝云應知三衣受用各別若作務時或道行時及在寺內常用五條若行禮敬及食噉時應披七條為遮寒入聚落乞食噉食禮制底應著大衣後二衣應割截作若是貧人後必須截薩婆多論云九十六種無淨施法佛大慈悲方便力故教令淨施令諸弟子得畜長財而不犯戒問曰佛何不直聽畜長財而強與結戒設此方便答曰佛法以少欲為本是故結戒不畜長財而衆生根性不同或有多預畜積而後行道得證聖法是故如來先為結戒而後設方便於法無礙衆生得益相十日中所得衣若得若不得至第十一日明相出盡捨墮若淨施不淨施遣與人失衣故壞作非衣作親厚意取忘去等亦爾淨施謂真實與他或向他說淨異此名不淨施遣與人即展轉淨施失衣謂盜去及離宿等故壞謂弊爛等作非衣謂作他用作親厚意取謂被親厚者取去此中從第一日得衣已乃至第十日於其中間或有日得或有日不得就所得者或有淨施或不淨施等但以第一日衣勢力故隨十日中爾許長衣至第十一日明相出盡犯捨墮若使先所得物隨作淨施等更無餘長者隔一日後或復得衣即此日為第一日得隨意畜乃至十日皆不犯也若捨墮衣不捨持更貿餘衣一捨墮一突吉羅此衣應捨與僧若衆多人若一人不得別衆捨隨所住處人多少應集在一處然後捨也若不成捨突吉羅應往僧中偏露右肩脫革屣向上座禮胡跪合掌當作是語大德僧聽我某甲比丘故畜爾所長衣過十日犯捨墮我今捨與僧披捨衣竟當懺悔受懺悔人當作白大德僧聽此某甲比丘故畜爾所長衣犯捨墮今捨與僧若僧時到僧忍聽我受某甲比丘懺悔白如是彼應向此人作如是言大德一心念我某甲比丘故畜爾所長衣犯捨墮衣已捨與僧竟所有波逸提罪今從大德懺悔不敢覆藏懺悔則安樂不懺悔不安樂憶念犯發露知而不覆藏大德憶我清淨戒身具足清淨布薩如是三說彼應語言自責汝心答言爾若僧多難集此比丘欲遠行應問言汝此衣與誰隨彼說便與僧即應還此比丘衣白二羯磨應如是與大德僧聽某甲比丘故畜爾所長衣犯捨墮今捨與僧若僧時到僧忍聽持此衣與彼某甲比丘彼某甲比丘當還此比丘白如是次作羯磨若捨已不還者突吉羅有人言莫還者突吉羅若作淨施若遣與人若持作三衣若作波利迦羅衣善見云朱羅波利迦羅衣漢言雜碎衣也若故壞若燒若作非衣若數數著壞盡突吉羅比丘尼捨墮不犯者齊十日內淨施若遣與人或奪失燒漂等想不淨施不遣與人彼受付囑衣者或命終遠出休道賊難獸害水漂不淨施不遣與人不犯衣犍度云衆僧衣過十日不犯捨墮僧祇律云若為佛為僧供養故求物集在一處雖久未用不犯律攝云若為三寶畜衣非犯或施主作如是言此是我物仁當受用雖不分別即說淨也用之無犯根本律云若犯捨墮不捨或雖捨不說悔或雖說悔不經宿隨有所得並成捨墮由前染故若捨衣說悔經宿已得皆無犯五分律云不得捨與餘人及非人捨已然後悔過若不捨而悔者罪益深除長三衣若長餘衣乃至手巾過十日皆突吉羅若淨施不犯薩婆多論云若初日得衣即不見擯不作擯即不懺悔舉也惡邪不除擯若狂心亂心病壞心設不解擯不得本心乃至命終不犯此戒後解擯得本心還計日成罪若初日得衣上入天宮北至單越住彼至命盡不犯此戒後歸本處計日成罪若初日得衣至五日不見擯等後解擯得本心還本處取前五日數後五日然後成罪二離衣宿戒此是遮罪大乘同制十八物攝故若比丘衣已竟迦絺那衣已出三衣中離一一衣異處宿除僧羯磨尼薩耆波逸提緣六羣比丘往遊人間持衣付囑親友比丘數數曬之諸比丘問知其故白佛結戒時一比丘有乾痟病以事欲遊人間糞掃僧伽梨重不堪持行同伴為白佛佛聽僧與病比丘結不失衣白二羯磨相若置衣僧伽藍內在樹下及餘處宿至明相出隨所離衣捨墮置衣他處宿僧伽藍亦爾除三衣離餘衣突吉羅捨已懺悔同上僧即應還此比丘衣白二羯磨若不還乃至數數著壞盡突吉羅比丘尼捨墮不犯者明相未出手捉衣或捨衣或至擲石所及處等衣界狹者須手促衣衣界寬者但至擲石所及處立即名為不離衣或不能捉衣亦不能至擲石所及處立須趁明相未出時作念捨衣蓋捨衣則但得缺衣突吉羅罪不捨則犯離衣尼薩耆罪故宜避重而就輕也善見律云羯磨者隨病未瘥得離宿若僧為羯磨已離衣往餘方病瘥欲還道路險難不得還恆作還意雖病瘥不失衣若決作不還意失衣過十日犯長衣罪若往餘方病瘥還至衣所病復發更欲往餘方承先羯磨不須更羯磨薩婆多論云若重縫三衣設有因緣擲分持行名不離衣宿根本雜事云若暫向餘處即擬還者任不將去復有暫出擬還至彼日暮即侵夜歸被蟲賊害當於彼宿不應夜行所守持衣應心念捨可於同梵行邊借餘三衣守持充事僧祇律云隨所住處常三衣俱持鉢乞食譬如鳥之兩翼恆與身俱辨問既云衣鉢常俱如鳥二翼何故離衣結罪離鉢不結罪耶答衣以蔽形鉢以乞食皆應恆與身俱但僧中常食及應請時猶可不用己鉢衣則更無可離之理故有結不結也音義優填王或云優陀延或云塢陀衍那此翻出受闡陀舊云車匿佛踰城出家時令其牽馬即是守馬奴名或云闡釋迦沓婆摩羅子亦云駝驃或翻實力提婆達亦云調達此翻天熱以其生時人天等衆心皆驚熱故又翻天授亦翻天與謂從天乞得故佛之堂弟阿難親兄阿闍世此翻未生怨目犍連或云沒特伽羅此翻采菽氏尊者之姓也名拘律陀即是樹名禱此樹而得生因以為名神通第一為羅睺羅之阿闍梨立十四人羯磨即是立人作寺主作知庫乃至分粥等也泥犁中受罪一劫不療泥犁即地獄此翻無有無喜樂無氣味無歡無利故或翻卑下或翻墮落一劫者世界一番成壞也梵語劫波或云劫簸此翻分別時節有小中大三種劫量人壽八萬四千歲減至十歲復漸增至八萬四千歲如是一減一增名為轆轤小劫二十小劫為一中劫成住壞空各一中劫共四中劫為一大劫此就娑婆世界言耳他方劫量種種不同如華嚴經廣明不療者不可救餘六衆出家七衆弟子惟比丘衆能破比丘僧餘俱不能也三語約敕一者一比丘軟語二者二三比丘軟語三者衆僧羯磨約敕也䩭連邑名也䩭音饑阿濕婆此翻馬宿富那婆娑此翻滿宿贈遺遺音位餽送也常臘面門臘常即常住僧物面門即現前僧物也毗婆沙中并自恣物佛塔物通稱為臘未詳何義或取以時受用意輦輿輦力展切步挽車也輿音俞車也死罪次死罪初篇四事犯者不可復救故名死罪二篇十三事稍有可救之理名次死罪唱令家即優俳戲樂之家淫聲美色惑人道意也贓賄音臧悔乃貪吏所受物名亦盜賊所偷劫之物名今出家人邪心獲利亦受此名也勒歷德切馬頭絡銜鞭音邊革為之以驅馬躓音至頓足不前進也轅音袁車前曲木上鉤衡者𨍮音隔車軸也咋音責嚙也毗舍佉此翻別枝即是氏宿以生曰所值宿為名六羣比丘一難陀二跋難陀此二人多貪財利皆生天中三迦留陀夷性多淫染因末利夫人訶之乃得證果勸化夫婦同證聖果者足一千家四闡陀惡性難共語佛滅度後阿難遵佛命作默擯法亦得證果五馬宿六滿宿汙他家行惡行皆墮熱沙龍中此六人本皆豪貴種族既出家後共為朋黨故號六羣也制底或云支提或云制多此翻可供養處或翻滅惡生善處有舍利者名塔無舍利者名支提九十六種西域外道共有九十六種或云九十五種是邪惟有一種是正也擲音惕挑發也
