body:
  text: 古吳蕅益沙門智旭彚輯總辨羯磨法夫羯磨乃作法辦事之名一切僧事皆依羯磨得成故曰有秉羯磨有如說行者斯則名為正法住世又曰不誦白羯磨者終身不得離依止是知比丘要務莫先於此而流俗相傳僅以對首說罪一事當之訛謬甚矣故特首明斯義總示大綱至於百一僧事散在諸科不煩重述也第四分云有三羯磨攝一切羯磨何等三白羯磨白二羯磨白四羯磨是三攝一切羯磨白羯磨亦名單白白二羯磨僧祇名為白一羯磨謂一白一羯磨也白四羯磨僧祇名為白三羯磨謂一白三羯磨也薩婆多摩得勒伽云有百一羯磨二十四白羯磨四十七白二羯磨三十白四羯磨根本百一羯磨云言百一者蓋是舉其大數於大律中檢有多少不同乃是以類相收無違妨也單白二十二白二四十七白四三十二隨機羯磨則明一百三十四法單白三十九白二五十七白四三十八又對首三十三心念十四共有一百八十一法雖詳盡作法科條未免犯非制而制所以懷素律師每多致議不如但遵原律之善也第三分云有四種僧四人僧五人僧十人僧二十人僧是中四人僧者除自恣受具出罪餘一切如法羯磨應作五人僧者在中國除受具出罪餘一切如法羯磨應作十人僧者除出罪餘一切如法羯磨應作二十人僧者一切羯磨應作況復過二十不得以比丘尼等足數不得以被舉被擯及所為作羯磨人足數不應作非法非毗尼羯磨非法別眾羯磨非法和合羯磨法別眾羯磨法相似別眾羯磨法相似和合羯磨訶不止羯磨得訶者訶而不止便同別眾也云何非法非毗尼羯磨應一白一羯磨一白三羯磨者或作白不作羯磨或作羯磨不作白或作多白或作多羯磨非法也不應與作舉者亂與作舉非毗尼也云何如法如毗尼羯磨如白法作白如羯磨法作羯磨如法也如舉罪法舉罪如毗尼也云何非法別眾羯磨不來者不與欲現前應訶者訶別眾也彼作種種羯磨白此事乃為彼事作羯磨非法也云何非法和合羯磨不來者與欲得訶者不訶和合也作種種羯磨白此事乃為彼事作羯磨非法也云何法別眾羯磨不來者不與欲得訶者訶別眾也彼羯磨如法作法也云何法相似別眾羯磨不來者不與欲訶者得訶別眾也作種種羯磨前作羯磨後作白法相似也云何法相似和合羯磨不來者與欲得訶者不訶和合也前作羯磨後作白法相似也何等人訶不成訶為比丘作羯磨比丘尼乃至若應滅擯若在戒場上結界之法先結戒場方結大界結大界時要除戒場內地蓋以比丘法事或有止須四人五人十人二十人作者即於此戒場中作之不必輒煩大眾也今若身在戒場即為出大界外故不成訶若作別住自有粗罪行覆藏法不應訶僧羯磨若以神足在空離地四指便名離界若隱沒即同人不現前若離見聞處小界固須舒手相及大界亦須眼見耳聞若所為作羯磨人但除受具及受僧差如是人訶不成訶云何訶成訶若善比丘不同比丘尼乃至應滅擯同在一界內住不同在戒場及作別住不在空不隱沒不離見聞處如是訶成訶根本目得迦云有十二種人不應訶言不採錄一者愚謂思其惡思說其惡說作其惡作二者癡謂不持蘇呾羅不持毗柰耶不持摩室里迦三者不分明謂不明三藏教文四者不善巧謂不善三藏教理五者無慚謂於四他勝中隨犯一戒六者有瑕隙謂新作鬬諍或舊有怨嫌七者界外住人八者被捨棄人九者言無次緒謂作妄語離間粗獷雜亂語言十者捨威儀謂捨本座十一者失本性謂作不應作事於諸學處不知修習十二者授學人有三種應訶一者住本性二言有次緒三不捨威儀若失本性人還住本性亦得成訶應須採錄若大眾差遣十二種人彼如是語大德不應差我此所出言應須採錄僧祇律云應二十眾作羯磨十眾作不成就應十眾作而五眾應五眾作而四眾應作白三羯磨而白一應作白一羯磨而單白皆不成就應作白而作白一羯磨應作白一羯磨而作白三羯磨應作四眾羯磨而五眾作應五眾而十眾應十眾而二十眾皆名成就曇無德律羯磨云凡諸羯磨作法應先白未受具戒者出不來比丘說欲及清淨僧今和合何所作為一人隨事答云某甲羯磨除結界無受欲法十誦律云比丘不應與尼作羯磨除受具摩那埵出罪諸尼不應與比丘作羯磨除不禮拜不共語不供養羯磨結界法一切如法僧事咸資界法而成故先明之問今時律堂或不結界或但用大悲懺中結界法未審一切僧事得成就不答若不結界則贍部中但是如來聲聞弟子有一不到便名別眾種種作法皆不成就此是僧伽要務豈容缺略至於禮懺持呪結壇自屬密宗法用斷斷不可混借也就結界法略明五意一結戒場二結大界三結不離衣界四結淨厨界五權結小界一結戒場第二分云時諸比丘有須四眾羯磨事起五眾十眾二十眾羯磨事起大眾會疲集極佛言聽結戒場稱四方界相若安杙若石若疆畔作齊限白二羯磨先須問僧集不和合不未受具戒者出僧今和合何所作為一人答云結界羯磨方乃秉白大德僧聽此住處比丘稱四方小界相若僧時到僧忍聽於此四方小界相內結作戒場白如是大德僧聽此住處比丘稱四方小界相僧今於此四方小界相內結作戒場誰諸長老忍僧於此四方小界相內結作戒場者默然誰不忍者說僧已忍於此四方小界相內結作戒場竟僧忍默然故是事如是持時諸比丘有欲廣作界者有欲狹作界者佛言先解前界然後欲廣狹作從意當白二羯磨解二結大界按五分律云先結戒場更結僧坊界結僧坊時唱四方界相及除內地律攝云結時小界在前解時小界在後宣公亦用其說懷素雖列大界在前而玩彼註文亦用此意今准之第二分云當敷座打犍椎盡集一處不聽受欲是中或舊住比丘或識界相者應唱大界四方相若東方有山稱山有壍稱壍若村若城若疆畔若園若林若池若樹若石若垣牆若神祀舍如東方相餘方亦爾唱已應令能羯磨者作如是白大德僧聽此住處比丘唱四方大界相若僧時到僧忍聽僧今於此四方相內除戒場地結大界同一住處同一說戒白如是大德僧聽此住處比丘唱四方大界相僧今於此四方相內除戒場地結大界同一住處同一說戒誰諸長老忍僧於此四方相內除戒場地結大界同一住處同一說戒者默然誰不忍者說僧已忍於此四方相內除戒場地結大界同一住處同一說戒竟僧忍默然故是事如是持不應二界相接當作標識不應二界相錯涉應留中間有二住處別利養別說戒欲共一說戒共一利養聽解界已然後結欲同說戒別利養亦如是欲別說戒同利養為守護住處故亦如是有二住處同說戒同利養欲別說戒別利養亦如是不得相去遠處同一說戒同一利養五分律云不應共住共得施異布薩結界犯者偷蘭遮按四分律為守護住處故聽蓋本是別說戒別利養者特以有無應互濟則利養合別為同而往還或有難則說戒自仍其舊今云不應者蓋指本是同住而布薩獨分有類破僧故也律攝云河㵎有橋梁者得通結界橋梁壞者若欲修治得經七夜至第八夜界法便失若本無心重修理者隨壞即失根本尼陀那云大界者齊兩踰膳那半應可結之若過非界踰膳那當三十里兩踰膳那半共七十五里也凡客苾芻至他住處住經七八日已無人來者應共結界十誦律云若不捨先界不得更結三結不離衣界第二分云時有厭離比丘見阿蘭若有一好窟自念若得離衣宿者可即於此窟住佛言當結不失衣界白二羯磨時諸比丘脫衣置白衣舍著脫衣時形露佛言除村村外界謂僧伽蓋大界既得至七十里則其中必有俗人村舍村舍不定或先無後有或今有後無故但云除彼村舍以村外為不離衣界也當如是白大德僧聽此住處同一住處同一說戒若僧時到僧忍聽除村村外界結不失衣界白如是大德僧聽此住處同一住處同一說戒除村村外界結不失衣界誰諸長老忍僧於此住處除村村外界結不失衣界者默然誰不忍者說僧已忍於此住處除村村外界結不失衣界竟僧忍默然故是事如是持先解不失衣界却解大界不得隔駛流水外結不失衣界除常有橋者十誦律云若捨大界不離衣界亦捨若捨不離衣界大界不捨四結淨廚界亦名淨地蓋比丘之法不留宿食若於僧坊界內與食共宿便名為不淨食今既結為淨地則免共宿之過也第三分云聽在僧伽藍內結淨地白二羯磨應唱若房處若溫室等如是白大德僧聽若僧時到僧忍聽僧今某處結作淨地白如是大德僧聽僧今某處結作淨地誰諸長老忍僧於某處結作淨地者默然誰不忍者說僧已忍於某處結作淨地竟僧忍默然故是事如是持有四種淨地一者檀賊若經營人作僧坊時分處如是言某處為僧作淨地二者若為僧作寺未施僧三者若半有籬障若多無籬障若都無籬障若垣牆若壍亦爾四者僧作白二羯磨結比丘房乃至鬼神廟屋皆得結作淨地不應結上好房作淨處應結下者五權結小界第二分云若布薩日於曠野中行僧應和合集一處說戒若不得和合隨同二師善友知識當下道集一處結小界說戒白二羯磨大德僧聽今有爾許比丘集若僧時到僧忍聽結小界白如是大德僧聽今有爾許比丘集結小界誰諸長老忍僧結小界者默然誰不忍者說僧已忍齊爾許比丘集處結小界竟僧忍默然故是事如是持爾許須出其數一切須在舒手相及處立說戒竟應解而去自恣亦爾若有欲受戒人不同意者未出界應至界外疾集一處結小界與授戒授已應解解法與結並同但改結字為解字耳授戒法夫比丘戒者乃是出世宏規僧寶由斯建立貴在受後修學行持非可僅以登壇塞責而已是故誘誨獎勸宜在事先研究討明功須五夏壇中要務惟秉羯磨餘所未知二師是問而後代師匠多事美觀遂以平時開導之法混入登壇秉授之次依文宣讀則解義為難時久遲延則厭倦必起且因科節繁勞致使眾多同受文繁則違佛本規眾受則並不得戒又受時雖似殷重受後便謂畢功顛倒差訛莫此為甚故今詳勘藏文恪依四分既崇佛制復便遵行和尚必須預求戒師但與秉白隨時皆可入道何須臘八及四月八難緣方許三人豈容多眾至百千眾非曰生今反古實不敢背法耳略明四意初明出家受十戒法二明請和尚及問重難法三明登壇受具法四明受具得不得法初明出家受十戒法依受戒犍度等酌錄不得度壞法外道根本百一羯磨云外道求出家者授與三歸及五學處僧中三乞大德僧聽我某甲外道從僧乞四月共住願僧慈愍故與我四月共住僧應安彼著眼見耳不聞處為作白四羯磨於四月內著鄔波䭾耶衣食僧常食准求寂例而作驅使善見律云此外道修得四禪乃至能飛騰虗空亦不得與具戒要滿四月若佛法中修得須陀洹道即日為受具不須四月若在外道或聞說法得須陀洹來求出家即與受具若彼垂滿四月聞毀佛法生歡喜心聞毀外道瞋恚好往五不應行處處更與四月若結髮外道事火外道不須四月共住何以故此二外道有業信因果過去諸佛為菩薩時出家波羅密皆於此道學若比丘欲往外道處步步突吉羅中路悔還懺悔突吉羅罪得住若往外道處聞外道說法不入其意悔還懺悔突吉羅罪得住若聞外道說法心便好樂受外道法下至拔一髮患痛悔還應滅擯不得更出家不得度奴不得度賊五分律云有賊厭作惡業求出家聽將至不識處與出家受具又云授戒不相識者應七日試看不得度負債人善見律云有人為償債得出家不得度五種病人癩癰疽白癩乾痟顛狂父母不聽不得度令出家善見律云若有餘方餘國度出家不須問父母不得度官人善見律云貪祿盡得出家若白王王聽亦得出家犯比丘尼賊心入道黃門畜生五逆罪人等未出家者不應度已出家者應滅擯犯比丘尼者善見律云初壞者不得出家第二壞者不障謂犯清淨持戒尼則成重難若尼先已破者後乃相通不名重難也賊心入道者僧祇律云若自出家人未曾入布薩自恣中後有好心得與出家受具若曾入布薩自恣中是名盜住不聽出家若王子大臣子避難自著袈裟者亦爾若欲僧伽藍中剃髮當白一切僧若不得和合房房語令知已與剃髮若和合當作白然後剃髮作如是白大德僧聽此某甲欲求某甲剃髮若僧時到僧忍聽與某甲剃髮白如是先某甲說沙彌名字次某甲說和尚名字後某甲亦沙彌名字既剃髮已名為形同沙彌也若欲寺中度令出家當白一切僧僧祇律云不聽不白僧度人出家下至白上座八人白剃髮不白出家越毗尼罪二俱不白二越毗尼罪若出界度者無罪到戒場上亦名出界阿闍梨作如是白大德僧聽此某甲求某甲出家若僧時到僧忍聽與某甲出家白如是若在戒場上有四比丘或過四人應作白若唯三人二人不須作白三某甲如前釋出家者正指受十戒法若不受戒雖復剃髮不名出家受十戒已乃名法同沙彌也白已教使著縵條壞色衣偏袒胡跪合掌作是語我某甲歸依佛歸依法歸依僧隨如來出家某甲為和尚如來至真等正覺是我世尊三說我某甲歸依佛法僧隨如來出家竟某甲為和尚如來至真等正覺是我世尊三說如諸佛盡壽不殺生我某甲亦盡壽不殺生如諸佛盡壽不偷盜我某甲亦盡壽不偷盜如諸佛盡壽不婬欲我某甲亦盡壽不婬欲如諸佛盡壽不妄語我某甲亦盡壽不妄語如諸佛盡壽不飲酒我某甲亦盡壽不飲酒如諸佛盡壽不著香華鬘不香塗身我某甲亦盡壽不著香華鬘不香塗身如諸佛盡壽不歌舞倡伎不往觀聽我某甲亦盡壽不歌舞倡伎不往觀聽如諸佛盡壽不坐高廣大牀我某甲亦盡壽不坐高廣大牀如諸佛盡壽不非時食我某甲亦盡壽不非時食如諸佛盡壽不捉持生像金銀寶物我某甲亦盡壽不捉持生像金銀寶物已上三歸十戒並是授戒阿闍梨教令說次應語言汝今已受沙彌十戒竟當盡形壽頂戴奉持終身不得犯應供養三寶和尚阿闍梨一切如法教不得違逆上中下座心常恭敬勤求方便坐禪誦經學問勸助作福開三惡道開涅槃門於比丘法中增長正業得四道果凡受沙彌戒必須二師如羅睺羅尚以舍利弗為和尚目連為授戒闍梨餘可知也問按沙彌十戒法中先受三歸五戒次說出家十戒是佛正規設有白衣欲求出家不受五戒徑受十戒可如法否答若已受五戒者即應剃髮受十戒若未受五戒者必先授五戒已乃剃髮說十戒倘不受五戒徑說十戒例同不受十戒而受具戒此人雖得戒二師則有過矣第二分云房舍臥具從大比丘下次第與不得令沙彌坐臥織繩牀上若能愛護不汙聽坐臥第四分云沙彌應以生年為次第若生年等者應以出家年為次第僧祇律云太小者若減七歲若滿七歲不知好惡皆不應與出家太老者若過七十能有所作若減七十不堪造事臥起須人皆不聽出家若年滿七十康健能修習諸業聽與出家應先剃鬚後剃髮若欲新出家者不得便說出家樂應說出家苦一食一眠少食少飲多覺少眠長壽能不若言能應與剃從七歲至十三名驅烏沙彌從十四至十九名應法沙彌從二十至七十名名字沙彌食及非時衣等與安居衣與半若三分之一根本尼陀那云年始六歲雖能驅烏不與出家年滿七歲不能驅烏亦不與出家問出家功德經云若復有人於閻浮提出家持戒一日一夜乃至須臾清淨出家利益無量若復有人破他出家為作留難即為劫奪無量善財當受惡果今僧祇云若欲新出家者不得便為說出家樂應說出家苦等豈非為作留難耶答信心出家不應阻難邪因入道必須料揀若阻難則退人善根不料揀則敗壞佛法又經中誡親友眷屬令其不作障緣律中誡和尚闍梨令其不濫攝受也善見律云沙彌有十惡應滅擯殺盜婬欺飲酒毀佛毀法毀僧邪見汙尼前九改過不更作猶可受具後一決不可按薩婆多論若破五戒八戒中重戒者更無勝進何況沙彌此云爾者重在悔過不更作亦猶比丘絕不覆藏得與學戒之意為和尚者特宜秘此勿令沙彌竊知也問正受戒時何故和尚反不說戒又後文云和尚不現前亦名得戒設阿闍梨不現前和尚可代授否答受戒雖依和尚秉白必賴闍梨者正以出家戒法關係僧輪不容私相授受故也若許和尚自說則羯磨者無權必有泛濫度人之失故斷不可二明請和尚及問重難法受戒犍度云時諸出家學道未被教誡者不案威儀著衣不齊整乞食不如法處處受不淨食或受不淨鉢食在小食大食上高聲大喚如婆羅門聚會法有一病比丘無瞻視者命終諸比丘白佛佛言自今聽有和尚和尚看弟子當如兒意弟子看和尚當如父意展轉相敬重相瞻視如是正法便得久住增益廣大當如是請和尚偏袒右肩胡跪合掌作如是語我某甲今請大德為和尚願大德為我作和尚我依大德故得受具足戒如是三說和尚當報言可爾或言如是或言當教授汝或言清淨莫放逸議曰初剃髮出家時即應如是請師但改云我依大德故得出家受戒耳若十戒和尚仍在不須更請若受具時十戒和尚或遠行或命終或捨戒或滅擯不復可依則須更擇大比丘而請之也聽先問十三難事然後為彼授具白四羯磨謂沙彌既新請和尚則和尚未必曾與久住故須細問非謂平日久相諳者亦須問也凡問難事須令彼解若不解者為之剖釋不得依文宣讀而已汝不犯邊罪不若破十戒八戒五戒中重戒者誠心悔過猶行進具若破具戒永不許受謂曾受佛戒犯四重禁即是佛法海外人也汝不壞他梵行不若壞比丘比丘尼梵行不可懺悔若壞餘五眾梵行亦許至誠懺悔謂自身雖未受戒若犯佛弟子淨戒人名破梵行汝非賊心入道不謂白衣或沙彌時盜聽說戒羯磨同僧法事僧祇律云若沙彌作是念說戒時論說何等即先入上座牀下盜聽若聰明覺知初中後語者後不得受具若暗鈍若眠若意緣餘念不記知者後得受具汝非破內外道不謂曾作外道來受具戒復入外道今又來求受汝非黃門不謂生不男犍不男妬不男變不男半月不男汝非殺父不若弑義父繼父等仍可懺悔受具若弑生身之父不可受具汝非殺母不若弑義母嫡母繼母庶母等仍可懺悔受具若弑生身之母不可受具汝非殺阿羅漢不若弑三果以下猶可懺悔受具若弑無學死不變容者不可受具汝非破僧不若破法輪若主若伴及破羯磨主還俗復來不可受具若破羯磨伴還來得受汝非惡心出佛身不此難佛滅後無依舊文問或云惡心毀佛形像亦成重難酌之汝非是非人不謂諸天修羅鬼神變為人形求受具戒不得戒也汝非畜生不謂龍等變為人形求受具戒亦必不得戒也汝非有二形不謂一身具有男女二根已上正乖道器故須先問三明登壇受具法第二分云不自稱字不肯稱和尚名教乞戒而不乞是三種人不得受具不得著白衣衣外道衣莊嚴具受具不得與眠醉狂裸形瞋恚人受具不得強授人具足戒一切四體六根不具形相醜惡多病多過汙辱眾僧者皆不得受具師及弟子并足數人若在空中若隱不現若離見聞處若在界外皆不名受具足不先受沙彌戒此人得戒眾僧有犯和尚審知沙彌無十三難事已為料理衣鉢選請羯磨教授二師及尊證等然後登壇令欲受戒者立眼見耳不聞處羯磨師當作白差教授師大德僧聽彼某甲從某甲求受具足戒若僧時到僧忍聽某甲為教授師白如是教授師當往至欲受戒人所語言此安陀會多羅僧僧伽梨鉢多羅是汝有不彼答言是教授師復應語言善男子諦聽今是至誠時實語時我今當問汝汝隨我問應答若不實者當言不實若實當言實汝字何等答言字某甲和尚字誰答言字某甲年滿二十不滿者答言滿衣鉢具足不答言具足父母聽汝不答言聽若父母已亡者應答言父母已亡汝非負債人不答言非汝非奴不答言非若言是者應問主人聽不答言聽汝非官人不答言非若言是者應問猶食祿不答言不食祿若言猶食祿者應問國王聽汝不答言聽汝是丈夫不答言是丈夫有如是病癩癰疽白癩乾痟顛狂汝今有此諸病不答言無如我今問汝僧中亦當如是問如汝向者答我僧中亦當如是答教授師如是問已還來僧中如常威儀舒手相及處立作如是白大德僧聽彼某甲從某甲求受具足戒若僧時到僧忍聽我已問竟聽將來白如是白已迴身將彼欲受戒人來至僧中為捉衣鉢教禮僧足已教在羯磨師前胡跪合掌教作如是語大德僧聽我某甲從某甲求受具足戒我某甲今從眾僧乞受具足戒某甲為和尚願僧慈愍拔濟我如是三乞戒已羯磨師當作白大德僧聽此某甲從某甲求受具足戒此某甲今從眾僧乞受具足戒某甲為和尚若僧時到僧忍聽我問諸難事白如是善男子聽今是至誠時實語時我今當問汝汝隨我問應答若不實者當言不實若實當言實汝字何等和尚字誰年滿二十不衣鉢具足不父母聽汝不汝非負債人不汝非奴不汝非官人不汝是丈夫不丈夫有如是病癩癰疽白癩乾痟顛狂汝今有此諸病不應一一問答如前竟然後為作白四羯磨大德僧聽此某甲從某甲求受具足戒此某甲今從眾僧乞受具足戒某甲為和尚某甲自說清淨無諸難事年滿二十三衣鉢具若僧時到僧忍聽僧今授某甲具足戒某甲為和尚白如是大德僧聽此某甲從某甲求受具足戒此某甲今從眾僧乞受具足戒某甲為和尚某甲自說清淨無諸難事年滿二十三衣鉢具僧今授某甲具足戒某甲為和尚誰諸長老忍僧與某甲受具足戒某甲為和尚者默然誰不忍者說此是初羯磨第二第三亦如是說僧已忍與某甲受具足戒某甲為和尚竟僧忍默然故是事如是持五分律云受戒已應語言汝今受戒某年某月某日某時汝應盡壽憶是事第二分云時有比丘受戒已眾盡捨去即共本二行不淨還詣眾中眾問汝何故在後彼說此事眾語言汝速滅去其人言何不先語我我當避之不作比丘白佛佛言自今作羯磨已當先說四棄法薩婆多論云四羯磨竟已得具戒所以說四依等者但為知故說也善男子聽如來至真等正覺說四波羅夷法若比丘犯一一法非沙門非釋種子汝一切不得犯婬作不淨行若比丘犯不淨行受婬欲法乃至共畜生非沙門非釋子爾時世尊與說譬喻猶如有人截其頭終不能還活比丘亦如是犯波羅夷法已不能還成比丘行汝是中盡形壽不得作能持不答言能一切不得盜下至草葉若比丘盜人五錢若過五錢若自取教人取若自破教人破若自斫教人斫若燒若埋若壞色者彼非沙門非釋子譬如斷多羅樹心終不復更生長比丘犯波羅夷亦如是終不還成比丘行汝是中盡形壽不得作能持不答言能一切不得故斷眾生命下至蟻子若比丘故自手斷人命求刀授若人教死歎死勸死與人非藥若墮胎若厭穢殺自作方便若教人作非沙門非釋子譬喻者說言猶如針鼻缺不堪復用比丘亦如是犯波羅夷法不復成比丘行汝是中盡形壽不得作能持不答言能一切不得妄語乃至戲笑若比丘非真實非己有自說言我得上人法得禪得解脫得定得四空定得須陀洹果斯陀含果阿那含果阿羅漢果天來龍來鬼神來彼非沙門非釋子譬喻者說譬如大石破為二分終不可還合比丘亦如是犯波羅夷法不可還成比丘行汝是中盡形壽不得作能持不答言能善男子聽如來至真等正覺說四依法比丘依此得出家受具足戒成比丘法比丘依糞掃衣依此得出家受具足戒成比丘法是中盡形壽能持不答言能若得長利檀越施衣割壞衣得受比丘依乞食比丘依是得出家受具足戒成比丘法是中盡形壽能持不答言能若得長利若僧差食檀越送食月八日食十五日食月初日食若僧常食檀越請食得受依樹下坐比丘依此得出家受具足戒成比丘法是中盡形壽能持不答言能若得長利若別房尖頭屋小房石室兩房一戶得受依腐爛藥比丘依此得出家受具足戒成比丘法是中盡形壽能持不答言能若得長利酥油生酥蜜石蜜得受汝受戒已白四羯磨如法成就得處所和尚如法阿闍梨如法眾僧具足滿汝當善受教法應當勸化作福治塔供養佛法眾僧和尚阿闍梨若一切如法教不得違逆應學問誦經勤求方便於佛法中得須陀洹果斯陀含果阿那含果阿羅漢果汝始發心出家功不唐捐果報不絕餘所未知當問和尚阿闍梨爾時應結撮𢌞向已令受戒者在前而去四明受具得不得法第二分云有八難事起及餘因緣二人三人聽一時作羯磨不得過八難者王賊水火病人非人惡蟲餘因緣者有大眾集或坐具少或房舍少天雨漏十誦律云不得一時唱說令四人得受大戒根本雜事云不得四人同受近圓何以故以眾為眾而作羯磨理相違故五分律云聽於布薩時自恣時僧自集時受具足戒不應以小似片事與受戒人作難先到受戒處者應先與受戒若二人俱到年大者先受若同年和尚大者先受壇中秉羯磨師正中而坐止惟一人或有二比丘各將一沙彌來求戒則約和尚戒臘大者先受也當知為此沙彌受具則彼和尚便為尊證為彼沙彌受具則此和尚亦便為彼尊證若和尚復同此有二意一者二位和尚戒臘相同二者或有大德多知猶如優波離舍利弗等許一年中受二三弟子應一時羯磨先稱名者先受例如雙生子先出胎者為兄也三人亦如是餘事亦得羯磨三人一切不得羯磨四人第二分云無和尚不得受戒善見律云若與受戒得突吉羅罪是人得戒薩婆多論云若先請和尚受十戒法和尚不現前亦得十戒和尚若死聞不得戒不聞得戒若白四羯磨受具足戒和尚不現前不得受戒以僧數不滿故若僧數滿設無和尚亦得受戒第二分云二和尚乃至多和尚亦不得受戒一人止有一親教師譬如生身之父不可多故若於彼為和尚於此為尊證者俱所不論和尚九歲得名受戒而眾僧有罪南海寄歸云凡為親教師者要須住位滿足十夏秉羯磨師屏教師屏餘證人並無定耳律攝云邊地若有十人可得取五人者名善近圓眾得越法罪若但有五人斯名善受若眾數不滿不得以佛作數佛陀僧伽寶體別故若狂聾人及天授部等將足眾數不成近圓天授部謂調達破僧伴也薩婆多論云佛不與人作和尚阿耆利大愛道八法受戒亦得稱阿難作阿耆利即阿闍梨根本尼陀那云若人身無難事自言我有是受近圓諸苾芻得越法罪若人實有難事自言我無不名受近圓諸苾芻無犯若作如是語莫授我近圓而為受者非受近圓諸苾芻得越法罪未受十戒而受近圓此人得戒諸苾芻得越法罪與四分同第二分云從不持戒和尚受具不知者得戒知者不得五分律云有和尚阿闍梨罷道後來就弟子求出家受具先弟子應與衣鉢助使得成亦聽即與作師彼更受戒者應如法敬師第二分云若於眾中被舉而休道者欲還出家若自見罪應與出家自見罪應與受具能懺悔應與解羯磨薩婆多論云年六十不得受大戒惟聽為沙彌凡七種受戒一見諦受戒如憍陳那初解聖諦即名得戒二善來得戒如前釋三三語得戒佛成道未久有人遇佛自唱我今歸依佛歸依法歸依僧即名得戒四三歸受戒佛初勅千二百五十人各各別行化度諸方若有發心出家者三說三歸即名得戒五自誓受戒如摩訶迦葉初出家時未曾遇佛但自誓云誰有世間最正覺者是我之師我是弟子即名得戒得戒已後方值世尊六八法受戒大愛道等五百女人受八不可過法即名得戒七白四羯磨得戒或更開尼為白八羯磨受戒法與比丘尼為遣信受戒邊方為五人中受戒即共有十種得戒不同佛法始終以白四羯磨戒為宗本能繼續三寶作無邊利益是故於七種戒中最勝最妙最為尊重善來惟局金口三語三歸惟局未制四羯磨前八法惟局五百比丘尼自誓惟大迦葉一人見諦惟五比丘獨此白四羯磨得戒綱維佛化使正法久住三乘道果不絕也十誦律云先受大戒乃至大須臾時是人應先坐先受水先受飲食善見律云若比丘實一臘妄言二臘依二臘次受利養計錢犯重南海寄歸云從九月十六至正月十五為冬時舊云八月十六至十二月十五從正月十六至五月十五為春時舊云十二月十六至四月十五從五月十六至六月十五為雨時舊云四月十六至五月十五六月十六一日一夜為終時舊云五月十六此一日一夜中受具猶得受後安居到三月滿便算一夏譬如世人臘月三十所生亦算一歲故以此為終時也若五月十七受戒則不得受後安居但名無夏比丘直待明年方受或前安居或後安居至三月滿方名一夏比丘譬如世人歲朝所生直至年終止名一歲也從六月十七至九月十五為長時舊云五月十七至八月十五此謂佛家密教與俗有殊凡西方南海出家之人創相見者問云大德幾夏答云爾許若同夏者問在何時若時同者問得幾日若日同者問食前後同在食前方問其影影若有殊大小成異影若同者便無大小坐次則據其先至知事乃任彼前差若六月十七明相纔出受其近圓同夏之中則為最大由不得後夏故舊云五月十七若六月十六夜將盡而得受戒則同夏之中為最小由其得後夏故舊云五月十六問十誦云先受大戒乃至須臾時應先坐等梵網經亦有如法坐戒今比丘與菩薩戒或復受有先後當依何戒次耶答釋籤云大小兩乘通用律儀攝其分位各依律儀以定位次是故菩薩在大則大在小則小故知在小乘眾還依小乘位次而坐在大乘眾則依大乘位次而坐又輔行云若先小後大一切轉為無盡戒體若先受大後方出家欲在大比丘數而不失菩薩法者則更受律儀但於一切發得身口清淨防非律儀無作戒體不復發也故涅槃中五篇七聚並是出家菩薩律儀又若先小後大則開小夏以成大夏若先受大後受律儀在小則依小在大則依大文此不易之論也第二分云比丘變女形即以先受戒年歲令入尼眾尼變男形令入比丘眾變二根者滅擯五分律云比丘變女形若先犯共比丘尼戒者應於尼眾中悔先犯不共戒不須復悔比丘尼根變亦如是若式叉摩那根變年滿二十應與受比丘戒未滿二十即是沙彌沙彌尼根變亦如是若沙彌根變或應與二歲學戒即於尼眾受二歲戒或年未應與二歲戒即是沙彌尼根本雜事云若至三轉即非僧尼當須滅擯第二分云被賊等截男根及自落者不應滅擯自截應滅擯五分律云截陰及半突吉羅都截偷蘭遮去一卵偷蘭遮去兩卵應滅擯律攝云苾芻修行之時有二種煩惱或容生起由忘正念便憶曾經遠境起染愛心造眾過失復由現前近境起染愛心而犯眾罪了知起犯緣已即於此事生對治心令其除滅若染緣強盛不能除遣應就尊宿及閑三藏有德行者請受教誡作意蠲除若仍不息當勤晝夜讀誦聞思簡擇深義於三寶所至誠供養即長等處忘自劬勞盡心供給或遊他方或復減食或往屍林獨居阿蘭若修不淨觀等或為四念住或作無常死想冀令煩惱除滅若仍不除應生慚愧作如是念我所為非戒不清淨而復受他信心施主四事供養又復諸佛及有天眼同梵行者并諸天神悉觀見我為此不應造眾罪業當自尅責如救頭然於清淨境說除其罪勿致後悔若作如前對治行時性多煩惱未能殄息應審自觀察或應捨戒而為白衣勿令有罪受他信施由受用時更造眾多罪惡之業定感當來苦異熟果如經廣說應善修持音義閑三藏閑習熟也蠲音涓亦除也又洗也異熟果三界果報並名異熟共三義一異時而熟此生造業後生受果二異性而熟因通善惡果惟無記三異處而熟人中造因六趣受果
