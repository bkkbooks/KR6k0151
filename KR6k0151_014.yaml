body:
  text: 古吳蕅益沙門智旭彚輯衣法聽取糞掃衣有十種牛嚼衣鼠嚙衣火燒衣月水衣產婦衣神廟中衣鳥䘖風吹雜處者塚間衣求願衣受王職衣往還衣謂送葬衣不應取阬壍中死人衣不應取垣上籬上壍中糞掃衣或是居士所浣曬故不應在斷事處取死人衣官敕旃陀羅棄死屍彼言使取衣者棄之不應取未壞死人衣死人未壞不應打令壞不應取大聚衣是居士所脫故糞掃衣無主屬先取者若共取應分不應取莊嚴供養塔衣聽以刀截衣得未浣衣聽自浣使人浣聽畜浣器浣板剪刀應五條不應六條應七條不應八條乃至十九條不應二十條若過是條數不應畜聽以長四肘廣二肘衣作安陀會廣三肘長五肘作多羅僧僧伽棃廣指豎言長指橫言問比丘三衣諸部皆以豎三橫五為量今造衣無不過量亦有罪不又僧伽棃四分律不過十九條僧祇律不過十五條惟根本許至二十五條今皆稱二十五條為上上衣亦定爾不答三肘五肘決不可過故律攝云過此以上皆得惡作今時製衣豎雖未必過三橫則無不過五譌云摺時取方當知受持披著步步得突吉羅又西國造衣或糞掃衣或檀越施衣但令所得廣長則條隔可少所得雜碎則條隔便多不惟僧祇四分不貴多條即根本部亦但云初三次三次三未嘗名為上中下也況梵網止言九條七條五條袈裟佛付迦葉傳彌勒者亦止是十三條金縷袈裟今乃獨尚二十五條傷工費本可笑甚矣作新衣一重安陀會一重多羅僧二重僧伽棃若故衣聽二重安陀會二重多羅僧四重僧伽棃若糞掃衣隨意多少重數得縵衣廣長足裁割便少聽作帖葉不應不著割截衣入聚落不應反著衣入聚落聚落外聽反著不應著一衣除大小便處不應著繡衣草衣樹皮衣樹葉衣珠瓔珞衣皮衣鷲毛衣人髮衣馬尾衣犛牛尾衣衣壞聽補治聽著納重線編邊隨孔大小方圓補有居士持衣來言與某甲比丘比丘言我不須即持衣置比丘前而去聽為施主故掌錄若須時聽受持大價衣布地不應在上行不應以大價衣作地敷聽用作臥褥坐褥作枕作覆上衣不應作帳房中四周設幃不應作軒簷前設幃聽畜袈裟色帶廣三指遶腰三周若帶細輭數結速斷應安扭玦不應用寶作患寒聽著復紵衣兩重名複內盛棉絮等名紵與貯通用寒雪國聽作韈聽著帽身患瘡并汗臭聽作拭身巾面汗聽作拭面巾患眼淚聽作捫淨巾僧祇律云非時長衣應與僧時衣太多減半與僧持三衣瓶鉢即是少欲少事作緤極廣齊四指極狹如𪍿麥五條應一長一短七條至十三條兩長一短十五條三長一短根本律云護惜衣服當如身皮應浣染縫治者當隨事作僧伽胝有九種九條乃至二十五條初三種二長一短次三種三長一短次三種四長一短應作應持過此已上便成破納上者豎三肘橫五肘下者豎二肘半橫四肘半二內名中嗢呾羅僧伽及安呾婆娑亦如僧伽胝量復有二種安呾婆娑豎二橫五豎二橫四雜事云肩上安胸前綴紐葉相有三大寬四指或如烏張足小寬二指或如母指面此內名中不應披三衣鬀髮應別畜鬀髮衣或用僧脚崎遮身而鬀應以帒盛衣常用者在上非常用者在下蚊幬周十二肘於上安葢長四肘闊二肘隨身高下䌵帶懸垂相掩作門熱應搖扇下邊蚊入氈席壓之僧伽胝者是衣中主不應隨處著用作諸事業入聚落時乞食時隨噉食時入眾食時禮制底時聽佛法時禮拜二師及同梵行者時可披大衣嗢呾羅僧伽應於淨處披著及食等事其安呾婆娑任於何處隨意著用目得迦云賊奪商旅所遺棄物不應收取若商主隨聽者應取有主屍林及神廟衣亦爾許諸苾芻畜十三資具衣一僧伽胝二嗢呾羅僧伽三安呾婆娑四尼師但那五裙六副裙七僧脚崎八副僧脚崎九拭面巾十拭身巾十一覆瘡衣十二鬀髮衣十三藥直衣隨一一衣各別疊名而為守持應如是說對一苾芻具壽存念此僧伽胝衣我今守持已作成衣是所受用如是三說餘衣守持準此應作其藥直衣應加為病因緣此外若更有餘衣應於二師而作委寄分別持之對一苾芻作如是說具壽存念我苾芻某甲有此長衣未為分別是合分別我今於具壽前而為分別以某師為委寄者我今持之如是三說若衣欲破應以長線而縫絡之若見有孔應可補帖若在內爛兩重幅疊如總爛壞不堪料理者應作燈炷或可斬碎和泥用塞柱孔或塗牆壁如是用時能令施主所捨福田任運增長薩婆多論云三衣若破不問孔大小但使緣不斷絕故成受持若衣久失色故不失受持後更上色亦不受持問今相傳三衣若破不許自補又比丘無常衣掛樹上何耶答曰是律所聽便可依從非制而制便名非法衣破不許自補出在五百問中此書多譌卷首已辯之矣比丘無常三衣與看病人律有明文如何可抗設欲免金翅之災必須龍王來乞或欲繫小兒之項亦須父母相求若高掛樹梢空無利益非律所載實為可嗤暴殄施物豈能無罪摩得勒伽云不得畜不淨所汗糞掃衣若得糞掃衣當洗浣治令淨好縫好染已受持十誦律云三衣不應少不應多少畜突吉羅多畜捨墮若糞掃衣若居士衣好割截治縫令周正別施緣若少衣不能得割截應衣上安牒若五若七若九乃至若十五五分律云著外道衣偷蘭遮若不知是外道衣而非佛所聽皆應壞之若知是外道衣應摘縋布地令人蹈上速使壞盡左條葉左靡右條葉右靡中條葉兩向靡蚊幮應隨牀大小作禪帶不應廣過八指不應減五指三衣應受持襯身衣被衣雨浴衣覆瘡衣蚊幮敷經行處衣障壁虱衣單敷衣坐具護䏶衣護膊衣護頭衣拭體巾拭手面巾鍼線囊鉢囊革屣囊漉水囊如此諸衣若似衣皆應受持患頭冷病聽以衣覆亦聽作帽煖則止富羅不應深作𩍓聽至踝上得新衣應先浣舒張度量然後裁截縫染如法受持不得以裹諸物謹護如身薄皮善見律云三衣受持不須說淨雨衣四月受持過四月已說淨尼師壇受持不須說淨覆瘡衣不須說淨瘡瘥已說淨敷具受持不須說淨雜碎衣受持不須說淨手巾受持不須說淨若先受持三衣捨已受持新者以身口對比丘說若無比丘以手捉衣自說若手不捉不成說應道其名字所捨三衣作雜碎衣應說淨尼師壇受持一不得二敷具多少隨意畜覆瘡衣畜一不得過手巾畜二雜碎衣隨有多少說受持不犯牀褥薦席等悉屬房物不須說淨律攝云凡著衣服應捨三種心一喜好玩飾心二輕賤受用心三矯覓名稱心詐著弊衣欲令他知有德有行是三心皆不應作但求壞色趣得充身順大師教進修善品應生五種心一知量度量而用勿使傷損二知間隙不可頻著一衣臭而疾破三知思察來處極難作報恩心受用之時勿為非法四知時寒熱適時受用合度五知數十三資具足得資身多畜貯衣長貪廢業鉢法第四分云有比丘入僧中食無鉢聽比座與若僧中借與不應不洗鉢用食不應畜木鉢是外道法不應畜石鉢是如來法鉢不應畜金銀瑠璃寶鉢是白衣法聽比丘作鐵鉢聽畜一切作具聽熏鉢一切物不應著鉢中不應不洗鉢便舉聽作鉢囊作帶絡肩挾鉢腋下鉢口向外僧祇律云不聽鉢中安隔若以餅隔及飯隔者無罪根本律云護鉢當如眼睛應綴者綴應熏者熏十誦律云鉢是恒沙諸佛標幟不得盛不淨物五分律云過中不應用鉢飲聽作飲器用銅鐵瓦聽別作歠粥器食法藥法藥犍度云若時藥和時藥及非時藥等應受作時藥若非時藥和七日藥等應受作非時藥若七日藥和盡形壽藥應受作七日藥若盡形壽藥和盡形壽藥應受作盡形壽藥不應自煑而服不得界內共食宿煑食食應在邊房靜處結作淨厨屋琝荼居士裁種種飲食於道路供佛及僧行過曠野故有餘食使人即盡持與比丘比丘白佛佛聽作檀越食受令淨人掌舉不應自受若有所須隨意索取有八種漿棃漿閻浮漿酸棗漿甘蔗漿果漿舍樓伽漿婆樓師漿蒲桃漿若不醉人應非時飲若醉人不應飲亦不應以今日受漿留至明日不應不淨果便食應作五種淨法火淨刀淨瘡淨鳥破淨不中種淨刀淨瘡淨鳥淨應去子食火淨不中種淨都食僧得果園應受敕僧伽藍民若優婆塞料理彼欲得分應計食作價與直沙彌亦得料理食不破果大便已子生不犯比丘種菜果自散種自移植後皆聽食蘇瓶油瓶聽覆若無淨人捉葢懸置其上不應手觸此是僧之蘇油非所受七日藥也不應噉不淨菜不應自作淨不應自手捉令人作淨應置地使淨人作作淨已應受而食不應故觸彼淨食令得不淨觸者突吉羅彼不觸無犯居士持食寄比丘後若自食若持歸或與比丘聽受病比丘須粥使淨人著水著米煑令沸洗手受然後自煑令熟不得界內共粥宿界內煑自煑若重煑粥聽自煑結淨厨界則無共宿內煑二過欲受蘇錯受油欲受油錯受蘇等皆不成受穀貴時聽比丘八事界內共食宿一界內煑二自煑三自取食四早起受食足食已不作餘食法得食五從食處持餘食來亦爾六胡桃果等食亦爾七水中可食物亦爾八若穀還賤不聽不任為食者比丘有病因緣盡形壽應服尼犍度云尼得與比丘授食尼宿食與比丘為淨比丘亦得與尼授食比丘宿食與尼為淨第四分云供養塔飲食若沙彌若優婆塞若經營作者應食飲食供塔須具三德六味若時新果並須作淨今時乃以淡白豆腐麩筋及帶穀果不切供可恥甚矣此供塔物比丘並不許食不惟密部也僧祇律云䔉者若生若熟若葉若皮悉不得食若須塗瘡聽用塗已不得眾中住應在屏處差已淨洗浴還入僧中病時不服䔉不差者聽服服已七日不得臥僧牀褥上僧廁入僧浴室溫室講堂食屋受僧次請乃至說法布薩一切不得住不應遶塔若塔在露地者得下風遙禮至八日澡浴浣衣熏已得入眾根本律云無事斷食得越法罪問如傅大士世稱彌勒化身每作絕食種種苦行智積菩薩復持水齋後人倣傚為有罪不答傅大士苦行絕食為欲代眾生苦智積菩薩水齋減食為欲調煩惱習乃至依密部中復有種種作法皆非無事斷食故無罪也然或借水齋絕食等事以邀名利則是邪命所攝罪更甚矣尼陀那云令淨人行果與僧若無淨人應使求寂求寂無者先作淨已苾芻受取應可自行十誦律云食生聽更煑若生食聽火淨已得煑云何名火淨乃至火一觸毗尼序云五時聽噉石蜜一遠行來二病三食少四不得食五施水處若不飲水不聽噉五分律云不應就樹上觸果以船車載飲食若無淨人行御聽比丘自行自御僧以車運米有一婆羅門以僧不淨米一把投車中佛言若可別應除去若不可別趣去一把食根有五種淨法剝淨截淨破淨洗淨火淨食莖葉有三種淨法刀淨洗淨火淨於一器一聚中若淨一名為總淨米中有穀聽畜杵臼令淨人伐之薩婆多論云若以時藥等助成七日藥作七日藥服無過或以七日藥等助成終身藥作終身藥服無過或以七日藥等助成時藥作時藥服隨勢力多故相助成故受食法法犍度云若欲受請應往僧小食大食處可見處住檀越白時到上座應在前如鴈行而去若有三寶事瞻病事應白上座已前去若有命難梵行難聽不問去往彼食處不應錯亂聚住應隨次坐上中下座互相看若有不如法坐不善覆身者應彈指令覺或遣人語令知不應貪恭敬故在後到令諸比丘起若檀越與上座果應問果淨不若未淨應語令淨若已淨應問為誰送來若言為上座得隨意取若言為僧應語令傳使徧與羮亦爾有比丘不得食聽比座為索若無比座應自減半與不應得食便食應待唱言等得然後食不應匡肘食妨比座不應大咳唾應徐徐棄唾所食可棄之物應聚著脚邊去時持棄食已應為檀越說大嚫乃至一偈餘比丘不應先去若為三寶事瞻病事應白然後去檀越欲聞種種法應隨宜為說第四分云不應二人同鉢食不得亞臥枕案上食身倚案上如半臥也老病比丘聽以鉢著牀角頭或安瓶上僧祇律云不聽共一器食若無鉢者應用鉤鉢犍甆若復無者置器著草葉上更互取食不得俱下手除五正食五雜正食餘餅果菜等共食無罪無病不聽机上食上座當徐徐食不得速食竟住看令年少狼狽食不飽根本雜事云不得著一裙而食老病者應著輭滑僧脚崎重病者應在屏處但著一裙隨意食留食之時普施羣生勿拘一類飯以水澆餅須細擘散之於地隨意當食不應遮止食訖當為說法或上座次座等或隨能者當預請之說施頌時不應噉食待說頌訖後食無過五分律云居士請僧食不請者不應往以因緣事不為食聽往有客比丘來應語主人聽入不若不聽應語言與我等食分我自平等共食若復不得應各以鉢受分出外共食若復不得僧坊內有食應將與之不應與白衣共器食若往親里家彼言我等非他亦非不淨何不共食聽繫念在前共食但莫令手相觸看病法第三分云佛案行諸房見有比丘病無人瞻視臥大小便中佛問何故無瞻視人答言我無病時不看他病是故今病無人瞻視佛言汝不瞻視供養病人無利無所得汝曹不相看視誰當看視病者佛即扶病比丘起拭身不淨拭已洗之復為洗衣曬乾棄故壞臥草掃除住處灑令清淨更敷新草并敷一衣還安臥病比丘已復以一衣覆上捨去食後以此因緣告諸比丘應看病不應不看應作瞻病人不應不作若有欲供養我者當供養病人聽彼和尚乃至弟子瞻視若都無人看僧應與瞻病人若不肯應次第差若次第差不肯如法治若無比丘者比丘尼乃至優婆塞等應看若比丘尼式叉摩那沙彌尼優婆夷不應觸比丘病人有五事難看所不應食而欲食一不肯服藥二看病人有至心而不如實語三應行不行應住不住四身有苦痛不能堪忍身小有堪能作而不作仰他作五又不能靜坐止息內心反上事者易看有五法能看病一知病人可食不可食可食能與二不惡賤病人大小便唾吐三有慈愍心不為衣食四能經理湯藥乃至差若死五能為病人說法令歡喜聽看病人受請不受請食病人殘食第四分云聽與病者隨意食隨病藥好瞻病人病比丘不應在閣上大房中住僧祇律云南方有二比丘共來見佛一比丘病一比丘待經二三日語言我欲前去問訊世尊汝差已後來彼言待我差共去答言我不見佛久思慕如渴不容同待即詣佛所佛知而故問汝何處來比丘以上因緣具白佛言此是惡事若比丘放逸懈怠不精進不能執持諸根馳騁六欲雖近我所為不見我我不見彼若比丘能執諸根心不放逸專念在道雖去我遠即為見我我亦見彼所以者何隨順如來法身故破壞諸惡故離貪欲故修寂靜故汝等同出家修梵行汝不相看誰當看者汝還看病比丘去若比丘共商人行至曠野得病同伴應代擔衣鉢親近扶接不應遠離若不能行應從商人借乘或許與穀草直不得載㹀牛車草馬當載特牛車䭾馬若病篤無所分別趣乘無罪若乘不可得應留一二三能看人到聚落求乘來迎應留糧食使住者不乏若曠野無肯住者不得便捨去應作菴舍敷草蓐作煙火取薪水留時藥夜分藥七日藥盡壽藥語病者言長老安意住我到前聚落當求乘來迎到聚落中不得遶塔問訊二師應語聚落中比丘曠野中有病比丘共迎來若言彼處多有虎狼恐當食盡雖聞此語要當往看若已死應供養屍若活應將至聚落語舊比丘長老此是某處病比丘我於曠野供養已今來至此次長老看若不看者越毗尼罪若無比丘應語優婆塞長壽曠野中有病比丘借乘往迎乃至迎至檀越家安別障處若人多應取二三能看病者看若病者言須多人樂住者應盡住共勸化前食後食乃至盡壽藥供給使無乏若有客比丘來不得便語使看病應代擔衣鉢乃至飲食止息已語言長老是病比丘我看已久長老次應看若無常者應供養舍利若比丘比丘尼共商人行尼病比丘不得捨去應語去去姊妹將接之宜如毗尼中說唯除抱撮若須按摩油塗身者倩女人為之若無常者彼有衣鉢應雇人闍維若無應捨去有俗人嫌者能作地想應擔著遠處若大德比丘病應著顯現房中弟子常侍左右掃灑房中燒香敷坐若比丘來問疾應與前食後食非時漿若有問事病者應答病人力劣應侍者答若優婆塞來問應言善來長壽語令就坐而為說法汝大得功德如世尊說看持戒病比丘如看我無異若有供養為呪願受若病人患下問病者不得久停應速發遣若病人不能出應畜三器一授病人一持出一洗已油塗日曬如是遞用一人戶邊住莫令人卒入一人在病人邊住時時為隨順說法若小德比丘病不應著顯露處臭穢熏外不得著僻猥處死時人不知應安人中若病人有師及弟子應看若無者僧應差一二三人看病若病人有藥直應取供給若無者僧應與若僧無者彼有重價衣鉢應轉貿輕者供給病人惜者應白僧言某甲病比丘不知無常慳惜衣鉢不肯貿易白僧已輭語說法使得開解然後貿易若復無者應乞與若不能得應僧食中取好者與若復無者看病人應持二鉢乞食持好者與根本律云不應令無智人看病必有他緣須自出外於不善解看病之人當可教示勿令病者非理損害墮水火食諸毒持刀斧墮巖壍陞高樹食所忌等皆應遮止不問醫人不應輙與病人藥服有病及看病人雖臥燈明無犯十誦律云年小看病比丘得共病人坐律攝云若病人貧無藥直師主知識等應為辦之或施主邊求或用僧伽物或塔物或旛葢等莊嚴具依價賣之以供藥直若後病瘥應償若無力者不還無罪大師之子是父財故若看病苾芻供給病者除性罪已餘皆應作問諸律為病權開及看病法皆有定式惟律攝云除性罪已餘皆應作豈一切遮罪悉無犯耶答當可護時而不嚴護則輕戒之罪必成當難緣時而乏權變則病苦之人必殆故云除性罪已餘皆應作葢是一往極勢之語非是一任放捨之言也房舍第四分云隨作房法所須一切聽與聽作布薩大堂聽作長牀聽作經行堂老病羸頓聽繩索繫兩頭循索行捉索行破手聽作捲或竹筒以繩穿筒手捉經行經行疲極聽兩頭安牀不應戶邊作龍蛇像聽作蒲萄蔓或蓮華像聽戶上作葉像不聽作兵馬像不應盡壽經營一房若作極上大好房重閣堂聽十二年經營六年內覆成餘隨大小量宜不應一切時受僧營事房聽夏三月竟隨上座分不應處處取營事房應九十日取一處住營事人不應在眾多人住處住不應小小經營便索營事房營事比丘命過此房隨僧營事比丘遣人白僧索房已命過此房隨僧彼使命過此房與營事者營事比丘未分房便出行應囑人取應指示房處所聽作浴室洗浴一比丘作房一比丘覆先作者應先住二比丘共作房聽更互作上座在先夏安居受所治房不應復受餘房僧房故壞有居士言若與我者我當修理聽與白二羯磨羅睺羅在那棃林中住有居士發意作房施之時羅睺羅人間遊行居士便以房施僧羅睺羅還以此白佛佛令往居士所問言汝將無見我有可訶責事非沙門法若口說若身行耶居士答言不也還以白佛佛告比丘若有人自心喜樂作房施一人或施多人或施僧已復施餘人若施多人若施僧若施所同部若施異部皆名非法施非法受非法住若有人喜樂作房施一人或施多人施僧施二部僧皆名如法施如法受如法住有小沙彌聽房中安隔障聽作後內房作戶作壁作半壁聽以石若甎若木作道聽作渠作池以石若甎若木障邊僧祇律云起僧伽藍先規度好地作塔處應在東在北僧地佛地不得相侵不得使僧地流水入佛地佛地水得流入僧地塔應在高顯處作不得在塔院中浣染曬衣著革屣覆頭覆肩涕唾地塔園中華應供養塔若檀越言是中華供佛果與僧應從檀越語若花多得與華鬘家語言爾許華作鬘與我餘者與我爾許直若得直用然燈買香供佛或治塔若直多者得置佛無盡物中塔池中華亦爾不得塔池中浣衣浴洗手面洗鉢下頭流出處得隨意用廁屋不得在東在北中應安隔使兩不相見根本雜事云作廁應在寺後西北隅寺中四角柱下各安唾盆十誦律云若得和香應塗舍內牀壁地上施僧華鬘以鍼釘著壁上房舍得香施者得福五分律云諸房舍中聽表裏及仰泥僧應畜斧鑿刀鋸鏵鍬梯泥漫種種作屋之具臥具法第四分云聽作褥若毳若劫貝作貯褥垢膩應作臥氈覆上聽作枕若方若圓若三角不應私用僧臥具聽作標識音志不應私物上作僧標識聽私物染作標識作如水灑地標識作輪標識不應移房中定臥具著餘處不應二人同牀宿除病人不應二人同被褥臥若正有一敷一被聽各別披襯身衣根本雜事云妙好牀座及大倚牀僧伽應受別人不許五分律云聽以十衣中隨一一衣作臥褥用羊毛駝毛棉花乃至輭草貯之極厚聽至八指器物法第三分云聽畜大銚銅釜鐵釜土釜銅瓶鐵瓶瓦瓶煎餅𨫼銅甌及鐏聽作衣架聽然燈聽鐵作燈著老病比丘聽安便器唾器不應多人住處拾虱棄地聽作虱筒聽作鬀刀畜承髮器拔鼻毛鑷剪爪刀聽作筒盛作葢塞不應寶作不應持大好圓葢不應捉王大圓扇若得已成者聽受與塔不應畜織毛㲖扇聽畜拂聽受陶師作種種器有三種不應畜瓦坐牀瓦斛瓦斗聽作刮舌刀擿齒物挑耳錍僧祇律云不聽私畜銅盂得施淨人已用無罪根本雜事云應畜三種袋一鉢袋二藥袋三雜袋應次第安長短相稱須闊作襻於內安㲲以線絡之勿令卷縮淨信居士等以諸食器奉施佛聽為大眾受受已置庫仍用鉢食施主嫌其但獲施福無受用福佛言應為受用扇有兩種一以竹作二用葉成粧彩之扇僧伽得受拂有五種一撚羊毛作二用麻作三細裂㲲布四用故破物五用樹枝稍若用寶物得惡作罪有二因緣方許乘轝一者年老衰羸二者帶病無力須持井索長者百五十肘短者十肘二內名中許為僧畜鬀刀并雜所須物五分律云寒時聽作火爐在屋外然煙盡持入用銅鐵泥石作之聽畜三鍼聽畜斗稱不聽畜田宅店肆有施者聽僧受使淨人知不聽多畜小小銅鏂不聽畜大銅鏂若畜一升以上突吉羅律攝云刀子小印苾芻應畜刀有三種上者長六指闊一指下者四指二內名中形如雞曲翎或如烏曲羽印有四種謂白銅赤銅鍮石及木皆不應用寶作杖法根本雜事云應作鍚杖杖頭安鐶圓如盞口安小鐶子搖動作聲而為警覺不應以杖打狗應舉怖之狗怖瞋劇取一抄飯擲地令食二三度搖無人問時即須行去十誦律云應作有聲杖驅遣毒蟲毗尼母經云夜怖畏處聽動錫杖作聲令諸惡毒蟲遠去問今準得道隥梯經造杖威儀尊重甚難護持與律意全不相同何耶答律中錫杖重在濟用經中制度重在表法表法或別是一途濟用則更為有益又如今人有錫淨瓶本於密部非關律宗也然彼經亦云為老病故畜杖此則雖合於律不免前後自旨相違當知既失譯人名姑置闕疑例可矣叢林法僧祇律云達貳伽即檀尼迦自念我作一房上座次受驅我令出第二第三亦驅我出續作燒成瓦屋世尊敕壞後取王木成屋又為世尊訶責徒自辛苦用多事為自今以往止此苦事依隨眾僧苦樂任過時達貳伽便習無事晝夜精誠專修道業得諸禪定成就道果起六神通自知作證深自慶慰而說偈言欲得寂滅樂當習沙門法止則支身命如蛇入鼠穴欲得寂滅樂當習沙門法衣食繫身命精麤隨眾得欲得寂滅樂當習沙門法一切知止足專修涅槃道十誦律云知僧坊比丘應作是願諸比丘未來者當來已來者供給衣食臥具湯藥不令有乏能作是願者僧隨彼意與若須食應自恣與好食若須房舍臥具皆應自恣與分處人不白僧得用十九錢供給客若更須應白僧竟與作維那應知時限知唱時知打犍椎知灑掃塗治講堂食處知次第相續敷牀榻知教淨果菜知看苦酒中蟲知飲食時行水眾散亂語時彈指第三分云現前僧大得可分衣物聽結庫藏屋白二羯磨差守物人白二羯磨若比丘不肯作守物人應福饒與粥若故不肯一切所受衣食應與二分若復不肯當如法治善見律云若外利養入知庫比丘得受兩分若頭陀比丘雖住寺中不住僧房不食眾檀越自為起房僧不得差作維那及知事使若比丘於讀誦教化說法能得利養利眾僧僧不得差知僧事有房舍衣鉢應先以好者與之飲食果木得加分與若有人來至寺不問貴賤劫賊一切悉得勞問若有喚求所須自物得與僧物先白僧和合者得與若有強力惡人來乞守物人為護住處故得隨意與與後僧不得訶第四分云有四種斷事人或寡聞無慚或多聞無慚或寡聞有慚或多聞有慚是中寡聞無慚及多聞無慚者在僧中言說斷事僧應種種苦切訶責令彼無慚者不復更爾若有慚寡聞者在僧中言說斷事僧應佐助開示令彼有慚者復於僧中言說斷事若有慚多聞者於僧中言說斷事僧聽彼說已應讚善哉令有慚者後於僧中言說斷事第三分云客比丘欲入寺內至門中手持門若有關鑰應開若不能開應徐打若不聞應大打若不開應至下籬牆處踰入開門不應左遶塔行應問言我若干歲有如許房不復應問此房有人住不有臥具不有被不有器不有衣不有福饒不若言有欲取者應語言我當取應至房所開戶若有蛇蟲應驅出掃除灑淨重敷牀臥具等應具淨水瓶洗瓶飲水器應問何處大小行何處是淨地何處不淨地何者佛塔何者聲聞塔何者第一上座房乃至第四上座房應隨次禮應問何處是僧大食處小食處夜集處說戒處何者是僧差食檀越送食月八日食十五日食月初日食檀越請食次到何處有何檀越僧為作覆鉢誰家是學家何處狗惡何處是好人何處是惡人舊比丘聞有客比丘來應出外迎為捉衣鉢安置與坐與洗足水器具與飲水應問大德幾歲若言若干歲應語言此是房此是繩牀木牀褥枕氈被地敷此是唾器此是小便器此是大小便處此是淨地乃至某甲處好某甲處惡十誦律云客比丘來應禮四上座若時得見者應禮不時得見者則止五分律云打鼓吹螺及三唱時至應使沙彌守園人木作犍椎若無沙彌比丘亦得打若比丘舉衣經十二年不還取者集僧平價作四方僧用彼比丘後還以四方僧物償若不受者善若有穀米施四方僧者為四方僧作時聽隨意食除佛辟支佛塔餘塔長物聽作四方僧用若此塔後須用取四方僧物還之根本律云苾芻應助營造不應盡日而作於寒冬時午後而作於炎夏時午前而作準量日時早須休作若檢校人知彼諸人晨朝執作宜辦小食若午後作為覓非時漿及塗手足油不者得越法罪俗人一擔之重苾芻應分兩人雜事云僧伽不應立非法制非佛所制便名非法如元朝附會百丈清規等營作之人應食寺物尼陀那云僧伽淨地棄髮爪甲得惡作罪作菩薩像惟除脚釧耳璫餘一切莊嚴具悉皆聽作律攝云如來制底應圓滿作若獨覺者上無寶瓶若阿羅漢安四輪相餘之三果如次減一若湻善異生苾芻上無輪干名平頭制底目得迦云造窣堵波小者得增大大者不應減小若有俗人能大作者善如不能辦苾芻應勸化助造若久故破壞應修營若佛像泥素虧壞或增令大或相似隨意作諸綵畵像不分明者應可拂除更為新畵諸餘葉紙佛經磨滅應拭故者更可書新徧持經部徧持律部總持論部者不應差作知僧事人為僧伽故應可受田所收果實應受用應準王法與彼耕人作其分數凡營作檢校苾芻先報寺中耆宿方可貸人或為券記保證分明僧祇律云眾僧田地不得借人不得賣不得私受用正使一切集僧亦不得借人不得賣不得私受用若園田地好惡人欲侵者得語檀越知是地若檀越言此是好園田何故知應答言此園田雖好惡人欲侵任檀越轉易僧有空地人來索與僧作房者應先與要齊幾時得作若言爾許時作應語言若爾許時不作者當更與餘人若二人俱索一人言我為僧作一重閣一人言我作二重閣僧應與作二重者如是乃至七重若俱言七重閣應與能成辦者若俱能成辦應與眷屬多者若不先作要與他者越毗尼罪舊比丘法不得自住好房好牀褥枕留弊壞垢膩者待客當修治好者待客南海寄歸云苾芻衣服多出常住僧或是田園之餘或是樹果之利年年分與以充衣直葢施主本捨村莊元為給濟眾僧豈容但與其食而令其露體住乎供食之餘充衣非損斯乃西國僧眾大途議論又神州道場或自有給衣之所亦得食通道俗此據施主元心設令䬸噉理亦非過凡是布施僧眾田宅乃至雜物並通眾僧衣食者此則誠無疑慮之患若元心作無盡無障之意者雖施僧家情乃普通一切但食用者咸無過也並由施主先心所期耳僧家作田須共淨人為其分數僧但給牛與地諸事皆悉不知或有貪婪不為分數自使奴婢躬檢營農護戒苾芻不噉其食以其僧自經理邪命養身驅使傭人非瞋不可壞種墾地蟲蟻多傷日食不過一升誰復能當百過是以耿介之士疾其事繁攜杖挾鉢棄之長騖獨坐靜林之野懽與鳥鹿為羣絕名利之諠囂修涅槃之寂滅若為眾家經求取利是律所聽墾土害命教門不許損蟲妨業寧復過此音義幬音道又音陶帳也䌵音竹綴帶縋音墜以繩有所懸也荼音徒不見翻譯應作蕤儒追切大嚫或云達儭或云檀噺報施之法即呪願也鉤鉢恐即次鉢小鉢之類㹀音字牝牛䭾音駝牡馬闍維或云耶旬或云茶毗西域記云涅疊槃那此翻焚燒鏵音華鍬此遙切十衣西域布帛之類凡有十種如麻布棉布等銚他彫切又徒弔切鐏音纘音宵鳥尾翹毛也襻普患切衣下絲撚乃殄切以指搣物也犍椎鐘鼓魚磬之類打之以集眾者苦酒醋也窣堵波或云浮圖或云偷婆或云私偷簸或云塔婆今略云塔翻為方墳亦翻圓塜亦翻高顯義翻靈廟涅槃後分云佛塔十三層上有輪相辟支塔十一層阿羅漢四層輪王無復層級未脫三界諸有苦故婪音嵐亦貪也緤音屑係也
