body:
  text: 古吳蕅益沙門智旭彚釋二十三非親織衣戒大乘為衆不同學若比丘自乞縷線使非親里織師織作三衣者尼薩耆波逸提緣跋難陀欲縫僧伽梨入舍衛城至居士家處處求線乞得線多遂使織師織作三衣自作繀自看織居士見而譏嫌故制相若看織若自纏若自作繀盡突吉羅比丘尼捨墮餘三衆突吉羅不犯者織師是親里與線者是親里自織作鉢囊等小用物僧祇律云自行乞縷越毗尼心悔得者越毗尼罪織成者捨墮十誦律云使非親里織師織者捨墮從非親里乞縷突吉羅若自織令五衆織突吉羅根本律云若酬價織者無犯薩婆多論云若少衣正應乞衣不應乞縷作衣須縷縫衣作帶無罪二十四求織好衣戒大乘同制是惡求多求故若比丘居士居士婦使織師為比丘織作衣彼比丘先不受自恣請便往織師所語言此衣為我作與我極好織令廣大堅緻我當少多與汝價是比丘與價乃至一食直若得衣尼薩耆波逸提緣舍衛城有一居士出好線令織師為跋難陀織衣織師語跋難陀彼即遣織廣大堅緻者織師言線少跋難陀至居士家更乞線居士婦出線箱即恣意擇取好者持與織師織師言價少即更許與價居士從他處還見非先所敕織問知其故便生譏嫌故制是後比丘疑不敢答自恣請亦不敢索不如者佛言先受自恣請者不犯相求得衣捨墮不得突吉羅比丘尼捨墮餘三衆突吉羅不犯者或為他他為己不乞而得僧祇律云若但往勸不許價得衣者越毗尼罪十誦律云不犯者自有物令織師織二十五與衣瞋奪戒大乘同學若比丘先與比丘衣後瞋恚若自奪若教人奪取還我衣來不與汝若比丘還衣彼取衣尼薩耆波逸提緣難陀弟子善勸化跋難陀語言與我共行人間當與汝衣餘比丘語言汝以何事共跋難陀行彼癡人不知誦戒説戒布薩羯磨後彼比丘即不隨行跋難陀乃索前衣比丘不還即瞋恚強奪比丘高聲言莫爾比房聞之集聚問故白佛結戒相奪而藏舉取離本處捨墮不藏舉不離處突吉羅比丘尼捨墮餘三衆突吉羅不犯者不瞋恚彼人即還衣或餘人勸令還衣若借衣者無道理故奪若恐失衣若恐壞若彼破戒破見破威儀若被舉若滅擯若應滅擯若為此事命難梵行難如是一切奪取不藏舉僧祇律云或合與別奪或別與合奪或合與合奪或別與別奪合奪者得一波逸提別奪者得多波逸提若與衣時作是言住我邊者與不住者奪或言汝適我意者與不適意還奪或為受經故與不受經還奪一切無罪或賣衣未取直直未畢仍取衣無罪或弟子不可教誡為折伏故奪後折伏已還與無罪十誦律云奪得捨墮不得突吉羅薩婆多論云奪五衆及與學行別住摩那埵盲瞎聾啞被舉人衣盡捨墮奪狂亂病壞心犯四重五逆人五法人衣盡突吉羅比丘尼奪比丘衣突吉羅奪尼等衣盡捨墮若先根本與他衣後為惱故暫還奪取捨墮衣捨還他波逸提懺若先根本與他衣後根本奪應計錢成罪直五錢犯重也若先暫與他衣後便奪取以忿恚欲令彼惱突吉羅若為折伏令離惡法暫奪無罪辨問四分奪破戒破見等者不犯薩婆多論奪與學乃至被舉人衣盡捨墮此復何從答若先與衣後因破戒等故奪則是折伏之心所以不犯若本是與學等人先以愛與後以瞋奪則是恣任凡情所以結過也二十六過七日藥戒此是遮罪大乘比丘同學若比丘有病殘藥酥油生酥蜜石蜜齊七日得服若過七日服者尼薩耆波逸提緣諸比丘秋月風病形體枯燥又生惡瘡佛聽服時非時五種藥畢陵伽婆蹉在羅閲城多有所識亦多徒衆大得酥油生酥蜜石蜜諸弟子積聚藏舉處處流漫房舍臭穢諸長者見而譏嫌故制相若犯捨墮藥不捨更貿餘藥一捨墮一突吉羅比丘尼捨墮不犯者過七日酥油塗戶響若蜜石蜜與守園人若至七日即與比丘食之根本律云應在午前當淨洗手受取其藥一同梵行邊作如是説具壽存念我苾芻某甲有此病緣清淨醫藥我今守持於七日內自服及同梵行者如是三説若已服一日即告同梵行者云此病藥已服一日餘有六日在我當服之乃至七日皆應告知過七日已尚有餘藥應捨與淨人或與求寂律攝云為好容儀或著滋味或求肥盛或詐偽心服食諸藥皆惡作罪十誦律云若重病不犯食是四含消時應作是念我以治病故含不為美味五分律云應捨與僧僧捨與白衣沙彌若用然燈塗足捨藥比丘不得用一切比丘皆不得噉二十七雨衣求用非時戒大乘同學若比丘春殘一月在當求雨浴衣半月應用浴若比丘過一月前求雨浴衣過半月前用浴尼薩耆波逸提緣佛在祇園毗舍佉母請佛及僧時天大雨佛敕比丘雨中浴婢來白時到遙見比丘裸形浴疑是外道還白主母佛既受供母請八願願與客比丘食遠行比丘食病比丘食病比丘藥瞻病人食食粥比丘雨浴衣比丘尼浴衣佛皆聽之時六羣即一切時求雨浴衣不捨雨衣便持餘用故制相三月十六日應求四月一日應用過前求過前用皆捨墮僧祇律云此衣不得受當三衣不得淨施不得著入河中池中浴不得小小雨時著浴當大雨時被浴若雨卒止垢液著入餘水中浴無罪餘時亦不得裸身浴當著舍勒或餘故衣不得著雨衣種種作事若食時欲以油塗身若病時若多人行處得繫兩頭作障至八月十五日當捨一比丘僧中唱大德僧聽今日僧捨雨浴衣如是三説若至十六日捨者越毗尼罪捨已得用作三衣亦得説淨亦得入餘水浴種種著作無罪薩婆多論云尼得畜浴衣不得畜雨浴衣比丘畜雨浴衣凡有二事一雨時障四邊於中浴天熱時亦以自障於中浴二以夏月多雨常裹三衣擔持行來若閏三月不應前三月求比丘不畜雨浴衣無罪二十八過時畜急施衣戒大乘為衆生故得畜然須如法淨施如前説若比丘十日未竟夏三月諸比丘得急施衣比丘知是急施衣當受受已乃至衣時應畜若過畜者尼薩耆波逸提緣佛在毗蘭若夏安居竟婆羅門設供施衣佛聽比丘受夏衣六羣即一切時常乞衣安居未竟亦乞衣亦受衣又跋難陀在一處安居竟聞異處大得衣乃處處分得衣分持入祇桓少欲比丘白佛訶責時舍衛國梨師達多富那羅二大臣受王命征反叛自念未知得生還否欲為僧設食施衣諸比丘以安居未竟不敢受衣白佛佛聽受乃結戒釋急施衣者受便得不受便失衣時者自恣竟不受迦絺那衣一月受迦絺那衣五月自恣十日在得急施衣應受應畜至衣時若九日在得急施衣應受應畜至衣時更增一日乃至一日在得急施衣應受應畜至衣時更增九日相過前過後俱捨墮比丘尼捨墮不犯者奪衣失衣等故過前奪失等想故過後根本律云若在夏中或施主欲自手行施取亦無犯若差得藏衣苾芻或施主作是語我行還自手當施雖過時分畜亦無犯薩婆多論云除十日急施衣一切安居衣必待自恣時分若安居中分突吉羅二十九後月離衣過六夜戒大乘比丘同學僧祇云夏三月未滿五分云安居三月未滿八月十誦云三月過未至八月未滿歲根本云在阿蘭若處作後安居按迦提翻功德又翻昴星昴星直此月故謂七月十六至八月十五名迦提月也滿字準餘四部應須讀聯下句謂受後安居者雖隨前安居衆七月十五自恣仍須滿此一月住阿蘭若以終後安居局故不許離衣也若比丘夏三月竟後迦提一月滿在阿蘭若有疑恐懼處住比丘在如是處住三衣中欲留一一衣置舍內諸比丘有因緣離衣宿乃至六夜若過者尼薩耆波逸提緣佛在舍衛國諸比丘安居竟後迦提一月滿在阿蘭若處住多有賊難皆趣祇桓聚住佛知其故聽留一一衣置舍內六羣即留衣舍內囑親友比丘已出行受囑者出衣曬之諸比丘白佛制戒釋阿蘭若處者去村五百弓遮摩羅國弓長四肘用中肘量有疑處者疑有盜賊恐怖者中有恐怖賊盜舍內者村聚也五分律云一一衣者若僧伽梨若優多羅僧隨所重寄一衣不得寄安陀會以著身故不得寄二以禮拜入僧乞食不得單著故有因緣者若有塔事二師事及以他事相第七夜明相未出前不捨衣不手捉衣不至擲石所及處住明相出捨墮不犯者劫奪等想船濟不通及餘阻難僧祇律云除僧羯磨得一月不失衣五分律云若一宿二宿乃至五宿事訖不還突吉羅律攝云本心暫去即擬還來因事稽留不至衣所無離衣過善見律云若阿蘭若處衆僧多房舍堅密不須寄衣聚落寄衣已六夜一往看見衣已還阿蘭若處三十回僧物入己戒大乘同制若比丘知是僧物自求入己者尼薩耆波逸提緣舍衛國有一居士恆好惠施欲飯佛僧兼施好衣跋難陀語言施僧者多汝今食可施僧衣可施我居士聽之次日衆僧赴請居士見威儀具足發大聲悔不施衣比丘問知其故白佛結戒時諸比丘不知是僧物非僧物為許僧不許僧後乃知是僧物已許僧或作捨墮懺或慚愧佛言不知無犯釋僧物者為僧作已與僧已許僧物者衣鉢坐具針筒下至飲水器相知是僧物自求入己捨墮若僧物轉與塔塔物轉與僧及四方僧物現前僧物比丘僧物比丘尼僧物轉轉相與盡突吉羅比丘尼捨墮餘三衆突吉羅不犯者已許不許想若許少勸令多與若許少人勸與多人許惡勸與好者根本律云已許許想及疑捨墮未許許想及疑突吉羅已許未許想未許未許想無犯僧祇律云若有人欲布施問比丘言應施何處答言隨汝心所敬處復問何處果報多答言施僧果報多復問何等清淨持戒有功德僧答言僧無犯戒不清淨者若人持物來施比丘應語言施僧得大果報若言我已曾施僧今正欲施尊者受之無罪若知物向僧回令向己捨墮是物僧不應還僧應受用若回與餘人波逸提知物向此僧回與餘僧等皆越毗尼罪知物向此畜生回與餘畜生越毗尼心悔五分律云若施主自回欲與僧物與已不犯薩婆多論云若物向他回令向己應捨還之若回此塔物向彼塔回此僧祇物向彼僧祇不須還取但作突吉羅懺若自恣臘回此衆僧向餘僧者應取還作突吉羅懺不還者計錢成罪面門臘亦如是三結問諸大德我已説三十尼薩耆波逸提法今問諸大德是中清淨不三説諸大德是中清淨默然故是事如是持四三十捨墮法竟五九十波逸提法三初總標二別列三結問初總標僧祇律九十二五分律九十一諸大德是九十波逸提法半月半月説戒經中來釋根本律云波逸底迦者是燒煮墮落義謂犯罪者墮在地獄傍生餓鬼惡道之中受燒煮苦又此罪若不殷勤説除便能障礙所有善法二別列九十初妄語戒至九十等佛衣量戒初妄語戒此是性罪大乘同制救衆生故得開若比丘知而妄語者波逸提釋象力釋子與外道梵志論議若不如時便違反前語若僧中問時即復違反前語梵志譏嫌故制相見聞觸知等八種妄語説而了了波逸提不了了突吉羅説戒時乃至三問憶念有罪而不説突吉羅比丘尼波逸提餘三衆突吉羅根本律云違心而説皆得墮罪若不違心而説者皆無犯附律攝云佛弟子言常説實不應為盟自雪表他不信故設被誣謗亦不應作誓十誦律云不得自呪呪他不得以物自誓誓他不得自投竄令他投竄呪與投竄一種故即今投狀訴神等事二毀呰戒此是性罪大乘同制若但毀呰結輕若合自讚結重若增上煩惱犯者失菩薩戒若比丘種類毀呰語者波逸提緣六羣斷諍事種類罵比丘比丘慚愧忘失前後不得語故制釋相種類毀呰人者卑姓卑行業卑伎術工巧或言是犯過人多結使人禿瞎人禿盲人如是等若面罵言汝是旃陀羅家生乃至衆患所如人等若喻罵言汝似旃陀羅家生等若自比罵言我非旃陀羅等盡波逸提不了了者突吉羅若以説善法而面罵喻罵自比罵者了了不了了盡突吉羅説善法者阿蘭若乞食補納衣乃至坐禪人面罵云汝是阿蘭若等喻罵云汝似阿蘭若等自比罵云我非阿蘭若等比丘尼波逸提餘三衆突吉羅不犯者相利故説為法為律為教授故説為親厚故説或戲笑説失口説獨説夢説誤説五分律云毀呰餘四衆突吉羅比丘尼毀呰比丘比丘尼波逸提毀呰餘三衆突吉羅三兩舌戒此是性罪大乘同制若比丘兩舌語者波逸提緣六群傳彼此屏語遂至衆中未有鬬事而生鬬已有鬬事而不滅故制相了了不了了同上比丘尼等同上不犯者破惡知識惡伴黨非法非律羯磨無義無利數數語等附官處言人者突吉羅十誦律云若白衣於寺中欲作惡事侵惱比丘應苦切語令其折伏若不折伏不應直向王言先語是惡人知識次語王夫人及王子大臣等若是人捨惡便止莫令得事四與婦女同室宿戒大乘同學若比丘與婦女同室宿者波逸提緣阿那律從舍衛國向薩拘羅國路至無比丘住處村聞一淫女家常安止賓客即往寄宿門下時有諸長者亦來投宿坐相逼近淫女愍念尊者令入舍內尊者結加趺坐繫念在前淫女於初夜來求作夫默然不答亦不觀視到後夜淫女復脫衣來前捉之尊者湧身空中淫女慚愧著衣合掌懺悔至三尊者下在本處説微妙法淫女得法眼淨受三歸五戒為優婆夷次日尊者受其供養説法而去還僧伽藍向衆僧説少欲者譏嫌白佛結戒釋室者有四周牆壁障上有覆或前厰而無壁或雖有覆而不遍或雖覆遍而有開處相比丘及婦女或先後到或俱至若欹臥隨脅著地波逸提隨轉側波逸提與鬼畜女及黃門二根人同室宿突吉羅晝日婦女立比丘臥突吉羅比丘尼波逸提餘三衆突吉羅不犯者不知有婦女屋缺覆障若行若坐病臥捉縛五分律云若同覆異隔若大會説法若母姊妹近親疾患有有知男子自伴不臥皆不犯律攝云若天龍女可見形者及傍生女同處宿咸得惡作小傍生女不堪行淫者不犯若有父母夫主等守護者同宿無犯五同未受大戒人三宿戒大乘比丘同學若比丘舉未受大戒人共宿過二宿至三宿波逸提緣六群與諸長者共在講堂止宿一比丘散心睡眠轉側露形有比丘以衣覆之復更轉側露形如是至三長者譏嫌調弄故制後佛在拘睒毗國諸比丘以羅云未受大戒遣出羅云往廁止宿世尊知之詣廁引入自房共止一宿明日集比丘告言汝等無慈心乃驅出小兒自今聽比丘與未受大戒人共二宿若至三宿明相未出時應起避去若至第四宿應自去或使彼去相犯不犯同上比丘尼波逸提僧祇律云若與未受具人同屋宿當以縵障若齊項若齊掖縵下至地不得容貓子過十誦律云有病比丘使沙彌供給雖臥無犯是中有不病比丘不應臥根本律云若安居後有惡比丘來入寺中師主應與求寂同房宿至夏終勿致疑惑夏罷已能驅者可擯斥之不可擯者應將求寂別詣餘寺如在行路雖過二宿通夜應眠勿生疑惑附根本目得迦云不合與俗人求寂授學人別在人等同坐必有難緣無犯六與未受戒人共誦戒大乘比丘同學若比丘與未受戒人共誦者波逸提戒因緣經云若比丘向未受戒者説一句戒法波逸提按善見律亦同此意蓋以五篇之名惟大僧法沙彌等知便成遮難故也緣六群與諸長者共在講堂誦佛經語聲高大如婆羅門誦書聲亂諸坐禪者故制釋未受戒人者除比丘比丘尼餘者是僧祇律云雖比丘尼受具戒亦不得教若授弟子經應教言待我誦斷汝當誦若不受語者不復得教五分律云並誦者俱時誦或授聲未絶彼已誦或彼誦未竟此復授相師不教言我説竟汝可説者突吉羅比丘尼波逸提不犯者我説竟汝説若二人同業同誦等善見律云佛涅槃後迦葉為上座五百阿羅漢所集三藏若共未受具人同誦波逸提若法師所撰文字共同誦者不犯七向外人説他粗罪戒大乘同制義疏云説過者有兩一陷沒心欲令前人失名利等二治罰心欲令前人被繫縛等此二心皆是業主必犯重戒若獎勸心説及被差説罪皆不犯又犯七逆十重前人失戒失戒後説但犯輕垢若比丘知他有粗惡罪向未受大戒人説除僧羯磨波逸提緣佛在耆闍崛山時有行波利婆沙摩那埵比丘在下行坐六群語諸白衣此等犯如是事故罰在下行坐有過比丘聞之慚愧餘比丘亦慚愧白佛結戒後舍利弗為僧所差在王衆人民衆中説調達過生畏慎心佛言僧差無犯釋粗惡者波羅夷僧殘僧者一羯磨一説戒相若説了了波逸提不了了突吉羅除粗罪以餘罪向未受戒人説突吉羅自犯粗罪向未受戒人説突吉羅除比丘比丘尼以餘人粗罪向未受戒人説突吉羅比丘尼波逸提餘三衆突吉羅不犯者白衣先已聞此粗罪等僧祇律云比丘尼雖受具戒亦不得向説根本律云若於不知俗家作不知想疑向彼説得墮罪若於知俗家作不知想疑向彼説得惡作不犯者於不知俗家作先知想等五分律云教向甲説而向乙説教説此罪而説彼罪皆波逸提十誦律云若羯磨此比丘作説罪人餘比丘説者突吉羅若令向此人説此處説向餘人餘處説者突吉羅若僧作隨意隨時隨處説罪羯磨者説無犯薩婆多論云寧破塔壞像不向未受具人説比丘過若説過罪則破法身故若説二篇罪名波逸提説罪事突吉羅辨問五分教向甲説而向乙説等皆波逸提十誦向餘人餘處説僅突吉羅此復何從答既被僧差則所向雖或失當似宜從十誦結輕然設以惡心欲令陷沒故向乙説復宜從五分結重也八向外人説證法戒大乘同學若比丘向未受戒人説過人法言我見是我知是實者波逸提戒因緣經乃因向沙彌説故制緣起自婆裘園比丘故制如初篇中廣説相了了波逸提不了了突吉羅向鬼畜説突吉羅向受大戒非同意者説突吉羅比丘尼波逸提餘三衆突吉羅不犯如初篇中説五分律云受大戒人不問而向説語語突吉羅不犯者泥洹時説十誦律云實是阿羅漢乃至得阿那般那念向他説波逸提實好持戒向他説突吉羅天來等波逸提土鬼來突吉羅律攝云對俗人現神通得惡作罪不犯者為顯聖教現希有事或欲令彼所化有情心調伏故雖説無罪薩婆多論云為名利故言我清淨持戒實誦三藏隨所誦經隨所解義隨能問答向人説者盡突吉羅摩得勒伽云向狂人散亂心人重病人説突吉羅九與女人過説法戒此是遮罪大乘同學護譏嫌故必若不起譏嫌隨機廣略無犯若比丘與女人説法過五六語除有知男子波逸提緣迦留陀夷乞食到長者家在姑前與兒婦耳語説法姑見生疑故制是後比丘不敢為女人説法乃更結此戒文釋五語者色無我乃至識無我六語者眼無常乃至意無常有知男子者解粗惡不粗惡事律攝云五六相應所有言語名五六語相比丘尼波逸提餘三衆突吉羅不犯者有知男子前過五六語説若無有知男子前授五戒説五戒法授八關齋説八關齋法説八聖道十不善法十善法及女人問義應答若不解應廣説五分律云為女人説五六語竟語言法正齊此從坐起去更有因緣還復來坐為説不犯若説五六語竟更有女人來為後女人説如是相續為無量女人説皆不犯若自誦經女人來聽若女人問義要使得解過五六語皆不犯薩婆多論云女謂能受淫欲者若未堪任作淫欲者突吉羅十掘地戒此是遮罪大乘比丘同學若比丘自手掘地若教人掘者波逸提緣六群為佛修治講堂周匝自掘地長者譏嫌斷他命根故制乃更教人掘長者復譏嫌佛更結戒釋地者已掘地未掘地若已掘地經四月被雨漬還如本十誦律云地有二種生地不生地多雨國土八月地生驚蟄後立冬前少雨國土四月地生夏四月也除是名不生地律攝云生地者謂未曾掘若曾經掘被天雨濕或餘水霑時經三月是名生地若無雨濕及水霑潤時經六月亦名生地異此非生相若用鋤或以钁斫或以椎打或以鎌刀刺刀乃至指爪掐傷地打橛入地地上然火一切波逸提若不教言知是看是突吉羅比丘尼波逸提不犯者若語言知是看是此是淨語也令彼淨人自知自看所應掘所應置處比丘不應直言掘是置是也若曳材木曳竹若籬倒地扶正若反磚石取牛屎取崩岸土若取鼠壤土若除經行處土若除屋內土若往來經行若掃地若杖築地若不故掘僧祇律云若河邊坎上以腳踏墮踏踏波逸提坎岸邊行土崩無罪若營事比丘多有塔物僧物欲藏地中若在露處生地不得自掘當使淨人知若在覆處死地得自掘藏釘栓古橛字拔橛亦爾若死土被雨已不得自取使淨人取盡雨所洽際然後自取無罪掘地波逸提半沙越毗尼罪純沙無罪石薑石糞灰亦如是十誦律云掘不生地一一掘突吉羅掘生地一一掘波逸提手畫地乃至沒芥子一一畫突吉羅若比丘作師匠欲新起佛圖僧坊畫地作模不犯餘比丘畫者犯罪若生金銀等礦處若雌黃赭土白墡處生石處黑石處沙處鹽處掘者不犯根本律云掘生地波逸底迦非生地惡作罪釘橛波逸底迦拔橛惡作罪若營作苾芻欲定基時得好星候吉辰無有淨人應自以橛釘地記疆界深四指者無犯五分律云餘三衆無事掘地突吉羅若取燥土不犯十一壞鬼神村戒此是遮罪大乘比丘同學若比丘壞鬼神村波逸提緣有一曠野比丘修治屋舍自斫樹木故制釋鬼者非人是村者一切草木是相若自斷自炒自煮教他斷炒煮盡波逸提打橛著樹上以火著生草木上斷多分生草木盡波逸提斷半乾半生草木突吉羅比丘尼波逸提不犯者言知是看是斷枯乾草木及一切誤斷五分律云若比丘一一所須語淨人言汝知是若不解復語言汝看是若不解復語言與我是若自伐鬼村若使人言伐是波逸提生草生草想疑皆波逸提乾草生草想疑皆突吉羅乾草乾草想生草乾草想不犯餘三衆無故殺生草木突吉羅若為火燒若折若斫知必不生不犯諸比丘住處庭中生草聽使淨人知薩婆多論云有三戒大利益佛法不得擔不殺草木不掘地若不制三戒國王當使比丘作役三衆是淨人故不犯不得上樹取果搖樹取果摩得勒伽云以灰土沙覆生草突吉羅語餘人言取是果我欲食突吉羅生果未淨全咽突吉羅取木耳突吉羅打熟果落突吉羅打生果落波逸提善見律云木倒笮比丘而不死雖手中有刀斧等寧守死不斫木掘土以脫命何以故掘土斫木得墮罪智慧人寧守戒而死不犯戒而生若人放火來燒寺為護住處得剗草掘土以斷火不犯樹有二種一水生二陸生蓮華浮萍水生若水中翻覆突吉羅若離水波逸提若須華果得攀樹枝下使淨人取不犯不得令枝折若樹高淨人不及比丘得抱淨人取不犯若樹押人比丘得斫樹掘地以救其命不犯上云不得是自救故此云不犯為教他故全同大乘教意僧祇律云有國土作穀聚畏非人偷以灰火燒上作識即此為淨如摩摩帝有倉穀未淨畏年少比丘不知法使淨人火淨至倉穀盡比丘恆得語言舂去不犯根本律云凡授事人為營作故將伐樹時於七八日前在彼樹下設諸祭食誦經呪願説十善道讚歎善業復應告言若於此樹舊住天神應別求居止此樹今為三寶有所營作過七八日已當斬伐之若伐樹時有異相現者應為讚歎施捨功德説慳貪過若仍現異相即不應伐若無別相應可伐之謂使淨人知非謂比丘可自伐也證根本雜事云得叉尸羅國有醫羅鉢龍王化身為摩納婆形持滿篋金遍遊諸處説偈問言何處王為上於染而染著無染而有染何者是愚夫何處愚者憂何處智者喜誰和合別離説名為安樂若有解者即以金篋供養然無有人能解釋者漸行至婆羅尼斯國復如是唱有人報言有上智人住阿蘭若名那剌陀當解斯義未幾那剌陀至龍以偈問彼聞記憶告言十二年後當為汝釋龍言時太長久漸求減至七日時那剌陀即往告五苾芻苾芻答言汝可問佛即詣鹿林禮足而坐佛為説法證預流果願求出家佛言先為摩納婆解釋頌義然後出家應如是答第六王為上染處即生著無染而起染説此是愚夫愚者於此憂智人於此喜愛處能別離此則名安樂彼若不解更為説頌若人聞妙語解已修勝定若聞不了義彼人由放逸彼若更疑汝可對彼以爪截葉若問世尊出世報言已出若問何處報言在施鹿林時那剌陀受佛教已至彼龍所具答如上彼龍化作轉輪聖王往世尊所佛言汝愚癡人於迦攝波佛時受佛禁戒不能護持感此下劣長壽龍身今者何故還起詐心汝今可復本形龍言世尊我是龍身多諸怨惡恐有衆生共相損害佛敕金剛手為之守護龍王別至一處遂復本形身有七頭頭尾相去有二百驛一一頭上各生一醫羅大樹被風搖動膿血皆流霑污形骸臭穢可惡當有繩蛆諸蟲遍其身上晝夜唼食是時龍王即以本身詣世尊所禮足却住白言唯願世尊為我授記當於何日捨此龍身佛言當來人壽八萬歲時有佛出世號曰慈氏為汝授記當免龍身龍王悲哭諸頭眼中一時淚出成十四河駛流驚注佛令裁止勿致損國頂禮佛足忽然不現大衆問其往因佛言迦攝佛時此龍於佛法中出家修行善間三藏具習定門經行醫羅樹下以自策勵樹葉打額即便忍受後時繫心疲倦從定而起策念經行葉還打頭極痛發瞋怒心即以兩手折其樹葉投地作如是語迦攝波佛無情物上見何過咎而制學處令受斯苦由彼猛毒瞋心毀戒命終墮此龍中附五分律云不得為鬼神及外道師作塔已作者不聽壞根本尼陀那云於天神處不應供養亦勿欺凌十二異語惱他戒此是性罪大乘同學若比丘故作異語惱他者波逸提緣闡陀犯罪諸比丘問之即以餘事報言汝向誰語為説何事為論何理為語我為語誰耶是誰犯罪罪由何生我不見罪云何言我有罪諸比丘譏嫌白佛佛令僧為作餘語白乃結戒云若比丘餘語者波逸提闡陀因不作餘語便觸惱衆僧喚來不來不喚來便來應起不起不應起便起應語不語不應語便語佛更令僧作觸惱白而結此戒相僧未作餘語白而餘語突吉羅若作白已而餘語波逸提僧未作觸惱白而喚來不來等盡突吉羅若作白已而觸惱盡波逸提若上座喚來不來突吉羅比丘尼波逸提餘三衆突吉羅不犯者重聽不解或前語有參差故似餘語前人作非法事或一坐食有病難等故似觸惱根本律云若苾芻見獵人逐麞鹿等入寺內彼問頗見有鹿從此過不不應答言見若是寒時報言可入溫室向火若是熱時報言可入涼室飲水若彼云我不疲倦我問走鹿應先自觀指甲報言我見指甲若更問者應觀太虗報言我見太虗若彼云我不問指甲及太虗然問可殺有情於此過不即應遍觀四方作如是念於勝義諦一切諸行本無有情報言我不見有情此皆無犯若餘問時不如實答皆得墮罪附不恭敬戒餘部皆有此戒大意與前戒同也十誦律云若比丘不恭敬者波逸提闡那於上座説法律時作異語答難故制僧當為記不恭敬事白四羯磨若未記前語令莫作答言不作而實作或答言當作而實作皆突吉羅若僧記不恭敬後語令莫作答言不作而實作或答言當作而實作皆波逸提五分律云輕三師及戒一一波逸提輕餘比丘突吉羅乃至師令掃地而不掃教順掃而逆掃皆突吉羅比丘尼亦如是餘三衆突吉羅律攝云不敬僧伽得墮罪不敬別人得惡作罪五種教敕不得虧違一國王二如來大師三衆中上座四阿遮利耶即阿闍梨五塢波馱耶即和尚辨國王教敕謂國家常法也比丘不得干國憲故若非理敕令朝拜作役等所不應從藏中有集沙門不應拜俗等事六卷比丘不可不看也又除如來大師若二師上座有非法教亦不應從四分律云不應在和尚和尚等多己十夏阿闍梨阿闍梨等多己五夏前通肩披衣著革屣有所取與除在白衣舍不犯又道行及日入時得著革屣又見二師上座應起迎除一坐食或作餘食法不食或病應作是語大德忍我有如是因緣不起音義繀蘇對切箸絲於筟車五法人受調達破僧五法著舍勒內衣短裙也阿那律或云阿䨲樓馱阿那律陀阿泥盧豆阿泥律陀此翻無滅亦翻如意亦翻無貧過去飢世曾以稗飯施辟支佛九十一劫於天人中受如意樂無所貧乏至今果報猶不滅也佛之堂弟天眼第一钁丘縛切大鉏也斫音捉鎌音廉鉤刀亦名鍥子爪側絞切掐苦洽切赭音者赤土墡上演切白土笮音責壓也押音鴨按也亦壓也得叉尸羅未見翻譯醫羅鉢亦云伊羅跋羅伊羅樹名此翻臭氣跋羅此翻極由此龍王往昔損此樹葉故致頭上生此臭樹摩納婆此翻儒童婆羅尼斯舊云波羅奈河名也去河不遠造立王城或翻為江繞城那剌陀未見翻譯駛音使又去聲馬行疾也
